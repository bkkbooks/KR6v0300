body:
  text: 金知見著慈怡譯譯者按均如大師為韓國華嚴學者由於其著作在長時期中未被發現因此其華嚴學研究迄不為世人所知曉幸於近世在釋華嚴教分記圓通鈔之書末發現有赫連挺的均如傳及序均如的業績及部分教學才較明確地呈現出來加上韓國金知見博士的苦心鑽研均如大師在華嚴學上的價值始被肯定一九七六年韓國大韓傳統佛教研究院出版金博士所編之均如大師華嚴學全書中文為研究韓國華嚴學者的一大貢獻均如大師及其著述之歷史意義由此乃告大白於學術界此事雖為韓日佛學界所樂道然國人知之者不多故譯此解題於此以供國內佛教界參考一均如全書的價值性為確立均如大師華嚴學全書的價值性有如下幾個問題值得商榷高麗宣祖七年西元一九年大覺國師義天一五五一一一年編輯新編諸宗教藏總錄三卷其內容為網羅古來學僧們對於經律論三藏等的研究章疏其成果之巨堪稱為嚆矢義天耗費約二十餘年的時間將當時流行於高麗遼宋日本等國之諸家章疏蒐集整理成為一部約千八十五部四千八百五十七卷的大巨作後來直至現代凡欲考察漢譯經典中諸家章疏之存否必須參考義天錄以其為基準此為眾所週知之事因此在東洋佛教思想中義天的業績有著頗高的評價但遺憾的事在義天龐大的目錄中對於均如的著作却未及一言相反地還有如下一段記載世所謂均如梵雲真派靈潤諸師謬書語不成文義無變通荒蕪祖師熒惑後生者莫甚於斯矣於此若依義天之指摘則可見均如與義天相形之下均如的學問與人品皆較貧乏關於此問題容後再作一詳細的比較一九一八年三月十日新久館刊行李能和著之朝鮮佛教通史上中下三卷如書名所稱為朝鮮佛教通史之重要資料價值頗高可作為永久之參考資料然而此書中對於均如却仍隻字不提因此在長久的歲月中若是海印寺藏經閣中之所藏有關均如的著述不能發現的話均如的業績豈不永遠地將從佛教史上被剔除但是不幸中之幸者約五十餘年前於調查海印寺藏經閣所藏之高麗大藏經及其補版時發現了釋華嚴教分記圓通鈔十卷依其書末所附之大華嚴首座圓通兩重大師均如傳並序均如的業績及部分教學始明確地呈現出來均如傳為高麗文宗二十九年遼成擁十一年一七五年進士赫連挺所撰述其分量約有八千餘字內容可分為初降誕靈驗分六感通神異分二出家請益分七歌行化世分三姉妹齊賢分八譯歌現德分四立義定宗分九感應降魔分五解釋諸章分十變易生死分上記之十部門中特別是第七歌行化世分與第八釋歌現德分在國文學上為無二之寶典因此均如又被認為是一個國文學者從含有民族意識的二十五首鄉歌中均如的普賢十種願王歌即佔十一首由此可窺知一班由於約佔鄉歌半數分量的均如傳的發現因此才為世人所知曉其最早有研究發表者為日本學者小倉進平博士然而所最遺憾者乃均如的研究業績在國文學上相當著名但在佛教界中他的研究論文却不為人所重視如上面所述均如傳除釋華嚴教分記圓通鈔第十卷末尾所附之大華嚴首座圓通兩重大師均如傳以外其他並無任何文獻發現又迄今在均如的傳記中仍有不少謬誤存在其主要原因乃因最初一人之誤讀且未加批評的沿襲下來亦未解讀原典僅將其全部記述流傳之故均如傳及其研究從各方面而言均為不可或缺者關於均如的著述可說是一個有志於從事韓國華嚴學研究的學者的一座無盡藏寶庫新羅以後的華嚴學章疏幾乎沒有完整地流傳下來特別是新羅義湘的法界圖註釋為一價值豐富的重要資料又在華嚴思想上佔有重要地位的十錢法之理論關於其為韓國傳來或為中國所有的問題元曉對義湘之理論互相比較時除均如之著述外其他將難以尋覓其貴重性由此可知至於資料的價值性首先在韓國國文學的研究上具有如均如傳中所記錄的鄉歌十一首之分量的資料可說絕無僅有說到在華嚴學的研究上如均如之著述具有珍貴的內容分量又豐富者現在已不復存其中最珍貴的即唐代北宗禪的代表人物神秀六六七六的著作在高麗義天目錄中僅有妙理圓成觀三卷的記載至於妙理圓成觀的內容如何則無從知曉東洋的學界中迄今亦未曾介紹過然而在均如全書中却引用了妙理圓成觀或稱為神秀大師妙理圓成觀相當分量的內容數年前筆者尚在日本研究時曾於考察有關均如之事時發現了妙理圓成觀遂加以整理而後與當時日本禪宗學者關口真大博士大正大學教授及柳田聖山教授京都大學教授連繫皆不能獲得相信於是將內容複寫後分送出去始在日本學界中引起興奮當時的情景至今猶如畫面般浮現在眼前至於有關日本初期華嚴典籍傳來史的背景迄今仍有不能理解的問題存在即五教章之和本宋本的問題然而在均如的著述中此問題却如鑰投鎖般迎刃而解這並不僅是韓日間的問題而是包含中國的三國之間的問題因此新羅華嚴的資料在三國的華嚴研究上遂成為最具指導任務者關於此事歡喜之餘對於現實問題却又不能不反省諸如關於均如傳記的誤讀生年等的誤記等仍有加以研究的必要生年的問題均如於新羅景明王七年即高麗太祖六年九二三八月八日生於黃州荊岳之南父邊煥性母占命高麗光宗二十四年九七三六月十七日於歸法寺入寂世壽五十一僧臘三十六然而由於均如傳最初的誤讀而在各種著述中有異說產生這些異說在關心均如傳而深入研究的學者中指摘其為從前的誤讀即如日本在古田紹欽博士於三十五餘年前在三寶章的研究中曾論及其疑問在我國韓國亦於數年前有中央大學故梁在淵教授於其論文均如大師研究中曾詳細地檢討著有高麗朝漢文學研究的徐首生教授亦稱須將均如傳重加考察韓國佛教史的著者金煐泰教授亦編年表以修正從前的說法筆者曾將古田教授的三寶章研究與各種異說相互比較調查於十餘年前即着手整理但是誤讀均如傳者幾乎皆為專家究竟誰屬正確深為大家所關心今趁此機會有校正誤讀的必要茲將以前誤讀的著述中特別舉出較為普遍的問題忽滑谷快天博士說均如於天祐十四年後唐貞明三年新羅神德王六年生於黃州宋開寶六年光宗二十四年六月七日入寂世壽五十七金仍石博士說均如黃州人新羅神德王六年丁丑九一七生高麗光宗二十四年癸酉入寂小倉進平博士說均如大師於唐天祐十四年即新羅神德王六年九一七出生宋開寶六年即高麗光宗六年九七三入寂趙潤濟博士說大師俗姓邊氏名均如新羅神德王六年九一七八月八日於慶州之北荊岳南麓出生高麗光宗二十四年九七三入寂梁柱東博士說依據師之傳記略述其生涯師俗姓邊氏名均如新羅神德王六年唐天祐十四年西元九一七出生於黃州北荊岳南麓十五歲出家光宗二十四年宋開寶六年西元九七三入寂金思燁博士說均如大師俗姓邊氏名均如新羅神德王六年九一七於黃州北荊岳南麓出生高麗光宗二十四年九七三入寂壽五十七李秉岐氏說均如俗姓邊氏黃州人新羅神德王六年丁丑檀紀三二五生光宗二十四年癸酉示寂年五十七臘四十七崔南善氏說均如俗姓邊氏黃州人新羅神德王六年丁丑生光宗二十四年癸酉寂年五十七臘四十七李鶴洙說均如大師為華嚴宗高僧宗教詩人九一七九七三如上所述關於均如的出生年代為新羅神德王六年中國年號為唐天祐十四年西元九一七年上列九氏之說可確認其均屬一致均如這種出生年代的說法乃係依據均如傳之說亦即傳記中第一降誕靈驗分所記錄的內容為上列九氏誤讀均如傳中關於出生之部份記載如下初降誕靈驗分者首座俗姓邊氏諱均如也父曰煥性尚志立名母曰占命嘗於天祐十四年四月初七日夜夢見雄雌雙鳳皆黃色自天而下並入己懷至二十載占命年已六十而能有身懷滿二十一旬以此年八月八日誕師于黃州之北荊岳南麓之私第遁台葉村今黃州判官前拾遺李晙重修舊址號曰敬天之寺即其所也師始生容貌甚醜無可倫比父母不悅置諸街中有二鳥比翼連蓋兒身行路人見其異遂尋家而縷陳之父悔母恨而收育焉而諱厥狀乃置笥鬥穀給乳之義數月而後示於鄉黨師在襁褓善讀圓偈凡父口授十無一失者也從上記之原文看九氏皆將均如的出生年代認為係天祐十四年新羅神德王六年西紀九一七年實則當年為均如之母占命女史得夢之年並非均如的出生年代均如的出生年代應為天祐二十年八月八日亦即占命女史於天祐十四年四月初七日夢見黃色鳳凰雌雄自天而降入於懷內至天祐二十年其年母六十歲妊娠滿二十一旬之八月均如出生引用文中之二十載從其前後之文脈來看應為天祐二十年若將均如的出生年代當做天祐十四年則自四月得夢妊娠後八月出生僅不過為一五朔童這種常識上的理論是可以成立的若退一步說即自四月以前即妊娠以下面的理由亦可令天祐二十年出生的結論成立先從均如傳第三姉妹齊賢分的原文加以考察第三姉妹齊賢分者師久居練若後戀庭闈遂歸覲親顏與秀明鬥智初秀明先師三年而生是歲天祐十七年也女生而啼呼者有節長則聰悟絕倫嘗丐僧到舍讀法花經女自內聽之便生信焉因設席迎僧請為了讀僧讀八卷畢乃請一宿敷暢經旨凡所耳滄片無遺漏僧行謂女曰我即菩提留支三藏也汝是德雲比丘化身耳及師歸覲之日秀明請聞其業師講普賢觀音兩知識法門神眾千手二經文三寸所宣一字無失師又於初夜念諷華嚴六地義約五百問答秀明偷聽頓悟至後五年請書手記己所悟一文一句無闕疑也從上文中可知均如之姊秀明於天祐十七年出生則均如之出生應以三年後即天祐二十年較為妥當至於天祐之年號為唐最後之昭宣帝三年時為了唐朝即將滅亡而稱天祐唯僅四年即告結束因此天祐十四年或天祐十七年之記述皆失其正確性天祐二十年該為後梁末帝龍德三年或後唐建國初年即新羅景明王七年癸未西元九二三年從上面所引諸例加以整理則知均如的出生年代若依傳記的考證而訂正則其世壽法臘當然亦得重新訂正若以十五歲出家則出家後至入寂當為三十七年雖然其他更有異說但皆依此訂正關於這個問題乃綜合前述諸學者努力研究的成果僅做為回答一般人的疑問而已又拙著新羅佛教研究中之校注法界圖圓通記日本山喜房佛書林一九七三年刊亦可做為參考二從均如的著述中所發掘的新資料在研究均如的著述時意外地發現了很多已經散逸了的貴重資料包含在內真是感激不盡又其中亦有不少到現在連名字都未曾聽過的論著關於這些問題預定於均如全書出刊後再作整理在整理新資料時有一件必需加入者即西元一九六八年十一月十七日故冽岩朴鍾鴻博士的書信的一部份那是當時在日本發掘新羅元曉的著述判比量論的斷簡後曾送一份給博士他所回的一封信茲錄有關部份內容如下元曉的判比量論斷簡已經收到了確實為一貴重之寶物我相信元曉的十門和諍論之全文必定也可以在日本的某一寺院中找到心裏計算著將來若有機會一定前去踏查總之十門和諍論留待下次的機會再說至於其他的部分若也能夠一點一點地找出來將不知是一件怎麼歡喜的事冽岩氏所以那樣地在搜索十門和諍論乃因為其一生之念願在於總和的論理的完成又搜集整理我等之物深信亦為愛國的使命感所致然而在均如全書之中含有至今被蒐集之十門和諍論的斷簡以外者又其中亦有元曉的著述目錄中所遺漏的元曉法師的普法記的一部份內容此外如曉公或曉師之言元曉的華嚴經宗要道申章一道章二障義等亦引用不少當然不僅元曉而已在中國系的章疏或新羅系的章疏中見不到的論文亦不少類似這種問題若加以整理則以前的學說或許有些部分尚待修正或者可以開拓某種新的論究首先極具重要性者為有關中國禪宗的代表人物大通神秀六六七六的著述的資料以及有關日本初期華嚴宗典籍傳來的背景之問題即關於五教章的和本和宋本的資料此外如有關元曉的若干資料為應初學者之便而加以整理一神秀的妙理圓成觀關於北宗禪的創始者大通神秀的思想若與南宗禪之祖慧能六三八七一三相比較則知其有被誤解之處直至近年由於燉煌文獻的發現因此研究工作能顯著的進行此為眾所周知之事實可以說特別地以其著述為問題的發端例如一九四年久野芳隆氏的北宗禪燉煌本發見依明神秀思想以及一九五一年柳田聖山氏的祖師禪源流等論文中曾介紹神秀的著述華嚴經疏三十卷及妙理圓成觀三卷係以新編諸宗教藏總錄卷一為根據此新編諸宗教藏總錄為高麗大覺國師義天一五五一一一所編輯又若缺乏均如之著述以及體元之白花道場發願文略解等研究則神秀之著述妙理圓成觀可作為其內容之一部分或者直至現在恐怕尚無介紹者若將以上各項詳加考察則可以推測神秀的著述妙理圓成觀係從高麗均如之時期至義天編輯新編諸宗教藏總錄時為止又於十三世紀頃體元著述白花道場發願文略解時曾盛行一時於此必須附帶一提著即柳田聖山教授的北宗禪思想一文中關於神秀的資料曾作如下的推介若欲考察大乘無生方便門中所包含的華嚴思想則不能不看神秀的華嚴經疏三十卷與妙理圓成觀三卷關於這些資料在義天的新編諸宗教藏總錄卷一中只見其名却未能瞭解其內容於此情況之下韓國的金知見博士從高麗均如的著述及其他地方所引用者發現有妙理圓成觀的數點斷片又本來成為問題的宗鏡錄卷九十八所引用的神秀和尚的句子實際上也是其中之一部分教授曾如此地一面指摘一面却又冗長地引用其原文因此僅此將妙理圓成觀之資料列舉如下同時亦將十三世紀頃體元之部分介紹於次釋華嚴旨歸章圓通鈔卷上一一右左神秀法師妙理圓成觀云問裟婆既當花藏正中剎種上第十三重雜染上如何經說菩提場中金剛地寶樹等境界全是華藏本剎耶答本不定本末不定末裟婆雖在第十三層中有淨機所見全是本非末若非淨機全是末非本余異類剎應知亦爾應知華藏遍一切處染土互遍亦爾又復於最上同類世界現在本剎從本剎上應知亦爾更有二十層向上既爾向下亦爾或本剎東極輪圍山邊取一剎土為本應知彼剎或正當中東去更有不可說種余方類爾應知十方廓同法界而不壞本相宛然此即有邊與無邊合無邊與有邊合猶如圓珠於十方面求不得邊不坊不坊中邊分量斯在何以故無漏所起無生所生非分限取故又以華藏具眾緣成則是總相眾緣非一各現是別相以山河等同成花藏故是同相山河等相望各各異故是異相由此諸緣花藏得成是成相此一一緣住自法不移是壞相也又此華藏一塵具含眾德是總相盡花藏德一一不同是一塵之德名別相盡花藏一一德同成花藏一塵是同相一一德相望各異是異相由諸德故花藏一塵得成是成相此一一德恆住自法不曾有作是壞相如一塵既爾余亦如是由此總別相即緣成無碍問何故爾耶答一由法性本來常爾二現所受用則由往因具如經說釋華嚴旨歸章圓通鈔卷下四二左妙理圓成觀云但修一因何得滿果答圓因若成無不滿果不滿果者非圓因也若爾如諸知識豈非圓因果何不滿答常滿以一切佛即心佛故若爾一切佛是他成自何不成答離佛無自故常成法我未立故不成問於此身中土却諸見得成佛不若竟窮於果海故即得成佛此身如何答身無別相用彼本佛身為自身相此身是菩薩攝生身常因果故爾此與前身中義有何異答前是一念圓信此是初住終心故不同爾釋華嚴旨歸章圓通鈔卷下四二左妙理圓成觀云今辨此義略分四別一唯因門從無始時盡未來際恆是菩薩修萬行故二唯果門盡前後際恆時佛故何以故德相全真不墮時數無盡極故更無眾生可化度故三通因及果謂有發心及成正覺於一切時念念發心念念成佛四非因非果謂無心可發無佛可成何以故真法界中無二性故釋華嚴旨歸章圓通鈔卷上二十四左神秀公他化自在主伴無碍觀云一為主不得更有主伴亦爾者如光明覺品此處佛會中見余佛會何得主伴主伴相見耶答彼約相入門故有此憑相即義故隨門取故十句章圓通記卷上十左神秀和尚果德依正難思觀云今依一味法界義分為二一所依之體二能依之用華嚴經三寶章圓通記卷上三八左妙理圓成觀原文因成觀云今成緣起者由互相資謂一文殊身為能資應舉體遍應於諸緣即一切色心等為所資應是以一一緣皆有一文殊身也釋華嚴教分記圓通鈔卷第三三七左妙理圓成觀云今就教辨者謂緣生之法情與非情皆無自性空有皆不俱即有情正有時非情必空故他即自何以故他無性以自作故即有情修訂是非情修訂也經云其身普周等真法界釋曰既等法界非情門空全是佛故又非情正有時有情必空故自即他何以故自無性以他作故即非情無修無訂是有情無修無訂經云善財觀樓閣時廣博無量同於虛空等釋云即此樓觀遍周法界有情門空全是一閣故釋華嚴教分記圓通鈔卷第四一二左神秀法師妙理圓成觀云今辨此義略分四別一唯因門從無始時盡未來際恆菩薩修萬行故或純或雜無有休息何以故於一一行無究竟故眾生不可盡故無成佛也文殊為諸佛師摩耶為諸佛母此並住因門攝化也二唯果門盡前後際恆是佛也何以故德相全真不墮時數無盡極故又無眾生可化度故三亦因亦果門謂有發心及成正覺於一切時念念發心念念成佛故四非因非果門謂無心可發無佛可成真法界中無二性故釋華嚴教分記圓通鈔卷第四一九左妙理圓成觀云問但修一因何得滿果答圓因若成無不滿果不滿果者非圓因也若爾如諸知識豈非圓因果何不滿耶答常滿以一切佛即心佛故若爾一切佛是他成自何不成耶答離佛無自故常成法我未亡故不成問於此身中亡却諸見得成佛不答若亡見則窮於果海故即得成佛此身如何答身無別相用彼本佛身為自身相此身是菩薩攝生身常因常果故爾此與前信中義有何異答前是一念圓信此是初住終心故不同爾釋華嚴教分記圓通鈔卷第六五右左神秀公妙理圓成觀云三無性者一遍計無相觀中所執情有即理無理無即無相二依他無生中幻有即性空性空即無生三圓成中隨緣即不反不反即無性釋華嚴教分記圓通鈔卷第六五左妙理圓成觀云一三性二無性三雙融初三性各有二義釋華嚴教分記圓通鈔卷第八一一右妙理圓成觀云言同體者如舉此一文殊為同體多一乃至云文殊為能資應舉體遍於諸緣即一切色心等緣為所資應是以一一緣皆有一文殊身白花道場發願文略解一五左神秀公妙理圓成觀問云裟婆既當花藏正中剎種上第十三重雜染土如何經說菩提道中金剛地寶樹等境界全是花藏本剎那答本不定本未不定末裟婆雖在十三層中有淨穢所見全是本剎若非淨穢全是末剎二五教章和本與宋本之背景關於這個問題必須做廣泛地探討曾在均如的現存全書中附上頭註為了研究者的方便加以整理時意外地却發現了貴重的資料那是給日本學界認為五教章只有日本才有異本的一個驚訝的資料當我回想到在東京大學研究室修學時曾於不經意中歡呼而起的一幕猶如在夢中經過幾次的考察撰寫成文後仍然毫無實感後曾撰報告一篇呈主任教授中村元博士並於一九七年五月十五日於東京國際東方學者學術會發表當時於發表後風聲曾流傳各處學術年報曾懇請寄稿發表遂以寄海東書考特和本宋本背景就為題於學術年報發表是後曾會同日本留學中之法友組織新羅佛教研究會研究會的目標是出版新羅佛教研究論文集由日本首屈一指的出版社山喜房佛書林出版全書約七五頁有日本斯界權威無住相的著作以及我等法友們各自的專門分野的著作當時筆者曾以校註均如大師的法界圖圓通鈔發表至今想起仍覺得其誤植百出而感到慚愧當論文集發表後日本學界曾有極好的反應在專門雜誌亦曾發表書評鈴木學術財團將它選定為七三年度的貴重書東京大學鎌田茂雄博士曾撰四頁長文書評發表其書評中博士說最近發表的新發現的資料即神秀的妙理圓成觀之一部分在最後曾提到關於五教章之和本與宋本的問題即在均如的圓通鈔中指出五教章於新羅尚有異本的問題因此可以確認日本的和本與新羅的草本係為一致由此可以很明顯地獲知日本華嚴學的背景受新羅華嚴學頗大的影響但是在一九七五年度日本印度學佛教學會學術大會上有京都女子大學校長即學界的元老結城令聞博士發表華嚴五教章日本高麗兩傳承對論評論文一篇提出反論我於閱讀論文之後却找不出反論的核心所在原因是因為這篇論文始終品位很高絲毫不損傷對方的立場因此足以窺知作者的人格但是至於其結論的意義如何却令人費解即以上不得已極其粗略地敘述請學者賜教關於為何用不得已的這一點似乎有再商榷的必要說不定是對於這個問題元老學者的反論有其不得已的苦衷也未可知因為對於我的論旨日本的佛教史學者幾乎沒有任何批判因此千二百年間傳承下來的史實至此不能不加以修正即是說初期的日本華嚴典籍係由中國人道璿七二七五九傳來而新羅系的審祥曾在法藏門下修學等問題有待修正的必要對此之反論筆者曾有數次的預約稿皆認為筆者有陳述反論的必要但筆者以暫時訴之於日本學界的常識來保留而未作答直至九月十一日十二日中外日報出版特輯將此論文的重要點揭要發表並且指明今後的展開頗值得注意且將成為今日佛教學界最值得重視的論爭後來自十月十五日起又分六次連載筆者的論文論文連載後於十一月十一日中外日報又發表前大谷大學教授春日禮智博士的論文題為黎明期的韓國佛教研究文中曾對筆者的論文作正當性的敘述至此筆者始感到此五教章之問題並非容易處理之事日本的初期華嚴對於其典籍傳來的背景有難以釋然之問題即五教章的和本與宋本的問題和本的傳來者有唐朝道璿七二七五九之說與新羅審祥七四二之說兩種此和本在日本的華嚴學研究上被認為是傳統以來所使用之本但是對此問題由於筆者的寡聞所致故對於其說之正誤以及為何有異本等問題仍未能究明高麗均如的五教章研究問題釋華嚴教分記圓通鈔中似乎有解決此問題之關鍵筆者曾於一九七一年度之學術論文集第一集發表寄海東書特五教章和本宋本背景論文一篇謹提出二三問題加以論述最初獲知有華嚴五教章者為唐崇福寺法藏寄海東新羅大華嚴法師書及其別幅略稱為寄海東書此為唐法藏寄給新羅義湘之書信法藏於此書信之外有關於智儼和尚義湘與法藏之師之章疏的註釋書即自己在有關華嚴方面的著述寄託來華留學又歸國的新羅僧勝詮其中有一乘教分記三卷此即所謂之華嚴五教章華嚴五教章另有異名即華嚴教分記華嚴傳記五大正藏五十卷高麗均如述釋華嚴教分記圓通鈔一乘教分記唐賢首國師寄海東書別幅圓宗文類二十二卷三國遺事卷四教分記新羅崔致遠撰唐大薦福寺故寺主翻經大德法藏和尚傳大正藏五十卷等別稱此為法藏建立華嚴五教之教判而詳述一乘教義之分齊的名著以下略稱五教章現在日本所存之五教章亦有不同之版本即所謂和本及宋本關於此問題以前的學者們只將它們區別為二種版本却未曾究明此二種異本所以形成的根源何在然而此問題却為日本華嚴傳來史之背景中所必須究明的宿題現將相關之資料蒐集整理的結果提出二個問題分述如下依華嚴五教章冠註所說此事在大例之首頁記載著和本在傳統上一直在研究流傳章凡有二本一本邦從古所流者一是宋朝所行者而今冠註於本邦本也對於宋本冠註五教章卷上之一二丁右有下列記載高倉院治承時分栂尾明惠上人於華嚴未渡疏章在此時一本附商船來宋朝傳來本也故云宋本由此可知宋本的由來以上的記錄於華嚴五教章頴川錄卷一卷六中均可發現在五教章上卷聽書鈔東大寺戒壇院沙門普一所說玄音記之中稱第一葉凡此章新羅審祥禪師天平年中華嚴經論隨身來朝時歟是云和本章久和國流布故云爾也由此可知即審祥赴日時傳來者也至於和本與宋本的差異可說僅是五教章十門與章節同意之前後順序有異例如和本之順序為第一建立一乘第二教義攝益第三敘古今立教第四分教開宗第五乘教開合第六教起前後第七決擇其意第八施設異相第九義理分齊第十所詮差別至於宋本第九為所詮差別第十義理分齊僅此前後順序差異外其他並無別個問題但是以教理為中心而理解華嚴的立場與以實踐的行證為焦點的立場明確地為其分水嶺現僅依和本的順序考察十門的組織第一建立一乘建立同別二教的一乘教義別教一乘中又分為因分可說與果分不可說因分可說中又立分相與該攝二門在分相門中因別教一乘與三乘有所差異而說超越此差異之乘門在該攝門中則說該羅融攝三乘入於一乘在同教一乘中又分分諸乘與融本末二門分諸乘更有一乘三乘乃至無量乘的分別融本末則融會一乘及無量乘第二教義攝益最初說明一乘三乘的教義分齊其次則敘述攝益的分齊第三敘古今立教列舉菩提流支誕法師光統曇隱自軌安廩智顗法敏法雲玄奘等古今十師的教相判釋第四分教開宗列舉小始終頓圓等五種分教以及法我俱有法有我無法無去來現通假實俗妄真實諸法但名一切皆真德不空相想俱絕圓明俱德等開宗以說明華嚴所佔位置之殊勝第五乘教開合又分為諸教融攝以教攝乘諸教相收等三門一面開展乘教開合之論理一面說明華嚴為融攝一切諸教之一大圓教第六教起前後論述三乘小教為逐機之末教相對的華嚴經為如來成道後最初之說法乃稱性之本教第七決擇其意此門將眾生之根機分類為十種並決擇本末二教之所以有前後差別第八施設異相假設超越對待的一乘以此對待三教而說明時處主眾所依說位行法門事等十門差異之趣旨第九義理分齊此門又立有三性同異六義為同因緣起十玄緣起無碍法六相圓融等四門在三性同異中論緣起諸法所生之果即圓成依他遍計等三性之性相圓會在六義為同因緣起中說明緣起諸法之因即空有不待緣的剎那滅有有力不待緣的性決定空無力待緣的恆隨轉空有力待緣的果俱有有有力待緣的引自果等六義並依此而論事理無碍之妙理在十玄緣起無碍法中論同時具足相應一多相容不同諸法相即自在因陀羅微細境界微細相容安立秘密隱俱成諸藏純雜具德十世隔法異成等十門而述無盡緣起之極致在六相圓融中以總別同異成壞六相而論事事無碍之奧義第十所詮差別此門依次第而立心識差別種性差別行住差別修行時分修養依身斷惑分齊二乘廻心佛果義相攝化分齊佛身開合等十門又分此為小始終頓圓等五教判於說明深淺差別之同時又論述華嚴別教一乘的原理至於在新羅亦有五教章之異本的問題高麗均如的釋華嚴教分記圓通鈔五教章之註釋書曾有詳細的闡述據寄海東書云法藏將自己的著述送予新羅之義湘並請其指正請上人詳檢臧否義湘收到法藏的著述華嚴教分記另有別幅及其他著作等後遂命真定智通等研讀自己亦於檢討後將五教章的順序更替換言之法藏所贈之五藏章將義理分齊列於第十而義湘為了調整前後義路之順序遂將第十之義理分齊改在第九因此改正後之本稱為草本未改正者稱為鍊本茲將原文揭櫫於后問有本義理分齊九所詮差別十者何耶答此後人所治也後人意者以此義理雙踏能所詮故置於第九貫前後也問後人誰耶答湘和尚也謂章主法藏寄湘德書云請上人詳檢臧否幸垂箴誨故湘德令真定智通勘其臧否而治定也今釋並章主所列也謂此文有草本鍊本不同義理為九者是草本反此者鍊本故爾也由此記錄可以推測新羅華嚴教學的研究風尚亦可推測其更高的境界以上是日本華嚴五教章的異本與新羅異本的內容概述將兩種異本互相對照得知新羅的草本與日本的和本一致所謂一致即長久以來對於日本華嚴典籍傳來的和本與宋本的背景一直曖昧不能明確的問題在此可以提出獲得確認的二項事由在法界義鏡與三國佛法傳通緣起的記錄中關於五教章由唐道璿七二七九五傳來的說法不得不修正在日本奈良東大寺之金鍾道場最初講華嚴經的新羅僧審祥於法藏門下修學的說法也必須修正在第一種的情形中若五教章由唐道璿傳來之說屬正確的話那麼傳來之本一定是宋本而非和本草本與鍊本在文學上或有不正確但在系統上却不相矛盾若假定由道璿傳來宋本而至三百餘年後之鎌倉時代首由栂尾明惠上人介紹宋本從道理上說亦不相矛盾然而所以成為問題者乃因日本遣隋使之開始自西元六三年其次為遣唐使至西元八九四年中止由此事實可以察知三百年間遣隋使及遣唐使往來的人數若依所傳遣傳使與遣唐使互相往來時最初曾將韓國指認為未開國蕃國因此鎌倉時代的佛教學者凝然在其三國佛法傳通緣起中僅以印度中國日本等三國為整理的對象而無視於與韓國系的關係表現出一種慕華的傾向在這種時代的趨勢中對於過去的傳統不無修正否參考日本的望月佛教大辭典將五教章的記述附記於下五教章大體上可分為和本與宋本二種其中之和本古來即被認為較正確者在我國日本凡講述註釋者皆以和本為準至於宋本在中國宋代由於亂世而散逸之佛典從各方再加以搜索而後開板因此難免偶有錯誤宋時代之五教章註釋者如道亭觀復師會希迪等皆以宋本為依據由望月氏之記述可以理解有關日本的和本與宋本之問題又中國系之註釋家僅利用宋本者亦值得注意筆者認為日本的五教章以在新羅修正而由審祥傳來之本為傳統所依之本至於三國佛法傳通緣起法界義鏡等之所說則有修正的必要最後必須指摘有關道璿傳來的說法係與事理相違背在第二種的情形中若新羅僧審祥曾直接於法藏門下修學之事屬正確的話則審祥傳來之本當為宋本而非和本法藏之寄海東書及其著述送至新羅時為新羅孝昭王元年六九二而審祥受聖武帝之勅請於奈良東大寺金鍾道場開講六十華嚴則於四十八年前鎌倉時代的佛學者凝然於其著述三國佛法傳通緣起中記述有關當時的狀況如下審祥法師於開講華嚴經之始奈良之空中拖有很長的紫色瑞雲蓋覆若草山天皇深為感嘆遂大行施地由此可以窺知審祥之德行遺憾的是韓國却無其傳記但是以五教章的和本問題為考察之中心時可說新羅僧審祥乃新羅華嚴系統之人物已無懷疑之餘地由上述之論究得知在均如的著述中包含有下述資料即在新羅亦有五教章之異本其草本乃義湘於檢討法藏之著述五教章時將十門之章節順序更換而已至於鍊本則為法藏著述之原本此資料解決了日本千二百年間對於五教章的異本和本宋本之由來不能究明未能整理的宿題可說是一份頗為珍貴的資料三元曉之十門和諍論等之斷片在均如的著述中引用新羅高僧的論著佔很重的份量也引用圓測道證太賢智通等很多中國系人物也紛紛登場特別是元曉義湘之著書引用極多其中元曉的普法記在其著述目錄中漏落者亦可見到且有數次的斷片的引用亦有一道章華嚴宗要等的引用文獻茲介紹二三原文以為參考釋華嚴教分記圓通鈔卷第三三十三左三十四右和諍論中依瑜伽現揚等立依持門依涅槃等經立緣起門然不通取瑜伽等文句但依五性差別之文立依持門亦不通取涅槃經文但依皆有佛性之文立緣起門又和諍論中猶如巨海起波浪者其巨海則喻真如佛性故釋華嚴教分記圓通鈔卷第三二十一左曉公和諍論引三師說問諸師所說何非何是答又有說者諸說皆是何以故各依聖教而成立故是義云何若依作因受果之門新薰種子正為因緣於生自果有功能故云云若依從性成果之門唯本性界正為種子釋華嚴教分記圓通鈔卷第三三十三右和諍論云問一切眾生皆有佛性耶當言亦有無性有情耶答又有說者於有情界空有無性一切界差別故無始法爾故釋華嚴教分記圓通鈔卷第八七右曉師普法記云所言如數錢者謂智儼法師所說之義義湘法師所傳之辭思量此義有道理故今須述也釋華嚴旨歸章圓通鈔卷下二左普法章云人及法理事義文解行因果相成主伴釋華嚴教分記圓通鈔卷第八七右華嚴經宗要此數錢法門儼法師所出亦有道理故今取之釋華嚴教分記圓通鈔卷第四七右曉公一道章云下品成就者是謂煗法中謂頂法上謂忍法是故當知煗法於惡趣等未決定離然若本來上品善根而趣入者始入下品順解脫分爾時便能不往惡趣本來中下而趣入者雖已趣入而未必然如瑜伽說釋華嚴旨歸章圓通鈔卷下二十五左道申章曉公云小之大義能容大大之小義爾中之義三均如之著述有關均如的著述在大華嚴首座圓通兩重大師均如傳以下略稱均如傳第五解釋諸章分中可以見到即搜玄方軌記十卷孔目章記八卷五十要問答記四卷入法界品抄記一卷釋華嚴教分記圓通鈔七卷釋華嚴旨歸章圓通鈔二卷十句章圓通記二卷華嚴經三寶章圓通記二卷一乘法界圖圓通記二卷釋探玄記圓通鈔二十八卷等但是這些卷數實際上與均如傳不無差異關於釋華嚴教分記圓通鈔在均如傳的記錄中有七卷但實際上却有十卷因此合計則為六十九卷而現存書則有釋華嚴教分記圓通鈔十卷華嚴經三寶章圓通記二卷十句章圓通記二卷釋華嚴旨歸章圓通鈔二卷以及一乘法界圖圓通記二卷以上有關均如的著述在中國華嚴第二祖至相大師智儼六二六八的著述中有註解華嚴搜玄方軌大正藏三十五一三頁中一六頁中所收一名華嚴經方軌華嚴經搜玄記搜玄記等之註釋書十卷註解華嚴孔目章大正藏四十五五三六頁下五八九頁中所收別名章目雜孔目華嚴經雜孔目等之註釋書八卷註解華嚴五十要問答大正藏四十五五一九頁上五三六頁中所收一名華嚴問答要義問答之註釋書四卷入法界抄記一卷亡失不傳以及十句之註釋十句章之復註十句章圓通記等惟現僅存十句章流傳在此必須注意之問題即在智儼之著述中僅就與均如有關係且與經典傳來之問題有關者提出一項加以敘述關於智儼之全部著述以及十句之問題可參照木村清孝博士之論文智儼著作金澤文庫研究二二六若欲考察有關十句章圓通記之著述時即使搜遍智儼的所有著述目錄亦不能有所發現此十句在智儼著述十地經論疏五卷之後記載於首頁中均如之說為唯一之記錄換言之即在智儼的著述中有十地經論疏五卷但在其他僧傳中却無法發現這種記事另一重要者即在十句章圓通記上卷之首頁關於為何智儼和尚在十地經論疏之首頁有十句的記錄之問題均如曾作如下之答覆即為了整理十句之意義而對經文有理解之可能因此在疏之首頁有列舉十句的必要由這種考察可以測知原據不明之新羅系的傳承情形下面再提到關於智儼的思想背景可能有傾向於十地經論的問題考察此問題得知智儼有通於智正等而繼承地論學系的跡象又傳說智儼曾因十地經論所說之六相的探究而開悟從十句章圓通記刊記中至相尊者以生知之智事杜順師學華嚴夢神僧冥告悟六相洞一乘於是約三觀之妙總地論之旨撰茲十句標於略疏之初則可謂法界漩澓矣等語可知彼於註釋十地經論之時將十句記載於其首頁雖以簡潔却可說十句確能把握十地經論之思想總之十句可以顯示出智儼在華嚴教學上之性格因此義湘系的後學們可以確信在智儼的著述中有十地經論疏以及在其疏之首頁有十句的記錄等事均如的十句章圓通記二卷從海印寺之補板來看可知其收藏於冥函中又從其刊記中所見上有高麗國江華京十九年庚戌月日弟子等誌之記錄即指江華遷都後十九年亦即高宗三十七年庚戌一二五年開板書之規格如同高麗大藏經上卷有二十張下卷有三十張所謂十句即取智儼十地經論疏首頁之十句再參考諸師之章疏而成即不思議以成陀羅尼顯地法廻文別屬以現義融隨文取義有五種過寄因陀羅彰義邊際教義二大有五重總三三轉現際無窮因果相形現義無盡無生佛法寄位升沈微細相容以明極勝隔越科文成義自在關於右列十句之註釋書在新羅時代有關其著者有兩種傳說其一有說係法融大德所造或說梵體大德將法融所造之本加以註釋但是在均如著十句章圓通記之時其著述已散佚不傳其二均如在其書中曾有下列的記述即有世達寺沙門神琳所述者當十句章圓通記著述時曾取得其內容而參考之神琳為義湘之門弟十句章圓通記之著述年代雖不明但有高麗高宗朝之僧天其一二一四一二五九年曾任興教寺教學僧統活躍一時駐錫於雞龍山岬寺時從古藏中搜得由此可知當時均如的著述曾廣泛地受到愛讀十地經論疏五卷在智儼的著述目錄中並無記錄且五卷疏首頁中記載之十句亦僅新羅系的華嚴學者在流傳關於此點有其意義存在在智儼的著述目錄中更不憚煩地增補了十地經疏可說對均如的十句章圓通記有著特別的喜愛這在對於十地經疏系統的研究呈現出空無狀態的我國韓國學術界給予不少的裨益天其的刊記雖然簡單但却傳達了此間之訊息註解法藏六四三七一二的著述的註釋書有釋華嚴教分記此即均如對華嚴教分記大正藏四五縮陽二卍三四一所收其別名有華嚴一乘教分記華嚴經中一乘五教分齊一乘教分記華嚴五教章華嚴一乘教義分齊章五教義分齊等略稱五教章的註釋書另有法藏的著述華嚴旨歸章可說為法藏的華嚴經綱要書大正藏四五縮陽二卍三四一所收此外有對於此書的註釋以及華嚴經明法品內三寶章別名華嚴雜章門大正藏四五卍續一四五的註釋等如上所述華嚴五教章的註釋書有均如之釋華嚴教分記圓通鈔略稱為圓通鈔關於五教章的註釋家在中國或日本亦很多但却無出於均如註釋之詳細與整理者此書收藏於海印寺補板治函從其第六卷末江華京辛亥十一月書之記錄來看約為高麗元宗十二年一二七一則知其為同時期之板刻其分量為第一卷三十五張第二卷二十七張第三卷四十張第四卷三十六張第五卷三十一張第六卷二十二張第七卷二十五張第八卷三十三張第九卷二十九張第十卷十八張另有大華嚴首座圓通兩重大師均如傳十張收於第十卷卷末依其第一卷末之刊記得知均如最初之著述乃係吏讀以朝鮮語讀漢文完全翻釋為漢文者則為後來之事現德五年現為顯五年為六年之誤刻即西元九五九年己末八月相傳在摩詞岬藪有五教章之開講當時之講者為均如重副師為法膺法師記錄為開泰寺理原法師因此從開泰寺之古藏中所整理出來的著述書即收於開泰寺者現德七年九六庚申之夏均如又開講所詮章記惠藏法師任記錄並負責整理收藏於開泰寺此時以法水寺藏本中卷為底本而整理者即五冠山摩詞岬寺沙門均如所說者在第四卷末中有副師心融法師的記錄可見當時或許曾參照流行於伽耶山法水寺之本是後峻豐三年九六二均如大師於法王寺開講義理章記錄者惠藏法師雍熙四年九八七丁亥四月完成收藏於開泰寺教藏又據他書記載峻豐三年九六二夏於京都法王寺講下卷副師心融法師重副師僧標法師記錄僧逽法師此時所整理之本至重熙十一年一四二始完成收於光教寺教藏當時任記錄者有惠藏法師與僧逽法師記錄上或有差異或有漏字同時均如大師講說之場所或於摩詞岬藪或於法王寺因此從伽倻山法水寺本可知此書編輯之當時頗費苦心刊記中亦有所表明大凡均如講說五教章之時間約為高麗光宗九年至十三年九五八九六二之間此時期可謂為高麗佛教的全盛時期光宗十一年九六值中國內亂佛經等被燒失因此派遣使臣至高麗尋求天台教典當時有諦觀法師者齎天台教論疏諸文獻至中國弘法在歷史上頗具盛名華嚴宗法印法師被奉為王師則為光宗十四年九六三之事十九年九六八奉惠居為國師坦文為王師王並廣設齋會且防偽出家又設放生所禁屠殺因此佛教異常興盛釋華嚴旨歸章圓通鈔二卷收藏於海印寺補板冥函據其刊記云該書即完成於雍熙四年丁亥三月三十日收於開泰寺教藏之本於江華京十七年戊申一二四八在東泉寺招待諸德舉行安居時依吏讀文而譯成漢文者雍熙四年約高麗成宗六年九八七即均如入寂後十四年入藏於海印寺之私刊藏經所記之年代辛亥五月日弟子等誌即高麗顯宗二年一一一該書形態與高麗大藏經同分量為上卷四十八張下卷四十四張即法藏所著華嚴旨歸章大正藏四五一八七一之註釋書於此必須附帶一言者即華嚴旨歸章一書自古以來有法業佛陀三藏靈祐法藏等人之著述日本東大寺圓超撰九一四之華嚴宗章疏並因明錄中曾列舉其著者有靈祐法業法藏等靈祐與法藏之本為一卷法業之本則有華嚴旨歸二卷東晉南林法業述之記錄高麗義天所撰一九之新編諸宗教藏總錄中則稱旨歸兩卷佛陀三藏述以上雖有各種異說但現存書却僅有法藏之著述因此應不致於形成問題但關於佛陀三藏却有佛陀跋陀羅佛陀扇多浮陀跋摩佛陀禪師等異說因此亦不能輕言不成問題況且對於思想史上的究明尚有其要因因此關於華嚴旨歸容待以後有機會再整理在新羅青丘沙門見登之集的華嚴一乘成佛妙義大正藏四五七八五頁下中曾多次言及佛陀三藏之所說又法界圖叢髓錄上之二大正藏四五七三八頁下亦有佛陀三藏之引文由此可知華嚴思想與佛陀三藏間之關係華嚴經三寶章圓通記二卷亦收藏於海印寺補板冥函雖無刊記但從其體裁來看約與十句章圓通記等同一時期刻板其分量為上卷三十九張下卷三十八張形態則與高麗大藏經同至於內容則為法藏華嚴經明法品內三寶章大正藏四五一八七四二卷之註釋於此必需附言者乃華嚴宗最早明示三寶之意義者為智儼而後繼承其意旨訂定教學之基礎者則為法藏法藏的三寶觀可說係華嚴宗三寶論之代表以大眾化為信仰之範疇以三歸為建立宗旨的目標均如以智儼和新羅系的論疏等為中心加以考察法藏的理論在刊記之末了曾記載有天其出生於義湘大師入寂後數百年歸依義湘門下又華嚴經三寶章圓通記古記中記載新羅方言削除後為了後輩之關係而編輯二卷書華嚴一乘法界圖圓通記二卷為均如現存之書中未入藏於海印寺補板者僅有筆寫本在六二二五動亂前其原本尚在流傳今則行方不明全書以影印本出版待原本發掘後少數難解之處遂得以整備完全華嚴一乘法界圖圓通記為均如新著乃新羅義湘六二五七二著華嚴一乘法界圖之註釋本關於法界圖有論文多種第一即均如之圓通記依完成於高麗忠烈王十三年丁亥一二八七五月用晦之跋文稱高麗光宗戊午九五八七月均如大師在摩詞岬白雲房講法界圖時原本以筆寫本流傳後因恐散佚因此再雕刻成板有高麗體元編之法界圖記叢髓錄四卷大正藏四五一八八七以及李朝清寒比蒭雪岑一四三五一四九三梅月堂金時習之大華嚴法界圖註並錄一卷相傳為李朝明宗十七年一五六二七月時有玄敏者雕刻成板但其板本却不傳僅流傳有筆寫本於此有一必須指摘之處即法性偈三十句中第二十四句叵息妄想必不得所具之重要性法性偈者乃由於法性之立場歌頌海印三昧之境地若從真妄二元之立場來解釋則似不恰當因此日本的大正藏經大正藏四十五七一一頁上與續藏經一二八五二九四頁上之妄應為忘之誤植而有訂正的必要均如解釋此問題時說本際者即法性偈又說叵息妄想古來有二種解釋法即第一莫息妄想若息妄想必不得還本際在智儼的搜玄記一上大正藏三五一三頁下解釋為妄想弗剪而霄翔累表靈鑑弗瑩而圓明等覺第二不息妄想必不得今釋為行者之對治修證而從後者由此可以察知均如自證的世界與學問的世界總之於研究義湘之思想上為一不能或缺之重要資料其分量為寫本上卷四十六張下卷四十六張如刊記所述以上簡略的介紹了均如現存書之全部於此對於均如的著述不能說它完全不重要其中所引用的章疏人名等有不少需充分花費時間加以檢討之問題但此次之刊行均如大師華嚴學全書乃因於均如之現存書並非易於得手之故至於其引用章疏之出典等在學界之立場因研究者之懇請首先於韓國出版後再轉達至日本最後在均如的著述中所引用的章疏名有各種之別稱在初學者的理解上恐有困難因此僅將常引用之章疏與特殊之事例附記於后法藏之探玄記二十卷大正藏三十五卍續一四一五所引用者有如下之別稱料簡大料簡發心品疏第二會中依本開末末會歸本本末無碍古經疏云昇天品疏舍那品疏壽命品疏約同教弁隨文疏六地疏義分齊明難品疏疏四卷十住品疏十行品疏疏云迴向品疏正為云俱存無碍中章主疏云賢首品疏入法界品疏初地疏云轉為文云光明覺品疏章主第十觀章王因緣觀名號品疏藏公十地疏藏釋抄四興教意中會末歸本等五教章大正藏四五縮陽二卍三四一所收所引用者有如下之別稱所詮章十玄章問答中心識章斷惑云上卷疏二地疏十人寄門六義章五重四句文云第十根一乘十玄門該攝文種性章結云同體即門等孔目章四卷大正藏四五五三六頁下八九頁中所收曾引用下列諸章目十種淨土章融會章普法章一乘三乘教章三昧章唯識章十地章無生忍章等搜玄記大正藏三五一三頁中一六頁所收之別稱有略疏儼公不思議品疏云儼公第九觀古辭儼師疏儼師六地品疏本疏儼公二十二位釋義門云儼師明難品十住云十行云后三觀第八觀云第九觀云等此外華嚴經演義抄稱為抄云世觀攝論釋稱為資糧章十地經論稱為地論曰或論曰瑜伽論稱為論第五又常有使用簡體字等若不從文脈詳加參考不易理解者亦復不少因此遂將均如著述之全部從吏讀文譯為漢文至於吏讀文之助詞等全部使用者亦不在少數四從均如所作之鄉歌到華嚴經的復元均如曾作鄉歌十一首即普賢十種願王歌在新羅系華嚴傳道史上可與義湘之法性偈美佔有極重要之地位在均如以前之新羅鄉歌十四首雖根據佛教的根本精神但稍嫌散漫其思想的具體性亦欠明瞭至均如之普賢十種願王歌成立時方有具體化的思想產生於此值得注意者即不瞭解華嚴學上的普賢行願思想的一般國文學者亦皆學習十大願王歌並稱念普賢菩薩的名號這是一個事實與鄉歌有關係之部分在六十華嚴八十華嚴的入法界品中並不包含其部分如結論所云僅添加於四十華嚴之末尾不論六十華嚴或八十華嚴其內容皆無特別之差異但在止觀方面即從實踐的立場來看四十華嚴的行願品對於我們頗有親近感但在看起來幾乎相似的反面若說前者是屬於思想的而後者則是屬於實踐的在華嚴經的入法界品成立以後依實踐方面的要求行願的思想即具體化這種精神包含在均如的鄉歌中具有很深的意義換言之均如之信行深邃的行願世界之歌在高麗當時因其具有極素樸的鄉歌形式在一般信者與庶民階層對於難以理解的行願思想畢竟不易入門此時在興起一股希望萌生出向道之信心多數的求道者唱著易於理解的普賢菩薩的行願歌即禮敬諸佛稱讚如來廣修供養懺悔業障隨喜功德請轉法輪請佛住世常隨佛學恆順眾生以及普皆回向最後為總結無盡願之無量妙法無論何種根機皆能理解並非為特殊階層含均如而設的華嚴研究均如的真意在於既為法界有情亦為活生生的真理即實踐無盡的行願然而關於此鄉歌在高麗時代如何歌唱現就均如傳考察其情況由此鄉歌之深入於一般庶民層中得知當時佛教被奉為國教而盛行的理由乃因容易記憶且易於理解之故舉一例證說明即治病之咒文如下右歌播在人口往往書諸墻壁沙平郡那必及干新羅官名緜痼三年不能醫療師往見之憫其苦口授此願王歌勸令常讀他日有空聲唱言汝賴大聖歌力痛必差矣自爾立効由上述之鄉歌可知若常讀誦則能退治病患更能得知均如製作鄉歌的動機使用一般庶民階級易於理解之語句並且常令讀誦由淺入深由近至遠令下根眾生亦能體解普賢行願的思想可說係一下化眾生的方便法門然而鄉歌在於均如與其說是本業實為一種外學這在第七歌行化世分中將詳述之其次將考察關於均如之鄉歌如何以文字依新羅以來之國風以吏讀之形式而作詞下面將列出均如所作之鄉歌十一首之全文第一為吏讀文第二為與均如同時代之崔行歸的譯歌第三為古語的日本文翻譯略最後則為華嚴經的復元所謂譯歌即崔行歸於均如入寂前六年之作詞其翻譯方法並非直譯乃於理解普賢行願之思想後意譯之名作四十華嚴之普賢行願品相當於六十華嚴八十華嚴之入法界品其中十大願及四十華嚴之僅有者對於四十華嚴十大願之成立高峰了州博士在其著作般若念佛中有與六十華嚴八十華嚴的比較論述而本田義英博士所著佛典內相外相中稱在四十華嚴中所缺之入法界品曾添於他二華嚴之最後一品此入法界品成立後行願的思想擴大且有具體的進展又此最後一品從行願思想的發展變遷史上來看為極具趣味之事在此形成問題者即溯及均如鄉歌之原典而考察時其出處為四十華嚴推究其背景則有下列情景善財童子會見文殊菩薩後遂發菩提心歷訪五十三善知識最後則為拜見普賢菩薩的情形普賢菩薩在說佛陀的功德是不可說的同時又說了十大願此十大願為一切求道者所必需履修的不二德目華嚴思想之真面目可說是表現同體大悲的十大願在韓國的佛教其由來雖不確實但為了教化信徒在大藏經中選擇三要經而誦讀此三要經不分僧侶信徒皆需誦讀即四十華嚴中之行願品法華經中之普門品以及圓覺經中之普眼章並於一九六六年八月二十二日於東國譯經院出版三要經且普及各地但此却與均如之鄉歌不發生關聯總之普賢十種願王歌在韓國的佛教對於其信行有很深的因緣最後試將均如之鄉歌復元於四十華嚴但因有關均如之傳記將於次章揭載見均如大師華嚴學全書下第六一頁釋華嚴教分記圓通鈔書末故省略韓譯部分僅介紹吏讀之原文及漢譯詩關於此部分有梁柱東博士之增訂古歌研究一潮閣刊與小倉進平之鄉歌及吏讀研究等書可作參考一禮敬諸佛歌原文心未筆留慕呂白乎隱佛體前衣拜內乎隱身萬隱法界毛叱所只至去良塵塵馬洛佛體叱剎亦剎剎每如邀里白乎隱法界滿賜隱佛體九世盡良禮為白齊歎曰身語意業無疲厭此良夫作沙毛叱等耶漢譯詩以心為筆盡空王膽拜唯應遍十方一一塵塵諸佛國重重剎剎眾尊堂見聞自覺多生遠禮敬寧辭浩劫長身體語言兼意業總無疲厭此為常華嚴經之復元普賢菩薩告善財言善男子言禮敬諸佛者所有盡法界虛空界十方三世一切佛剎極微塵數諸佛世尊我以普賢行願力故深起信解如對目前悉以清淨身語意業常修禮敬一一佛所皆現不可說不可說佛剎極微塵數身一一身徧禮不可說不可說佛剎極微塵數佛虛空界盡我禮迺盡而虛空界不可盡故我此禮敬無有窮盡念念相續無有間斷身語意業無有疲厭二稱讚如來歌原文今日部伊冬衣南無佛也白孫舌良衣無盡辯才叱海等一念惡中涌出去良塵塵虛物叱邀呂白乎隱功德叱身乙對為白惡只際于萬隱德海胯間王冬留讚伊白制隔句必只一毛叱德置毛等盡良白乎隱乃兮漢譯詩遍於佛界罄丹衷一唱南無讚梵雄辯海庶生三寸抄言泉希涌兩唇中稱揚覺帝塵沙化頌詠毉王剎上土風縱未談窮一毛德此心直待盡虛空華嚴經之復元復次善男子言稱讚如來者所有盡法界虛空界十方三世一切剎土所有極微一一塵中皆有一切世界極微塵數佛我當悉以甚深勝解現前知見各以出過辯才天女微妙舌根一一舌根出無盡音聲海一一音聲出一切言辭海稱揚讚歎一切如來諸切德海窮未來際相續不斷盡於法界無不周徧如是虛空界盡眾生界盡眾生業盡眾生煩惱盡我讚乃盡而虛空界迺至煩惱無有盡故我此讚歎無有窮盡念念相續無有間斷身語意業無有疲厭三廣修供養歌原文火條執音馬佛前燈乙直體良焉多衣燈炷隱須爾也燈油隱大海逸留去耶手焉法界毛叱色巴只為手良每如法叱供乙留法界滿賜仁佛體佛佛周物叱供為白制阿耶法供沙叱多奈伊於衣波最勝供也漢譯詩至誠明照佛前燈願此香籠法界興香似妙峯雲油如大海水洪澄攝生代苦心常切利物修行力漸增余供取齊斯法供直饒千萬總難勝華嚴經之復元復次善男子言廣修供養者所有盡法界虛空界十方三世一切佛剎極微塵中一一各有一切世界極塵數佛我以普賢行願力故起深信解現前知見悉以上妙諸供養具為供養所謂華雲鬘雲天音樂雲天傘蓋雲天衣服雲天種香塗香燒香末香如是等雲一一量如須彌山王然種種燈酥燈油燈諸香油燈一一燈炷如須彌山一一燈油如大海水以如是諸供養具常為供養善男子諸供養中法供養最何以故以諸如來尊重法故以如說修行出生諸佛故若諸菩薩行法供養則得成就供養如來如是修行是真供養故此廣大最勞供養四懺悔業障歌原文顛倒逸耶菩提向焉道乙迷波造將來臥乎隱惡寸隱法界余音玉只出隱伊音叱如支惡寸習落臥孕隱三業淨戒叱主留卜以支乃遣只今日部頓部叱懺悔十方叱佛體閼遣只賜立落句眾生界盡我懺悔來際永良造物捨齊漢譯詩自從無始劫初中三毒成來罪幾重若此惡緣元有相盡諸空界不能容思量業障堪惆悵罄竭丹誠豈墮情慵今願懺除持淨戒永離塵染似青松華嚴經之復元復次善男子言懺除業障者菩薩自念我於過去無始刼中由貪瞋癡發身口意作諸惡業無量無邊若此惡業有體相者盡虛空界不能容受我今悉以清淨三業徧於法界極微塵剎一切諸佛菩薩眾前誠心懺悔後不復造恆住淨戒一切功德如是虛空界盡眾生界盡眾生業盡眾生煩惱盡我懺乃盡而虛空界迺至眾生煩惱不可盡故我此懺悔無有窮盡念念相續無有間斷身語意業無有疲厭五隨喜功德歌原文迷悟同體叱緣起叱理良尋只見根佛伊眾生毛叱所只吾衣身不喻仁人音有叱下呂修叱賜乙隱頓部叱吾衣修叱孫丁得賜伊馬落人米無叱昆於內人衣善陵等沙不冬喜好尸置乎理叱過後句伊羅擬可行等嫉妬叱心音至刀來去漢譯詩聖凡真妄莫相分同體元來普法門生外本無余佛義我邊寧有別人論三明積集多功德六趣修成少善根他造盡皆為自造總堪隨喜總堪尊華嚴經之復元復次善男子言隨喜功德者所有盡法界虛空界十方三世一切佛剎極微塵數諸佛如來從初發心為一切智勤修福聚不惜身命如是一切難行苦行圓滿種種波羅蜜門證入種種菩薩智地成就諸佛無上菩提及般涅槃分布舍利所有善根我皆隨喜及彼十方一切世界六趣四生一切種類所有功德迺至一塵我皆隨喜一切菩薩所修無量難行苦行志求無上正等菩提廣大功德我皆隨喜六請轉法輪歌原文彼仍反隱法界惡之叱佛會阿希吾焉頓叱進良只法雨乙乞白乎叱等耶無明土深以埋多煩惱熱留前將來出米善芽毛冬長乙隱眾生叱田乙潤只沙音也後言菩提叱菓音烏乙反隱覺月明斤秋察羅波處也漢譯詩佛陀成道數難陳我願皆趨正覺因甘露酒消煩惱熱戒香薰滅罪愆塵陪隨善友瞻慈室勸請能人轉法輪雨寶遍沾沙界後更於何處有迷人華嚴經之復元復次善男子言請轉法輪者所有盡法界虛空界十方三世一切佛剎極微中一一各有不可說不可說佛剎極微塵數廣大佛剎一一剎中念念有不可說不可說佛剎微塵數一切諸佛成等正覺而我悉以身口意業種種方便慇懃勸請轉妙法輪七請佛住世歌原文皆佛體必于化緣盡動賜隱乃手乙寶非鳴良爾世呂中止以友白乎等耶曉留朝于萬夜未向屋賜尸朋知艮開尸也伊知皆矣為米道尸迷反羣良哀呂舌吾里心音水清等佛影不冬應為賜下呂漢譯詩極微塵數聖兼賢於此浮生畢化緣欲示泥洹歸寂滅請怪沙刼利人天談真盛會猶堪戀滯俗羣迷實可憐若見惠燈將隱沒蓋傾丹懇乞淹延華嚴經之復元復次善男子言請佛住世者所有盡法界虛空界十方三世一切佛剎極微塵數諸佛如來將欲示現般湼槃者迺至一切諸善知識我悉勸請莫入湼槃經於一切佛剎極微塵數刼為欲利樂一切眾生如是虛空界盡眾生界盡眾生煩惱盡我此勸請無有窮盡念念相續無有間斷身語意業無有疲厭八常隨佛學歌原文我佛體皆往焉世呂修將來賜留隱難行苦行叱願乙吾焉頓部叱逐好友伊音叱多身靡只砕良只塵伊去米命乙施好尸歲史中置然叱皆好尸卜下里皆佛體置然叱為賜隱伊留兮城上人佛道向隱心下他道不冬斜良只行齊漢譯詩此娑婆界舍那心不退修來迹可尋皮紙骨豪兼血墨國城宮殿及園林菩提樹下成三點眾會場中演一音如上妙因總隨學永令身出苦河深華嚴經之復元復次善男子言常隨佛學者如此裟婆世界毘盧遮那如來從初發心精進不退以不可說不可說身命而為施剝皮為紙折骨為筆刺血為墨書寫經典積如須彌為重法故不惜身命何況王位城邑聚落宮殿園林一切所有及余種種難行苦行迺至樹下成大菩提迺至示現入於湼槃如是一切我皆隨學如今世尊毘盧遮那如是盡法界虛空界十方三世一切佛剎所有塵中一切如來皆亦如是於念念中我皆隨學如是虛空界盡眾生界盡眾生業盡眾生煩惱盡我此隨學無有窮盡念念相續無有間斷身語意業無有疲厭九恆順眾生歌原文覺樹王焉迷火隱乙根中沙音賜焉逸良大悲叱水留潤良只不冬萎玉內乎留叱等耶法界居得丘物叱丘物叱為乙吾置同生同死念念相續無間斷佛體為尸如敬叱好叱等耶打心眾生安為飛等佛體頓叱喜賜以留也漢譯詩樹王偏向野中榮欲剎千般萬種生花果本為賢聖體幹根元是俗凡精慈波若洽靈根潤覺路宜從行業成恆順遍教羣品悅可知諸佛喜非輕華嚴經之復元復次善男子言恆順眾生者謂蓋法界虛空界十方剎海所有眾生種種差別所謂卵生胎生濕性化生種種生類種種色身種種形狀種種相貌如是等類我皆於彼隨順而轉種種承事種種供養如敬父母如奉師長及阿羅漢迺至如來等無有異何以故菩薩若能隨順眾生則為隨順供養諸佛若令眾生生歡喜者則令一切如來歡喜何以故諸佛如來以大悲心而為體故因於眾生而起大悲因於大悲生菩提心成等正覺譽如曠野沙磧之中有大樹王若根得水枝葉華果悉皆繁茂生死曠野菩提樹王亦復如是一切眾生而為樹根諸佛菩薩而為華果以大悲水饒益眾生則能成就諸佛菩薩智慧華果善男子汝於此義應如是解以於眾生心平等故則能成就圓滿大悲以大悲心隨眾生故則能成就供養如來眾會圍繞諸如來悉在菩提樹王下十方所有諸眾生願離憂患常安樂十普皆回向歌原文皆吾衣修孫一切善陵頓部叱廻良只眾生叱海惡中迷反羣無史悟內去齊佛體叱海等成留焉日尸恨懺為如乎仁惡寸業置法性叱宅阿叱寶良舊留然叱為事置耶病吟禮為白孫佛體刀吾衣身伊波人有叱下呂漢譯詩從初至末所成功廻與含靈一切中咸覬得安離苦海惚斯消罪仰真風同時共出煩塵域異體咸歸法性宮我此至心廻向願盡於來際不應終華嚴經之復元復次善男子言普皆廻向者從初禮拜廻至隨順所有功德皆悉廻向盡法界虛空界一切眾生願令眾生常得安樂無諸病苦欲行惡法皆悉不成所修善業皆速成就關閉一切諸惡趣門開元人天湼槃正路若諸眾生因其積集諸惡業故所感一切極重苦果我皆代受令彼眾生悉得解脫究竟成就無上菩提菩薩如是所修廻向虛空界盡眾生界盡眾生業盡眾生煩惱盡我此廻向無有窮盡念念相續無有間斷身語意業無有疲厭十一總結無盡歌原文生界盡尸等隱吾衣願盡尸日置仁伊而也眾生叱邊衣于音毛際毛冬留願海伊過此如趣可伊羅行根向乎仁所留善陵道也伊波普賢行願又都佛體叱事伊置耶阿耶普賢叱心音阿于波伊留叱余音良他事捨齊漢譯詩盡眾生界以為期生界無窮志豈移師意要驚迷子夢法歌能代願王詞將除妄境須吟誦欲返真源莫厭疲相續一心無間斷大堪隨學普賢慈華嚴經之復元迺至虛空世界盡眾生及業煩惱盡如是一切無盡時我願究竟恆無盡
