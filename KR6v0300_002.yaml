body:
  text: 高麗國歸法寺主圓通首座均如説將𥸩此文三門分別初辨章主因緣行狀并造文因緣及次第二𥸩題目三入文解𥸩也初門如常可略也就第二門有三假初列七科二現未入疏三華嚴經下正舉題名今初問此七科者有定次第耶答無定次第中且作次第也謂於世間最可歸依故又是揔故三寶在初也就法寶中具含理教行果之四而生滅流轉是理法觀此生滅流轉之心是行法觀心既熟即至菩提涅槃之𩂜是果法現此之詮是教法是故於法寶中立流轉章故有第二此流轉法至於一乘則法界緣起故有第三佛寶中能説之音及所依之身故有第四第五此之三寶於十世中紹隆不絶故有第六此上六假所現玄義故有第七也第二未入疏者問若爾五教章等亦未入疏何故無此辭耶答五教章等既大疏外隨人所問隨意而説無別所依之經文此之七科既華嚴經明法品內立三寶章一卷六故冝載疏中而不論故故云爾也三中有二先牒舉後魏國西寺下所依𩂜并集者名也初中華嚴經明法品者所依本教立三寶章者能𥸩章名也初中華嚴經者捻所依明法品者別所依也捻所依中古辭云大方廣華嚴毗盧遮那所説經大方廣華嚴普賢菩薩所説經大方廣華嚴諸菩薩修行經云云別中依明法品中十種三寶文立七科也問前列則備列七科今牒則唯舉三寶何耶答最在初故又是捻故問若爾何故華嚴傳中云玄義章一卷耶答玄義者通明前六中玄妙之義故亦得是捻又最在後故後後舉也問何口之玄義亦是捴耶答玄義章染淨緣起中問衆生雜染及三寶清淨為俱是妄為亦非妄答此二各有四句等已上約三寶廣辨四句故亦是捻也問三寶章則依十種三寶文餘六科則依何文耶答三寶章既依十種三寶文於三寶章中開論後六故無別所依之文也明法品文者精進慧菩薩白法慧言云云於佛教中云何修習云云紹三寶種使不斷絶法慧菩薩告精進慧菩薩言佛子菩薩具足如是智慧令三寶種永不斷絶所以者何菩薩摩訶薩教諸衆生發菩提心是故能令佛種不斷常為衆生開闡法藏是故能令法種不斷善持教法無所乖違是故能令僧種不斷復次悉能稱讚一切大願是故能令佛種不斷分別演説因緣之門是故能令法種不斷常勤修習六和敬法是故能令僧種不斷復次於衆生田下佛種子是故能令佛種不斷護持正法不惜身命是故能令法種不斷統理大衆無有疲倦是故能令僧種不斷復次法來今佛所説之法所制之戒皆悉奉持心不捨離是故能令佛法僧種永不斷絶章主略疏云前九句別辨後一句捴結前中九句為三重則為初中後三位也初重內以教發大心為佛種故教授令持為法種故順教無違為僧種故此三在於十信終心已上實則通諸下心然至不退方三寶種永不斷故舉終心也次重內讚菩提願令不退轉名為佛種授緣起理法令悟多門名為法種令修六和僧行成熟名為僧種謂行無違諍曰和牙相尊重為敬六和者三業為三及戒同施同見同故為六也是三在於三賢已上三賢不退可知也後重內初令衆生證真如成無漏種故云下佛種護四法寶不惜身命控御大衆令如法住此三地上已上以地上菩薩無漏證法令衆生證故也若通説可知後一揔結但順三世佛教修行不違即令三寶種恆不斷絶古經疏云且約佛寶初教發菩提心次已發者讚令不退三依願起行使佛因圓故下云下佛種子等因圓果發名生正覺芽始終相續令佛種不斷二法寶初示深教法次𥸩理法三護持等明行法又初捴示深法次法深難解故須解𥸩令解法流行法既行已即加守護不惜身命令斯法寶廣行不絶又初契經次對法后是毗尼二僧寶初受持威儀教法是僧行方便次行六和敬僧行成熟行不乖曰和行相遵曰敬后善御大衆必無憂惱是僧德已成懍公云初三教道次三證道次三不住道后一捴結紹隆光統云前三同前懍公𥸩第四明稱體謂前三隨解差別此明一味自體真覺名為佛寶性平等名為法寶第一義和合名為僧寶一章者積字成句積句成篇積篇成章故也一卷者文雖七科卷無二軸故也就所依𩂜并集者名中西寺者簡東比二寺準三卷章圓通抄云云沙門捴名法藏別名沙門者梵語具云沙迦摩囊此云息𢙣又斷𢙣法藏者梵言達摩多羅字賢首梵言陀羅室利敕號國一法師也述者述而不作義也第三入文解𥸩有二初開門列名后初明立意者下依門別𥸩初中亦二先開門后一明下列名於中八門生起次第者何故立三寶𥸩捴別名何以何為體性㸦相融揚何佛法僧數幾何歸何不改三寶業用何三寶先后何是故八門相續起也后依門別𥸩中初依門開數后一為邪下別𥸩中初三門依涅般經次一門依雜心論后三門依寶性論也初中先正𥸩后引訂𥸩中為邪故者捴𥸩即翻下別𥸩謂通望下文邪三之義而云為邪故是則捴𥸩次下相對別則別𥸩也自在天等者外道尊師自在天等故邪論者四韋陀論五明論金七十論等也引訂中是真優波塞者比丘比丘尼優波塞優波夷等四衆具足何故不舉餘衆耶答比丘比丘尼通於所皈是故不舉優波夷則實舉且略也優波塞者此云近事男優波夷者此云近事女也𮥷於殺害者外道經説殺生祀天佛法禁殺故爾也歸佛亦𮥷殺害歸法亦真優波塞且舉一邊云耳外道諸典籍者此方典則五經九經等籍則歷代史籍等謂佛菩薩所説名為經依經所造名為傳籍外法亦爾也皈依於僧者等者此中亦得云真優波塞𮥷殺害而前中已現故不云也二為除病故者除煩惱病也良醫喻佛藥喻法看病人喻僧謂有醫有藥及看病人則世病可治由三寶故除煩惱病也三為出怖故如經云等者涅般經第五卷云一切衆生怖畏生死諸煩惱故故受三皈比如羣鹿怖畏獵師既得免𮥷若得一跳即比一皈如是三跳即比三皈以三跳故即受安樂衆生亦爾怖畏四魔惡獵師故受三皈依三皈依故即得安樂安樂者即真解脫解脫者即是如來如來者涅般涅般者即是無盡無盡者即是佛性佛性者即是決定決定者即是阿耨多羅三藐三菩提已上此意者群鹿避於獵師難時一跳則𮥷刀難二跳則𮥷矛難三跳則𮥷箭難如是三跳亦𮥷諸難衆生亦爾皈三寶故未出生死一云三跳出怖如次當於脫三途若然脫三途苦非是永𮥷生死之苦故不可配此中意者依於三寶慈悲救拔得出生死故比三跳則永𮥷生死義也是故三跳可配三道謂初地見道位中斷分別煩惱種則一跳免刃難修道位中𮥷兮假生死則二跳免矛難無學道位中永𮥷易生死則三跳免箭難故永𮥷怖畏也問三跳準三寶如何答但取數之同耳非是敲配也四為生緣念故者既云為令衆生念佛求一切智等則為令衆生之緣發生念佛求智之心也五寶性論者堅慧菩薩造四卷論也六約三乘中實則三乘通求三寶若約增相而説菩薩則求成佛緣覺則出於無佛世界觀逝川落葉自悟深因緣法聲聞則依於衆僧求解脫故爾也七約三根者與前三乘人何別答前則後增相故菩薩求佛緣覺求法聲聞求僧如是各配今則無問菩薩及與二乘但約信佛信法信僧之人以分三根故詮別也福田者生福之田也第一妙法者對外道法則佛法為第一妙法對外道衆則佛弟子為第一聖衆也準此則佛寶可云第一尊師也此上三門者第五六七三門也引訂中具云則依能調所訂弟子為三乘信三供養等是故説三寶已上為三乘者訂約三乘人信三供養者訂約三根也是故彼文則為於三乘及信三供養等如是見也第二𥸩名中有二開數及正𥸩𥸩中先𥸩捴名后𥸩別名初中先正𥸩捴名又寶是可貴義下重𥸩寶義也初中帶數者有依主帶數有持業帶數有有財帶數謂二諦三性五蘊等者二即是諦三即是性五即是蘊更不依於他法得名故云持業帶數也五識者識則無二而隨根成五則依他得名故云依主帶數也五無間業者從所有報得名故云有財帶數也今此持業帶數意也寶是可貴者前六寶是喻義者約何義喻是故今云約可貴義喻也此則正𥸩寶性論已下引訂中先引長行后引偈頌初中二無垢義等者諸經要集中引此文云二無垢義如世真寶清淨無瑕穢三寶亦爾三勢力義彼文云三勢力義如世珠寶除貧去毒有勢力三寶亦爾等比論本似異準知具六通等功德等者別境五中惠數所攝謂天眼通天耳通者眼識耳識相應惠數所攝餘四者意識相應惠數所攝也澄惑業苦者謂由煩惱造業受報是三雜染也成淨信等者信謂善十一中信也智謂別境五中惠數攝也淨則通二也同澄惑業苦三濁成淨信智者惑澄成淨業澄成信苦澄成智耶答通澄惑業若通成淨信智故非是次第對也望三寶亦爾皈佛寶時通澄三濁通成淨信智法僧中亦爾也六不變義等者要集中云六不變義如世真寶打燒磨不可改易等已上世間八法者利襄毀譽稱譏苦樂也后𥸩別名中先正𥸩別名次是即佛下結后又智論云下重出事和中異義初中一是覺悟義者向內照真故二是覺察義者向外鑒俗義也理智照真者向內照真則云相而照故云照真量智鑒俗者向外鑒俗則存相而照如鏡中現影故云鑒俗也此之二智若準新法相則名為正體智后德智也問此二智同時起耶前后起耶答若初教則前后若終教則同時起也問仁王經云初地菩薩四天王雙照二諦平等道已上然則可云同時起耶答雖云雙照而恆前后也古人云比如有人一時産得二兒雖云一時雙生非是並頭一時而出要一先一后也此中雙照之義亦如是也問后德中有獨起后德俱緣后德約俱緣后德則亦得同時耶答若俱緣后德與正體智相應則還是終教義故初中一向前后也向理量二智配始本二覺云何答本覺中具二智始覺中亦爾也謂法常師攝論疏云西域本音名為佛陀此云覺者覺義有二一本覺謂心真如𩂜染不染解性不改名為本覺此有二義一從本已來性無煩惱染故真如根本智性自返照二本來無無明故世間自然業智性自照也此以本有恆沙別功德望真如平等為世間也此二是始覺家性名本覺二據心功能不染而染名為不覺后以修得智對治煩惱障故名真如根本智對𮥷無明故名世間自然業智此二合名始覺既自具此二后覺衆生合具此二覺道滿足故名覺也已上真如根本智則今理智自然業智則今量智是故本始中各具理量二智也又覺察煩惱賊者理智照真後無明睡覺者量智鑒俗也問若爾二𥸩云何別答初𥸩解脫道訂理后𥸩無間道斷障也謂初則訂理義故解脫道也后則斷障義故無間道也覺察煩惱賊者煩惱障也從無明睡覺者所知障也問何故煩惱名賊無明名睡耶答煩惱則縛諸衆生造諸𢙣業墮三惡趣害法身命故名為賊無明則於境迷暗令不知覺故名為睡也自覺者具理量智而自覺也覺他者既自覺已亦覺他也是故自覺簡允夫迷而不覺故他覺簡二乘唯行自利闕利他行故覺行窮滿簡菩薩但隨分覺覺不圓滿故佛地論初卷云佛得一切智一切種智斷煩惱障所知障知一切種一切種相而自覺他覺等已上一切智者則此理智一切種智者則此量智斷煩惱障者則此覺察煩惱賊也斷所知障者則此後無明睡覺也知一切種者則此照真也知一切種相者則此鑒俗也自覺覺他等者則自覺他覺等皆依彼文説也者是假人者五蘊假者為佛寶故有財𥸩者有財中有全取他名分取他名二也謂俱舍論非是對法藏而名為對法者以𥸩根本對法藏故爾也則全耴他為名今此有覺之者名為覺者則以覺屬人故分耴他為名也如説者楞伽經也即𮥷分別者是章主言也栗木𮥷他性住自栗木性松木等亦爾如是雖各住己性而𮥷自他分別也雜阿毗曇論第一云何攝法為自性為他性答自性何以故諸法𮥷他性各自住己性故説一切法自性之所攝已上青法唯青法是更無赤白等法是故青法中無有具餘法之分別也赤白等皆爾也對意名法如法處法界等者法處則十二處之法處法界則十八界之法界也等中等耴五蘊之受想行等也色則眼等所對識則十八界中七識所攝故除也唯等耴意識所對受想行也正取后一兼明前二者法之得名非約自體對意而得以䡄則得名故云正耴然非是遺於對意自體二義故云兼明也一理和謂見諦等者入初地見道見二諦理時心雖各異同訂一真如理故爾也此中有普廣聖教有戲論建立門有內訂聖教無戲論建立門初則能訂心異而所訂理同后則能所訂不別今此則普廣聖教門也事和謂四人已上等者下至四人已上可成一羯磨事謂一人作維那唱云大德僧聽而要聽者三人已上足成衆也此則説戒羯磨法也若授戒羯磨則十人已上方成事若出罪羯磨則二十已上方成一事也秉者持也第三出體中先開章門后初中有三下依章正𥸩𥸩中初中有三者開數二約事已下𥸩𥸩中約事就義門等者就於一佛體事之上所具三義論三寶故云約事就義門此義通諸乘等者謂小乘中依三十三心所成之佛三乘中三身佛一乘中十身佛上皆具此三義但淺深為異也唯除人天等者以彼不了無漏功德故也二約會事從理門者會三寶事皈真空理也同以真空妙理為性者初教則空真如終教則不空真如也涅般經云等者若能觀三寶常住同真諦者四十卷第十卷迦葉品文我性佛性無別者第七卷文也唯除凡少者我性則是迦葉菩薩性佛性則是佛之性此是人空故可具小何故簡耶答今云我性佛性仍云即以真空為體則及耴法空而説故知簡小乘也三約義融現門等者初則事二則理今此通融前二故也經云於佛性中有法僧者涅般第五卷文又淨名經者三十二菩薩各説不二中寂根菩薩不二文也此義通諸教唯除小乘及始教等者別行三寶章云真如中𮥷念本覺名佛寶者終教義三寶無為相與虛空等者頓教義若就覺義而論並稱為佛等者圓教義也何故此中合此諸義而云通諸教耶答彼中意者本覺與恆沙功德則終教事也三寶之無為相與虛空等則頓教事也於諸法中隨我所舉覺義則佛䡄則是法和合是僧者圓教義增現是故如是説也今此中意者本覺與恆沙功德並是無為法中所具又於此無為法中隨舉為覺為法及與和合是故通諸教也同體門竟者前標則云同相何故結云同體耶答文云然無別體豈為異耶則同相同體不別也第二別相中以有漏五蘊為體者佛雖無漏然亦同人天故云爾也黑象腳身者觀佛三昧經第三云若生垢惡不善心者若有毀犯佛禁戒者見像純黑喻如炭人𥸩子衆中五百𥸩子見佛色身猶如灰人比丘衆中有一千人見佛色身猶如赤土優波塞衆中有十六人見佛色身猶如黑象腳優波夷衆中有二十四人見佛色身猶如聚曇如是四衆各各異見已上何故如是不同見耶答由宿業故爾次經云過去有佛名毗波尸時有王名月德有五百子王信佛法子信邪法諸子忽病受極苦惱時王教言有佛名毗波尸汝等當念諸子如教即念佛名生四王天天壽命盡當墮地獄以受父教念佛名故今為𥸩子五百人也以宿世邪見習故如是見也汝等當念毗波尸佛名及念我名已上故知爾也樹神身者提胃經一卷中云云若小乘中毗曇等宗者舍利弗雜阿毗曇心論二十卷也生身者淨飯王宮誕生身也二法身以五分功德者戒定惠解脫解脫知見若配三學則初二則戒定餘三則惠學也若配色心者戒即是色余四則是心也色中有極逈色極略色自在所生色境界所生色修行所引色今此則修行所引色戒中有三心謂審慮心決定心發動心也審慮者作意欲受決定者決定欲受發動者竟至師前曲躬敬受初二唯意業后通身口也五分功德配於別境則戒配三摩地余三配惠數也向色心開合不定故五蘊中色合心開十二處中五根五塵故十就於法處心所五十二不相應二十四無為六合之為法處又加意處則為十一五根五塵則是色開也意處法處即是心合也十八界中五根五塵為十加七識界法界故為十八此即色心並開何故不同耶答欲治計色謂之執故色開心合欲治計心謂之病故心開色合欲治雙執色心謂之病故雙開色心故爾也此中唯耴無漏功德等者五分功德具有漏無漏之二故爾云也謂道后盡智無生智等者十一智也謂苦智集智滅智道智比智法智盡智無生智他心智等智如智初四即知四諦智用上形下名為比智知諸軌則名為法智惑盡則名盡智不生后有名為無生智知他人心則名為他心智知下苦麁及上淨妙則名為等智也法智已前則因盡智已后則果今此是佛寶體始從盡智耴也問五蘊法與前五分功德何別答一云一也一云盡智等五也謂五蘊法以五分功德為體五分功德不𮥷五蘊法故並得也或有漏及報相從名佛者前云報無記與有漏非可重故報與有漏非正佛寶是故爾云也又此宗中等者以此宗中於無漏法上立假人名以為佛僧故五蘊法雖即是法而為佛寶體也師正者師長也若三乘中等者此中具初終頓教也初教中或五聚法中等者謂心王心所有法不相應法無為法色法五也真如擇滅等者等耴非擇滅也無為謂虛空真如擇滅非擇滅不動想受滅六也擇滅者是修生以斷障義故非擇滅者是本有也非擇滅中有三本來清淨非擇滅緣善不生非擇滅后苦不生非擇滅也初則可知次則本識若滅善惡無記三性種子亦不生故后則后有不生故苦不生也色處為化等者初教化身有心耶答一云約終教則化亦有心約初教則無也問若化亦有心則於一有情二識俱起耶答不爾謂唯識疏心中有二謂自依心他依心自依心者從自種起他依心者後他起也曉公云自依心者見分他依心者相分以有他分心故化身亦有心也然無自分心故一有情中二識不俱起也約自當宗則化身無心者初教則為引小乘而小乘云此樹下佛是報余方是化是故於初教中欲引彼故云樹下佛則有心余方之化則無心也以無漏至心王者八識中具有流無流而至佛果中八識或云有或云無者以有漏八識無故云無無漏八識有故云有也二十一心所有法者五十一中除根本煩惱十隨煩惱二十唯有別境五遍行五善十一故爾也不相應行中小分者不相應二十四中唯取命根以佛果中亦有命根故問若爾約得佛果上功德義亦許具得耶答非謂得佛果功德故名為得以得后有果故名為得故不爾也是故前中云五聚法中小分為體者謂心王具有漏無漏唯取無漏心所中唯取二十一不相應中唯取命根無為中唯取真如與擇滅及非擇滅為佛之體故云小分也捻為受用體者自受用耶他受用耶答自受用也謂初教法門意在引小故似小而説而小乘云唯樹下佛是余並此佛之化用是故今此自受用身者當於樹下之佛余方化者當於化身故爾也問若爾小乘不知法身何故以真如擇滅為法身耶答全同不引全異不引今則於全同不引義中并舉也以法身是自受用身所依自受用身是化身所依若不舉法身則自受用身無所依故舉自受用身與法身若他受用身則以彼所不知故不舉也瑜伽論等者第七十七卷也此約始教之初説者何是終耶答説三界九地十地十一地之回心教者是初教之初也説三賢十地等直進教者初教之終也是故初則為回心聲聞人説終則為直進人説也或約五法攝大覺地等者四智配三身義於法相家中有二説謂大圓鏡智為法身平等性智妙觀察智為應身作事智為化身又圓鏡智平等智為應身妙觀察智作事智為化身而法身不屬四智然此章主合二義也謂清淨法界至受用身者后説中法身不屬四智義也妙智通二身者初説中妙觀智則應身后説中妙觀智則化身合二身也轉四識成四智中法相云轉阿賴耶成鏡智轉末那成平等智轉意識成妙觀智轉五識成作事智也此章主意轉四識成智者寄惑現位耳非行也若行中四智並是意識所成無垢無罣得智者正體也大迦葉等者付法藏經文也彼經迦葉白佛言我為侍者佛言汝是耆年未可當也五百羅漢皆如是請佛皆不許迦葉即知佛心在於阿難即教阿難為佛侍者已上但前教生故順小説故者以初教生故順於小乘似同而説而引接也不分二三等者三謂初終教三身二謂小乘生身法身也二種十佛者第八地及𮥷世間品二處十佛也問𮥷世間品見佛文首案向上順行二字與而訓德𥸩云尤立畫見聞右立畫解行下得畫訂入也又右畫見聞龍畫解行內上畫見佛下畫佛名也徑三生人方得佛名林德云能見所見為二又解佛行佛為二已上解佛行佛云何耶答一云第八地十佛為解佛𮥷世間十佛為行佛一云就𮥷世間品因圓十佛為行信滿十佛為解一云反此一云因圓與信滿二處皆具行佛解佛也一云此之諸説皆可得也問第一義云何答孔目章生成佛德章云若一乘義所有功德皆不𮥷二種十佛一行境十佛謂無著佛等如𮥷世間品二解境十佛謂第八地三世間中佛身等故爾也問𮥷世間品見佛首所案之印𥸩時何故并引第八地十佛𥸩耶答正𥸩行佛而兼𥸩解佛故爾也問第二義云何答𮥷世間疏𥸩信滿十佛云前明持法今明解佛故也𥸩因圓十佛云四有十見佛者行障既盡佛境斯現故云見佛故也第三義云何答別行三寶章云圓教有二種十佛解門十佛者無著佛願佛等二行門十佛者第五名化佛余九同前已上列信滿十佛則苐五化佛列因圓十佛則第五涅般如是列故爾也第四義云何答𥸩因圓見佛處所案之豫云解佛行佛為二故知爾也因圓中既具二佛信滿亦爾可例知也第五義云何答此上諸義皆有文訂是故説普皆可許問余諸義文現何知苐四義中因圓信滿並具解行佛耶答疏中信滿十佛云前明持法今明解佛別行三寶章云以信滿十佛為行門十佛故合取二處之義則信滿中具解行佛也又𥸩因圓十佛云行障既盡佛境斯現彼章又云解門十佛故合耴二處之義則因園亦具解行佛也問此諸處解行之説云何會耶答孔目章中第八地十佛修因契果生解分中所説故解佛𮥷世間十佛托法進修成行分中所説故行佛也信滿十佛為解佛者以劣位中解心所見故解佛因圓十佛為行佛者以勝位中行訂義故行佛也別行三寶章信滿十佛不説𥸩句者以𮥷發心修行義故行佛因圓十佛并列𥸩文者以不𮥷發心修行義故解佛也此上説皆是聖言故不可捨然上解佛行佛為二者何門佛耶則別行三寶章義信滿十佛為行佛因圓十佛為解佛也問何故信滿十佛為行佛耶答雖有多義信唯是行位未成門故云行佛也問何故因圓十佛為解佛耶答𮥷世間品疏第六十種觀察下五百十句答上第六門問因圓果滿行於中有二初三百二十句辨因園究竟行亦是等覺位相似二從十種住兜率天一百九十明現果圓滿行亦是妙覺位相似已上既𥸩等覺云行過十地解與佛同是故同解佛門之佛故解佛也問第八地十佛解佛𮥷世間十佛行佛又因圓十佛行佛信滿十佛解佛如是不定何故今云信滿十佛行佛因圓十佛解佛耶答𥸩成行分中所説見佛文首所案豫時并𥸩修因契果生解分中所説第八地十佛難也文云前明持法今辨解佛又云行障既盡佛境斯現等者行布同教義也解佛行佛者別教義也是故同於三寶章所説以信滿佛為行佛以信但是行未成位門之佛故云行佛也若爾信但行位未成者即是同教何故云解佛行佛者是別教所論耶答信未成位亦是別教義也問若爾同別二教云何別耶答別教則信中具攝諸位同教則不爾也是故云前明持法今并解佛故也又此信滿明得佛果故明也若爾后解位滿亦得佛果何不明耶𥸩以信初故解唯此故已上前明十陀羅尼陀羅尼者即是捻持義是故云前明持法此則同教義也又此信滿明得佛果者約別教義𥸩也今此解佛行佛通彼二𥸩故不得一準也問問答中名數門中列十佛見佛門中亦列十佛準於解佛行佛如何答約此因圓十佛於名數門見佛門中二處列故並是解佛也問若爾信滿十佛亦具名數及見佛義耶答爾也謂信滿十佛𥸩中云又𥸩同下十種見佛處以彼𥸩此應知已上故具見佛義也亦云無著佛願佛等故亦具名數也既通三世間等者謂十佛身捻則三世間廣則十普法也故第八地衆生國土等身通三世間亦一切理事人法等捻為佛寶則通十普法也皆就覺義等者雖通取十普法為佛然約覺義説也以海印三昧為體者十佛皆以海豫為所依故爾也前諸教所明至二門者此是方便同教何故云具同別二門耶答并舉若依一乘之所同別教故云具同別二門耳非謂唯據攝方便門六爾也五教章云或具前五攝方便故者前四是攝方便教仍望所同之別教云具五也非謂攝方便中即具五也今此亦爾也余可知者一云余處攝方便中具説所流所目今此則無故令準知也今𥸩者別行三寶章出三寶體中約心出體約智出體約斷障約世時約同相約別相出體多種不同今此唯約同相別相出體不説其余故爾云也法寶體者小乘三乘一乘三段不同初小乘中先約毗曇宗后約成宗初中先捻約四種法寶出體一以四諦十六行下別約四法出體也四諦十六行者苦諦中苦空無常無我之四集諦中因集有緣之四滅諦中盡止妙出之四道諦中道如𨁯乘之四四諦各匹故為十六行也小乘三藏教等者經律論三也音聲名句聲處法處二法等者音聲則聲處攝名句文則法處攝也問音聲之屈曲是名句文何故名句文於法處中攝耶答雖是聲之屈曲然音聲則耳識所對之境名句文則意識所對之境故爾也見道者十六心見道也八忍八智者欲界四諦中苦法忍苦法智集法忍集法智滅法忍滅法智道法忍道法智故為四忍四智也上二界中苦類忍苦類智集類忍集類智滅類忍滅類智道類忍道類智故為四忍四智合八忍八智也三十三心者若并取果則九無間九解脫故合三十四心是故諸文説小乘成佛處或云依三十三心成佛或云三十四心也今此除果以果法屬於佛寶故也理和事和者菩薩緣覺及在家者同訂諦理故云理和然菩薩唯是單一無和合衆緣覺出於無佛世界獨處深山恆觀落葉流水得悟深法故無事和在家人可知后若依成等者前宗中無漏法外不許別立假人故唯在家四果屬於法寶今此宗中別約假人以為佛僧是故在家出家之無漏法並攝在法寶中也彼論云等者既云信此真智名信法是故知佛菩薩之所有無漏功德法皆屬法寶此法以外別立假人為佛僧也以相好身及等智等者有別相門通相門故別相門中相好身屬佛寶等智等屬僧寶若通相門通屬佛寶通屬僧寶也涅般不助彼等者涅般即是無漏體故不助成無漏智也答中先略答次重責如道有二種下廣答也道如乘者能通義故名道此道順於滅果故名為如以此為䡄到於滅果故名為乘此到於滅果名乘問若爾何故偏得道名答後初得也以𮥷惑業品數上下者上品障則下品劣智斷下品障則上品勝智斷以上品障麁故劣智能斷下品障細故勝智能斷也盡止妙出者滅止盡止一義也滅煩惱惑故名為滅過此更無所至故名止苦麁障盡故名妙如是出𮥷有結故名出也此亦初得滅名也苦空無常無我者逼迫為苦我體空故名空不住名無常無我所故名無我向何故偏得苦名答空無我則或通滅諦無常則或通集諦苦無通處故也問若空無常無我通於余諦何故得云苦下具四耶答欲遮身邊二見故也謂計異熟果報執為我則名身見此身見上增執為常名邊見以空無我遮身見以無常門遮邊見故爾也因集有緣者生苦名因不𮥷於苦名集能有后有之果名有苦基名緣問若爾何故偏得集名答若生苦時集最親故問生苦之因因亦親耶答因雖生苦無苦之時亦得有也集則能集煩惱業便生苦故最親也問然則苦集是生死因果滅道是涅般因果故生死有漏非可重也何故苦集得為法寶耶答迷四諦為生死訂四諦為涅般四諦可重故得為法寶體也問答文現可知三乘假中有初終頓三也初教中假突二法者音聲為實此音聲所成名句文為假也識所變等者諸佛利他種子為因衆生機感為緣於佛智上文義相生為本質教衆生之有漏無漏善根種子為因諸佛慈悲行𭛔為增上緣聞者識上文義相生為影像教之意也以諸道品等者三十七道品也謂四念住四正斷四如意五根五力七等覺攴八聖道攴也即三四二五單七隻八也即空無分別者初教之法約即空説故也或以真如等者真如中體相二大為理法寶從此真如最清淨法界所流十二分教為教法寶真如中體相二大為內熏因真如用大為外熏緣依此正教所起之行為行法寶此行圓滿還契真如為果法寶也問答中問意者得果法名佛依此修行名僧然則果法與佛何別行法與僧何別耶答意可知如此經云者十地品金剛藏菩薩云此法深不可説等是也一乘中皆就䡄義説者佛寶中雖具十法以覺義為佛法寶亦爾雖具十法亦以䡄則義説也因陀羅等者等取余門也余可準知者此亦約心約智等出多種體準知也僧寶體中小乘三乘一乘三假也小乘先約毗曇宗后約成實宗初中先明應供僧三皈僧后又依彼下明第一義僧等僧初中應供僧者丹越請僧不簡上下依次而請從凡沙𣃥上至於佛等心請供若計勝劣而請供養供養心狹生福亦狹不簡勝劣等心請供供養心寬生福亦廣是故梵網云別請五百羅漢菩薩僧不如僧次一凡夫僧賢愚經云正使比丘畜挾妻子四人已上名字衆僧應當敬如舍利弗目健連已上此則約應供僧説也二三皈僧唯取聲聞人等者四向四果也以凡僧無聖德等者前云下極凡夫沙𣃥既是僧數今此何故唯取聲聞人中四向四果耶為決此疑云三皈僧中以凡夫僧無聖德等云云可知無漏突功德等者於聲聞中以四向四果為僧寶則恐有疑云并取有漏無漏耶是故簡也二等僧謂凡夫僧者若以平等心供養凡僧則生福與供養聖僧等故名等僧也聖中等者恐有人謂若是聖僧皆僧寶體是故簡云前二非正后一無漏正為寶體也方便善五陰者修有漏戒定得無漏五陰故有漏戒定名為方便也仍有四句者有僧德無僧儀一句無僧德有僧儀一句俱有一句俱無一句有僧德無僧儀者則在家人自聞思已上乃至羅漢謵得聖果故有僧德然在家故無僧儀也無僧德有僧儀者則出家人自聞思已前未得聖果謂出家故有僧儀然不得聖果故無僧德也俱有者謂出家人聞思已上得聖果者也俱無者在家聞思已前凡夫人也第一句則上法寶攝第三句則此僧寶中攝第二句則住持僧寶攝第四句則此中不攝然欲圓句數故并説也三乘中有初頓三假初教中始終可知菩薩以三賢已去等者菩薩位中三賢為資糧位回向已后別立四善根為加行位初地為通達位二地至第十地為修習位佛地為究竟位也二乘位中就七方便捴相念處別相念處五停心觀為初三方便即資糧位也暖項忍世第一法為四善根即加行位也是故菩薩與聲聞同以四善根為加行故三賢已去又云入資糧位已去也問菩薩位中不辨説十信耶答信是方便故不現説然以方便故舉三賢時具十信也唯取出家同僧者等問前則無問在家出家為僧寶此中唯取出家故如是云耶答二義可見一意者前假亦唯取出家同僧法者以為僧寶然前中不別現示故今辨云唯取出家等也一意者前則通取在家出家今此唯取出家同僧法也在家聲聞等者前中唯取出家為僧寶未知在家何寶所攝故今云爾也犀角辟支者麟角喻獨覺也簡去助伴獨覺助伴獨覺者依十二因緣法得道果故得獨覺名然依助伴而得解脫故僧寶中攝也此約始教之初者問前説始終與此始終何別答前則回心為始直進為終今此則通約回心直進為始別約菩薩為終此是令向終教義故二處別也如論云者寶性論也或唯取菩薩隨一皆遍六位者終教中唯以菩薩乘為真僧寶者方便引之令入別教隨一皆遍六位義故也然則初教唯以菩薩為第一義和合者亦是方便引向終教唯以菩薩為真僧寶義故也三住持三寶中以素畫等者絹素之中所畫之像也衆同分不相應法為體者不相應中第三衆同分也問答中問意者形像無心命雖致敬捐壞冝無罪福當於何處得罪福耶答中先正答次引訂后此明若是已下𥸩所引文也隨是何塔者立塔有八人謂佛菩薩緣覺阿羅漢阿那含斯陀含須陀洹及與輪王佛塔則八重露盤已上菩薩塔則七盤乃至輪王則唯一露盤是故佛塔則致敬捐壞望佛得罪福菩薩等亦爾故云望主得罪福也問則據像而問答則引塔為訂而答也次問答可知塔像者前向中舉像答中舉塔故今并舉也三乘中佛法及僧像同以色法為體者菩薩像十六羅漢像等為僧像也一乘中並是大法界緣起等者若一乘中雖是遺教流通之事並是六法界中約機緣起所成淨用故不離本法以之為體也余義準之者此中準前亦説攝方便義故爾也第四融攝中初開數列門后初中下正𥸩正𥸩中從初中至上來二融攝約三乘教説者約三乘現二門融攝后若別教下約一乘明初中從初至如是等者正𥸩上來二門下捴結也初中二門即為二假初門有三初同相中二先約始教説后約終教説初始教中先正明同相融攝后問答中問意可知答中先正答次引訂后是故當知下結也正答中但以彼二本來自空者答如其有者等問也非壞彼二方得為空者答如其無者等問也引訂中二經並般若經也色即空訂彼二本來自空義也非色滅空訂非壞彼二方得為空義也非以空色故名色空訂非壞彼二方得為空義也但以色即是空空即色訂彼二本來自空義也二終教假中先明攝別相后彼住持之相已下明攝住持也初攝別相中二初正明后是即下結也初中先引論義明攝后又彼論云下正引訂論文有二即初明別相依同相起后明同相攝別相也梁論可知初中依法力熏習者體相二大為內熏因用六為外熏緣而成熏習之義則地前也如實修行者地上也滿足方便是十地滿足也破和合識相者於賴耶中具有生滅不生滅和合之義今破生滅識相現不生滅體也滅相續心相者滅業識等心相謂心體是真不可滅故唯滅相也現現法身者即是心體現現是則斷果即下法身也智純淨故者是則智果則下自受用身也他受用身者為地上機變化身者為地前機非是地前地上之機則以所流教法及住持幢相化也如是勝妙境界不同所為之機有差別故爾也是故依真如起二種相中從智淨相起佛僧二寶從不思議業相起於法寶則知別相不離同相真也幢相者所以寺中立幢相者意欲表佛宇吉祥處故如是世間住持三寶亦能表現真實三寶也問若爾此中已現同相攝住持之義何故至下更云乂彼住持之相等耶答所現一切勝妙境中住持幢相等法含在其中是故兼説非是正又彼論云本覺等者此有心體離念𮥷念之相等虛空也一云𥸩論云者也謂心體離念離念之人等虛空也不乖同而恆別者但語對故來耳義在下別相融攝中如彼可知也以此教理者此中所引論文及所現之義理也二攝住特中先正明攝后故以下結也初中亦二先明住持從同相真如所流不離同相攝在中也素像者幢憣及菩薩像也后為真已下所以標示住持三寶相者為欲現示真三寶故彼住持相攝在同相中也初中先自意𥸩后剃袈裟下廣引聖教𥸩現也剃髮加沙者十輪經云剃髮披袈沙諸佛法幢相諸佛等護持解脫道之眼雖破諸律儀非永遮解脫能破諸惡見當速趣涅般如腐敗良藥猶能療泉病如是破律儀亦能滅他若不聽彼苾芻在布薩羯磨許為他説法俱獲福無疑大集經云佛言若有衆生為我出家剃除鬚髮被服袈沙設不戒彼等悉已為涅般印之所印也佛言大梵若有惱亂罵辱打縛為我剃髮著袈沙行不受禁戒受而犯者得罪多彼何以故是人猶能為諸天子示菩薩道是人便已於三寶中心得敬信勝於一切九十五道已上經中造像夌等者未曾有經云佛告阿難若有一人盡四天下滿中草木皆悉為人得四道果及辟支佛盡壽四事供養所項具足至滅度后一一起塔香花幢憣寶蓋供養復造帝𥸩大莊嚴殿用八萬四千寶柱八万四千天井寶窗八万四千樓櫓館閣四出圍繞衆寶校飾若有善男子善女人作如上百千億大莊嚴殿用施四方僧其福雖多然不如有人於佛般涅槃后以如芥子舍利起塔大如阿摩勒果其如針上施盤蓋如痠棗葉造佛形像如麥大勝前功德滿足百倍不及一千倍万倍百千万倍所不能及不可稱量已上又以袈沙至彼獵師非法之處者十輪經第四卷云善男子過去有迦闍國王名梵授勑旃陀羅大象王名青蓮花六牙具足住香山邊汝可往彼拔取牙來若不得者汝等五人定無活義時旃陀羅為護身命執持弓箭被赤袈沙現沙門威儀形像往雪山邊至象王所時彼母象遙見人來執持弓箭驚怖馳走詣象王所白言大天今見有人張弓挾箭徐行覘視來趣我等將非我等命欲盡耶象王聞已舉目便見剃除鬚髮著加沙人即為母象説偈言彼殑加沙等諸佛法幢相觀此𮥷𢙣法必不害衆生時彼母象以偈答云雖知披法服而執於弓箭是𢙣旃茶羅樂𢙣無悲愍時大象王復説偈言見袈沙一相知是慈悲本此必皈佛者愍念諸衆生汝勿懷疑慮冝應速攝心被此法衣人欲度生死海時旃茶羅即以毒箭彎弓審射中象王心母象見之舉聲呼叫悲哀哽咽以頌白言被此法衣人冝應定皈法威儀雖寂靜而懷毒𢙣心冝速踏彼身令其命根斷滅此怨令盡以射天身故時大象王以偈答曰寧速捨身命不應生𢙣心彼雖懷詐心猶似佛弟子智者非為命而壞清淨心為度諸有情當習菩薩行已上又如彼縷救龍難等者海龍王經中以大衣救難又觀佛三昧經以一縷絲救罷難等又如出家破戒悉當得泥洹等者大悲經云佛吉阿難於我法中但使性是沙門汙沙門行自稱沙門形似沙門當有披著袈沙者於此賢劫𣃥勒為首乃至最后樓遮如來彼諸沙門如是千佛於無余涅般界次第當得入般涅槃無有遺余何以故如是一切諸沙門中乃至一稱佛名一生信所作功德終不稱已上意引彼經也又能生天人十種功德者此亦十輪經謂色力受樂等十種功德也如牛黃者十輪經云依我出家若持戒若破戒我即不聽國王大臣宰相摘罰繫閉加諸鞕枚截其手足乃至斷命况復余輕犯小威儀破戒比立雖是死人是戒余力猶如牛黃是牛雖死人故取之亦如麝香死后有用能大利益一切衆生惡行比丘雖犯禁戒其戒勢力猶能利益無量人天比如燒香香體雖壞熏他令香破戒比丘亦復如是自墮𢙣趣能令衆生增長善根已上第二別相中先明攝同相后住持幢相已下明攝住持也初中余思準之者前假終教中引此波水之喻是故即知此假波水之𥸩亦是終教意是則此中先明終教意又欲現初教中以空真如成此別相故同相攝在此中之義故云余思準之泥木像等者觀佛三昧經云時于闐王戀慕世尊鑄金為像聞當下寶階象載金像來迎世尊爾時金像從象上下猶如生佛足步虛空足下兩花亦放光明來迎世尊合掌又手為佛作禮爾時世尊亦復長跪合掌向像空中百千化佛亦皆合掌長跪向像爾時世尊語像言汝於未來世大作佛事我滅度后我諸弟子以付囑汝空中化佛異口同音咸作是言若有衆生於佛滅后造形像得用供養是來世必得念佛三昧又外國六佛上忉利天為母説法經九十日波斯匿王思欲見佛刻牛頭栴檀作如來像置佛座處佛后還精舍像出迎佛佛言還坐吾般涅槃后可為四部衆作諸法式像即還坐此乃像之始也佛移住兩邊小精舍與像異處相去二十步祇桓精舍本有七重諸國竟興供養不絶含燈炷燒諸幡蓋遂及精舍七重都盡謂像亦燒而像自移一閣儼然而坐后開閣見知不被燒云云皆是如來神力也巧智施設等者紙墨經卷等住持之法皆是佛智之所施設不𮥷智也經云者華嚴經也第三約住持中先所住持后能住持麁末之相者同相別相是細是本住持是麁是末也后中能住持彼同相別相故得住持三寶名也潛隱而成者同相別相於住持中潛隱而成也第二三寶相收中如前同相者前同相假中云真如𮥷念本覺為佛此中恆沙功德為法等於一真中開示三寶相故指彼也經云分別一切者第三會勝惠菩薩偈也又經云者一切惠菩薩偈也論云等者寶性論也二約始覺等者智體遍融者理也智相圓音者教也万行者行法成一妙果者果法約此四義為法寶也經云者維摩經也又經云者般若經也又經六於如來智等者性起品智堪含受喻中依於佛智生三乘善根之文也又經云者涅般經也又論云者寶性論也二約別教融攝中先通舉明融攝后依是義下明別別融攝也初中攴分則僧圓滿則佛軌則則法也分非圓外分分圓以成分者佛門融攝義圓非分外圓等者僧寶融攝義軌如圓分等者法寶中融攝義也后中先僧中攝三寶次又如經等者法中攝三寶又如經中如來等者佛中攝三寶即舍那品文也又以法界身等者佛中具攝也今此現三寶融攝中何故舉一切法耶是故決云一切法者是三寶故也第五明種類中或同世間身者黑象腳身及樹神身等也或二身者生身法身等也或一身者頓教中以𮥷言絶慮為佛故也二身者自性法身應化法身也三身者法身應身化身也又法報化也四身者梁論云法身自性身應身化身也佛地經云法身自受用身他受用身變化身也楞伽經云如如佛功德佛智惠佛應化佛也法寶中或唯一種者𮥷言絶慮之一實法也名同小乘者非是近牒或唯一種望於或亦四種云也或三種謂同相等如前者指前出體假此約三乘者問何故前之約事就義門中不簡小乘今此同相不通小乘耶答一佛體上具説三義則可通小乘然此中意於一真體上之所開示正唯大乘非是小乘之所見聞是故簡也或有十門者一云一一各開十現無盡也今𥸩三寶中各三故為九更加揔門則為十也在修行心訂比教智處等者一云見聞解行為比訂果海為訂也訂之人化他之義為教智也即是住持成其大益等者是比訂人住持十種三寶令不斷絶之義非謂別相住持相對之住持也第六簡定所皈者前明三寶既有多種未知取捨故此假來也一捨邪皈正中問前建立中彼邪三立佛法僧則是有漏耶答二假中相之義則一而不殊然彼建立中不分有漏及與無漏也佛亦同也者佛雖無漏同於人天故説有漏也二捨劣皈勝門者先則正明捨劣皈勝后或可已下現通皈漏無漏義也初中先自意𥸩次引訂后問答除疑現寶通皈局也初中先明捨劣后彼但相從下明皈勝也引訂中先乃至得涅槃無上法者論文也后此明已下章主之辭也初中至皆得名寶者論文乃至約寶明皈者章主之辭也問云三寶已下論文也此明唯皈佛無漏等者向法寶則可云是法何故佛寶僧寶亦云法耶答此宗中五蘊實法以外不許別立假人直於法上假設人佛僧亦如云也問答中向則文現答中已下喻如是者法合也初中從初至生福則劣者答中通也皈依據究竟安隱等者答皈中局義也二通收中以寶同皈寶亦無漏故通也如此上下者指此假也或以皈同寶等者以皈同寶則皈中通皈漏無漏也三捨權皈門中先正明后或通皈等者兼明通歸二無漏也初中捨及引訂后大乘中下皈及引訂也前則法華后則梵網也不皈佛寶法寶亦例知也二此大乘中自有二無漏等者前則通皈愚法二乘今則大乘目有不愚法二乘是故皈於自中所有不愚法不皈愚法無漏也問言大乘自有二無漏時皈於不愚法二乘無漏之義既具現現何故加云自有三乘法耶答前云大乘中有二無漏未知如何是二無漏故欲現此故云自有三乘法故也言又亦者非唯愚法有二無漏自大乘中亦有無漏故云又亦也四捨相皈真中先捨相皈真后或亦通𭠎已下通皈別相同相也初中先自意𥸩后涅般下引訂初中前假對三乘無漏明皈不皈今則於菩薩乘自宗之中明同相可皈別相不可皈也此約終教及頓教説者即富捨相皈真也此約三乘教説者通望前捨權皈實云也何者此約終教及頓教説者對前假此通始終教説之辭來也此約三乘説者對前前假上來約小乘説之辭來是故爾也五捨末皈本中二先明捨末皈本后或亦通𭠎下明通攝本末也初中先明皈本后余隨物機下明不皈末也或亦通收者攝方便郎不即答一云或亦通收以本末圓融無二相故因此仍云攝方便故同一法界故則知攝方便也向若爾本末圓融無二之義難成耶答攝方便中亦得爾也謂所詮章云由此甚深緣起一心具五義門是故聖者隨以一門攝化衆生一攝義從名門如小乘説二攝理從事門乃至五性海具德門如圓教説是則不動本而常末不壞末而恆本故五義相融唯一心轉也已上不動本而常末則下四教不壞末而恆本則是一乘通約本夫令其鎔融則是攝方便故爾也然今𥸩本末圓融無二相者即是別教一乘次下攝方便者是攝方便也是故或亦通收中具含多義故見下四教於一乘十三寶中本來具足名為通收又下四教所説三寶望我一乘十種三寶而為方便則亦名通收雖並名通收然若本末圓融則本末之法並是一乘也此則本末鎔融唯一大善巧法又該攝一切三乘等法本來悉是別教一乘已上此意也問本末圓融無二相者與所詮章中約法通收約機分齊云何配耶答約法通收門也問若爾約法通收門云不動本而常末不壞末而恆本初句則下三乘后句則一乘別教也則通收門中通具下四教何故今此本末圓融局於別教耶答彼章中意者不壞末而恆本則正當約法通收門義不動本而恆末則但是語對故并舉耳該攝門中有一即三三即一二句唯三即一句當於該攝門但是語對故并説一即三句耳此亦爾也問攝方便者約法通收門耶約機分齊門耶答約機門中見也既種性章中約機并得法分齊中并説攝方便故爾也同一法界故者以同是一法界故則成本末圓融之所以也同於別教一法界故則成攝方便之所以也人天所得亦在其中者以下四教三寶於一乘十三寶中本自具故是別教也又下四教三寶望我一乘十種三寶為攝方便是故亦在所攝故是同教也二義具也余義準之者余門但舉攝方便同教義不明下四教攝在一乘中本末具足之義是故余門亦準此假本末具明之義説也第七業用中別相勝余漸劣者同相次劣住持最劣耶不爾耶答能秉持法益衆生故住持則勝然既同相依持資成別相用故同相次住持最劣也不分三相者同相者於一真體上之所開故非佛故勝法僧故劣是故云爾也平等為用者平等之用未知何相故云此有三義也問以此三義準三寶云何答一云初則佛寶次法后僧今𥸩同相三寶通資別相三寶不別成也次下二句亦通可知也余義可知者既𥸩佛寶最勝指余法僧二寶軌則義故次和合義最劣之義也若一乘三寶業用皆齊等者普賢盡佛境則僧寶齊於佛法寶也法界起用法如是者法寶齊於佛僧寶也第八次第中如經云者維摩經佛國土品也初二句訂佛寶之先次二句訂法寶之次后天人得道者訂僧寶之后也如憂奠王等者佛為母往忉利天説法九十日憂奠王戀佛刻栴檀造像故云耳迦葉等結集法眼等者二月十五日世尊入滅至四月八日迦葉與一千阿羅漢於阿闍世王宮中結集法眼故法次也依於此法度於凡僧故最后也捴説至如前説者指一乘三寶皆無前后等也余義可知者三乘三寶則別約佛法僧作次第也一乘則不爾通約十三寶云皆無前后等則若約三乘佛法僧論次第亦得云大法界緣起同時現現無前後等義準可知也捴説亦爾此是該攝義也流轉章前明三寶於法寶中有教理行果之四而理法之中有流轉生滅之義欲現此義故次來也又前明所迷三寶今此明迷於三寶生滅流轉之義故次來也此中先開數列章后初中已下依門別𥸩別𥸩中十門即為十假初假中先通𥸩生滅流轉之義后生滅違順下正𥸩違順初中先自意𥸩次引訂后皆是流轉等者結也引訂中經云者沮般經云如人捨命受大苦時宗親呼哭其人惶怖莫知依救雖有五情無所知覺攴即顫動不能自持身體虛冷暖氣欲盡見先所修善惡報相此陰滅時彼陰續生如燈生暗滅燈滅暗生善男子如臘印印泥印與泥合印滅文成而是臘印不變在泥文非泥出不余處來以印因緣而生是文現在陰滅中陰陰生是現在陰終不變為中陰五陰中陰五陰亦非自生不從余來因現陰故生中陰陰如印印泥印壞文成名雖無差而時即各異等又經云者苐三會偈也二生滅違順中先捻后別捻中一相違可知二相順中先正𥸩次問若前下問答除疑后是故下結也問答中有五重問答初重問答中初若前念至二念不並者帖前次既其滅已下正難后是故滅已無物下重難也初中若前念至不得生者正帖前二念不並者出所因次既其滅至不得生者正難以生無所依故者出所因也如論下引訂是故已下重難可知答意者有斷滅有剎那滅若斷滅則不得生后以剎那滅故能生后也第二問答問意者若是滅者即同無物若不同無物應非是滅答中是剎那滅必引后故不同無物者答此剎那滅不同無物之問若不引后非此滅故者答應非是滅之問也若具云者若不引后非此滅故而引后故即此滅也今此言略也第三問答問中無心定等者等取滅盡定也答中一能依轉識麁等者入無心定等非是不生以能依轉識麁故入無心定若經劫數若便出定前后相望俱為等無間緣二所依本識細故流注相續也是故約能依轉識故入無心定若約本識則無入無心定之理也唯識章云七云何處無心定不可得耶如世尊説入無想及滅盡定當知爾時識不𮥷身若無阿賴耶識爾時應𮥷身識若𮥷身便應捨命非謂處之定已上雖入滅定由有阿賴耶識故前后流注相續不絶也第四問答中答意者小乘中但論六識不知有賴耶末那是故云入無余滅根識永滅不得更生若終教中説此入滅之人不滅賴耶末那不斷根本無明是故更起心想受變易身行菩薩道以無衆生作非衆生者小乘中謂入滅人灰斷永滅故云非衆生終教則不爾故云爾也是故瑜伽第八十云入無余滅人常居清淨界終不墮在天龍藥叉𠃵達波阿修羅迦樓羅緊那羅摩睺羅迦人非人等衆生數中已上小乘及始教云入無余滅則非衆生數也四記論者俱舍論云一向記問記默然記分別記也又佛地論第六云一向記分別記反問記默然記也謂一向記者如有問言一切生者決定滅耶佛法僧寶名福田耶如是等問應一向記此義應決定故分別記者如有問言滅者定更生耶如是等問應分別記何者煩惱已斷更不生三界若不盡斷者還生三界故分別也反問記者如有問言北洲南洲何勝何劣應反問言問何勝劣若問福之勝劣北洲則勝南閻浮提則劣也若問善根北洲則樂多苦小故劣南閻浮提則苦多樂小多有樂求佛法之人故勝也默然記者外道之人手握活鳥問生與死又立門閫問入與出應默然不答也滅者復生分別記者此約小乘者小乘中言滅者復生則但對外道故分別而云汝之所立滅不生者實是生也我宗所立斷煩惱滅者實不生也若約終教則小乘滅者實是生也第五問答答中先正答次引訂后是故流轉等者結也引訂中經云者楞伽經又經云者維摩經也三中亦違亦順中若不滅生無以生生等者滅彼生故滅違於生然不滅彼生則無以生生由滅生故得生生故順於生也依彼滅故生順於滅然而背滅故生違於滅也非句中具形奪無寄二義故由前二義相形奪者形奪也無二為一下無寄也以順奪違故唯順無違故云無二為一以違奪順故唯違無順故無二為一也第二別解者前則通舉前念后念論生滅此中前念開引后與滅壞二義后念開依前與背前二義故云別解也由滅壞不異至亦違亦順者由滅壞故亦違不異引后故亦順也由依前義故亦順不異背前故亦違也由滅壞至非違非順者滅壞故非順客引后故非違也背前故非順容依前故非違也更有句數者或具前四以解境故或絶前五以行境故等也第二斷常者亦先捴后別捴則通約前后念別則前后念中各開二義也別中由滅壞至不常者以滅壞故過去之法不至未來以背前故未來之法不至過去各各不動故法不至法也是故昨日已滅故昨日之法不至明日明日未起故明日之法不至昨日也由引后至不斷者前念位引后念位后念位依前念位故前后流注不絶也問何故不常所以中云法不至法不斷所以中云位不絶位耶答且舉一邊耳是故不常中亦得云位不至位不斷中亦得云法不絶法等也謂前念位滅故生后念位故於不常中可云位不至位也前念法引后念法后念法依前念法故不斷中可云法不絶法也不斷至轉不轉無二故也者不斷故恆流不常故不轉也不斷之不常故恆流而不轉不常之不斷故不轉而轉也非常非非常非斷非非斷者類類説故如是作句也則非常非非斷非斷非非常如是云也謂由滅壞違生后故由背前違依前故是故非常非非斷反此則云由引后違滅壞故由依前違背前故是故不斷非非常謂滅壞違引后故非常背前違依前故非非斷也引后違滅壞故不斷依前違背前故非非常也今此至非不流轉者約非常非非斷義云非流轉約不斷非非常義云非不流轉也第三一異中先捴后別揔中由前念引后等者何故一異門中不作不異而云俱不俱等耶答一云不一門中作三句不異門中唯一句故謂不一門中由前念滅壞與背前故不一前念引后與后念背前故不一前念滅壞與后念依前故不一是則三句也不異門中一向前念引后與后念依前故不異故唯一句如是略故不作也而云等者等取不異句與不一句中不作之二句也一云有無中一后念中背前義是有二前念中滅壞義是無三后念中依前義是非有四前念中引后義是非無是故后念背前義與前念引后義齊是有故不異然前念后念異故不一此二不相難故俱此二絶故不俱也又前念滅壞義與后念依前義等是無故不異然前念后念異故不一此二不相難故俱此二絶故不俱也如是可作二重四句是故等者亦可云等取不現作之二重四句也別中亦四謂前后非一等者后念中背義與依前義為二故不一此二無二故不異此二不難故俱上之三句絶故不俱也又前念中滅壞義與引后義為二故不一此二不二故不異此二不難故俱雙泯故不俱也如是前后念中各開四句是則云前后非一者非謂四句中不一之句是前念后念各別不一中各開四句也又交終相望等者前后二念各開四句又通約二念論四句謂前念引后義與依前義故不異前念滅壞義與后念背前義故不一不相難故俱㸦形奪故不俱也既云又交絡相望故捴中立論亦得也第四有無中何故標云有四句𥸩則具説七句耶答二義可見一義者從初四句而摽加后三句開論存泯及與無尋而𥸩也謂澄觀和上廣狹門中云唯廣唯狹俱不俱乘此而云五具前四以解境故六絶前五以行境故至於中門云四句六句可準知之已上四句謂唯攝唯舒俱不俱也六句謂解境行境也今此亦爾摽中四句從初四句説也𥸩中后三從解行境通前説也一義者雖是七句不出於四謂初一是有次一是無第三四六是非有非無第五句是亦有亦無也第七句中存則第五泯則第六也是故七句即四句也經云者楞伽經云一切法不生我説剎那義初生即有滅不為愚人説一切法不生訂泯義我説剎那義訂存義也第六前后中亦二先捴后別通論意者以前捴中唯約非初非中后作四句故略故名捴此中非唯如前非初非中後論四句亦約前中后取論四句廣故名別也初捴中初三句則非初非中后意也苐四句則還是前中后取意故若作不俱則非非前后非非同時意也是故此不俱句者是前中后取之意然而非初非中后中三句之不俱義故是故當於非初非中后之四句也是故引訂中非初非中后者訂初三句前中后取故者訂苐四不俱句也別中通論等者初三句則前中后取之意也第四句則還是非初非中后之意然而以前中后取為詮所論故是故當於前中后取之四句也第七約時世初趣向中二依后向前至還無等者本無則未來今有則現在還無則過去是故此意者明日則未起故本無至明日則已起故今有明日至已即滅故還無也即當來作現在現在現滅為過去等者明日是未起故為當來至於明日則為現在而明日滅則為過去是故爾云也三由前二義不相難等者向后故生無盡然向前故無不滅也向前故滅無積然向無不生也四由前二義形奪等者非向后故滅無積然非向前故無滅也非向前故生無盡然非向后故無生也第二約相成中有五句云云三由前二門至三世俱泯等者光明覺品多中無一性一亦無有多如是二俱捨普入佛功德已上新疏𥸩云一多相依㸦為本末然有四義一相成義一多俱有㸦相待故有力俱存二相容義形奪兩亡以相依故各無性也已上與此何別答約三世約一多故詮則有異義乃無二也問若爾於異體本法訂中亦以力無力義為訂耶答但約相由為訂非以力無力義為訂也第三時法中有五門一時不流而法轉者若約我身説則九歲十歲時三十四十時六十七十時各別非是九與十歲時去入三十四十時非謂三十四十時去入五十六十時各各住故云時不流也今我此身從九歲十歲時至五十六十時故云法轉也此中先標次謂已下𥸩后此即約時已下結也𥸩中先𥸩法轉后然過去已下𥸩時不流也初中先正𥸩此是法轉者結也后時不流中先正𥸩此時不流者結也捴結中約時念念間斷者結時不流也約法相續恆流者結法轉也二法不轉而時遷者芽長花開則春葉茂枝繁則夏果熟葉𮕱則秋收藏皈根則冬則春之芽長花開不遷入夏之葉茂枝繁夏之葉茂枝繁不遷至秋之果熟葉𮕱等故法不轉然時莭則依前起后前后流注相續不絶故云時遷也此中分科假如前準也問何時法中各有流不流耶答前念時法中滅壞義后念時法中背前義是故時法各有不流之義前念時法中引后義后念時法中依前義是故時法各有流轉之義也三俱遷者約苐一法轉第二時遷也四非遷者約第一時不流第二法不轉故云非遷也五合前四句不相難等者約第一法轉第二時遷及苐三句全故云不動而流也約第一時不流第二法不轉及第四句全故云遷而不易也第八因果門一無中前因已滅等者過去既滅故非是判現在果之因當來未起故非望現因而得為果又當念不住故非因果是則昨日已滅故非今日之因明日未起故非望今日之因而得為果是故云對誰稱果也當念不住等者若約今日午時則已時已滅故同於昨日之滅未時未起故同於明日之未起又約此午時第二刻則初刻已過故同於巳時之已滅第三刻未起故同於未時之未起又約此一刻欲求剎那之相剎剎元來不住故云當念不住也二有中如論云者唯識論也三俱中由引后至亦因亦非因者由引后故亦因也而不異滅壞故亦非因也由酬前至亦果亦非果者由酬前故亦果也不異背前故亦非果也四俱泯至非因非非回者由滅壞故非因不異引后故非非因也由背前至非果非非果者由背前故非果不異酬前故非非果也此二門復不異故非因果非非因果者約前非因非果合為非因果約前非非因非非果合為非非因果也又若因果已下前論非因果今此亦遣非因果也第九真妄中先開數列名后初中已下𥸩𥸩中從初中至從此至彼者立宗也以生滅法下出所以也論云者正意菩薩十二因緣論中偈云煩惱初八九業二及與十余七説為苦三攝十二法從三故生二從二故生七從七復生三是故如輪轉一切世間法法因果無人但從於空法還生於空法已上初八九者無明愛取三為煩惱道行與有為業道余並為苦道也三攝十二者煩惱是捴故攝十二盡也從三故生二者由煩惱故造業也從二故生七者由業故感苦報也從七復生三者於此苦上又起惑造業受於苦報流轉不已猶如車輪也一切世間法法因果無人者訂無人也但從於空法還生於空法者訂下無法也二無法中先𥸩無法次但緣起力已下遣伏執初中此生滅法者捴舉次由后依前起至前念而來者舉后念法無從前生起之義𥸩現無法也由前滅至后位者舉前念法不至后念之義𥸩現法無也是故下結結中前念無法可去至后念者結后假后念無法可從前念來者結初假初中由后依前起后無自性等者舉依前義𥸩現無法此意者后依前起后則無體是故后念法體不從前來故知法之無也由后背前等者舉背前義𥸩現無法此意者以后背前故前不及后是故后法不從前來故知法之無也云此亦者前舉依前𥸩無法中云不從前念而來對此舉背前義𥸩無法云不從前念而來故云此亦也由前滅壞故無法可至后念者舉滅壞義𥸩無法此意者前念之法已滅壞故前法不至后念故知無法也由能引后義故體非后位攝等者舉引后義𥸩現無法此意者以前念能引后故后念之法不攝前念是故前念不至后念故知法之無也二中伏執云前中説無人無法若爾何故現見有生滅流轉故今遣云無人法而以緣起力故似有相續也三相盡中先𥸩后問答除疑初中從初至無體也者現三世之體空也又復思惟已下現來去住相本自盡也又細思惟下別約現在法現體空也當念速故不能自住者如空中雨滴既𮥷於上又不至下不於中住於三際中求其住相永不可得此亦爾也以𮥷首尾者首則過去尾則未來若𮥷過未即無體也且約午時而説巳時已滅同於昨日無未時未至同於明日無又於午時約第二刻説初刻已過故同巳時無三刻未至故同未時無又此一刻中若細分首尾則現在之體永不可得是則前中捴相而説故云當念速故不能住也今此深細而𥸩故云經思惟等也問答中答中先以自意答經云下引訂也初中從初至無不是真空者正答不得假有方是真空者現真空異斷空也是故下捴結也正答意者以同過未之空無為現假有故此假有即真空也斷空者猶穿井𭏚方得為空是故滅色方為空也外道斷滅皈於大虛小乘斷滅皈於涅般今此則不破假有即為真空是故異於滅色為空也經云者大品經又經云者般若經也四理現者前現虛相皆盡今説真理露現也先自意𥸩次論中已下引訂后諸佛菩薩已下現悲智不住也初中即由如是相自盡等者帖前相盡説真理現也引訂中現楊論云真如有六種一流轉真如二相真如三唯識真如四安立真如五邪行真如六清淨真如七淨行真如也又經云者涅般經也悲智不住中先法説次喻説后依此道理下結成也第十成觀二假可知初中先識妄念后引訂初中先現能緣所緣𮥷相即空次既知下知法不有傷己顛倒后又復思惟下重現能緣所緣不有也初中既思惟下昨日已滅無明日未至無當念不住無如約一刻分首尾則乃至一念悉無所有永不可得故云一念無念也非唯所念之法如是不有能緣之心亦爾過去不至現在現在不至未來㸦不及也相即空者帖前相盡性本現者帖前理現也經云者普賢觀經也二成觀中先説解行二門后問答除疑也初中解可知行中亦二一始思惟彼法等者法界觀云第四泯絶無寄觀者謂此所觀真空不可言即色不即色亦不可言即空不即空一切皆不可不可亦不可此語亦不受逈絶無寄非言所及非解所到已上從此觀義説也言説不及者言語道斷也念慮不到者心行處滅也問一切並絶既是行始何者為終耶答玄鏡𥸩此語亦不受等云若受不可言是即有受有受則有念皆是心言之故逈絶無寄二邊既𮥷中道不存心境兩亡土絶無寄般若現矣已上般若現前是行終也是故第六地中初七八平等以無破有苐九平等以有破無苐十平等有無雙破如是苐十平等中具説亦有亦無非有非無四句然后四句雙泯百非頓絶方為般若現前之因已上則四句絶是生般若之因故名行始般若現前方名行終也此亦是至初地真觀中時正體智與真合境智雙融之義也若於乃至作無念者諸見絶處即是真行何得而言絶亦絶耶故令遣云若言一切皆絶即作無念之解若作無念之解亦是妄念故非行故云絶亦絶也二終謂以念智照無相境者正體智照真也非照非境者以境智雙融故無有境外智來照於境亦無智外境為智所照也非照非境者令絶止也無觀無不觀者令絶觀也四威儀中常作一切者觀也而無所作者止也雙行無得者止觀雙運也后問答問中此一門無念者帖前行門何須如上廣分別者望解始終云也答中若不如前者示有解始若不解知等者示有解終謂解終云正行不如所解是故今此欲令知解行之別故示有解終也設捴無知已下示無知之失謂無所知曉是過之大者是故如上分別令廣知也經云者大乘同性經也十輪經中僧有四一第一義僧謂諸佛菩薩辟支佛四果聖人二清淨僧謂持具足戒三啞羊僧謂不知智凡不知輕重之罪可懺不親近善知識不咨問是義非義無智而不起言如噁羊故四無慚無愧僧謂欲活命故入於佛法恣於六情而常著五欲樂者又智論第四云是僧有四種云何有羞僧持戒不破身口清淨能別好醜未得道名有羞僧云何無羞僧謂破諸戒身口不淨無惡不作是名無羞僧云何啞羊僧雖不破戒鈍根無惠不別好醜不知輕重不知有罪無罪若有僧事二人共諍不能斷結默然無言猶如白羊不能作聲名啞羊僧云何僧若學人若無學人住四果中行四向道是名突僧無慧修靜慮等者唯修智惠不修靜慮失在狂惠唯修靜慮不修智慧失在頑癡雙修㝎惠方免狂癡之失也並如別説者智者禪師十卷止觀章主起信論疏也法界緣起章中先開列章門后初緣起相由者下別𥸩初中夫者若夫竊以觀夫夫以並是一義皆發語之初也問此中法界緣起與義理章法界緣起何別答一云彼則具內訂外化此唯外化一云二處並具內訂外化也一云二處唯外化也然今𥸩后義可存也問彼中并説究竟果訂何云並是外化耶答法界緣起之名從隨緣約因辨教義得也但於所依之中并説究竟果耳是故彼處亦外化也蹀取十玄緣起無得法而云法界緣起則十玄緣起既是外化故法界緣起亦唯外化是故上説隨緣約因辨教義已結云此上十門解𥸩及本文十義同時會融成一法界緣起具德門如是同於章初法界緣起之言而結之是知法界緣起正唯外化也以不簡內外染淨統收法界成一緣起故名法界緣起也澄觀疏中云大緣起者簡於內外染淨一事緣起也如外土人功時節等為緣即有芽起無明行等為緣有識等起今即該收法界為一緣起故云大也已上故爾也容持者容則容入持則持依約能攝能持故云容持若約所持所攝可云依入也問唯局中門耶亦通即門耶答正當中門亦通即門謂光明覺品新疏中於即門中明㸦泯義而文云四㸦泯義以此持彼彼相盡而唯此以彼持此亦爾已上故即門之持義也又即門論廢攝而攝義是容義故容持之義通即門也如帝網該羅若天珠交涉者初則通舉一網后則別舉多珠也緣起相由者旨故章云緣起相由者本一與多㸦為緣起相由成立已上由一故有二由一故有三乃至有十若却初一十皆不成是相由義也法性融通者所依之理融通無得故能依之事亦如所依之理無得即入也三緣性雙現門者緣則緣起相由性則法性融通二門同時現前也四理事分無門者緣則是事性則是理理事俱泯無別分齊也問諸處文中十普法是所𥸩相即相入是玄門緣起相由等是所以也何故今此唯説所以不説門法耶答此有深意謂三寶是捴故在最初次就法寶中有教理行果於理法中有生滅流轉故次説流轉約流轉之法以一乘高心而説則是法界緣起故次立法界緣起章上𥸩一乘法寶云若依一乘約有十法謂理事教義因果人法解行皆就䡄義説具足主伴無盡因陀羅等已上謂理事等是所𥸩十法主伴者主伴門也因陀羅者帝網門也等中等取余門也如上一乘法寶何故如是相即相入園融之法而為體即是故今此説緣起相由及法性融通以𥸩所以也是則此章前説十門十法今説所以與諸章疏一而無別也𥸩中先𥸩緣起相由后現不作門也初中二先正𥸩后上來下捴結也初中先題本法三門后此三門已下現示七門須門之義也此中同異體義以十門説一本法須門淺深決二同仱異體得名決三法性門中同異決四本法錢數多小決五能應所應同體決六所應是九是十決七同體一一種種決八同體事事理理決九雜假問答現義決十隨文科𥸩現示決第一本法須門淺深決者一云本法則緣起自體故深須門則緣起義門故淺也今𥸩本法須門並是一緣起義門説無別淺深也問三門本法終云緣起本法竟然則緣起本法與緣起自體不別何云無淺深耶答本法與自體之名既別不可一同且本法與須門者並是緣起義門中所説而章疏之人欲別門戶故約同異體勒束諸法則名為本法於此法上須中即回陀羅而論則是須門故爾也苐二同異得名者一云至須門時得名今𥸩本法時得名既云諸緣㸦異則異體諸緣㸦應則同體故爾也問料簡同體相入門中云謂前一緣所具多一與彼一緣體無別故名為同體等則可云須門得耶答怗舉本法而𥸩名故是故本法中得也謂演義云疏七同體相入等者𥸩中有三初別𥸩同體義二雙𥸩即入二義所以三正解此門今初言謂前一緣者即指前第二門以第二門是本同體故已上謂前一緣者帖前本法也又諸緣各異之異與異體之異不別故爾也第三法性門中論不論者一云法性門中不論同異今𥸩通論也謂章主發心品疏云次八重即入無得此中一大小相即二多小三廣狹四一多五相入六染淨七帝網八相生此八有二義謂相即相入此二各有二謂同體異體此二復有二義得成即入一約緣起門二約真性門初中亦二義一約體有空有義故得相即二約用有力無力義故得相入約緣有待不待義故有同體異體二約性亦二義一不壞緣相故相入二緣相盡故相即並園融無得自在準上思之已上準上思之者真性門中準前緣起門亦論同異體故爾也問緣起門同異體則約待緣不待緣論也真性門同異體亦爾耶答一云真性門約自類異類論同異體也今𥸩緣起門中亦得自類異類論同異真性門中亦得約待不待義論同異如是㸦説無得也何者二門所論同異一種無別是故所𥸩十普法中有同體法有異體法如是同異之法由緣起力故即入者緣起門之同異體由法性融故即入者法性門之同異體是故㸦説也問異體相由同體不相由然自具十中亦有相由之義則同異體之相由與緣起相由之相由何別答一也謂旨皈章緣起相由力故者謂一與多㸦為緣起相由成立已上由一故有二由一故有三等相由而成者是緣起相由也同異相由亦爾也由一故有二由一故有三等是故相由之義一而無別也問同異體是所𥸩即入是玄門緣起相由等是所以法位既別何故所𥸩同異體之相由與所以之緣起相由一耶答立異體法云由一故有二由一故有三乃至由一故有十如是立十法之時各守相由之義立於自位同體雖不相由而𢪛自具德中相由是故立十法之時亦各守相由之義住於自位如是同異之法相即相入則玄門也何故如是相入相即耶則既前立所𥸩法時各守相由之義而立是故同異之法以自所有相由力故相即相入則緣起相由之同異體也由所依理之融通故相即相入則法性融通之同異體也如幻夢故相由不相由而相入即者如幻夢之同異體也是故相由則一也但所𥸩與所以之詮小別耳問緣起門中一向空有義故得相即力無力義故得相入真性門中一向緣相盡故相即不壞緣故相入耶亦得㸦云耶答一云如前今𥸩亦得如后以言異義同故也謂空有義故相即者一有則多空故多相本盡即於一也故云相即然則與緣相盡故相即一意也力無力故相入者一有力則余無力無力之多不動自位入於一中故云相入然則與不壞緣故相入一意也問不壞緣與緣相盡者可通能具所具何故偏約所具云即答但從增相説耳謂光明覺品新疏中入門中云以此特彼不壞彼而存此以彼持此亦爾是故上文一中解無量等即門云以此持彼彼相盡而唯此以彼持此存亡亦爾下文云知一即多多即一已上且約所具緣之盡與不壞云也問空有力無力緣相盡不壞緣則所以相即相入則玄門耶答一云空有力無力則緣起門之所以緣相盡不壞緣則真性門之所以因此所以乃成即入玄門是故不得㸦云也今𥸩此等並是即入異名故並玄門也問何故爾耶答若空有力無力是緣起相由之所以則於本法中亦論相由不相由也然則本法中亦論空有力無力耶若爾本法與須門何別是故並是即入別名故並是玄門也問既云由有空有故由有力無力故則空有力無力可是所以何故云並是玄門耶答此辭不定謂旨皈章云異體相望故有微細隱現謂異體相容故具微細義異體相是故具隱現義已上則相容相是為所以成微細隱現之玄門耶然並是一種玄門故今此亦爾也問若爾者亦得云由相即故有空有由相入故有力無力耶答爾也謂義理章云若不相即者空有二義不現前已上故爾也相即既爾相入亦然也第四本法多小者一云同體本法十門百箇異體本法一門十箇也一云同異二門並十門百箇也一云二門並一門十箇也今𥸩耴第三義也既異體中云諸緣各異故立各異之單十也同體異體無寬狹故同體本法亦一門十法也問異體中諸緣相望者一為能望余為所望故一中具十約余亦爾則似是十門耶答於一門中前后相望具於十故如是云耳所立之門唯一門也問同體中云諸緣㸦應亦云㸦遍相資者通於十門也何不爾耶答雖是一門亦爾云也既文超童云問若言各各舊自有一者以十爾一帖一即有二十個一何以只有十個一耶答以初一㸦融全應故唯十個一也已上彼亦一門同體是知一門亦云㸦應㸦遍也問既諸緣㸦應則通於十門耶答雖是一門具十緣故云諸緣㸦應也問諸緣㸦異與異體諸緣㸦應與同體何別答一云諸緣㸦異諸緣㸦應者通於十門異體同體者唯是一門故別也然今𥸩諸緣㸦異與異體諸緣㸦應與同體一而無別也問既言諸緣可通十門何云一門耶答若爾一門同異體云何名耶是故雖云諸緣唯是一門也問若爾十門同異體云何名耶答十門通名則諸處無文若作十門之通名者應云諸門之諸緣㸦異諸門之諸緣㸦應也問諸緣㸦應者此應於彼彼應於此故通於十門耶答若爾難者亦得云能應應於所應所應應於能應耶然而一向云能應應於所應是故此難無也若同異體本法中立十門者義理章本法中云同體不相由異體相由已上此亦舉十門同異論相由耶然不爾故唯立一門也問結同體本法云一一各具一切一也者十門百個耶答此則例余門之辭故爾也謂演義中二㸦遍相資義即同體門亦四初正𥸩言即具多個一等云云疏若此一緣不具多一即資應不遍不成緣起者第二及成也疏此即一一各具一切一者第三例余也疏下文下苐四引訂已上故爾也問㸦遍相資中通標十門於中且約一門𥸩是故云且如一緣云云例現此中不𥸩余門之時云一一各具一切一也然則㸦遍相資通於十門耶答㸦遍相資通標十門則演義中應別分科假然文中合為一假科云正𥸩故知正𥸩一門同體也問若爾對望何等而云且如耶答對於一一各具一切故爾云也問若一一各具者是例余則異體中各各守自一者亦例余耶答演義云此即各各守自一者結示已上故此則是結非是例余也問若爾異體中不説余門耶答既文超章云二異體者以前后相望各㸦異故所言異者由一故有二由一故有三乃至由一故有十如是相由㸦為緣起皆從本一生余九故是故余九入本一中各各不同名為異也既以一望余九由一有余即攝余入一者以二望余九乃至以十望余九亦爾準之已上則亦有例余門也問若爾同體中不結一門同體耶答且如一緣已下結也謂又云此諸緣㸦相遍應方成緣起已上則此言似於通舉十門是故次云且如一緣應多緣故有此多一則此是結一門之辭也問若爾何故演義云正𥸩耶答且對一一各具一切之言別𥸩一門故云正𥸩然此文中若分𥸩結則此諸緣等者𥸩也且如已下結也問且如一緣者何一耶答隨舉即是無別偏當也問第二門則云且如二緣第三門則云且如三緣等今云且如一緣則似是初門耶答約位則爾然例余中云一一各具一切一也則位雖一二等別直約其體則唯是一也是故知無偏當之一也問演義中一者如十錢為緣一錢當體自是本一應二之時乃詺初一以為二一應三為三一乃至應十為十一故有多一已上當於初一故唯初一耶答且如一緣是無偏當之一而演義中且令當於初一論耳問若此一不具多一資應不遍不成緣起已上何是能資何是所資耶答同體能資異體所資也謂妙理因成觀云今成緣起者由㸦相資謂一文殊身為能資應舉體遍應於諸緣即一切色心等為所資應是以一一緣皆有一文殊身也已上一文殊為同體色心等為異體故爾也問若爾此觀又云異體相資同體感應自分不他力義成者亦是開體能資異體所資耶答此則同體所資異體能資也問何故不同耶答隨心所舉分能所故不定也然同體本一之中有多一者只由異體之多緣資一故若約此義則異體能資同體所也若約同體本一應於異體之多緣故方具多一則同體能資異體所資以資有二義故資承之義則同體能資資助之義則異體能資之義也問異體本法訂中云多中無一性一亦無有多此則有力俱存義然則本法中亦説中即耶答既演義云四文云下引訂即光明覺品下半云如是二俱捨普入佛功德上半相成並立義下半形奪兩云義今非下半之義故不引之然由相成方各有體已上相成並立者由一故有二由一故有三等相由成立也既𥸩緣起相由之義云一與多㸦為緣起相由成立故但於相由義中引也非是引有力義為訂故不論也問俱存無得中云此一緣者何一緣耶答同異俱存之一緣也謂前説一門同體一門異體因此通舉令其俱存故也問要住自一方能遍應中何同體何異體耶答要住自一者異體方能遍應者同體也問異體具十何故云住自一耶答且約能待之一云耳則此一待於所待之無而具十故是故異體中亦具十也問若爾應通舉云由異體故有同體何故云要住自一方能遍應耶答且舉人論則人只是一而守自一待他之義則異體也然此一人違應於余則同體也如是人之一中令具視亦同異體故是故且約能待之一云耳然此能待之一待他具十也問同異圓備門云住一遍應故有廣狹自在然則此亦住自一則異體能遍應則同體耶答帖前俱存無得故爾也問廣狹自在者何見耶答異體挾同體廣也問同異二門各論廣挾何故通舉論耶答不定也下論隱現云同體為現異體為隱異現同隱亦爾已上如是通約二門以論隱現故今此亦爾也况同異圓偹門故爾也問演義云疏住一遍應故有廣挾自在門者即指前本法第二門也住一故挾遍應故廣已上此則既指㸦遍相資門故唯當同體耶答住一遍應故者舉異體現同體從其所現指遍應門故爾也
