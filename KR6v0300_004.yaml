body:
  text: 高麗國歸法寺主圓通首座均如說將釋此章略作四門一弁章主因緣行狀二弁造文因緣及次第三釋題名四入文解釋初者具如朝隱所述碑崔致遠所述傳故略也二中有二初弁因緣後弁次第初中亦二揔弁別弁也揔弁中二初報先恩後利今後報先恩中近報師恩故謂章主寄相德書云但以和尚章䟽義豐文簡致令後人多難趣入是以謹錄和尚微言妙旨勒成義記已上造述諸文淶演師義是報恩故也遠報佛恩故謂大䟽請加偈云願令法久住傳灯報佛恩故如大集經云假使頂戴經塵劫身為牀座遍三千若不傳法利群生畢竟無能報佛恩又如說修行為報佛恩耳利今後者請加偈云開此秘奧藏廣益於自他故別弁中華嚴傳云旨歸一卷十門右於上十門各以十義解釋通弁百門以現經義遂令浩汗之旨宛在目前又此中云庶探玄之士粗識其致已上則造此文別因緣也二造文次第者寄相德書云探玄記二十卷兩卷未成一乘教分記三卷玄義章等雜義一卷別華嚴中梵語一卷起信論䟽二卷十二門論䟽一卷新法界無差別論䟽一卷已上華嚴傳云華嚴旨歸一卷華嚴三昧觀一卷華嚴綱目一卷等已上旨歸是嵩福寺時所述故最在後也而傳中最初刻也是故寄相德書中所列正是造文次第也然教分記云西嵩福寺者以此記有二鍊本草本也闕章主名及與序者是乃草本則勝詮法師所傳魏國西寺時所述本是也至後鍊治時方題章主名及序文故云西嵩福寺耳第三釋題目中二先正弁章題後弁所依處及章主佳号初中亦二先舉所依本教后弁能𥸩章題初中問此章弁異設等十經料簡弁恒本等六經並是所依耶荅一云唯除眷屬經餘並所依也一云唯略本是所依也初義者下文云准此所說說華嚴會揔无了時何客有此一部經教荅為下劣眾生於無盡說中略取此等緒集流通故有此一部令其見聞方便引入无際限中如觀牗隙見無際空當知此中道理亦爾觀此一部見无邊法海又復即此一部是无邊劫海之說以結通文无分際故一說即是一切說故已上既云一部為詮見无邊海又云即此一部是無邊劫說由此二𥸩故尒也今𥸩唯略本三万六千偈為所依也以不見恒本等經故何得云依而𥸩耶問若尒前義中所引文云何會耶荅既云觀此一部見無邊法海等故雖云所依唯是略本然其義理該収恒本等經无所遺餘故尒云耳是故就略本中若五十卷經䟽非是八十卷經䟽或反此等此亦尒也問此所依教於三教中如何見耶荅一云下十益中頓得益是修相稱性益是窮實余則是頓故三教具也今𥸩唯頓圓中見也謂現經義中具說能𥸩十門及所𥸩十法則諸處文中門法之末即云若教義分齊與此相應者即是一乘圓教及頓教法門若與此相應而不具足者即是三乘漸教所攝已上故知尒也若具應云大方廣佛華嚴經今則存略也能𥸩題中有指字本則指示義以指示探玄之者所皈趣故今旨字本也旨者宗也皈者趣也即是語之所表曰宗宗之所皈曰趣是故旨皈旨趣宗皈宗源宗趣宗要並一義也一卷者文無二軸故若從卷數應名一卷章若依門云者十門章百門章若依下結應云无盡法海章也后所依處及章主佳号中亰兆者是通所依西嵩福寺者是別所依也通中亰者大也兆者數之多也謂天子居處高大人類眾多故也別中則天之父士者六原天水人則天皇后於咸亨元年封父為大原王封母為大原王妃遂於大原捨家為寺亦於東之洛陽西之長安皆置寺為敬生處並以大原名之至文明元年則天臨御封父為魏國王封母為榮國夫人乃改寺号並名魏國寺后東都僧法明等上表請改寺額遂並改為大神嵩福寺既而略去神字号為嵩福寺而云西者簡於東北二嵩福故寺者梵云毗阿羅此云遊行處以是智人所遊行處故又云治處以治𢙣種善處故章主佳号中沙門者揔名法藏者別名揔中梵語具云沙伽摩𨚗此云息𢙣亦云断息涅槃經云出家惱他人不名為沙門息心達本源是名為沙門阿含經云出家修道捨𮥷恩愛攝御諸根不染五欲慈心一切无所傷害逢苦不慼遇樂不欣能忍如地故曰沙門別中字賢首俗姓康氏勑号國一法師從其所業世号華嚴和尚述者述而不作義也以依大經扶洪師義故苐四入文解𥸩有三先序分次一說經處下正宗分后是謂華嚴下流通分問此則是結何云流通耶荅流通不定也有約勸信有約誓願有約結屬名為流通謂法界品末云眾生心㣲𭎇海水滴可數虛空亦可量佛德說无盡聞此法歡喜信心无疑者速成无上道與諸如來等已上勸信流通也起信論云諸佛甚深廣大義我今隨分揔持說迴此功德等法性普利一切眾生界已上教分記末云誓願見聞修習此圓融无㝵普賢法等誓願流通也此章則以結法屬人為流通是謂華嚴等者結法也唯普賢智方窮其底者屬人也𥝠又有此章𥸩一本亦是如師說大旨與此記不殊而云以結屬為流通者餘處无文若然則義理章云唯智境界非事識以此方便會一乘者亦是流通耶既此頌后更有誓願見聞云云為流通是故此章中是謂花嚴等者但云結屬不名流通若科此文應云將𥸩此文大分為二先敘揔意后說經處下題章解𥸩已上就序分亦三初明所𥸩經義甚深次今略下𥸩章題后庶探玄下著述所為也初中有三對六句初法喻對則所訂法也次因果對則能訂人也后深廣對則簡下位也為現教義圓融故有初對如是教義是何人境故有次對何故唯佛普賢之所知非余人境故有后對也就法喻對夫以者發語之初也夫以竊以若夫原夫觀夫並一義也主教者一云主之教以此經是化主之所說故下句云帝珠者帝𥸩殿之珠故亦是帝之珠也對此故云主之教也今𥸩約所說之法為主故主即是教也謂華嚴是主下教是伴眷屬故簡下教故云主教也問此下并敘眷屬經何故云簡下教耶荅但是華嚴伴眷屬義中并耳問何故不云主之教耶荅若尒則三乘亦是十佛化用所說故亦可云主教耶若從化主則可尒若從助化則可云伴教耶然不尒故不云主之教也圓者圓滿是𮥷減義謂事无不具理无不現障无不盡德无不備故通者是𮥷滯塞義也尽虛空於𭎇剎者以𭎇內之剎該於虛空无不尽故帝珠者約此帝喻法之重重也方者正故𮥷邪廣者包愽之義則以毫端容法界故愽是普遍則以法界入毫端故如意普應義也謂略䟽云方者圓通之致處无不善觸緣順不擇物而施已上故尓也攬法界於毫端者如意教之因義也問尽虛空於𭎇剎何別荅一云虛空足事法故事事无㝵此則法界是理毫端是事故理事也今𥸩但是語无別義也此二句中一云初則能詮后則所詮今𥸩言五教時雖舉能詮亦具所詮之圓融后句亦尒就因果對亦名境智對上句境下句智故一云上句性海果分下句緣起因分一云上句佛外向下句普賢內向也初義者性海果分是十佛境界緣起因分是普賢境界故尔也問性海則訂分无二處故不可更說容融今既云无㝵容融故可是外化荅容融中有法性本自容融之義有對機示現容融之義今拠初義故非外化也是故十玄章究竟果訂義隨緣約因弁教義六相章因則普賢境界及以訂入果則十佛境界所現无窮已上今此亦尒也問前則歎所訂法今則舉能訂人然則前之二句亦通內訂耶荅上之二句唯外化也然此中但所依義中并舉內訂耳后義者既云无㝵容融故非是訂境不可說義故知外向也上句既尒則知下句是普賢內向也妙境者有三謂所訂境所知境分齊境若无㝵容融為訂分義中唯所訂境也若佛外向義中具所知境分齊境也所知境則約佛心所知分齊境則佛之分齊普賢分齊別也有㾏斯泯者以𮥷三乘有待塞㝵之邊㾏也后義中上句既是佛外向門故普賢內向時稱佛外向之心而訂也普賢眼者經中普賢戒眾云普眼境界清淨身我今演說仁諦聽已上從此云也正所為文云何故此法非余境界荅以盧舍𨚗周遍𭎇方普應法界一切群機於定中同時頓演若彼別機稱自根器各見己所見各聞己所聞此普賢機見一切所見聞一切所聞皆無盧舍𨚗能化之分齊故云普眼境界也已上是故若有眾生依此普法得開普見眼者則便是普賢眼之玄鑒非𢩁一普賢云也是故普眼境界清淨身者當於此中普賢眼之玄鑒盧舍那能化分齊者當於此中盧舍𨚗之妙境故上句佛外向下句普賢內向也問二門何則荅一云別謂化主之体相用与助化之体相用故也佛外向者是化主可說之用普賢內向者是助化入定之体故十句章云佛外向為義普賢入定為教故有重也舍𨚗品䟽云宗趣有二一約人二約法人中亦二一化主二助化各有体相用主中內訂法智為体七日思惟為相加說為用此三不二唯是一果助化中入定為体蒙加為相起說為用此三不二唯是一因此上因果融攝不二唯是一人法中亦二一約義理二約教事亦各有体相用義理中性海為体別德為相應教為用此三不二唯一義理教事中本分內五海十智為体十世界及花藏世界為相益機為用此三不二為一教事此上教義融攝不二為一法也又上人法圓融不二為一宗趣此四義各三為一緣起相即无㝵是故或唯果以俱是佛故或唯因俱是普賢故或教或義或人或法或体或用或主体乃至或教用並皆攝尽下諸會宗皆有此相但隨法異耳已上是故雖云不二然有異也一云舍𨚗品䟽云普賢廣大三業窮本底故正所為中云皆尽盧舍𨚗能化分齊已上故无重也今𥸩十句章云三門中有二義一云普賢向內為佛佛外向為九會諸菩薩若從此義普賢入定及訂忘像海印此義就佛普賢為語非就機作區一云普賢入定分知佛外向門未究竟故佛外向為義普賢入定為教已上初義者佛外向為緣起因分普賢內向為性海果分是故於此義中不應問於一耶異耶后義則有重也問若尒舍𨚗品䟽反正所為文如何會耶荅古辞云普賢入定時及訂佛外向心耶不及訂耶但云及訂不云窮訂已上是故正為文等約及訂義然未是同佛窮訂故佛外向心普賢內向心別也以普賢內向時及訂佛外向心然佛則窮訂猶如硯中所磨之墨普賢等力會諸承別定力別別而訂則詮有差別猶如筆上所染之墨染雖是硯中之墨然筆上所染硯中所磨有異故也問何故普賢未得𮥷詮而窮訂耶荅果人則訂自果法故𮥷詮相而訂也若普賢則因人而訂果法故厼也就深廣對浩汙則廣宏深則深也此中一云微言則能詮旨趣則所詮法海則能詮宗源則所詮是故二句中並舉能詮現所詮也一云初句同前𥸩后句之法海亦則所詮故直約所詮現其難窮也謂料簡云義海宏深微言浩汙已上二處不別故后句唯所詮也是故亦名能所詮對也亦名本末對謂清涼云湛湛亡言而教海之波瀾浩汙已上此中浩汙微言者即彼教海之波瀾浩汙故末也此中宏深法海者即彼之湛湛亡言故本也宏深法海者是无住揔相故增𥸩前之舍𨚗妙境也微言浩汙者起言已去故增𥸩前之普賢立鑒也問下云義海宏深真源渺漫者何耶荅唯約所詮也或有𥸩云主教下𥸩大字帝珠下𥸩方廣无㝵下𥸩佛字有㾏下𥸩花嚴次二句𥸩經字无盡法界不出七字題名是故序中先舉揔𥸩也此亦有理就𥸩章題而云今者前明旨趣難尋宗源叵測故唯佛普賢所知之境然今舉十門以開標趣之處故也則是因前起後之辞也略者有省略有要略今取要略也此叚意者提網而眾目張裘舉領而群毛順今舉十義則无尽之義自然現現也機要者樞要機要一義也著述所為中探玄之士者演經時中下劣眾生何別荅同是遺教然下劣眾生則結集時之所為也今此則章主已后依此普法修習之人故別也玄者古有三𥸩一者文義並玄謂花嚴經中若文若義並因陁羅故一文攝多文一文攝多義如一文余文亦尒約義亦然是故入法界抄云三乘名義名非義事一乘名義名事即義事已上也二文則未玄義則玄也謂一乘文義雖並因陁羅若分詮相不无文義之淺深也三文義並不玄𮥷於文義方為玄耳謂法界圖云所訂之法言相皆絕諸佛世尊以大慈悲本願力故諸佛家法法如是故施設言教為眾生說已上此則唯約訂分名為玄也粗識其致者正舉緣起分之玄然不碍於令識訂分之玄也問文云異以執名之徒還皈无名真源者如次當於探玄之士粗識其致耶荅別也執名之徒則是執下四教之人也无名真源則是法性圓融訂分也今此探玄之士則和尚已后普法學人也粗識其致則雖不㝵於令識訂分性海之玄然正舉緣起分以下文揔結云唯普賢智方窮其底故也十句章云然為機緣普賢菩薩出定於无生无名處以種種名題目是故云所目於此所目中隨機緣心勝劣尊卑差別故云寄位外沉也眾生實執所目故云執名之徒佛不隨名訂名无住義故云无名真源即是法性圓融訂分也已上故今此則約和尚以后探玄之士令識大經之趣故別也問探玄之士則章主之所為執名之徒則主之所為故可是一量耶荅約所為則一而詮相則別也此中直現此經旨趣欲令章主以后依花嚴人有所標趣耳文則既云大聖善巧无方應機隨病非一迷之者守迹不知失体勤而皈宗未曰故依理拠教略制槃詩異以執名之徒還皈无名真源已上善巧无方者是花嚴經也隨病非一者謬解此法執為三乘之義也如是謬解故皈宗无曰也是故主以圓表圓教以屈曲表三乘而示之云自汝謬解之時不出圓教乃至初初不動在於无名真源如是令解故知別也就正宗中二先列章門后說經處苐一下依章別𥸩也初中問此十門有定次苐耶荅雖无定次苐章主且作次苐謂說法必依處說法必依時於如是時處未知何佛說与如何眾俱以何儀式說說幾許部經經所詮義何未知以幾因緣所詮之義如是圓融未知所被機成就何等益故前之九叚次苐來也欲現前九究竟圓滿故苐十叚來也此十門中苐十揔余九別別中初五說經緣后四所說法及所成益也問此之十門何旨何皈荅旨則皆旨皈則皆皈故不得一定問教及与義可如是耳處与時但是說緣何故尒耶荅時處融通即是此經所現旨趣故尒也別𥸩中各有二初牒名后𥸩相苐一門中說經處苐一者牒名夫圓滿教下𥸩相於中三初此叚別序次初此下正宗后余佛下問荅除疑也初中問此圓滿教与下圓滿經何別別荅一也以圎滿經中云此上諸本揔混同一无盡大修多羅海故厼也問苐九名眷屬經至苐十方名圓滿經而𥸩云此上諸本捴混同一則圓滿經中并有眷屬經耶荅揔混同一之時眷屬亦同无尽是主經攝故圓滿經中唯見主經不見眷屬也問既云略本是所依則唯約略本為圓滿教耶荅雖以略本為所依然見略本時所詮之義則該於異說等經无所不尽故通十經也問十經通是圓滿教者唯約前九門佛所說之經耶亦通余佛所說耶荅一云異体異名之余佛故唯前九門佛所說也今𥸩通也問唯約現在佛所說為圓滿教耶通約三世佛所說耶荅如前謂上列十門皆約現在佛說經時處故也問苐十門引經云三世諸佛已說今說當說已上既通約十門佛說為圓滿教則通於三世佛所說何云不尒耶荅文雖并引三世佛說正取現在佛說為訂故尒也𭎇方者塵則微塵方則十方謂周側於㣲𭎇十方也周者橫尽法界側者竪尽法界也今𥸩不湏別橫竪但於十方三世无不普遍說此大法故云周側耳今從狹至寬者初此閻浮則最狹二則次寬如是轉轉寬也問清涼云若從狹至寬略現十處初此閻浮二周百億三遍異類四遍剎種五遍花藏六遍余剎海七遍前六𩔗剎𭎇八尽虛空九猶帝十余佛同已上与此何別荅演義云今䟽所以不同彼者以皈花藏即前染淨无㝵故不立之故旨皈云事尽理現染相尽故其該別𭎇与遍𭎇道並皆是𭎇故苐七中攝八重攝剎者亦明花藏中𭎇一一攝余剎海亦不異於苐六該別𭎇故並略之而加四五六已成十義彼三即此八彼五即此三已上如是別也雖有同者非是全同謂清涼則一一門皆遍法界故約初閻浮亦遍法界後一皆尒此中門門不言遍法界也問清涼則門門皆遍法界應不得言從狹至寬耶荅遍法界則同然所拠閻浮等從狹至寬謂初則唯閻浮故狹二則百億如是漸寬也問此中從狹至寬者遍此堂而說則最狹遍於堂外地則次寬遍於一國則最寬耶遍此堂說則最狹堂內之𭎇攝於此堂遍此而說則最寬如是等耶荅一云具二義也謂初此閻浮二周百億三尽十方者如次當於前義之三也尽十方遍𭎇道者亦如次當於後義之二也問既從狹至寬則遍𭎇道冝在第一何故不尒荅此義可許然非唯約遍一塵義通約法界一一塵中攝剎海義故不違也雖有是義然今𥸩非於十門曲分寬狹但約通相先弁同類界次則異類乃至剎海之義大分寬狹而云從狹至寬耳正宗中二先列門后初此下𥸩相初叚中七處八會等者人三天四故七處也一菩提塲會二普光堂會三切利四夜摩五兜率六他化七普光堂八逝多林會周本經有九會此闕十定品普光堂重會之文故唯八會也清涼於此門中引外天品文云尒時世尊不𮥷一切菩提樹下上外湏㢱向帝𥸩殿云云下云十方世界悉亦如是已上七處等普遍之相文現故引也如光明覚品說者通望三叚訂也謂彼品中有二十五重初重云如此見佛坐蓮花藏師子座上有十佛世界𭎇數菩薩眷屬圍遶已上訂初叚也百億閻浮亦復如是者訂第二也后二十三重者訂第三也四遍塵道者取前十方尽末為𭎇此一一𭎇各攝法界於中說也問若厼可云從至細耶荅唯約𭎇中說義可如所難然此中以十方界尽末為𭎇每一𭎇各攝法界於中而說故云從狹至寬也問遍塵道者剎遍耶佛遍耶荅文云一一塵處皆有彼剎已上故剎遍也𭎇道者性起品云毛道疏云約虛空中一毛容處云毛道例此則雖是虛空可容一𭎇処則云塵道也五通異界中㸦不相㝵者同類世界既遍法界異類亦尒不相㝵也問異類界者在同類界中耶同類外耶荅二義也章主𥸩眾生形世界有二一眾生形即世界二如眾生形世界已上初𥸩者謂諸有情有以同類界眾生之形以為世界依而生者故眾生形即世界也河形樹形等亦尒故不𮥷同類界也后𥸩者如眾生形世界如河形世界則在同類界外之異界也今此約后義問通異界者同類界之遍耶佛之遍耶荅如后問若尒同類界之遍異類義不論耶荅亦有此義然前弁同類遍法界時既已現故此門唯約佛遍義也問同類与異類別則從狹至寬之義難成耶荅前唯約湏弥形世界遍法界今此則樹形遍法界河形遍法界等多種世界一一皆遍法界則最寬於前況復踏前則前唯弁同類界中遍說之義今此明異類界中遍說之義故寬於前前也六該別𭎇謂異類界該於異類界𭎇於中說也問別𭎇者別於前之同類世界遍𭎇之義耶於異類中亦有多種二相望而云別耶荅具二義也一一塵道者河形樹形等所有𭎇𭎇各攝剎海也同前者指前第四也問應云攝自異類何故云攝同類耶荅樹形界𭎇攝自樹形界河形界𭎇攝自河形界如是等各攝自類故厼也七皈花藏与清涼遍花藏何別荅彼約佛遍義此約雜染世界染相尽義云皈花藏故別也問䟽云積界成種積種成海則積同類界種成同類花藏積異類界種成異類花藏耶積同異類界種成一花藏耶荅如問二義也初義者舍那品䟽云乘十佛化境蓮花藏世界海有三種一蓮花臺藏世界雖遍法界對地上菩薩機現有增減寄在色頂唯說一界二即此遍法界之花藏說十現无尽即无尽箇花藏一一皆遍法界三樹形等雜類世界一一皆有花藏並似彼界悉遍法界各有十无尽无尽也此三中初一約同教一乘弁后二約別教一乘現耳今此文中拠湏旀山世界中弁花藏故風輪水輪還似彼也以易信解故与機而成故已上后二中初則同類花藏后則異類花藏故厼也問此中前四門明同類界五六二門明異類界通望此二明皈花藏門則積同異類成一花藏何云不厼荅雖同異類華藏之別然花藏義不異故合說一花藏也約實則積同類界種成同類花藏積異類界種成異類花藏也后義者既此章望前同異類界弁一華藏門故也問舍𨚗品䟽文如何會耶荅雖一華藏且從同異類界別弁耳今𥸩同類華藏異類花藏雖各別然能成之緣皆具同異類也謂䟽中別弁二種花藏已云今拠湏弥山世界弁花藏故風輪水輪還似彼也則知此經所明華藏是同類花藏而此華藏中央種中所積十二佛土七世界性形相各別故知同類華藏積同異類界種成也同類花藏既尒則知異類花藏亦如是成也數過剎𭎇者雜染界之數耶花藏之數耶荅如后謂一切雜染世界染相皆盡悉是花藏故花藏之數過於剎𭎇也問能成之緣具同異類一種无別如何而成則同類花藏如何而成則異類花藏耶荅拠同類界為本花藏時似同類界積之而成則同類花藏也拠異類界為本花藏時似異類界積之而成則異類花藏也問何知尒耶荅神秀法師妙理圓成觀云問沙婆既當花藏正中剎種上第十三重雜染土如何經說菩提場中金剛地寶樹等境界全是華藏本剎耶荅本不定本末不定末娑婆雖在第十三層中有淨機所見全是本非末若非淨機全是末非本余異類剎應知亦尒應知華藏遍一切處染土㸦遍尒又復於最上同類世界現其本剎從本剎土應知亦尒更有二十層向上既尒向下亦尒或本剎東極輪圍山邊取一剎土為本應知彼剎或正當中東去更有不可說種余方類尒應知十方廓同法界而不壞本相然此即有邊无邊合无邊有邊合猶如圓珠於十方面求不得邊不坊中邊分量斯在何以故无漏所起无生所生非分限取故又以華藏具眾緣成則是揔相眾緣非一各現是別相以山河等同成花藏故是同相山河等相望各各異故是異相由此諸緣花藏得成是成相此一一緣住自法不𮃆是壞相也又此華藏一塵具含眾德是揔相尽花藏德一一不同是一塵之德名別相尽花藏一一德同成花藏一塵是同相一一德相望各異是異相由諸德故花藏一𭎇得成是成相此一一德恒住自法不曾有作是壞相如一𭎇既尒余亦如是由此捴別相即緣成无㝵間何故尒耶荅一由法性本來常尒二現所受用則由徃因具如經說云云世尊徃昔於諸有微𭎇佛所修淨行故獲種種寶光明花藏莊嚴世界海已上此問意者既積二十重等廣大世界以成花藏是故沙婆在第十三重是雜染末剎何故經中說此沙婆世界菩提場等金剛所成便是花藏本剎耶如是問也荅意者隨所對機緣本不不定故此第十三重沙婆世界以為本剎時即此沙婆全是本剎蓮花藏界於此本剎中央而上積二十重廣大世界第十三重亦有沙婆也又於上方約最上一同類界為本剎時向上亦如前積二十重世界也又於十方約最下一同類界亦然又於東方取最近輪圍山一同類界為花藏本剎時同前向上有二十重世界等也余方亦然是故約此同類花藏之成義云此遍法界花藏說十現无尽即无尽箇花藏一一皆遍法界也同類花藏既如是成異類花藏亦如異類積而成也是故文云樹形等世界一一悉有花藏並似彼界已上者以樹形界為花藏時似彼樹形界積之而成拠河形界為花藏時亦似何形界而成也今此經中拠湏弥山世界弁花藏故是故水輪風輪還似彼也已上者今拠沙婆為花藏時故風輪水輪似沙婆也問於末剎中有淨有穢何故但云染相尽耶荅以淨世界為本花藏易可得故且舉雜染也問清涼云四遍剎種章主前之六門約界而弁第七已下約海而明何故不說剎種耶荅舉界與海明時已現剎種遍說之義故且略也問相海品說如來大人相結云十蓮花藏微𭎇數相已上䟽云蓮花藏世界說十現无尽已上十蓮花藏者何耶荅一云淨蓮花勝光莊嚴等十世界是也一云起具因緣等十世界是也第一義者淨蓮花等十世界与花藏齊等是表法故厼也舍𨚗品䟽云問下文此華藏界无邊云何此中有東等耶荅以花藏界是邊无邊不二故名无邊如下說无邊邊不二故名有邊如此說是則不壞邊而恒无邊不破无邊而恒邊若謂无邊乖於邊邊乖於无邊是情計所及法非正緣起也以此邊无邊是一事故雙超情表也其猶錦窠白線徹遍而不雜紫窠紫等亦尒又白窠有紫由是錦故若白中无紫紫線不至兩編即繡非錦也白窠无紫由是錦故若白有紫現則壞文非錦也是故由白有紫得成白无紫无白亦尒當知此中道理亦尒思以准之問若尒彼十方世界是花藏不荅是不謂由即是故不是不是亦尒准上思之又何以故由是花藏東等故即不即也問此十方世界外更有世界否荅无也何以故以花藏為主彼十方為伴此主及伴圓融普遍一切𭎇道重重如帝故余皆即此如虛空故已上既有如是是不二𥸩故若約不義𥸩則非是花藏若約是義𥸩則是花藏故厼也問此十世界望為主時是花藏耶從伴時來是花藏耶荅一云如前一云如後初義者既云彼十世界是花藏不荅是不已上故知望為主時是花藏若望伴時非是花藏故也問錦窠喻中以十錦窠喻十花藏耶具足十窠一機之錦以喻一花藏耶荅如后謂中央花藏具淨蓮花等十世界伴成花藏又淨蓮花等十世界亦各具十世界為伴而成花藏故尒也後義者既云十蓮花藏莊嚴世界海具足主伴如帝等已上者花藏為主十方為伴故厼也問若尒者唯云是也何故云是不耶荅伴花藏故云是非是主花藏故云不也此義中以十窠錦喻十花藏者中央一窠喻主余窠喻伴也問若尒邊无邊云何荅白窠之白線徹遍諸窠則主花藏之遍於伴故无邊也白窠之白線雖徹遍諸窠然十窠各別則主花藏之与伴世界不雜之義故有邊也第二義者跊云初通論十世界後別弁花藏界亦是𥸩苐十壞世界以成即壞故已上此壞方便既是花藏故知約余世界亦是花藏也今𥸩依結通文見十花藏也經中說一方花藏已云如一方十方亦如是已上故厼也淨蓮花等十世界是表法伴非是主花藏也起具因緣等十世界者文云二約攝化處有三類一湏山界及樹形等已去乃至一切眾生形世界海為第一類二三千界外別有十世界一世界性二世界海三世界輪四世界圓滿五世界分別六世界旋七世界轉八世界蓮花九世界湏㢱十世界相此等當万子已去輪王境界為第二類三十蓮花藏莊嚴世界海具足主伴如帝等是佛境界為第三類通有十事為首成世界一說世界海二起具因緣世界海三住世界海四形世界海五体世界海六莊嚴世界海七清淨世界海八如來出世世界海九劫世界海十壞方便世界海已上約此十種通弁界種海中能成之因緣耳非是所成花藏也問經中如一方十方亦如是䟽𥸩云第三叚向上廣持諸剎於中二初牒上海及海上花二弁持剎及性云云此中大意明眾香海中略舉一海一海所持十方剎中略舉一方一方既厼說不可尽余方例准一海所持十方无尽皆遍法界一一海皆持十方各遍法界无㝵圓融无尽自在即不可說不可說也二所持中二初一方后結十方已上就一花所持十方剎性中明一方剎性后例余方剎性故唯是一花藏內何故依此文論十花藏耶荅此經文中含二義故一義如問一義者䟽云所成果中分二先明此主界后弁結通已上故此中先明一方花藏后結通余方花藏是故依結通文立十花藏義也䟽云即此遍法界之花藏說十現无尽即无尽箇花藏一一遍法界已上於此明所成中所以說此辝者良由經文於此說分先明一方花藏后結通余方花藏故厼也是故知結通所明是十花藏也問彼十世界是花藏否荅是不已上約不義則雖非花藏約是義則可云花藏何故云不厼耶荅以非是花藏外別花藏故云是也然但是伴耳非是主花藏故云不也是故問云彼十世界是花藏不者花藏世界既遍法界如是无邊而經云花藏世界東有世界名淨蓮花勝光莊嚴等則此十世界未知是花藏內耶外耶如是問也荅云是不者花藏內故是也然非主花藏故云不也問何知厼耶荅次䟽云由即是故不是不是亦尒准思之何以故由是花藏東等故即不即也已上即者以即是花藏內故𥸩前是義不即者以非是主花藏故𥸩前不義故知厼也問十蓮花藏世界具足主伴已上合主与伴云十花藏耶荅約一花藏亦具十世界伴余花藏亦尒約此各具十世界伴之十花藏更有論主伴之義是故云具足主伴也非謂花藏為主十世界為伴也問䟽云此世界外更有余世界不荅无也何以故以花藏為主彼十方為伴此主及伴圓融普遍乃至余皆即此如虛空故然則花藏以外更无所余約何世界為結通之十花藏耶荅此約一乘法之不相知義謂具十世界伴之一花藏遍法界時不見余花藏遍法界義故云无余耳結通義者約余花藏論遍法界例亦如是以現緣起㸦无側也是故結通文是十花藏之文也既云此主及伴圓融普遍一切𭎇道重重如帝網余皆即此如虛空故已上是故見一花藏遍法界時不見余花藏遍法界約余亦尒故厼也問今此文中拠湏弥山界論花藏故風輪水輪還似彼也則今經所說是同類花藏也依何經文而云樹形等雜染世界一一皆有花藏並似彼界耶荅經中无有說異類花藏之文然經中於同類花藏說十現无尽風輪水輪還似於彼則可知異類花藏亦如是也問皈花藏者皈一花藏耶皈十花藏耶荅一云如初以皈十花藏之義則至第十門所現故也今𥸩如后謂同類花藏具十无尽異類花藏具十亦尒通望三類花藏而立皈花藏門故也是故文云一切雜染世界各皆同尽唯是蓮花藏世界海數過剎𭎇已上以過剎𭎇雜染世界染相皆尽全為花藏故花藏亦過剎𭎇之數是故知通約同異類花藏云皈花藏也清涼𥸩花藏品云譯者猒繁乃成大略處中應云蓮花藏莊嚴世界海品謂蓮花含子之處目之曰藏今剎種及剎為大蓮花之所含藏故云花藏其中一一境界皆有剎海𭎇數清淨功德故曰莊嚴世界深廣故名為海有云世界依海故立海名者恐非文意以下云花藏世界住在花中故云云約事可厼何因剎海相狀如斯略舉二因一約眾生如來藏識即是香海亦是法性海依无住本是謂風輪亦妄想風於此海中有因果相恒沙性德即是正因之花世出世間未來果法皆悉含攝故名為藏若以法性為海心即是花含藏亦尒然此藏識相分之中半分為外器不生覺受故半為內身執為自性生覺受故如來藏識何緣如此法如是故二約諸佛謂大願風持大悲海生无邊行花含藏染淨二利果法重疊无㝵故所感剎相狀如之是以出現品中多將世界以喻佛德細尋文義乃由佛德世界如之云云今一乘十佛之境大小无㝵淨穢相融且依一相說有邊表則一重橫尋无邊況復重重𭎇含法界然准下文別現應有十事一所依風輪二風持香海三海出蓮花四花持剎海五遶輪山六臺面寶地七地有香海八海間香河九河間樹等十揔結多嚴已上章主舍𨚗品䟽云今通𥸩諸世界海略作十門一種𩔗二居人三名体四染淨五流无流六共不共七世間涅槃八依正九人法十无㝵初種𩔗者小乘唯有一𩔗沙婆世界无別淨土三乘中云云一乘有二一約果分十佛自体國土海此當不可說寄緣說十如第二會說二約攝化處有三𩔗一從湏弥山界及樹形等已去乃至一切眾生形世界海為第一𩔗二三千界外別有十世界一世界性二世界海三世界輪四世界圓滿五世界分別六世界旋七世界轉八世界蓮花九世界湏弥十世界相此等當万子已去輪王境界為第二𩔗三十蓮花藏莊嚴世界海具足主伴如帝等是佛境界為第三𩔗云云二所居人者若小乘唯有有余依聖及凡位居也三乘三中云云一乘三中多分論時初見聞位次解行位後向果位通即可知三名体者世是時界是分齊謂於時中分齊現現從相得名繁多奧積深廣難窮同名海也若小乘以子母七微及色等四𭎇并能造四大實色為体若三乘中凡小地前俱以賴耶識為体地上二義報土亦同賴耶識為体若二智所現即以唯識智為体故攝論云菩薩及如來成唯識智乃至為淨土体故若依終教俱以如來藏真如為体若一乘以无尽法界通三世間人法理事等諸法相即㸦為其体荏思云云五流无流者若小乘唯有流三乘云云一乘中如緣起法界若无一即一切不成㸦融无㝵亦具四句全攝可知八重攝剎者前則遍於數過剎𭎇花藏而說此則前諸花藏尽末為𭎇一一塵中各攝剎海於中說也九猶帝彼一一微𭎇既各攝此无尽剎海者牒前重攝剎中一一微𭎇皆攝剎海也此所攝剎積𭎇而成故此剎中亦有微𭎇又此𭎇𭎇各攝剎海如是重重成无尽也此中三先正𥸩此門次上來下通結前九后問若下問荅除疑也問中二先正問后設尒下過也正問中若如上說即七處八會等者一云因前帝門問也今𥸩初此閻浮中舉七處八會第四明塵塵攝七處八會及十方界此門則重重相攝等故通望前九問也荅中三先荅正問次若約下遮過重𥸩后余一一下例余荅意者忉利說十住時既遍法界說故𮥷說處不遍過然於在夜摩中忉利天說故非即夜摩等故以隱現門意荅也是故清涼云此是隱現門也就遮過重𥸩中有難云既十住遍法界十行亦尒十住十行為相見否若相見者還成𮦀乱若不相見難成遍義也荅中若約十住等者明不相見若約諸位等者明相見也問此二門為中即耶為主伴耶荅如問二義也初義下攝位益全位相是諸位相資二門同故尒也后義下第十門各遍共遍同故尒也今𥸩清涼云十住十行等全位相攝即彼此㸦无各遍法界者是相即門若約諸位相資即彼此㸦有同遍法界者是相入門已上故二門即是中即也又清鿌云諸位相資門中立有力能攝為主无力被攝為伴已上故亦不㝵主伴義也問此相攝相資二門者約前九門論也第十門中各遍共遍者通約前九門第十門論也所論之法別故共各二義為亦別耶荅厼也謂此中全位相攝是各遍則見十住遍時不見十行遍約十行亦尒也諸位相資是共遍則十住有力時十行无力約十行有力十住无力等以有力為主无力為伴如是主伴同遍法界是故約一主一伴不俱故各遍法界也第十門中約二主二伴不俱之義為各遍一主一伴同遍之義為共遍故共遍則二處不別各遍則二處殊故不同也問何知即門當各遍門則是一主一伴不俱耶荅法界義海章云主之伴㸦相資相攝若相攝則彼此㸦无不可別說一切若相資則彼此㸦有不可同說一切已上若相攝彼此㸦无不可別說一切者是明主之伴不俱之義若相資則彼此㸦有不可同說一切者是明主伴相見之義故此亦尒也就相資中二有力二无力不俱則各遍也一有力一无力俱則共遍也此義正當第十門中共各義也例余中問應先舉初二會論主伴然后例余何故超舉第三第四以例余耶荅尒也且先約位成處說也十余佛同者一云伴同說一云同体同各余異名余佛也初義者若二主則不得同說既云同說故知伴佛也引訂云如訂法菩薩所說當知余佛不同說已上如訂法菩薩所說者會會訂成經文云我等佛所亦說是法大眾眷屬名味句身此不異者是引能訂伴文故尒也一乘普法理无孤起必攝眷屬是故前九門中弁其主說第十門中弁其伴說也問文中亦引三世諸佛同說之文十方諸佛同說之文則三世佛者過去迦葉亦說此法現在𥸩迦未來弥勒亦說此法故引也十方同說者東方阿閦西方㢱陁等亦說此法故引也然則皆約主說義何故云伴說耶荅約過去迦葉等望現在舍𨚗為伴之義訂也何者升天品中所讚十佛者初之三佛是現在賢劫之佛后之七佛是過去莊嚴劫之佛䟽云此后七佛是過去莊嚴劫中佛何因得於賢劫中忉利天宮而說法耶荅此天宮等有麁有細麁者前劫燒滅細者常在故也如經天人見劫壞我土常安穩等又三乘所說者滅一乘所明者常存已上後𥸩義者一乘中三世常存故過去莊嚴劫之七佛常在賢劫帝𥸩宮中說法故厼也次義者舍𨚗說處有十之中是第十門故尒也問但云說經處第一而不言舍𨚗佛說經處何言舍𨚗說處有十等耶荅序中云盧舍𨚗之妙境又下說經佛中云說此經佛盧舍𨚗身既在如前无尽時處已上無尽處者是前十重說處故十處並舍𨚗說處也問說前九門竟云揔是舍𨚗佛說花嚴處至第十門云余佛同故可是名体異之余佛耶荅前九門中約一舍𨚗說處至第十門中約一切舍𨚗說處弁故前九門終結一舍𨚗說處也十余佛同者明一切舍𨚗說處故尒也問前九門中二周百億三尽十方者約舍𨚗遍說義乃至帝門重重遍說者亦是舍𨚗則前九門中已具一切舍𨚗何故不尒耶荅前九門中明一舍𨚗之一切舍𨚗義第十門中明一切舍𨚗之亦各一切舍𨚗義故尒也問引訂中三世諸佛者過去迦葉當來㢱勒等十方同說者阿閦宝相等是則可是名体異之余佛耶荅十方三世佛无不說此法故引耳若約說此經則唯以舍𨚗名說若說三乘則以𥸩迦名說也何者十行品䟽云此經中所訂皆悉盧舍𨚗佛世界同名花藏沙婆已上故尒也後義者前九門終云上來揔是盧舍𨚗佛說花嚴處至第十門云余佛同故尒也引訂中欲現此義故引異名十方三世佛也問舍𨚗佛說處有十之第十門故是舍𨚗說處耶荅一云但言說經處不言舍𨚗故知說處中合舉余佛說處也一云說經處得名者正從舍𨚗說處得也至第十門并論余佛說處也此義合文也問不別指言舍𨚗說處則可云通約二佛說處得說處名耶荅后九並於舍𨚗說處中立論故說經處名但於舍𨚗說處立也問名号品䟽云此中名号為是舍𨚗佛為通余佛荅若約三乘唯此界內百億為𥸩迦名余十方界是別佛名若約一乘尽法界揔是舍𨚗名已上既尽法界揔是舍𨚗名則傍无余佛何言名体異之余佛耶荅此皆約舍𨚗佛尽法界義故如是云也若約余佛時一皆亦尽法界故阿閦佛名亦尽法界宝相佛名亦尽法界也是故次云皆此佛所化處故无別佛又𥸩迦海印中現故无別佛又𥸩迦一佛名既通十方余佛亦各如是通於十方已上是明約余佛時亦尽十方之義也是故舍𨚗之尽法界義則前門中弁也余佛之尽法界義則此第十門中見也今𥸩同体異名佛也一切諸佛一体无二而隨機緣或現舍𨚗名或現他佛名以舍𨚗名說法之義則前九門中弁以余佛名說法之義則今第十門中弁也問何文為訂耶荅明難品云一切諸佛身唯是一法身一心一智𠅤力无畏亦然已上問荅云諸方現佛若名若義皆依𥸩迦海印定現无別佛也又云若依一乘所有諸佛在𥸩迦所化教名義現現者並是𥸩迦佛海印定力清鿌入法界䟽云更以文理訂此諸佛皆遮𨚗身等已上此等諸文故知尒也問舍𨚗為揔於此揔中現種種別名佛故是同体異名佛耶荅不尒謂一切諸佛並以一法界為体故舍𨚗亦以一法界為体時種種佛名並是舍𨚗体上之名是故舍𨚗具種種名也然則以舍𨚗名說則前九門弁以余佛名說則今第十門弁故尒也問更以文理訂此諸佛皆遮𨚗身已上依𥸩迦海印現故无別佛已上故舍𨚗名可是揔耶荅一切諸佛以無偏當一大法界為体亦得无偏當海印三昧則此所引文等是約舍𨚗尽法界義故一切諸佛皆於舍𨚗海印中現无別佛也若約余佛尽法界義則一切佛並阿閦身亦並現於阿閦海印故无別佛如是見也問何知尒耶荅名号品䟽云若依一乘尽法界皆是舍𨚗名已上此即約舍𨚗尽法界義也約余佛亦尒故得知也問尽法界揔是舍𨚗名者前九門中弁余十方佛名亦皆如是各遍法界者第十門弁耶荅就盡法界揔是舍𨚗名中以舍𨚗名說則前九門也以余佛名說則第十門見也問若尒尽法界揔是舍𨚗名則此舍𨚗外更有何佛如是分配耶荅所言尽法界揔是舍𨚗名者非謂尽法界唯是一種舍𨚗名也以尽法界種種之名皆是舍𨚗体上之名故也問尽法界揔是舍𨚗名者是舍𨚗為揔之義故前九門見也余十方佛名皆亦如是各遍法界者則是余佛為揔之門故可於第十門中見耶荅此中非是㸦論揔別之義一切諸佛同以一法界為体就於此中且約舍𨚗名則尽法界揔是舍𨚗名若約余佛則尽法界揔是某甲佛名也其猶虛空列種種星且約大白星則大白星之空中種種星也若約鎮星則鎮星之空中種種星也當知此中道理亦尒也十地加分䟽云二約舍𨚗佛謂舍𨚗佛本修菩薩道時一舍𨚗所能加諸佛同名金剛藏加說地法舍𨚗今成正覺本願今成故彼能加佛亦名金剛藏故不異名也如涅槃經云徃昔此處有佛名𥸩迦侍者舍利弗目連因此具願故今亦同之在此說法是此𩔗也已上以此相配則此舍𨚗佛本行菩薩道時於世界海㣲𭎇數劫遇世界海㣲𭎇數佛恭敬供養一一佛所淨修世界海㣲𭎇數願行如是遇多佛時若遇舍𨚗佛作是願言我當來成正覺時亦以舍𨚗名如是說也若遇余佛亦如是願是故具於尽過去際一切佛名於十方界同時成佛以隨機故或現舍𨚗名或現余佛名等故就於此佛所具多名以舍𨚗名說則前九門是也以余名說則第十門是也若第十門佛是名仿召之余佛者此佛所具余名說義當於何門見耶故尒也問若尒行菩薩道時所事諸佛名体異者是則諸佛名体各異何云一体耶荅尽過去際歷事諸佛而成正覺既正覺時得三世佛平等果法得如是果時即入法性既入法性之時自他无二故即見十方諸佛即是自佛亦見過去未來諸亦即自佛是故三世諸佛同一体也是故道申章云之當佛來化於我非他佛者即是事也就此中先自意立門后經云下引訂也初中先結前為能例后是則下弁所例問此中舍𨚗名說則前九門弁余名說則第十門弁者名号品界內百億万名於前九門是耶荅尒也謂一佛說花嚴處如是不同是則十方一切余佛各說花嚴処皆不同淮前已上一沙婆說則是一佛此沙婆外則是十方一切余佛如是沙婆之舍𨚗說處則前九門弁余佛說処則第十中弁故厼也問若尒舍𨚗佛无有遍於十方說義余佛亦无遍沙婆說義耶荅雖互遍說今此中意沙婆之舍𨚗遍法界說義則前九門弁故界內百億万名亦前九中見也問界內之名既有百億万種之異何故當於前九門中唯舍𨚗名說耶荅雖有異名此則中央四天下佛悉滿月之名故以此為主非以余四天下佛名為主之義故此主中滿月等名即是一名非異名也是故䟽云沙波一界有二種融一以說法之處則為當中為成主伴融彼百億令有上下使得圓故无三百也二縱於三近輪圍山邊一四天下為說法主即是當中融彼四天下還有十方眷屬具足以諸四天下皆望他為伴望自為主故已上隨何說處即為中央四天下是故以中央四天下之佛名為主說耳更无有余四天下佛名為主說義也是則百億万名是一主佛名故是故唯以舍𨚗名說門中見也問唯約現在十方佛說耶通約三世諸佛說耶荅如前也是故文云十方一切余佛各說花嚴不云十方三世一切余佛也問智通問荅云善財值知識時所聞法門皆如問得訂耶聞以后修行方得耶荅隨所聞法即得訂也問若尒既得法因緣問荅中明過去无量劫中值諸佛聞法供行修方得此法門善財今方聞所說法耳非修行无量劫行云何得乎荅既得此法門即入法性法性即自他无二三世非前後故善知識所得因果自利利他法門即是善財自行成故隨所得法門其因果前后之法皆自无不行得法不移一時而即成无量劫隨所聞法門无量劫中修行得以豈不修有得果之義乎又道申章云問我之當佛還化我以何文知荅瓔珞經云八地菩薩自見己身當果諸佛摩頂說法又經云礼敬三世諸佛故滅諸罪業未來諸佛用何為問此乃礼他己成佛豈謂自未成佛乎荅非无礼他佛之義而他佛踈何者凢諸佛為眾生說法意者為令眾生欲得自當果不惜身命而修行耳非為得他果正令我發心修行之佛者是我當佛非他佛也又有他已成佛即是我當佛何者成佛時得三世平等果法已上則三世既是同体何故余佛中不并舉過示之佛耶荅此中但弁現在之佛說經時處等故第十門唯約十方現在佛弁也問若尒何故引訂云三世諸佛已說今說當說耶荅但取今說非取過未為訂也又𥸩三世佛說者竪窮三際義中訂也十方同說者橫尽十方義中訂也問若尒三世佛說者訂異時說義十方同說者訂同時說義耶荅若約現則可如所問然亦有三世佛同時說義如前所引升天品䟽云一乘中三世常住故也同說者問以軌則同故耶約時之同耶荅文云如此一佛說花嚴處如是不同是則十方一切余佛各說花嚴處皆不同唯前知之是則約軌則同義又是現在十方佛說故不㝵時同義也引訂中經則舍𨚗品正陳法海分也又三賢十地本分經中皆有此文也次又云者地品也次又如訂法菩薩者引會會因人訂成文也問若引訂成文者可是伴佛說處耶荅既為他作訂則亦得自有為主說義故約此為主之義訂也故非伴說處也就問荅中先正問荅后如舍𨚗為主下還結前九門事也初中問荅即為二叚問中先正問后設厼下過難也正問中問若前九門中弁主說苐十門中亦弁主說則二主不相見者是法尒道理何故問云相見不相見耶荅此所問義是苐十門佛為伴同說義中所難也今則反難云若前九門中弁主說苐十門中弁伴說則主伴相見之義是法厼道理何故問於相見不相見耶汝若救云雖主伴相見法尒道理然因論方現故如是問者若尒則二主不相見因論方現是故湏問故无難也𣲪此中意者前九門中弁舍𨚗佛具能訂伴為所訂主之義苐十門中弁余佛具能訂伴為所訂主之義亦有通約此二明㸦為主伴之義故欲現此義故如是問也問若厼為主伴之伴義亦具能所訂之伴耶荅厼也謂通約具能所訂之前九門具能所訂之苐十門更論主伴故主具能所訂伴亦尒也問要湏從法受名方能作伴則所言伴者唯是能訂耶荅主伴不定也或約能所訂論主伴或不動本舍𨚗阿閦名論主伴此中前之九門具能所訂苐十門中亦尒不動本舍𨚗阿閦名弁其㸦為主伴之義故尒也是故清涼主伴重重極十方而齊唱𥸩中有三一遮𨚗為主十方為伴可見彼文也問下文云如舍𨚗為主訂處為伴則可是能訂耶荅此則牒前九門事耳於共各門无所開故无難也是故若分科叚則先正明苐十門事次問余佛下通約前九及苐十門問荅后舍𨚗為主下還牒前九門論故厼也就過難中若相見者即違相遍者前明相遍義故如是難耶荅前明舍𨚗遍法界義及余佛遍法界義是則相遍故若相見則違相遍如是難也荅中㸦為主伴通有四句者各遍門二共遍門二故四句也謂各遍中主主不相見一句伴伴亦尒一句共遍中主之伴其必相見一句伴主亦尒一句也問以此二門荅前難云何荅以共遍門荅若不相見不成主伴以共各二門荅相見即違相遍也謂清涼云二㸦相見主伴義成見不見遍義皆成但各遍同遍為異耳已上故厼也是故就相遍門相見則共遍不相見則各遍也問一門中各論主伴耶合舉二門論一重主伴耶荅如問二義也初義者林德云各遍者是正主伴共遍者是不正主伴故厼也問正不正主伴何別荅舉主時非但不見對立之主亦乃不見隨生伴者是正主伴也有隨生伴者不正主伴也今𥸩合二門論一重主伴耳謂各遍則標也共遍則𥸩也謂於各遍門中論二主二伴不俱之時已標共遍門一主一伴相見之義故各遍門即是標也共遍門中𥸩成主伴故是𥸩也問林德分論正不正故二門各論主伴耶荅林德之辝后人謬傳耳謂林德但云各遍門中正其主伴之法后人乘此而言既如是各遍門中論正主伴故對此則共遍門是不正主伴耳如是誤傳也林德意者各遍門中正鍊主伴至共遍門方明主伴之正義耳主主不相見者見舍𨚗為主時不見余佛為主之義伴伴亦尒者見余佛為伴之時不見舍𨚗為伴之義故也問各遍門中云彼此共遍門中云此彼者有別義耶荅一云各遍門中以無為宗故先舉阿閦之主无后舉舍𨚗之主无故云彼此也共遍門中以有為宗故先舉舍𨚗之主有后舉阿閦之主有故云此彼也今𥸩二門之中並彼此此彼隨何自在无別義也且從一冝有不同耳法界義海章二門並云彼此故厼也主之伴其必相見者舍𨚗為主余佛為伴義也伴主亦尒者余佛為主舍𨚗為伴義也問前九門舍位相攝是各遍者明一主一伴不俱之義諸位相資是共遍者明一主一伴相見之義此中二主二伴不俱之義是各遍者為即門耶不荅隨相而說二主二伴不俱之義是各遍者即門義也一主一伴共遍者中門義也謂神秀公他化自在主伴无㝵觀云一為主不得更有主伴亦尒者如光明覺品此處佛會中見余佛會何得主伴主伴相見耶荅彼約相入門故有此相即義故隨門取故已上此義者約相入門故主伴相見約相即門故主伴不俱是故二主二伴不俱者即門一主一伴相見者中門也然而主伴門中門別故非是一向二主二伴不並則即門一主一伴相見則中門也問清涼云相資門中立有力為主无力被攝為伴已上主伴相見者似是中門耶荅此亦不定故非是一向主伴相見為中門故无難也若尒難者一乘三乘主伴相成者一乘為主三乘為伴此亦中門耶又所訂主能訂伴者此亦中門耶又𥸩經意第八云約用有有力无力故有相入門約体有空有義故有相即門相閞攝故有主伴无㝵已上若主伴相見是中門則應云有力无力故有主伴相閞攝故有相入何故不云耶義海云主之伴相資相攝若相攝則彼此㸦无不可別說一切若相資則彼此㸦有不可同說一切已上主伴者是湏中即之法位非即是中即也是故主伴共遍非是一向中門義也料簡相入門云即此花葉舒已遍入一切法中即攝一切令入己內舒攝同時无障㝵也主伴門云此圓教法理无孤起必眷屬隨生下云此花有世界海塵數蓮花以為眷屬若主伴之共遍是中門者主花即有力眷屬花即无力耶而不尒故主伴共遍非是一向中門也就牒前九門事中如舍𨚗為主等者正牒前九門若約苐十門應云如阿閦為主訂處為伴无有主而不具伴故阿閦訂處同遍法界設於東方訂法來處彼有阿閦還有東方而來作訂等也問如舍𨚗為主訂處為伴其義云何荅一云㸦為今𥸩約融義謂若第二會為主之時十方各從百剎以外而來作訂若此主舍𨚗之花藏剎以向東融遍故當於東方百剎以外法雲世界妙德佛所而法雲世界妙德如來亦向東融遍還自東方百剎以外而來作訂西方法雲世界妙德如來亦向東融遍故當轉在於本舍𨚗花藏之處而來作訂向東方既尒余方亦然故也一一具具者此方為主時十方各從百剎外而來作訂是則主伴具足故是一具也又此舍𨚗花藏融遍故向東轉在百剎外時又於十方各從百剎外而來作訂是則主伴備具故是一具也如是等比之於鉢要具大小及匙筯等方名一具也遠近皆同者一云百剎以外來者則遠百剎以內來者則近如是等也今𥸩非約一會訂成論遠近通約諸會故是故若第三會則百剎外來若第四會千剎外來乃至性起品則八十不可說百千億𨚗由他世界外來是則第三最近後後漸遠性起則最遠如是等故也演經時第二於中二先此叚別序后初唯下正宗初中常恒之說等者約前際則尽无始過去際后際則尽无終未來際究竟決定无有不說此法之時則揔举普法說時之長遠也況念劫圓融者非特長時恒說一一念攝多念一一劫攝多劫等於中而說則揔举說時之圓融也是故常恒等者敘初三叚之意況念劫等者敘次下諸叚意也今略舉短脩分齊析為十重者初則最短二則次長三則最長等如是從短至長說十門故也是故卷則一念舒則至七日乃至三際就於此中以劫攝劫以念攝念劫約如是圓融義弁也如是雖弁十門卷則唯七日又揔此則唯一念也正宗中先正弁后問荅除疑也前中三初列名次初唯下依名別𥸩后於此无量下結也別𥸩中初唯一念者第二七日中初日旦一念耶最后日旦一念耶荅若約詮相則初日旦一念也約實則第二七日具多念於此多念隨何所舉云一念也謂約初起說之一念故云初旦一念然舒此一念故次尽七日又舒此七日故遍三際是故云第二七日具多念故隨何一念說也剎𨚗者仁王經中一念有九十剎𨚗一剎𨚗有九百生滅已上念則長剎𨚗短也此中念剎𨚗不異謂牒初一念云於一剎𨚗故也俱舍論云剎𨚗者或有動法行度一極微頃又對法諸師云猶如壯士疾彈指頃六十五剎𨚗也又頌云百二十剎𨚗為怛剎𨚗量臘縛此六十此三十湏此三十晝夜三十晝夜月十二月為年於中半減夜湏者牟呼栗多也如前无尽之處者指前說處也頓說等者若初會說花藏果第二會說正報果此后漸次說五位因等則非頓說也然而不厼七處八會无尽之法一念頓演故厼云也二盡七日此章尽七日唯一念清涼所立何別荅彼云今別現是初成佛時亦彰大聖出現時也此教勝故眾教本故在於初時初言尚揔幾日之初九會之文同此初不略為三解一約不壞前后相說纔成初七說前五會第二七日說十地等第九一會乃在后時以祇園身子皆后時故常恒之說不防后故雖能頓演有所表故初五信解行願最在初故皆云不𮥷道樹第六會因地訂位居其次故无不起菩提樹言法界訂極最在后故亦現二乘絕見聞故雖異處異時亦不相𮥷為寄穢土以現淨故湏前后耳若尒世親𨚗云初七不說但思惟行因緣行耶世親纔見十地即為論釋或則未窮廣文或則知見有異未全克定菩提留攴大意同此二順論𥸩九會皆在二七日后二七非久亦名始成三約實圓融𥸩皆在初成一念之中一音頓演七處九會無尽之文海印定中一時現以應機出世機成即應應則有說无非時失故祇園身子盖是九世相収重會之言亦猶灯光涉入演義云初言尚揔下假問徵起此有二徵一徵初遠近二徵初通𢩁䟽略為三解下第三解𥸩些一捴摽三義即為三別三解之中初之一解徵初遠近近在一念荅初通𢩁𢩁初五會苐二解二七之后而通九會第三解取前師一念之初取后第二師通於九會云云三約實圓融則藏和尚義已上若約此文則初准一念者始成正覺日之一念二尽七日者可是初七日也然演義云二尽七日者謂初成道一七日中自受法樂第二七日頓演此經已上故䟽中雖有三說然約順論𥸩則清涼之唯一念尽七日章主之義同也問此經七處八會者就第二七日中初日在寂滅道場說初會法第二日在普光堂說第二會法苐七會法如是乃至第七日在祇洹林說第八會法耶荅一云始自初日頓起七處八會之法尽於七日說也一云初日在寂場說初會法時遍后六日說第二日在普光堂說第二會法及第七會法時亦遍初日及后五日說乃至第七日說第八會法時遍前六日說也今𥸩以七日配七處難也是故於一念中頓說七處八會法也隨文䟽云二攝前后者有三重𥸩一於此二七之時即攝八會同時而說若尒何故會有前后荅如文讀時前后与之同時問若尒云何重會得成荅重亦同時以无㝵故如灯光涉入等余不動外天准𥸩可知已上故知一念頓說八會也佛初成道第二七日者儼公云初七日得道之始第二七日現世之初章主云初七日現世之始第二七日說法之始何故不同耶荅章主意則初七日於道樹下成正覺於第二七日說法故也儼公則初七日菩提樹下雖成正覺人皆不知至第二七日說法之時方知有佛出現故也三遍三際者如不思議品者大力𨚗羅延幢佛所住法文也四攝同類五収異劫已上二叚文現可知六念攝劫問此之十門從短至長何故以劫攝劫然后方說念攝劫耶荅前明以劫攝劫今此諸劫皆具多念一一念中攝无邊劫則長於前門故不違也此中先一念攝无量劫后如是念下念念攝无量劫謂過去際未來際皆具多念无量无邊不可說也如是一一念中各攝无量劫海也七復重収已上並約同類界時也八異界時中時劫不同分齊各別者異類界之眾生所感時劫長短分齊各別也九彼相攝清涼云彼此相攝者約同異類界時劫相攝也亦各別相収或㸦相攝者演義云九彼此相攝者即彼異類界所有時劫亦各別相𠬧或異類同類界時㸦相攝入若念若劫重重无尽同前四五六七已上若約此意𥸩此文者樹形界時劫攝樹形界時劫河形界時劫攝河形界時劫等者各別相𠬧也河形界時劫攝樹形界時劫樹形界時劫攝河形界時劫等者或㸦相攝也又一義者无問河形樹形於異類界中具有長短時劫此長短劫長攝長短攝短者各別相𠬧也長攝短短攝長者或㸦相攝也无尽同前者指同前之四五六七四叚也亦二義𥸩若后義中長攝長短攝短者是各別相収故同前第四叚也長攝短短攝長是㸦相攝故同前第五叚也若念者六念攝劫之念七復重収之念也若劫者六念攝劫之劫七復重収之劫也是故若念若劫中約念攝劫則同前第六叚所攝劫中復有多念於此所攝若念若劫相攝重重无尽者同前第七叚也若初義中同前義者至於若念若劫之中方同前之四五六七故就若劫中長攝長短攝短即同前第四叚長攝短短攝長則同前第五叚揔就若念若劫中以念攝劫則同前第六叚所攝劫中復有多念若念若劫重重相攝則同前第七叚也十本収末者問何本何末荅一云花藏本沙婆末也今𥸩非劫是理故本劫者是事故末也謂理則平等𮥷分限故云非劫此之平等非劫之理隨俗差別依此差別以立時劫故云事也以非劫為劫劫即非劫者以一乘中事即理理即事故厼也念亦然者非念為念念即非念也問百句如中云日如月如故只可云劫即非劫何故云非劫為劫耶荅且彼經文劫即非劫門中所說故无難也以時无長短𮥷分限故者𥸩非劫也以染時分說彼劫者以現非劫之劫也謂淨業之人所感淨土𮥷於三災故時劫之相不可說也是故准染業人所感之土三災時劫說現華藏世界時劫也以時无別体依法上立者一云法者理法謂依理法以立時劫理既融通劫亦融通是故此是法性融通門義也今𥸩依有為法立時分故是有為法也如依草木及日月以分四序及晝夜故法既融通時亦隨尒者三乘中有為之法既差別故依此所立時劫亦隔㝵也一乘中此有為法亦融通无㝵故依此所立時劫亦即入重重也就此義中可云以染時分說彼劫者弁第十門事也以時无別体下通結前也問荅除疑中二先舉所說法問荅后問若此下舉能化佛問荅也初中問荅為二問中一部者通舉結集之上中下三本也荅意者不思議品䟽云若拠此文无不說之時何故乃有一部奉行荅此是眾生感處故說為一部而如來說法未曾暫息以大機常感故无有開断故已上大機所見无不說時然慈悲者為下劣眾生於无尽中略取此結集流通如是荅也下劣眾生有三差別謂或聞七字題名則得一部之意者下劣之上根也或聞題名乃至淨眼品舍𨚗品然后方得一部之意者下劣之中根也具聞八會之法方得一部意者下劣之下根也若不在此三亦不名為下劣人也此中有二𥸩先則以一部為詮見劫海說也后則一部即是劫海說也初中先法說次喻說后當知下法合也后中只此一部即劫海說此一部外更无余說也就能說佛中問荅為二荅中有三一云先寄法身荅次又復下举化身荅后復次舍𨚗下寄報身荅也一云初實際頓次修相后則圓也初則簡於三乘之佛有涅槃故次則說三乘佛涅槃之相亦是第二七日之所𭠎故后則如常住者即是无尽性海義故也今𥸩存初義也法界品中者毗瑟底羅居士文也䟽云常供塔者以於塔處常見法身故云云開塔戶見佛法身常以見佛体性无限尽故以開塔者開其事相也得定者見理性也得妙法者理中恒沙功德法也已上攝化威儀等者以攝化眾生故示於涅槃則成道說法无別是故雖是八相然三乘化身別也如常住故者一云如來二十一種殊勝功德依法身生以法身常住故二十一種功德亦如法身而常住也一云感花藏之眾生見常恒說是故如來亦如機而常住也一云所詮章云或說𥸩迦報土在靈鷲山如法花經云我常在靈山法花論主𥸩為報身菩提也當知此約一乘同教說何以故法花中現一乘故其處隨教即染皈淨如菩提樹下說花嚴處為蓮花藏十佛境界則法花亦尒漸同此故已上如於法花報身常住之義故也問說此經佛即十身佛何故約三身𥸩耶荅若隨相說不㝵三身故不違也說經佛苐三問何故此叚无別序耶荅實有且略耳是故清涼云夫真身寥廓法界合其体包羅无外万化齊其用窮原莫二執迹多端一身多身經論異說今說此經佛為真為應為一為多已上故知厼也問荅為二初中先正問后設尒下過難也正問中盧舍𨚗者䟽云今勘梵本云毗盧舍𨚗盧舍𨚗者此云光明照毗者此云遍是謂光明遍照也光明有二種一智光二身光智光亦二一照法謂真俗雙鑒二照機謂普應群品身光亦二一是常光謂圓明无㝵二放光謂以光驚悟此中遍者亦二一平漫遍无㝵普周故二重重遍如帝重現故此二圓融各全体遍非是分遍此中身智无㝵故身光即智光二遍无㝵故平漫遍即重重遍光遍无㝵故光明即遍照遍照性開覺是故名為佛此明下文世界海等諸事一一皆是稱性緣起无㝵𮥷暗覚照稱光无不普周法界名遍此舍𨚗佛非𢩁報身以通器三種世間具十身故已上如前无尽時處者時則前之十重說時處則名体異之余佛義中約前九門也今𥸩亦通前十重說處也問以舍𨚗名說則前九門弁以余名說則第十所弁此是所立之義今此既云舍𨚗則唯約前九門耶荅第十異名之余佛非是他佛是舍𨚗之異名佛也是故此中言舍𮟯時通舉十門佛也若舍𮟯身唯𢩁前九門則此下身雲差別名号不同者此亦𢩁前九門耶既云名号不同故知舍𮟯身上具足十門佛也此中且舉舍𮟯名故如是論也若舉異名佛應云說此經佛阿閦之身說此經佛寶相之身等如是之時皆具前十門佛也與過難中若是一身何故一切剎中各全現耶者光明覺品云如此見佛坐蓮花藏師子之座有十佛世界微塵數菩薩眷屬圍遶百億閻浮亦復如是已上將此經意如是難也全現者簡分現也非是唯現一手半身面相及足等於百億界中一一皆現全身故也若是多身何故經云而不分身者指性起品及淨眼品文也荅中三先揔荅次今現下別現十无㝵后如來以自在下結也揔荅中有六句初一句通荅次四句別荅后一句現深也初句中既舍𨚗身雲无障㝵故具下十无㝵也次四句中初二句荅第三問次一句荅第二難后一句荅第一難也此中意者清涼略䇿云問去住不同人天處別如何經說不起覺樹而外三天荅法性寥廓緣起難思我佛世尊融法界以為身揔緣起而為用体用无㝵一多自在不分而遍不去而周感而遂通見有前后閻浮有感見在閻浮天宮有感見外天上非𮃆覺樹之佛而外彼天故法慧菩薩云佛子汝應觀如來自在力一切閻浮提皆言佛在中我等今見佛在於須𣃥頂十方悉亦然如來自在力明如去住皆物見也請以喻現比如清江一月三舟共觀一舟停住二舟南北南者見月千里隨南北者見月千里隨北停舟之者見月不移是為此月不移中流而徃南北設百千共觀八方各去即百千月住去見殊諸有智人自曉玄二日已上准思之后一句中以如來身无所不遍故不能思則甚深義也菩薩尚不能思況於二乘及人天耶此約攝論二十一種功德中不能思身也別現中先列名后依名別𥸩初用周无㝵二先正𥸩后引證也於上念劫剎塵等者指前時處也周側如上一一塵剎一一念劫攝生威儀等者若具說則應云周側於一剎一劫中攝生威儀或現八相等如一剎一劫既尒余諸劫亦尒如一剎中劫劫既尒余剎中諸劫亦尒剎中既尒塵中亦尒故周側於一塵一念攝生威儀或現八相或三乘形等如一塵一念既尒余念亦尒如一塵念念既尒余塵塵中念念亦尒如是具說今且略說也攝生威儀者揔也清涼云或攝生威儀或八相等已上此則攝生威儀亦是別也問取何義而為別耶荅約行住坐臥四儀故別也此中既云盧舍𮟯佛於一塵中示現十佛世界微塵數等多威儀路以攝眾生已上故現八相現三乘等皆是攝生威儀是故揔也五趣身等者黑象脚身樹神等也或六塵境者香積世界食香飯而三昧現極樂國土聽風柯而正念成等又寶性論云諸佛如來身如虛空無相為諸勝智者作六塵境界示現微妙色出于妙音聲令佛戒香佛妙法味使覺三昧人知深妙法細思惟稠林佛𮥷虛空相已上引證中先舍品后淨眼品也二相遍无㝵前則一重无盡業用今則前无盡用中舉攝余約余亦尒也於上一一等者牒前也各攝一切用者既云各攝可云相攝无㝵何云相遍耶荅若約能攝則可尒今約能遍故人也如是一切自在无㝵者約八相則入胎相中具攝余約三乘形則菩薩中具二乘約余亦尒約則天趣中具余趣身余亦尒約六塵則香塵中具故也經㣲細者指苐九迴向㣲細處也三㝵前唯約用此通寂用三先自意𥸩次引訂后喻也雖現如是无邊自在者牒前二叚也不作意則是寂而不㝵起用也四依起无㝵前唯約起此通依起二先自𥸩后引訂也初中如此所現者牒前三叚也皆依海印三昧者與前寂滅无二三昧何別荅海即是所依之定也寂滅无二三昧者但取業用則无功用之義故屬能依用中見也經者賢首品也五真應无㝵前唯約應此通真應先正𥸩后引證初中即此應現无盡身雲者牒前也即无生滅者真也不㝵業用者應也經者舍𮟯品也法身則真現十方則應也如此真應下章主辞也理事者理真事應也六分圓无㝵前唯約圓此通分圓正𥸩引訂也訂中先正訂分圓后又如法界品下對因現也正訂中二先如來毛孔現自化身也后亦於毛孔下現他佛身中先橫論則現十方佛后竪論則現三世佛也是故應加云盡未來際一切如來也經偈者淨眼品又如法界品者普賢知識文也菩薩毛孔尚如是現況於佛耶七因果无㝵前唯約果此通因果正𥸩引訂二也先現自徃因后現他身雲經中者舍𨚗品也八依正无㝵前唯約正此通依正先弁相作后亦潛身下弁潛入也初中先正𥸩后引賢首品也潛入中先明佛入塵毛次又彼所入下弁攝所入剎在於毛孔也后又如來下還現自身於身內剎也初中二正𥸩引訂也一一微細等者非是佛身小處小現大處大現雖是塵毛微細之中皆全全圓滿現也經云者舍𨚗品也次所入剎在毛孔中二先正明后普賢下對因現也經云及普賢亦云者並舍𨚗品也九潛入无㝵前則約佛及器今通眾生世間先正弁潛入次又亦揔攝下攝入无㝵也問若尒亦有攝入何故唯云潛入耶荅雖攝眾生在如來身而眾生不知故唯云潛入耳故清涼云𥸩有二義一明佛入眾生二亦攝下明眾生入佛皆眾生不知故云潛入演義云又亦攝下上弁潛入今明攝入已上故尒也經云者淨眼品善化天主偈也十圓通无㝵前則別弁今通約前九揔明无㝵先正𥸩后同一下結也即理即事者同法身故隨緣現現故即一即多者法身一故應身多故就應身中此方為一他方為多也即依即正者於十身中國土身故如來身故即人即法者訂法成人故以法為身故即此即彼者不移菩提樹而恒在他處故遠在他處而恒在樹下故又此娑婆舍𨚗佛即是妙喜世界阿閦佛故或反此故即情即非情者異草木故同色性故作河池等故問前依正何別荅依正則約所依之土能依之佛今此无問染淨但約色心𥸩故別也即深即淺者蘊界入等若虛空故深即廣即狹者无不包含故廣又量同空故廣𮥷空相故深即因即果者因无異果之因果无異因之果故十身之中有如來身有菩薩身故即三身即十身者若約佛身上十身者頌曰菩提願化力意化相好勢德通報化法即法身智通三是故即三是十即十是三也若約融三世間十身者頌曰如來與智通三身法與虛空唯法身余之六身唯化身也佛身大義具如中卷章第八第十門也說經眾第四別序正宗二也初中眾海者非唯數之繁廣一一皆悉智慧深奧廣大如海故也豈塵筭能知者无量世界盡末為塵以塵為筭亦難數故正宗中先列名次依名別𥸩后以前十類下結也別𥸩中一果德眾者此是舍𨚗別德眾故與舍𨚗佛同一体也問若尒后九類眾亦是舍𨚗別德何故不名果德耶荅別德之中有因有果故后之九門是因門之德耳問舍𨚗海𮟯定中所現別德之眾故十門並是果德何故云因德耶荅此義可許然䟽云准此經文阿難海是大菩薩能持大法理亦无違若依圓教並是舍𨚗海三昧內現此傳法之人故亦即是佛也已上則果德亦得也又三種世間十種普法皆是海所現是故因果之法无不海中現故具因果亦得也又䟽初約百二十眾弁因果云若一乘中或皆是因以未是佛故或俱是果以並是佛海中現故又乘解脫力入佛海故或通因果由前二義故或俱非因果以𮥷性平等故已上准此則約十類眾論四句得也問此十類眾與百二十眾有何別耶荅百二十眾是序分中眾故无訂法所益及果德眾此中具三寬狹可知問此之十眾為別相續耶為一相續耶荅一云如前初則是佛苐三則異生苐十則二乘如是故非一相續也問隨文䟽百二十眾中三定器者汍論列眾有三義一是當機二是影響三是寄法今此通三已上故一一眾中皆具三義也雲集品䟽云有三類一助化眾謂十方菩薩影響如來二表法眾諸首諸慧諸林諸幢等各為寄人表法也三當機眾諸教所被等此通三也已上此亦一一皆具三義故淮此則可云一相續何云各別耶荅此上眾中或有當機或有影響或有寄法故云通三非是一人通具三義故相續各別也一云如后謂䟽云通三者一人通具三義故也今𥸩約隨相門苐一苐十則聾盲二乘果人故相續別也中間之眾一相續也若約實則無盡法界同一相續故十眾並是一相續也然約緣起道理湏一相續時一相續亦得若隨詮相於十眾中湏別相續時別相續亦得也問百二十眾中今此通三之義如何會耶荅或具三義或无三義或唯當機故云通三耳此三類者始自遠公所立於百二十眾中第五會升天品五十二眾者闕三義也雲集品眾中具三義也此十類眾者所益則唯當機也現法眾果德眾則於三類中不立也問此所益眾䟽初當機何別荅約第三會雲集論當機三義者是則依序分此所益眾者依會會得益之文故詮相即別然會初表法之眾至於會末而得益故是一種也問此中果德眾與佛花嚴定中為果德眾說果德之果德何別荅彼則約背機門此則約向機門故別也問共說花嚴者能加眾則唯加无說何故云共說耶荅共加之義是共說也苐三會加分䟽云欲現一切佛同說是以承佛神力此法慧說即是一切佛說也已上所以加者為現一切佛同說故不違也二訂法者此約果訂第八約因訂故別也此中引發心品性起品𮥷世間品也諸會訂成頌曰賢首發心𮥷世果住行向地並因訂性起一品因果訂初后二會揔无訂問賢首亦是果訂何故此中不引耶荅一云訂成中有主伴訂成有讚述訂成今此所引是主伴訂成而賢首則讚述訂成故不引也一云實引且略也初義者舉佛名世界名證者是主伴訂成賢首品中但云十方諸佛皆現賢首前嘆言善哉賢首善說此法不舉佛世界名故尒也然此義中可云對所訂主則能訂並是伴故若是能訂无不是伴則賢首亦是主伴訂成也然訂成中有具主伴而訂成者有唯訂成不具主伴者今此所引三處則具主伴及能訂義也若賢首則唯有佛之訂成義故也后義者賢首是果訂故實引然引三處文時義已現故且略也皆云我等諸佛為未來菩薩等者一云既十方亦尒之次仍有皆云我等諸佛之言是則十方諸佛之皆云也則皆云者唯𢩁性起品也今权性起品發心品皆有我等諸佛為未來菩薩護持此法令久住世之言此則一方訂成耳十方訂成中无有此言是知章主約二品中一方訂成之言合而言之故言皆云也此經住世皆是佛力者𮥷世間品亦有我等諸佛護持此經等言故通結前三品也有云賢首品无有我諸佛護持此經等言故不引也然此中以果人訂成為宗故實引且略耳二常隨眾普賢等眾若望勝音等則是外眷屬然望他方來集眾故云內眷屬也雖是初會所列通遊八會舍𨚗佛相隨不𮥷故舉三乘舍利弗等常隨𥸩迦為同法喻也千二百五十人者十二遊經所說也三嚴會眾此亦初會所列然通遊八會而莊嚴也若依周本經則有卅九類也並是道力隨緣殊形異現等者此之神天皆佛境界然現鬼畜等種種之形莊嚴海會是故䟽云或俱是果等四句如前引也余宗是化者攝論云受用土中悉无此等眾生欲令淨土不空故化作如是雜類眾生已上三乘淨土欲現不空化作雜類眾生故是化非實也此中是實等者若此宗中神天等眾並是海所現實德攝故是實非化也問此弁娑婆之眾何故引三乘淨土不空之義而對弁耶荅此非娑婆穢土之眾也為弁花藏佛境界眾故尒也是故䟽云乘中佛在花藏界菩薩雜眾或並是實以是海定現實德攝故或俱是權以隨緣而現故已上雖是穢土若說華嚴時當處是花藏是故此弁花藏之眾非娑婆之眾也此中應有或俱是權隨緣而現之句然對三乘化現故唯弁一乘實德也然前之並是道力隨緣之中義已現故略也問䟽中云菩薩雜眾或並是實以海定現實德攝故或俱是權以隨緣而現故已上則此之十眾可通此義何故唯嚴會中弁權實耶荅此亦欲簡三乘淨土中菩薩眾則實雜類眾則變化之義故尒也約實十眾通權實也能問現示大法海者一云列眾之所以也今𥸩是實非化之所以也以海中現實德之眾故方能問現大法海也問䟽云有煩惱染業入九境自外入聖境已上此嚴會眾當於何耶荅是佛境界眾入聖境中見也三乘中神天等入凢境中見也問此眾是飲血噉肉鬼畜之相何故云佛境界眾耶荅不動飲血噉肉之相即是佛境界也又䟽中明其位若三乘此普賢等皆是十地以上彼神王等多分是隨類生攝即是八地已上若一乘中如緣起際諸位皆齊是故一人具五位位位皆遍収已上也問諸佛菩薩隨類變化之身實業所感諸神王別耶荅三乘則別一乘中約此實業所感雜類眾生即是諸佛菩薩隨緣所現之身亦即是舍𨚗別德更无別也四供養眾如第五會云云梵王而圍遶之者若唯經文則不如是說也然五十八眾中初三十四眾是人天眾次十四眾是菩薩於中舉菩薩之上首云百万億菩薩在前立侍又舉天王之上首云百万億梵王而圍遶之等則章主以意引也問此中云彼有五十八眾初會䟽云苐五會外天品內五十二眾已上除何等耶荅此中直隨經文弁也第五會䟽云色界天等然余處說於四禪天中各有三天此各四者皆一是揔余三是別故謂初禪中梵眷屬天二禪中光天三禪中淨天四禪中密身天此各是揔故不同也已上初會䟽中於四禪天各除揔又百万億諸天百万億種種天者牒前所說故亦除此二故云彼有五十二眾也又无量阿僧祇等者彼云尒時兜率天王不可計阿僧祗諸天子奉𨒦如來等已上引此文也五奇持眾如佛高臺樓觀者䟽𥸩云高臺之內所有樓觀也又高臺即樓觀也若約初𥸩高臺也樓觀也師子座也諸莊嚴也如是各別舉也若約后𥸩則不別也依正无㝵者疑云若依報所攝何故出菩薩耶故遣之云依正无㝵也人法无二者菩薩則人座則法故若加言者亦是因果无二謂菩薩即因高臺等即是果故然次下現故略也又表從訂起教者眉間表中道白毫表訂道白淨法故訂勝言是教也白毫者䟽云依觀佛三昧海經大子時舒長五尺樹下長一丈四尺五寸成佛已放之長一丈五尺圓卷如秋月分明皎潔云云初弁所坐蓮花是所詮義二現音是能詮故坐花者稱義施教也蓮花者開敷故出三乘水故不染故眾聖蜂所採訂故云云此並是法門若約三乘託此事別表法然彼事非即此法一乘即彼事是此法仍有事現現也若依一乘此菩薩即名見教体人法无㝵故現教圓故具主伴也順理故敬遶也二明稱義故坐臺鬚也已上六影響眾如影隨形如響應聲如來興現欲說普法十方菩薩來影響也影不異形響不異聲是故要是極位非下位也且如上方等者問十方菩薩並是影響何故偏舉耶荅經中唯說上方菩薩毛孔中攝法界事故偏舉之以例余也問何故此中偏引初后二會表法眾中引余會耶荅一云若興供具來集則是影響也若无供具名表法故也今𥸩諸會之眾通具助化影響當機等三義如雲集品䟽中今此且約一義引也七表法眾問此眾亦是極位菩薩何於影響唯云極位耶荅實尒然諸首表信諸表解分齊各別極位相隱唯影響眾極位相現也此眾亦具影響當機之義而普賢等實是果人欲助化故現菩薩相故非當機不從他方來故非影響普賢之名非𢩁某會某法故非表法是故名為常隨眾也八訂法眾此訂成者結通內訂成耶結通外耶荅一云內也䟽中主伴无盡科云一一會一一品一一法皆結通十方如此閒說十方虛空法界一切世界乃至一切塵中亦如是說此結主經也又彼一一會等皆有他方塵數菩薩來訂法此結伴經也已上牒前結通中十方虛空等云彼一一會故從結通內一切會還來訂成也今𥸩結通外也謂一訂一切訂門一說一切說門各別故也問主伴无盡科文何會耶荅彼一一會者是所訂會故不違也九所益眾天王天女等者且舉第六會聞前地法請后地法人也發心品者彼經末云說此法已有万佛世界塵數眾生聞是法已皆發阿耨多羅三藐三菩提心我等諸佛授此人記疾得成佛名号淨心等十方亦如是已上意欲通引結通之益故云十方世界一一各有也性起品者彼經云時百千佛剎微塵數等菩薩得菩薩一切明一切三昧受一生記當成阿耨菩提一切佛剎塵數眾生成佛道悉同一号号佛勝境界乃至云如此四天下所度眾生十方无量阿僧祗不可思議不可稱不可說法界等一切世界所度亦復如是已上此中文勢先举結通十方并引此方所益二莭之文也謂欲引初莭百千佛剎塵數等菩薩之文故云又云彼一一世界中復各有百千佛剎塵數等也欲引后節一切佛剎塵數等眾生之文故云十方虛空法界等一一各有一切佛剎微塵等眾生也欲引結通文故云十方虛空法界等世界一一又云彼一一世界等也第八會初等者本會頓訂之眾也十現法眾无有結通者以二乘是此一方眾故問祗桓林佛會遍法界時此眾亦隨遍耶荅雖遍法界然此方二乘他方二乘別故經无結通也相違因者䟽云文殊行經云五百聲聞聞不信受何故今此揔不聞見荅彼是三乘逐機說令得故亦聞今此一乘逐法高出故不能聞其猶重陽麗天荐雷振響螘子等類不能聞見若全无器前不能同念若有器何故今乃示之不見荅有怖法心故前能同念眼未開故示之不見云云又不見菩薩所由經文有七一不求通明二不修彼善三不生彼願四五不知法空六不入彼位七不得普眼云云問若尒二乘應非法界所攝荅法界廣故攝於二乘二乘狹故不攝法界問緣起一塵猶能攝於一切何故二乘狹而不攝廣耶荅廣狹相攝是菩薩所知二乘无此故非此攝問二乘豈不是菩薩所知法界何故不攝荅是此攝故彼不知見問若是此攝應得知見如菩薩眾荅法界緣起有二門一順緣門如成法因等即佛菩薩要是知見方得攝耳二違緣門如相違因等即二乘眾要不知見方乃攝耳此二緣門望所起法悉有功力是故同此緣起所𭣣見不見異問若尒凢夫外道亦是違緣何不此攝荅彼无德人不堪於此如聾故設余聲聞猶恐不堪是故要以鶖子等類諸大聲聞方現法勝是故弁之問此聲聞等得此法不荅並得法何以故以如聾音入緣起故以此為得問若得應知見荅若知見即不得以非是相迸緣起攝故不名得也菩薩不同故不例也問二乘高德尚如聾如今凢夫豈得受持荅徃昔凢時不受持故今時對面如聾如今若不受還亦同彼是故只為高德二乘如聾如盲故湏受持增長信力令后得之已上准之就結中䟽云若三乘中但是寄人現法仍人非是法若一乘中此等諸人並是法界緣起法門又此一眾通三世間以或作河池井泉等國土身等可知已上說經儀第五別序正宗也初中施化万品者一云施於万品則機之万品也一云施化有万品則法化之万品也正宗通論中前八中初一口業次五外五塵次一內六根后一四儀也問此十儀式於同異類界如何分耶荅一一並通然約相分者初一同類界儀次七異類界儀后二通於同異類也或現妙色者惟摩經云佛以何說法以妙色說故奇香者惟摩經云以奇香化故此經小相品香雲普熏如下滅障益中所引也上味者香積世界食香飯悟无生也具足優婆夷以小器食給施一切䟽𥸩云只是一器食融同法界无㝵緣起機无不應應无不益益无不稱本位法界也妙觸者婆湏蜜女摩觸嗚口皆得解脫等普賢菩薩摩善財頂善財即得𭎇數三昧等法境者法塵也有通有別通法塵者意識通緣五根所對故別法塵者唯除識蘊受想行蘊及法處所攝五色六无為也內六根者不思議品云以耳入作鼻入以鼻入作耳入等四威儀者行住坐臥也如𮥷世間品弟子人物者如勝音菩薩即是教体等一切所作等指余不說也別現中先弁音聲十義次引訂現成十之所以也后如音聲下例余也一如來語業者口業也二毛孔等身業三光明等意業也菩薩亦尒然此十並口業也以此並是如來口業說法故謂供具中說偈而智論𥸩為口業說法准此則毛孔光明出聲說法並口業也然佛菩薩毛孔光明說法之事經中相現故各開耳如來語業等者僧祗品小相品是佛自說故引舍𨚗品者訂第二第三也同如法界品者前引花嚴后引密嚴故望后密嚴欲令隔異故云同也問眾生及剎何故不開分圓耶荅實開也是故清涼云今此能說通三世間開即為五謂佛菩薩聲聞眾生及器更開為十謂三世微塵毛孔器及有情各有分圓故毛孔微塵即是分說此上諸說通三世故已上尒也問眾生及器佛力加說耶實自說耶荅三乘中但云以佛神力令其說法故是變化也一乘中三種世間是一身故剎說眾生說即是佛說佛說即是剎說眾生說也又一乘中緣起之法法尒如是皆具三業各自說法故實說也今言令諸剎海出聲等者此中欲弁如來說法儀式故湏尒也又雖以佛力加說亦是法界緣起法性如是故三乘別也是故三乘中有二種說法謂相說法音聲說法也相說法者見八尺柱生八尺解見一尺瓦生一尺解等也音聲說法者神力加被令出聲說也一乘中一切諸法以法界為身故自具廣大三業各說法也䟽中𥸩菩提樹等皆具三業經中大光王處諸草木等亦皆禮敬等此義也問非情說法如何見耶荅古人云欲知非情具三業說法者要湏自作非情然后可見也此義者情即分別无情即无分別故得无分別同於非情方知非情之說法也問若非情能說者能聞之中亦有非情耶荅道申章云木石等具三業故菩提樹能說法者能聞眾中何不列樹等但列有情眾耶良圓師荅且依相故眾中不列實言樹等即是佛之行德故樹說法問佛但化眾生亦化器耶荅以相但化眾生世間以實亦化器等已上准思可知也一切法中皆出聲說等者清涼抄云廣則无量法界品中類非一者法界品中略五類法界皆有說義五類之內一一復多故云无量言五類者一法法界二人法界三俱融法界四俱泯法界五无障㝵法界初中有十一事法界二理法界三境四行五体六用七順八逆九教十義二人法界亦有十門一天二人三男四女五在家六出家七外道八諸神九菩薩十佛又事有多事天有多天神有多神百一十城三千知識等故云類非一也已上一切說義也彼品者舍𨚗品也次前叚引舍𨚗是故望前言彼品也苐六叚引面光集眾文此中引正法海文也第八叚彼品者亦舍𨚗品故前云也此叚引面光雲集中供佛叚以雲自在供佛中文也示經教第六別序正宗也初中窮法界者所說之法界也既盡如來无盡辯力者能說之辯才也各遍虛空等者現能說之廣大也先橫尽十方后竪尽三際竪中應有尽過去際之言然无間断常說之義於未來際中增故隨便且舉耳頓說者橫盡也常說者竪該也時處既其如是无邊故所說之法亦難於部柣也正宗中先列名次別𥸩后无盡教海下通結也初中料簡云一恒本經二大本三上本四中本五下本六略本等問此中十經幾是前九門佛所說幾是第十門余佛說耶荅初七經者是前九門佛說第八第十經通十門佛說也苐八經云謂舍𨚗佛所說花嚴雖遍法界然余佛所說之經㸦為主伴已上第十經云此上諸本揔混同一故尒也初異設經者異則樹形等異設則應機施設恐有謂言何知舍𨚗於異類界亦普應說故引舍𨚗品訂也問清涼云又上十處共為緣起举一全収前一一時皆遍此諸處又隨一一處皆具前前時頓說此經已上同類界眾亦聞異類界中說等耶荅雖同異界別若普賢機必盡能化无邊分齊故通聞也正為文云何故此法非余境界荅以盧舍𨚗周遍塵方普應法界一切群機若彼別機稱自根器但各見己所見聞己所聞皆不見他所見不聞他所聞此普賢機乃見一切所見聞一切所聞皆尽盧舍𨚗能化分齊故云普眼境界也是故普別二機感普別二法各不同也已上別機則各各別聞普機則一切普聞也又非唯見聞一佛遍說普聞余佛各遍法界說也二同說經以同類界中之所說故引證中引不思議品阿僧祇品者同是音聲說故也悉以毛端周遍度量一一毛端處於念念等者且約一毛端之所入處則以一毛入處中於一念中化不可說不可說佛剎塵數身一一化身有不可說不可說佛剎塵等頭一一頭有不可說不可說佛剎塵等舌乃至說不可說不可說佛剎塵等句身味身如一毛端中一念既尒余念亦然如一毛端中念念既尒余一切法界毛端中念念亦尒故難知分齊也且舉客毛之處量其分齊故云以一毛端周遍度量也此中有十種无邊謂一一毛端者處无邊於念念中者時无邊塵數身者身无邊塵數頭者頭无邊舌无邊聲无邊修多羅无邊法无邊句身味身无邊復不可說不可說等者異句身味身无邊故有十也此中法无邊者是所詮句身味身者是能詮也問句身昧身聲无邊何別荅声者從種所生故也句味者是聲上屈曲故假也名身略也問異句身味身者異類界色香等說耶荅約同類界於一種四諦若諦名中此閻浮則同余四天下則異也就閻浮中五言殊漢地語別是故圓音章云如婆沙論說世尊有時為四天王先以聖語說四諦二王領解二王不解世尊憐故以南度邊國俗語說二天王中一解一不解世尊復以蔑戾車語說四諦時四天王皆得領解已上故同類界中亦多種語也音聲充滿法界眾生无不聞者不簡眾生聞不聞如來圓音无不普被何者十佛圓音非但應放堪聞之處亦普應於不聞處也是故風水之聲鳥獸之語皆是如來轉法輪声若大機則恒聞一切當說遍說若別機則雖不能知一切音声是十身佛轉法輪声亦无不聞是則如來圓音一切皆聞令其暗学也无異者无変異也无断者无間断也阿僧祇品說眾生依者依報也問料簡恒本訂中引此不思議品解云此通樹形等異類世界各毛端處念念常說无有休息已上故此文可通訂異設經何故今此偏於同說中引耶荅料簡合此同說異說為一恒本是故約同異界諸毛端處遍說无尽之義為恒本時云通樹形等非謂音声說法通異類也法輪者䟽苐三𥸩云法是軌持義通有四種謂教理行果輪是所成義亦有四一圓滿義以𮥷減故二具德義以轂輻等皆悉具故三有用義以摧輾惑障故四動轉義謂從此向彼即從佛至眾生故亦從彼向此即從眾生向佛果故又輪是喻況如聖王輪寶故体性者通論教等四法為性尅性唯八正道為性以戒為轂謂正語業命以惠為輻謂正見正思惟以定為輞謂正定余念精進等為莊餙此約小乘初教同此又无分別智為法輪体又唯真理為性此約終教或理智俱泯教果亦亡𮥷言絕慮為法輪体此約頓教或通攝无尽法界謂人法教一切自在法門海並為法輪体如帝重重具之主伴等此約圓教又若依一乘轉无尽稱法界法輪所被機同一法界无二无別法尒常恒无新弁益已上也三普眼經即料簡大本經也問大本恒本何別荅寬狹別也恒本則通於同異類界說大本則唯同類界說也恒本則通一部大本則唯𢩁法界一品也恒本則不可限其品類大本則有世界塵數品也恒本則不簡聞不聞常恒之說大本則海雲比丘放十二年觀大海時佛從海出所說也貞元經䟽𥸩此經名云普眼者略有五義一詮普法故二普詮諸法故三得此法者一法之中見一切故四唯是十眼之所見故五非唯十眼圓明方見能所不異方能見故是義云何謂諸緣發見緣各為根演義抄云別𥸩所以如大乘以九緣發識眼根名眼今則例之眼根能發識眼根得名眼空明能發識亦同得名眼余亦例然以緣起之法各有有力无力相成立故云云因沒果中緣皆号眼抄云九緣並是因見色得名眼九緣皆見色沒果同名眼以皆全有力故云云故全色為眼恒見色而无緣全眼為色恒稱見而非我抄云色是所緣之境眼是能緣之心今全是眼故无緣也眼是我能見今全為色正見之時即非我也云云非我𮥷於情識无緣絕放尋求収万象於目前全十方於眼際是以緣義无尽隨見見而不窮物性叵思應法法而難故法普則眼普義通乃見通体之則寂寂照之乃重重斯眼所見為普眼法門也已上四上本經結集書記之上本者文殊阿難海於鐵圍山間之所結集以機无堪受収入龍宮六百余年未傳於世后有龍樹菩薩本是外道知欲是苦本生猒𮥷心依於佛法出家求道於九十日間尽誦閻浮提所有佛教因起大慢謂此佛經只此而已大龍菩薩愍其如是引入龍宮以示佛經文字浩愽不可尽誦欲數偈頌又无邊涯卷帙之數亦不可得但數部類問於大龍菩薩云佛之經誥亦有幾許大龍菩薩言帝𥸩宮中所有佛典倍於此中不可說也故龍樹頌云我於四王自在處向來龍宮除難中隨分覩見契經海其數都合百洛叉故知龍樹唯誦百洛叉經出傳於世也七卷楞伽經云大惠汝應知善逝涅槃后未來世當有持放我法者南天竺國中大名德比丘厥号為龍樹龍破有无宗世間中現我无上大乘法得初歡喜地徃生安樂國已上則世尊親記也六下本經十万偈者約幾許為十万耶荅有四種偈一數字偈无問長行偈頌八字為一句四句為一偈一偈有三十二字也二直頌或諷誦謂不頌長行也梵云伽陁三祇夜謂頌長行也四越檀攬此云自說也后三頌者三字四字五字七字等不定也今此約數字偈數至十万也遮俱槃國山中等者演義引開皇三宝錄云其于闐國東三千余里有遮俱槃國彼國王歷敬重大乘諸國名僧入其境者並皆試鍊若小乘学者遺而不留摩訶行人請留供養王宮內有花嚴摩訶般若大集等經並十万偈王躬受持親執戶錀香花供養懸諸彩幡間以時果使諸王子使入拜礼令其迴向又此國東南万二千里有山甚其內置花嚴大集方等宝積等經九十一部皆十万偈國法相承傳宝守護初東晉沙門攴法領志樂大乘捐𨈬求法裹粮抗䇿至遮俱槃國竭誠謂檮遂得花嚴前分三万六千偈賫來至此即晉朝所譯是也已上問此下本經所有品數料簡智通問荅到目中云三十八品花嚴傳孔目章云有四十八品花嚴宗要云三十六品已上而此土所傳八十卷本經者是譯下本四万五千偈也有三十九品何故本經是三十八品而譯為三十九品耶荅新羅悟真和尚遣書問大唐了源和尚和尚荅云下本梵經有十万偈三十八品何故新經四万四千偈三十九品者一云此乃西域相傳不可定信一云現相等五品為一品更加十定一品唯有三十五品經若未尽十万偈者應有三十八品已上后𥸩義者五十卷經有三十四品八十卷經有三十九品者就晉本經舍𨚗品開現相等五品為三十九合此五品則三十四品加晉經所无十定一品合三十五品余三品未傳此土如是荅也是則約三十八品問故如是荅也孔目花嚴傳中有四十八品者十万偈非一故難定也華嚴宗要中三十六品者有本品有子品從本品數也七略本經是前十万偈中要略所出者料簡云是彼十万偈中前分三万六千頌要略所出已上何故云前分耶荅一云有前分花嚴有后分花嚴此土所傳五十卷經是前分也一云既云要略故此土所傳是會會之初故云前分謂若就初會有无量數菩薩唯列二十不具列也神眾亦尒但舉其上首等法門亦尒等故云前分也楊州謝司空寺者何故或云潤州興嚴寺耶荅楊州境寬分為潤州寺在潤州地故新䟽人云潤州此中云楊州者從本名也寺名是道場寺而云謝司空者從舟越耳𡚳謝官是司空也於此始譯花嚴故或名興嚴寺也就旀勒問疑者花嚴傳云嘗同學僧伽遠多遊處積年達多雖服其才敏未測其淺深后於密室閉戶坐禪忽見賢來驚問所從荅云誓上兜率致敬旀勒言訖便隱達多方知異人已上大乘三果者四果通於大小今簡小乘也八主伴經謂舍那所說等者就結通法中或一舍𨚗為主一切舍𨚗為伴或反此或不動阿閦舍𨚗之名㸦論主伴或㸦為能訂㸦為所訂以論主伴有多種也今約后義也問此中舍𨚗余佛第十門舍𨚗余佛何別荅一種舍𨚗余佛然㸦論主伴之義則不定也或約具能所訂之舍𨚗具能所訂之余佛㸦論主伴或唯所訂為主能訂為伴而㸦論主伴也第十門者從初義此中從后義故別也是故舍𨚗所說花嚴雖遍法界者举所訂之主然此佛之余佛為能訂伴義亦并在此中也余佛所說經者舉余佛為所訂主之義然此余佛舍主為能訂伴義亦并在此中也是故此則所訂主能訂伴㸦為主伴之義也是以舍𨚗說經亦主亦伴者亦主則所訂主也亦伴則能訂伴也余佛說經亦主亦伴義准前也一一主經者舍𨚗余佛經也謂約一舍𨚗所說經結云此方品數既尒余方品數亦尒又一說一切說又余佛說經亦尒已上通望此等故也於中有三先正𥸩次引訂后此略本下舉略本例余本也如說性起品竟者舉所訂主經也十方一一各有下舉能訂伴是故知此中主伴約所訂主能訂伴義也九眷屬經一一主經必具无量方便眷屬已上前主伴經中一一主經何別荅二義也一云主伴經之一一主經唯所訂主眷屬經之一一主并舉能訂伴故別也一云並所訂主也今存后義謂所訂主經有同類眷屬異類眷屬也主伴經中一一主經必具无量同類眷屬者約具同類此中一一主經必具无量方便眷屬者約其異類也簡前同類云方便眷属耳問此前主伴經何別已上此主伴經何佛所說耶荅一云唯伴佛說一云具主伴說也初義者若約主伴佛說者不應對望眷屬經問也既云此前主伴經何別故知尒也問若尒應云伴經何故云主伴經耶荅亦有為主之義故尒也以對望不定故若望所訂主則可云伴佛所說然望眷屬則能訂之伴亦是主也是故此云彼經亦主亦伴名主伴經唯伴非主名眷屬經者對眷屬經故亦主然對所訂主故亦伴也若眷屬經一向伴无有為主之義故唯伴非主也今𥸩存后義既文云主伴經故也問若尒不應對於眷屬經如是問也何故尒耶荅此問意者此與前主伴經之伴經何別如是問故不違也問若尒何不唯舉伴經問耶荅言揔意別言則揔举主伴意則正問伴經故也荅中一前經文句必主同此則不尒者前主伴經云我等佛所亦說此法眾會眷屬名味句身此不異故尒也二彼經必結通十方同說者主伴之伴隨所訂主之一說一切說故能訂亦尒一訂一切訂也余文可知不入一切眾生手者䟽𥸩手有七義一約位謂修學此經必定超出眾生境故名不入手以此非是世法攝故二約心謂若不發起大菩提心非此經器名不入手是故若不發心終日執卷未曾入手三約行謂此經是行菩薩道者之所要若起惑造業名眾生行經非彼要故不入手是則若為名聞利養誦讀此經遍數縱多未甞入手四約智謂執見之智名眾生智經超彼見名不入手是則若受持此經執見不破元此經曾不相見是故要湏違眾生見順此法者方名入手十地經云若聞則迷悶論𥸩云聞作聞解不得不聞五約信謂雖未能破見正入於此情外難思議事能決定信方名入手若不信者不名入手故法集經云是經雖行閻浮提於諸佛所護眾生中行於能信深法者常住如是眾生心手中行解云以信能採納同手義故賢首嘆信云為清淨手受眾行斯之謂也六約二乘亦不入手七約權教菩薩亦不入手以雖聞不信故唯除菩薩者既言不入一切眾生手此言有濫故今簡除前七種簡取法器則乘不思議乘菩薩也已上一切權教等者一云唯初教是權若熟頓等是實教故即是同類眷屬也是故屬主伴經中見也今𥸩對花嚴圓教故下之四教並屬權教也十圓滿經此上諸本揔混同一則圓滿經中亦具眷屬耶荅此上九本捴混同一之時雖眷屬經亦圓明滿足還是主經故唯約主經之義為圓滿經也一會一品等者如理之包一一文句等者如理之遍如理之包故一攝一切如理之遍故一切入一也圓滿因緣修多羅者晉本五十五願勇光明夜神說徃因中為勝光王大子名善伏救罪人時大悲深至救護彼故作如是言我代獄囚受諸楚毒若我不救此眾生者云何能濟三界牢獄云云頌中云時王用臣言如法治大子諸臣送大子至彼刑戮處王后聞此已來白大王言願聽十五日布施修功德時王即聽許令其修福業所期日已至將至刑戮處彼時一切眾悲感悉呼泣時法輪音聲虛空灯如來知眾生根熟徃詣大眾所現現自在方演說圓滿經无量諸眾生悉授菩提記清涼䟽云經普照因輪者謂令知善𢙣各自有因罪人惡因所招大子善因當滿故科長行經文云悲救罪人二臣議非理三請囚代命四臣執令誅五王后哀祈六王子志七大子礭救八母請修因九正設施場十如來親於中六一就戮時臨二如來降德三敬申禮請四就座談經五廣益當機六大子得法
