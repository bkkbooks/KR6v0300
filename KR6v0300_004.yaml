body:
  text: 高麗國歸法寺主圓通首座均如説將釋此章略作四門一辨章主因緣行狀二辨造文因緣及次第三釋題名四入文解釋初者具如朝隱所述碑崔致遠所述傳故略也二中有二初辨因緣後辨次第初中亦二揔辨別辨也揔辨中二初報先恩後利今後報先恩中近報師恩故謂章主寄相德書云但以和尚章疏義豐文簡致令後人多難趣入是以謹録和尚微言妙旨勒成義記已上造述諸文淶演師義是報恩故也遠報佛恩故謂大疏請加偈云願令法久住傳燈報佛恩故如大集經云假使頂戴經塵劫身為牀座遍三千若不傳法利群生畢竟無能報佛恩又如説修行為報佛恩耳利今後者請加偈云開此祕奧藏廣益於自他故別辨中華嚴傳云旨歸一卷十門右於上十門各以十義解釋通辨百門以現經義遂令浩汗之旨宛在目前又此中云庶探玄之士粗識其致已上則造此文別因緣也二造文次第者寄相德書云探玄記二十卷兩卷未成一乘教分記三卷玄義章等雜義一卷別華嚴中梵語一卷起信論疏二卷十二門論疏一卷新法界無差別論疏一卷已上華嚴傳云華嚴旨歸一卷華嚴三昧觀一卷華嚴綱目一卷等已上旨歸是嵩福寺時所述故最在後也而傳中最初刻也是故寄相德書中所列正是造文次第也然教分記云西嵩福寺者以此記有二鍊本草本也闕章主名及與序者是乃草本則勝詮法師所傳魏國西寺時所述本是也至後鍊治時方題章主名及序文故云西嵩福寺耳第三釋題目中二先正辨章題後辨所依處及章主佳號初中亦二先舉所依本教后辨能𥸩章題初中問此章辨異設等十經料簡辨恆本等六經並是所依耶答一云唯除眷屬經餘並所依也一云唯略本是所依也初義者下文云準此所説説華嚴會揔無了時何客有此一部經教答為下劣衆生於無盡説中略取此等緒集流通故有此一部令其見聞方便引入無際限中如觀牗隙見無際空當知此中道理亦爾觀此一部見無邊法海又復即此一部是無邊劫海之説以結通文無分際故一説即是一切説故已上既云一部為詮見無邊海又云即此一部是無邊劫説由此二𥸩故爾也今𥸩唯略本三万六千偈為所依也以不見恆本等經故何得云依而𥸩耶問若爾前義中所引文云何會耶答既云觀此一部見無邊法海等故雖云所依唯是略本然其義理該收恆本等經無所遺餘故爾云耳是故就略本中若五十卷經疏非是八十卷經疏或反此等此亦爾也問此所依教於三教中如何見耶答一云下十益中頓得益是修相稱性益是窮實余則是頓故三教具也今𥸩唯頓圓中見也謂現經義中具説能𥸩十門及所𥸩十法則諸處文中門法之末即云若教義分齊與此相應者即是一乘圓教及頓教法門若與此相應而不具足者即是三乘漸教所攝已上故知爾也若具應云大方廣佛華嚴經今則存略也能𥸩題中有指字本則指示義以指示探玄之者所皈趣故今旨字本也旨者宗也皈者趣也即是語之所表曰宗宗之所皈曰趣是故旨皈旨趣宗皈宗源宗趣宗要並一義也一卷者文無二軸故若從卷數應名一卷章若依門云者十門章百門章若依下結應云無盡法海章也后所依處及章主佳號中亰兆者是通所依西嵩福寺者是別所依也通中亰者大也兆者數之多也謂天子居處高大人類衆多故也別中則天之父士者六原天水人則天皇后於咸亨元年封父為大原王封母為大原王妃遂於大原捨家為寺亦於東之洛陽西之長安皆置寺為敬生處並以大原名之至文明元年則天臨御封父為魏國王封母為榮國夫人乃改寺號並名魏國寺后東都僧法明等上表請改寺額遂並改為大神嵩福寺既而略去神字號為嵩福寺而云西者簡於東北二嵩福故寺者梵云毗阿羅此云遊行處以是智人所遊行處故又云治處以治𢙣種善處故章主佳號中沙門者揔名法藏者別名揔中梵語具云沙伽摩那此云息𢙣亦云斷息涅槃經云出家惱他人不名為沙門息心達本源是名為沙門阿含經云出家修道捨𮥷恩愛攝御諸根不染五欲慈心一切無所傷害逢苦不戚遇樂不欣能忍如地故曰沙門別中字賢首俗姓康氏勑號國一法師從其所業世號華嚴和尚述者述而不作義也以依大經扶洪師義故苐四入文解𥸩有三先序分次一説經處下正宗分后是謂華嚴下流通分問此則是結何云流通耶答流通不定也有約勸信有約誓願有約結屬名為流通謂法界品末云衆生心微𭎇海水滴可數虛空亦可量佛德説無盡聞此法歡喜信心無疑者速成無上道與諸如來等已上勸信流通也起信論云諸佛甚深廣大義我今隨分揔持説回此功德等法性普利一切衆生界已上教分記末云誓願見聞修習此圓融無得普賢法等誓願流通也此章則以結法屬人為流通是謂華嚴等者結法也唯普賢智方窮其底者屬人也𥝠又有此章𥸩一本亦是如師説大旨與此記不殊而云以結屬為流通者餘處無文若然則義理章云唯智境界非事識以此方便會一乘者亦是流通耶既此頌后更有誓願見聞云云為流通是故此章中是謂花嚴等者但云結屬不名流通若科此文應云將𥸩此文大分為二先敘揔意后説經處下題章解𥸩已上就序分亦三初明所𥸩經義甚深次今略下𥸩章題后庶探玄下著述所為也初中有三對六句初法喻對則所訂法也次因果對則能訂人也后深廣對則簡下位也為現教義圓融故有初對如是教義是何人境故有次對何故唯佛普賢之所知非余人境故有后對也就法喻對夫以者發語之初也夫以竊以若夫原夫觀夫並一義也主教者一云主之教以此經是化主之所説故下句云帝珠者帝𥸩殿之珠故亦是帝之珠也對此故云主之教也今𥸩約所説之法為主故主即是教也謂華嚴是主下教是伴眷屬故簡下教故云主教也問此下并敘眷屬經何故云簡下教耶答但是華嚴伴眷屬義中并耳問何故不云主之教耶答若爾則三乘亦是十佛化用所説故亦可云主教耶若從化主則可爾若從助化則可云伴教耶然不爾故不云主之教也圓者圓滿是𮥷減義謂事無不具理無不現障無不盡德無不備故通者是𮥷滯塞義也盡虛空於𭎇剎者以𭎇內之剎該於虛空無不盡故帝珠者約此帝喻法之重重也方者正故𮥷邪廣者包博之義則以毫端容法界故博是普遍則以法界入毫端故如意普應義也謂略疏云方者圓通之致處無不善觸緣順不擇物而施已上故尓也攬法界於毫端者如意教之因義也問盡虛空於𭎇剎何別答一云虛空足事法故事事無得此則法界是理毫端是事故理事也今𥸩但是語無別義也此二句中一云初則能詮后則所詮今𥸩言五教時雖舉能詮亦具所詮之圓融后句亦爾就因果對亦名境智對上句境下句智故一云上句性海果分下句緣起因分一云上句佛外向下句普賢內向也初義者性海果分是十佛境界緣起因分是普賢境界故爾也問性海則訂分無二處故不可更説容融今既云無得容融故可是外化答容融中有法性本自容融之義有對機示現容融之義今據初義故非外化也是故十玄章究竟果訂義隨緣約因辨教義六相章因則普賢境界及以訂入果則十佛境界所現無窮已上今此亦爾也問前則歎所訂法今則舉能訂人然則前之二句亦通內訂耶答上之二句唯外化也然此中但所依義中并舉內訂耳后義者既云無得容融故非是訂境不可説義故知外向也上句既爾則知下句是普賢內向也妙境者有三謂所訂境所知境分齊境若無得容融為訂分義中唯所訂境也若佛外向義中具所知境分齊境也所知境則約佛心所知分齊境則佛之分齊普賢分齊別也有㾏斯泯者以𮥷三乘有待塞得之邊㾏也后義中上句既是佛外向門故普賢內向時稱佛外向之心而訂也普賢眼者經中普賢戒衆云普眼境界清淨身我今演説仁諦聽已上從此云也正所為文云何故此法非余境界答以盧舍那周遍𭎇方普應法界一切群機於定中同時頓演若彼別機稱自根器各見己所見各聞己所聞此普賢機見一切所見聞一切所聞皆無盧舍那能化之分齊故云普眼境界也已上是故若有衆生依此普法得開普見眼者則便是普賢眼之玄鑒非𢩁一普賢云也是故普眼境界清淨身者當於此中普賢眼之玄鑒盧舍那能化分齊者當於此中盧舍那之妙境故上句佛外向下句普賢內向也問二門何則答一云別謂化主之體相用與助化之體相用故也佛外向者是化主可説之用普賢內向者是助化入定之體故十句章云佛外向為義普賢入定為教故有重也舍那品疏云宗趣有二一約人二約法人中亦二一化主二助化各有體相用主中內訂法智為體七日思惟為相加説為用此三不二唯是一果助化中入定為體蒙加為相起説為用此三不二唯是一因此上因果融攝不二唯是一人法中亦二一約義理二約教事亦各有體相用義理中性海為體別德為相應教為用此三不二唯一義理教事中本分內五海十智為體十世界及花藏世界為相益機為用此三不二為一教事此上教義融攝不二為一法也又上人法圓融不二為一宗趣此四義各三為一緣起相即無得是故或唯果以俱是佛故或唯因俱是普賢故或教或義或人或法或體或用或主體乃至或教用並皆攝盡下諸會宗皆有此相但隨法異耳已上是故雖云不二然有異也一云舍那品疏云普賢廣大三業窮本底故正所為中云皆盡盧舍那能化分齊已上故無重也今𥸩十句章云三門中有二義一云普賢向內為佛佛外向為九會諸菩薩若從此義普賢入定及訂忘像海印此義就佛普賢為語非就機作區一云普賢入定分知佛外向門未究竟故佛外向為義普賢入定為教已上初義者佛外向為緣起因分普賢內向為性海果分是故於此義中不應問於一耶異耶后義則有重也問若爾舍那品疏反正所為文如何會耶答古辭云普賢入定時及訂佛外向心耶不及訂耶但云及訂不云窮訂已上是故正為文等約及訂義然未是同佛窮訂故佛外向心普賢內向心別也以普賢內向時及訂佛外向心然佛則窮訂猶如硯中所磨之墨普賢等力會諸承別定力別別而訂則詮有差別猶如筆上所染之墨染雖是硯中之墨然筆上所染硯中所磨有異故也問何故普賢未得𮥷詮而窮訂耶答果人則訂自果法故𮥷詮相而訂也若普賢則因人而訂果法故厼也就深廣對浩汙則廣宏深則深也此中一云微言則能詮旨趣則所詮法海則能詮宗源則所詮是故二句中並舉能詮現所詮也一云初句同前𥸩后句之法海亦則所詮故直約所詮現其難窮也謂料簡云義海宏深微言浩汙已上二處不別故后句唯所詮也是故亦名能所詮對也亦名本末對謂清涼云湛湛亡言而教海之波瀾浩汙已上此中浩汙微言者即彼教海之波瀾浩汙故末也此中宏深法海者即彼之湛湛亡言故本也宏深法海者是無住揔相故增𥸩前之舍那妙境也微言浩汙者起言已去故增𥸩前之普賢立鑒也問下云義海宏深真源渺漫者何耶答唯約所詮也或有𥸩云主教下𥸩大字帝珠下𥸩方廣無得下𥸩佛字有㾏下𥸩花嚴次二句𥸩經字無盡法界不出七字題名是故序中先舉揔𥸩也此亦有理就𥸩章題而云今者前明旨趣難尋宗源叵測故唯佛普賢所知之境然今舉十門以開標趣之處故也則是因前起後之辭也略者有省略有要略今取要略也此假意者提網而衆目張裘舉領而群毛順今舉十義則無盡之義自然現現也機要者樞要機要一義也著述所為中探玄之士者演經時中下劣衆生何別答同是遺教然下劣衆生則結集時之所為也今此則章主已后依此普法修習之人故別也玄者古有三𥸩一者文義並玄謂花嚴經中若文若義並因陀羅故一文攝多文一文攝多義如一文余文亦爾約義亦然是故入法界抄云三乘名義名非義事一乘名義名事即義事已上也二文則未玄義則玄也謂一乘文義雖並因陀羅若分詮相不無文義之淺深也三文義並不玄𮥷於文義方為玄耳謂法界圖云所訂之法言相皆絶諸佛世尊以大慈悲本願力故諸佛家法法如是故施設言教為衆生説已上此則唯約訂分名為玄也粗識其致者正舉緣起分之玄然不礙於令識訂分之玄也問文云異以執名之徒還皈無名真源者如次當於探玄之士粗識其致耶答別也執名之徒則是執下四教之人也無名真源則是法性圓融訂分也今此探玄之士則和尚已后普法學人也粗識其致則雖不得於令識訂分性海之玄然正舉緣起分以下文揔結云唯普賢智方窮其底故也十句章云然為機緣普賢菩薩出定於無生無名處以種種名題目是故云所目於此所目中隨機緣心勝劣尊卑差別故云寄位外沉也衆生實執所目故云執名之徒佛不隨名訂名無住義故云無名真源即是法性圓融訂分也已上故今此則約和尚以后探玄之士令識大經之趣故別也問探玄之士則章主之所為執名之徒則主之所為故可是一量耶答約所為則一而詮相則別也此中直現此經旨趣欲令章主以后依花嚴人有所標趣耳文則既云大聖善巧無方應機隨病非一迷之者守迹不知失體勤而皈宗未曰故依理據教略制槃詩異以執名之徒還皈無名真源已上善巧無方者是花嚴經也隨病非一者謬解此法執為三乘之義也如是謬解故皈宗無曰也是故主以圓表圓教以屈曲表三乘而示之云自汝謬解之時不出圓教乃至初初不動在於無名真源如是令解故知別也就正宗中二先列章門后説經處苐一下依章別𥸩也初中問此十門有定次苐耶答雖無定次苐章主且作次苐謂説法必依處説法必依時於如是時處未知何佛説與如何衆俱以何儀式説説幾許部經經所詮義何未知以幾因緣所詮之義如是圓融未知所被機成就何等益故前之九假次苐來也欲現前九究竟圓滿故苐十假來也此十門中苐十揔余九別別中初五説經緣后四所説法及所成益也問此之十門何旨何皈答旨則皆旨皈則皆皈故不得一定問教及與義可如是耳處與時但是説緣何故爾耶答時處融通即是此經所現旨趣故爾也別𥸩中各有二初牒名后𥸩相苐一門中説經處苐一者牒名夫圓滿教下𥸩相於中三初此假別序次初此下正宗后余佛下問答除疑也初中問此圓滿教與下圓滿經何別別答一也以圎滿經中云此上諸本揔混同一無盡大修多羅海故厼也問苐九名眷屬經至苐十方名圓滿經而𥸩云此上諸本捴混同一則圓滿經中并有眷屬經耶答揔混同一之時眷屬亦同無盡是主經攝故圓滿經中唯見主經不見眷屬也問既云略本是所依則唯約略本為圓滿教耶答雖以略本為所依然見略本時所詮之義則該於異説等經無所不盡故通十經也問十經通是圓滿教者唯約前九門佛所説之經耶亦通余佛所説耶答一云異體異名之余佛故唯前九門佛所説也今𥸩通也問唯約現在佛所説為圓滿教耶通約三世佛所説耶答如前謂上列十門皆約現在佛説經時處故也問苐十門引經云三世諸佛已説今説當説已上既通約十門佛説為圓滿教則通於三世佛所説何云不爾耶答文雖并引三世佛説正取現在佛説為訂故爾也𭎇方者塵則微塵方則十方謂周側於微𭎇十方也周者橫盡法界側者竪盡法界也今𥸩不須別橫竪但於十方三世無不普遍説此大法故云周側耳今從狹至寬者初此閻浮則最狹二則次寬如是轉轉寬也問清涼云若從狹至寬略現十處初此閻浮二周百億三遍異類四遍剎種五遍花藏六遍余剎海七遍前六類剎𭎇八盡虛空九猶帝十余佛同已上與此何別答演義云今疏所以不同彼者以皈花藏即前染淨無得故不立之故旨皈云事盡理現染相盡故其該別𭎇與遍𭎇道並皆是𭎇故苐七中攝八重攝剎者亦明花藏中𭎇一一攝余剎海亦不異於苐六該別𭎇故並略之而加四五六已成十義彼三即此八彼五即此三已上如是別也雖有同者非是全同謂清涼則一一門皆遍法界故約初閻浮亦遍法界後一皆爾此中門門不言遍法界也問清涼則門門皆遍法界應不得言從狹至寬耶答遍法界則同然所據閻浮等從狹至寬謂初則唯閻浮故狹二則百億如是漸寬也問此中從狹至寬者遍此堂而説則最狹遍於堂外地則次寬遍於一國則最寬耶遍此堂説則最狹堂內之𭎇攝於此堂遍此而説則最寬如是等耶答一云具二義也謂初此閻浮二周百億三盡十方者如次當於前義之三也盡十方遍𭎇道者亦如次當於後義之二也問既從狹至寬則遍𭎇道冝在第一何故不爾答此義可許然非唯約遍一塵義通約法界一一塵中攝剎海義故不違也雖有是義然今𥸩非於十門曲分寬狹但約通相先辨同類界次則異類乃至剎海之義大分寬狹而云從狹至寬耳正宗中二先列門后初此下𥸩相初假中七處八會等者人三天四故七處也一菩提場會二普光堂會三切利四夜摩五兜率六他化七普光堂八逝多林會周本經有九會此闕十定品普光堂重會之文故唯八會也清涼於此門中引外天品文云爾時世尊不𮥷一切菩提樹下上外須㢱向帝𥸩殿云云下云十方世界悉亦如是已上七處等普遍之相文現故引也如光明覺品説者通望三假訂也謂彼品中有二十五重初重云如此見佛坐蓮花藏師子座上有十佛世界𭎇數菩薩眷屬圍繞已上訂初假也百億閻浮亦復如是者訂第二也后二十三重者訂第三也四遍塵道者取前十方盡末為𭎇此一一𭎇各攝法界於中説也問若厼可云從至細耶答唯約𭎇中説義可如所難然此中以十方界盡末為𭎇每一𭎇各攝法界於中而説故云從狹至寬也問遍塵道者剎遍耶佛遍耶答文云一一塵處皆有彼剎已上故剎遍也𭎇道者性起品云毛道疏云約虛空中一毛容處云毛道例此則雖是虛空可容一𭎇處則云塵道也五通異界中㸦不相得者同類世界既遍法界異類亦爾不相得也問異類界者在同類界中耶同類外耶答二義也章主𥸩衆生形世界有二一衆生形即世界二如衆生形世界已上初𥸩者謂諸有情有以同類界衆生之形以為世界依而生者故衆生形即世界也河形樹形等亦爾故不𮥷同類界也后𥸩者如衆生形世界如河形世界則在同類界外之異界也今此約后義問通異界者同類界之遍耶佛之遍耶答如后問若爾同類界之遍異類義不論耶答亦有此義然前辨同類遍法界時既已現故此門唯約佛遍義也問同類與異類別則從狹至寬之義難成耶答前唯約須彌形世界遍法界今此則樹形遍法界河形遍法界等多種世界一一皆遍法界則最寬於前況復踏前則前唯辨同類界中遍説之義今此明異類界中遍説之義故寬於前前也六該別𭎇謂異類界該於異類界𭎇於中説也問別𭎇者別於前之同類世界遍𭎇之義耶於異類中亦有多種二相望而云別耶答具二義也一一塵道者河形樹形等所有𭎇𭎇各攝剎海也同前者指前第四也問應云攝自異類何故云攝同類耶答樹形界𭎇攝自樹形界河形界𭎇攝自河形界如是等各攝自類故厼也七皈花藏與清涼遍花藏何別答彼約佛遍義此約雜染世界染相盡義云皈花藏故別也問疏云積界成種積種成海則積同類界種成同類花藏積異類界種成異類花藏耶積同異類界種成一花藏耶答如問二義也初義者舍那品疏云乘十佛化境蓮花藏世界海有三種一蓮花臺藏世界雖遍法界對地上菩薩機現有增減寄在色頂唯説一界二即此遍法界之花藏説十現無盡即無盡箇花藏一一皆遍法界三樹形等雜類世界一一皆有花藏並似彼界悉遍法界各有十無盡無盡也此三中初一約同教一乘辨后二約別教一乘現耳今此文中據須旀山世界中辨花藏故風輪水輪還似彼也以易信解故與機而成故已上后二中初則同類花藏后則異類花藏故厼也問此中前四門明同類界五六二門明異類界通望此二明皈花藏門則積同異類成一花藏何云不厼答雖同異類華藏之別然花藏義不異故合説一花藏也約實則積同類界種成同類花藏積異類界種成異類花藏也后義者既此章望前同異類界辨一華藏門故也問舍那品疏文如何會耶答雖一華藏且從同異類界別辨耳今𥸩同類華藏異類花藏雖各別然能成之緣皆具同異類也謂疏中別辨二種花藏已云今據須彌山世界辨花藏故風輪水輪還似彼也則知此經所明華藏是同類花藏而此華藏中央種中所積十二佛土七世界性形相各別故知同類華藏積同異類界種成也同類花藏既爾則知異類花藏亦如是成也數過剎𭎇者雜染界之數耶花藏之數耶答如后謂一切雜染世界染相皆盡悉是花藏故花藏之數過於剎𭎇也問能成之緣具同異類一種無別如何而成則同類花藏如何而成則異類花藏耶答據同類界為本花藏時似同類界積之而成則同類花藏也據異類界為本花藏時似異類界積之而成則異類花藏也問何知爾耶答神秀法師妙理圓成觀云問沙婆既當花藏正中剎種上第十三重雜染土如何經説菩提場中金剛地寶樹等境界全是華藏本剎耶答本不定本末不定末娑婆雖在第十三層中有淨機所見全是本非末若非淨機全是末非本余異類剎應知亦爾應知華藏遍一切處染土㸦遍爾又復於最上同類世界現其本剎從本剎土應知亦爾更有二十層向上既爾向下亦爾或本剎東極輪圍山邊取一剎土為本應知彼剎或正當中東去更有不可説種余方類爾應知十方廓同法界而不壞本相然此即有邊無邊合無邊有邊合猶如圓珠於十方面求不得邊不坊中邊分量斯在何以故無漏所起無生所生非分限取故又以華藏具衆緣成則是揔相衆緣非一各現是別相以山河等同成花藏故是同相山河等相望各各異故是異相由此諸緣花藏得成是成相此一一緣住自法不𮃆是壞相也又此華藏一塵具含衆德是揔相盡花藏德一一不同是一塵之德名別相盡花藏一一德同成花藏一塵是同相一一德相望各異是異相由諸德故花藏一𭎇得成是成相此一一德恆住自法不曾有作是壞相如一𭎇既爾余亦如是由此捴別相即緣成無得間何故爾耶答一由法性本來常爾二現所受用則由往因具如經説云云世尊往昔於諸有微𭎇佛所修淨行故獲種種寶光明花藏莊嚴世界海已上此問意者既積二十重等廣大世界以成花藏是故沙婆在第十三重是雜染末剎何故經中説此沙婆世界菩提場等金剛所成便是花藏本剎耶如是問也答意者隨所對機緣本不不定故此第十三重沙婆世界以為本剎時即此沙婆全是本剎蓮花藏界於此本剎中央而上積二十重廣大世界第十三重亦有沙婆也又於上方約最上一同類界為本剎時向上亦如前積二十重世界也又於十方約最下一同類界亦然又於東方取最近輪圍山一同類界為花藏本剎時同前向上有二十重世界等也余方亦然是故約此同類花藏之成義云此遍法界花藏説十現無盡即無盡箇花藏一一皆遍法界也同類花藏既如是成異類花藏亦如異類積而成也是故文云樹形等世界一一悉有花藏並似彼界已上者以樹形界為花藏時似彼樹形界積之而成據河形界為花藏時亦似何形界而成也今此經中據須彌山世界辨花藏故是故水輪風輪還似彼也已上者今據沙婆為花藏時故風輪水輪似沙婆也問於末剎中有淨有穢何故但云染相盡耶答以淨世界為本花藏易可得故且舉雜染也問清涼云四遍剎種章主前之六門約界而辨第七已下約海而明何故不説剎種耶答舉界與海明時已現剎種遍説之義故且略也問相海品説如來大人相結云十蓮花藏微𭎇數相已上疏云蓮花藏世界説十現無盡已上十蓮花藏者何耶答一云淨蓮花勝光莊嚴等十世界是也一云起具因緣等十世界是也第一義者淨蓮花等十世界與花藏齊等是表法故厼也舍那品疏云問下文此華藏界無邊云何此中有東等耶答以花藏界是邊無邊不二故名無邊如下説無邊邊不二故名有邊如此説是則不壞邊而恆無邊不破無邊而恆邊若謂無邊乖於邊邊乖於無邊是情計所及法非正緣起也以此邊無邊是一事故雙超情表也其猶錦窠白線徹遍而不雜紫窠紫等亦爾又白窠有紫由是錦故若白中無紫紫線不至兩編即繡非錦也白窠無紫由是錦故若白有紫現則壞文非錦也是故由白有紫得成白無紫無白亦爾當知此中道理亦爾思以準之問若爾彼十方世界是花藏不答是不謂由即是故不是不是亦爾準上思之又何以故由是花藏東等故即不即也問此十方世界外更有世界否答無也何以故以花藏為主彼十方為伴此主及伴圓融普遍一切𭎇道重重如帝故余皆即此如虛空故已上既有如是是不二𥸩故若約不義𥸩則非是花藏若約是義𥸩則是花藏故厼也問此十世界望為主時是花藏耶從伴時來是花藏耶答一云如前一云如後初義者既云彼十世界是花藏不答是不已上故知望為主時是花藏若望伴時非是花藏故也問錦窠喻中以十錦窠喻十花藏耶具足十窠一機之錦以喻一花藏耶答如后謂中央花藏具淨蓮花等十世界伴成花藏又淨蓮花等十世界亦各具十世界為伴而成花藏故爾也後義者既云十蓮花藏莊嚴世界海具足主伴如帝等已上者花藏為主十方為伴故厼也問若爾者唯云是也何故云是不耶答伴花藏故云是非是主花藏故云不也此義中以十窠錦喻十花藏者中央一窠喻主余窠喻伴也問若爾邊無邊云何答白窠之白線徹遍諸窠則主花藏之遍於伴故無邊也白窠之白線雖徹遍諸窠然十窠各別則主花藏之與伴世界不雜之義故有邊也第二義者跊云初通論十世界後別辨花藏界亦是𥸩苐十壞世界以成即壞故已上此壞方便既是花藏故知約余世界亦是花藏也今𥸩依結通文見十花藏也經中説一方花藏已云如一方十方亦如是已上故厼也淨蓮花等十世界是表法伴非是主花藏也起具因緣等十世界者文云二約攝化處有三類一須山界及樹形等已去乃至一切衆生形世界海為第一類二三千界外別有十世界一世界性二世界海三世界輪四世界圓滿五世界分別六世界旋七世界轉八世界蓮花九世界須㢱十世界相此等當万子已去輪王境界為第二類三十蓮花藏莊嚴世界海具足主伴如帝等是佛境界為第三類通有十事為首成世界一説世界海二起具因緣世界海三住世界海四形世界海五體世界海六莊嚴世界海七清淨世界海八如來出世世界海九劫世界海十壞方便世界海已上約此十種通辨界種海中能成之因緣耳非是所成花藏也問經中如一方十方亦如是疏𥸩云第三假向上廣持諸剎於中二初牒上海及海上花二辨持剎及性云云此中大意明衆香海中略舉一海一海所持十方剎中略舉一方一方既厼説不可盡余方例準一海所持十方無盡皆遍法界一一海皆持十方各遍法界無得圓融無盡自在即不可説不可説也二所持中二初一方后結十方已上就一花所持十方剎性中明一方剎性后例余方剎性故唯是一花藏內何故依此文論十花藏耶答此經文中含二義故一義如問一義者疏云所成果中分二先明此主界后辨結通已上故此中先明一方花藏后結通余方花藏是故依結通文立十花藏義也疏云即此遍法界之花藏説十現無盡即無盡箇花藏一一遍法界已上於此明所成中所以説此辝者良由經文於此説分先明一方花藏后結通余方花藏故厼也是故知結通所明是十花藏也問彼十世界是花藏否答是不已上約不義則雖非花藏約是義則可云花藏何故云不厼耶答以非是花藏外別花藏故云是也然但是伴耳非是主花藏故云不也是故問云彼十世界是花藏不者花藏世界既遍法界如是無邊而經云花藏世界東有世界名淨蓮花勝光莊嚴等則此十世界未知是花藏內耶外耶如是問也答云是不者花藏內故是也然非主花藏故云不也問何知厼耶答次疏云由即是故不是不是亦爾準思之何以故由是花藏東等故即不即也已上即者以即是花藏內故𥸩前是義不即者以非是主花藏故𥸩前不義故知厼也問十蓮花藏世界具足主伴已上合主與伴云十花藏耶答約一花藏亦具十世界伴余花藏亦爾約此各具十世界伴之十花藏更有論主伴之義是故云具足主伴也非謂花藏為主十世界為伴也問疏云此世界外更有余世界不答無也何以故以花藏為主彼十方為伴此主及伴圓融普遍乃至余皆即此如虛空故然則花藏以外更無所余約何世界為結通之十花藏耶答此約一乘法之不相知義謂具十世界伴之一花藏遍法界時不見余花藏遍法界義故云無余耳結通義者約余花藏論遍法界例亦如是以現緣起㸦無側也是故結通文是十花藏之文也既云此主及伴圓融普遍一切𭎇道重重如帝網余皆即此如虛空故已上是故見一花藏遍法界時不見余花藏遍法界約余亦爾故厼也問今此文中據須彌山界論花藏故風輪水輪還似彼也則今經所説是同類花藏也依何經文而云樹形等雜染世界一一皆有花藏並似彼界耶答經中無有説異類花藏之文然經中於同類花藏説十現無盡風輪水輪還似於彼則可知異類花藏亦如是也問皈花藏者皈一花藏耶皈十花藏耶答一云如初以皈十花藏之義則至第十門所現故也今𥸩如后謂同類花藏具十無盡異類花藏具十亦爾通望三類花藏而立皈花藏門故也是故文云一切雜染世界各皆同盡唯是蓮花藏世界海數過剎𭎇已上以過剎𭎇雜染世界染相皆盡全為花藏故花藏亦過剎𭎇之數是故知通約同異類花藏云皈花藏也清涼𥸩花藏品云譯者猒繁乃成大略處中應云蓮花藏莊嚴世界海品謂蓮花含子之處目之曰藏今剎種及剎為大蓮花之所含藏故云花藏其中一一境界皆有剎海𭎇數清淨功德故曰莊嚴世界深廣故名為海有云世界依海故立海名者恐非文意以下云花藏世界住在花中故云云約事可厼何因剎海相狀如斯略舉二因一約衆生如來藏識即是香海亦是法性海依無住本是謂風輪亦妄想風於此海中有因果相恆沙性德即是正因之花世出世間未來果法皆悉含攝故名為藏若以法性為海心即是花含藏亦爾然此藏識相分之中半分為外器不生覺受故半為內身執為自性生覺受故如來藏識何緣如此法如是故二約諸佛謂大願風持大悲海生無邊行花含藏染淨二利果法重疊無得故所感剎相狀如之是以出現品中多將世界以喻佛德細尋文義乃由佛德世界如之云云今一乘十佛之境大小無得淨穢相融且依一相説有邊表則一重橫尋無邊況復重重𭎇含法界然準下文別現應有十事一所依風輪二風持香海三海出蓮花四花持剎海五繞輪山六臺面寶地七地有香海八海間香河九河間樹等十揔結多嚴已上章主舍那品疏云今通𥸩諸世界海略作十門一種類二居人三名體四染淨五流無流六共不共七世間涅槃八依正九人法十無得初種類者小乘唯有一類沙婆世界無別淨土三乘中云云一乘有二一約果分十佛自體國土海此當不可説寄緣説十如第二會説二約攝化處有三類一從須彌山界及樹形等已去乃至一切衆生形世界海為第一類二三千界外別有十世界一世界性二世界海三世界輪四世界圓滿五世界分別六世界旋七世界轉八世界蓮花九世界須彌十世界相此等當万子已去輪王境界為第二類三十蓮花藏莊嚴世界海具足主伴如帝等是佛境界為第三類云云二所居人者若小乘唯有有余依聖及凡位居也三乘三中云云一乘三中多分論時初見聞位次解行位後向果位通即可知三名體者世是時界是分齊謂於時中分齊現現從相得名繁多奧積深廣難窮同名海也若小乘以子母七微及色等四𭎇并能造四大實色為體若三乘中凡小地前俱以賴耶識為體地上二義報土亦同賴耶識為體若二智所現即以唯識智為體故攝論云菩薩及如來成唯識智乃至為淨土體故若依終教俱以如來藏真如為體若一乘以無盡法界通三世間人法理事等諸法相即㸦為其體荏思云云五流無流者若小乘唯有流三乘云云一乘中如緣起法界若無一即一切不成㸦融無得亦具四句全攝可知八重攝剎者前則遍於數過剎𭎇花藏而説此則前諸花藏盡末為𭎇一一塵中各攝剎海於中説也九猶帝彼一一微𭎇既各攝此無盡剎海者牒前重攝剎中一一微𭎇皆攝剎海也此所攝剎積𭎇而成故此剎中亦有微𭎇又此𭎇𭎇各攝剎海如是重重成無盡也此中三先正𥸩此門次上來下通結前九后問若下問答除疑也問中二先正問后設爾下過也正問中若如上説即七處八會等者一云因前帝門問也今𥸩初此閻浮中舉七處八會第四明塵塵攝七處八會及十方界此門則重重相攝等故通望前九問也答中三先答正問次若約下遮過重𥸩后余一一下例余答意者忉利説十住時既遍法界説故𮥷説處不遍過然於在夜摩中忉利天説故非即夜摩等故以隱現門意答也是故清涼云此是隱現門也就遮過重𥸩中有難云既十住遍法界十行亦爾十住十行為相見否若相見者還成𮦀亂若不相見難成遍義也答中若約十住等者明不相見若約諸位等者明相見也問此二門為中即耶為主伴耶答如問二義也初義下攝位益全位相是諸位相資二門同故爾也后義下第十門各遍共遍同故爾也今𥸩清涼云十住十行等全位相攝即彼此㸦無各遍法界者是相即門若約諸位相資即彼此㸦有同遍法界者是相入門已上故二門即是中即也又清涼云諸位相資門中立有力能攝為主無力被攝為伴已上故亦不得主伴義也問此相攝相資二門者約前九門論也第十門中各遍共遍者通約前九門第十門論也所論之法別故共各二義為亦別耶答厼也謂此中全位相攝是各遍則見十住遍時不見十行遍約十行亦爾也諸位相資是共遍則十住有力時十行無力約十行有力十住無力等以有力為主無力為伴如是主伴同遍法界是故約一主一伴不俱故各遍法界也第十門中約二主二伴不俱之義為各遍一主一伴同遍之義為共遍故共遍則二處不別各遍則二處殊故不同也問何知即門當各遍門則是一主一伴不俱耶答法界義海章云主之伴㸦相資相攝若相攝則彼此㸦無不可別説一切若相資則彼此㸦有不可同説一切已上若相攝彼此㸦無不可別説一切者是明主之伴不俱之義若相資則彼此㸦有不可同説一切者是明主伴相見之義故此亦爾也就相資中二有力二無力不俱則各遍也一有力一無力俱則共遍也此義正當第十門中共各義也例余中問應先舉初二會論主伴然后例余何故超舉第三第四以例余耶答爾也且先約位成處説也十余佛同者一云伴同説一云同體同各余異名余佛也初義者若二主則不得同説既云同説故知伴佛也引訂云如訂法菩薩所説當知余佛不同説已上如訂法菩薩所説者會會訂成經文云我等佛所亦説是法大衆眷屬名味句身此不異者是引能訂伴文故爾也一乘普法理無孤起必攝眷屬是故前九門中辨其主説第十門中辨其伴説也問文中亦引三世諸佛同説之文十方諸佛同説之文則三世佛者過去迦葉亦説此法現在𥸩迦未來彌勒亦説此法故引也十方同説者東方阿閦西方㢱陀等亦説此法故引也然則皆約主説義何故云伴説耶答約過去迦葉等望現在舍那為伴之義訂也何者升天品中所讚十佛者初之三佛是現在賢劫之佛后之七佛是過去莊嚴劫之佛疏云此后七佛是過去莊嚴劫中佛何因得於賢劫中忉利天宮而説法耶答此天宮等有麁有細麁者前劫燒滅細者常在故也如經天人見劫壞我土常安穩等又三乘所説者滅一乘所明者常存已上後𥸩義者一乘中三世常存故過去莊嚴劫之七佛常在賢劫帝𥸩宮中説法故厼也次義者舍那説處有十之中是第十門故爾也問但云説經處第一而不言舍那佛説經處何言舍那説處有十等耶答序中云盧舍那之妙境又下説經佛中云説此經佛盧舍那身既在如前無盡時處已上無盡處者是前十重説處故十處並舍那説處也問説前九門竟云揔是舍那佛説花嚴處至第十門云余佛同故可是名體異之余佛耶答前九門中約一舍那説處至第十門中約一切舍那説處辨故前九門終結一舍那説處也十余佛同者明一切舍那説處故爾也問前九門中二周百億三盡十方者約舍那遍説義乃至帝門重重遍説者亦是舍那則前九門中已具一切舍那何故不爾耶答前九門中明一舍那之一切舍那義第十門中明一切舍那之亦各一切舍那義故爾也問引訂中三世諸佛者過去迦葉當來㢱勒等十方同説者阿閦寶相等是則可是名體異之余佛耶答十方三世佛無不説此法故引耳若約説此經則唯以舍那名説若説三乘則以𥸩迦名説也何者十行品疏云此經中所訂皆悉盧舍那佛世界同名花藏沙婆已上故爾也後義者前九門終云上來揔是盧舍那佛説花嚴處至第十門云余佛同故爾也引訂中欲現此義故引異名十方三世佛也問舍那佛説處有十之第十門故是舍那説處耶答一云但言説經處不言舍那故知説處中合舉余佛説處也一云説經處得名者正從舍那説處得也至第十門并論余佛説處也此義合文也問不別指言舍那説處則可云通約二佛説處得説處名耶答后九並於舍那説處中立論故説經處名但於舍那説處立也問名號品疏云此中名號為是舍那佛為通余佛答若約三乘唯此界內百億為𥸩迦名余十方界是別佛名若約一乘盡法界揔是舍那名已上既盡法界揔是舍那名則傍無余佛何言名體異之余佛耶答此皆約舍那佛盡法界義故如是云也若約余佛時一皆亦盡法界故阿閦佛名亦盡法界寶相佛名亦盡法界也是故次云皆此佛所化處故無別佛又𥸩迦海印中現故無別佛又𥸩迦一佛名既通十方余佛亦各如是通於十方已上是明約余佛時亦盡十方之義也是故舍那之盡法界義則前門中辨也余佛之盡法界義則此第十門中見也今𥸩同體異名佛也一切諸佛一體無二而隨機緣或現舍那名或現他佛名以舍那名説法之義則前九門中辨以余佛名説法之義則今第十門中辨也問何文為訂耶答明難品云一切諸佛身唯是一法身一心一智𠅤力無畏亦然已上問答云諸方現佛若名若義皆依𥸩迦海印定現無別佛也又云若依一乘所有諸佛在𥸩迦所化教名義現現者並是𥸩迦佛海印定力清涼入法界疏云更以文理訂此諸佛皆遮那身等已上此等諸文故知爾也問舍那為揔於此揔中現種種別名佛故是同體異名佛耶答不爾謂一切諸佛並以一法界為體故舍那亦以一法界為體時種種佛名並是舍那體上之名是故舍那具種種名也然則以舍那名説則前九門辨以余佛名説則今第十門辨故爾也問更以文理訂此諸佛皆遮那身已上依𥸩迦海印現故無別佛已上故舍那名可是揔耶答一切諸佛以無偏當一大法界為體亦得無偏當海印三昧則此所引文等是約舍那盡法界義故一切諸佛皆於舍那海印中現無別佛也若約余佛盡法界義則一切佛並阿閦身亦並現於阿閦海印故無別佛如是見也問何知爾耶答名號品疏云若依一乘盡法界皆是舍那名已上此即約舍那盡法界義也約余佛亦爾故得知也問盡法界揔是舍那名者前九門中辨余十方佛名亦皆如是各遍法界者第十門辨耶答就盡法界揔是舍那名中以舍那名説則前九門也以余佛名説則第十門見也問若爾盡法界揔是舍那名則此舍那外更有何佛如是分配耶答所言盡法界揔是舍那名者非謂盡法界唯是一種舍那名也以盡法界種種之名皆是舍那體上之名故也問盡法界揔是舍那名者是舍那為揔之義故前九門見也余十方佛名皆亦如是各遍法界者則是余佛為揔之門故可於第十門中見耶答此中非是㸦論揔別之義一切諸佛同以一法界為體就於此中且約舍那名則盡法界揔是舍那名若約余佛則盡法界揔是某甲佛名也其猶虛空列種種星且約大白星則大白星之空中種種星也若約鎮星則鎮星之空中種種星也當知此中道理亦爾也十地加分疏云二約舍那佛謂舍那佛本修菩薩道時一舍那所能加諸佛同名金剛藏加説地法舍那今成正覺本願今成故彼能加佛亦名金剛藏故不異名也如涅槃經云往昔此處有佛名𥸩迦侍者舍利弗目連因此具願故今亦同之在此説法是此類也已上以此相配則此舍那佛本行菩薩道時於世界海微𭎇數劫遇世界海微𭎇數佛恭敬供養一一佛所淨修世界海微𭎇數願行如是遇多佛時若遇舍那佛作是願言我當來成正覺時亦以舍那名如是説也若遇余佛亦如是願是故具於盡過去際一切佛名於十方界同時成佛以隨機故或現舍那名或現余佛名等故就於此佛所具多名以舍那名説則前九門是也以余名説則第十門是也若第十門佛是名仿召之余佛者此佛所具余名説義當於何門見耶故爾也問若爾行菩薩道時所事諸佛名體異者是則諸佛名體各異何云一體耶答盡過去際歷事諸佛而成正覺既正覺時得三世佛平等果法得如是果時即入法性既入法性之時自他無二故即見十方諸佛即是自佛亦見過去未來諸亦即自佛是故三世諸佛同一體也是故道申章云之當佛來化於我非他佛者即是事也就此中先自意立門后經云下引訂也初中先結前為能例后是則下辨所例問此中舍那名説則前九門辨余名説則第十門辨者名號品界內百億万名於前九門是耶答爾也謂一佛説花嚴處如是不同是則十方一切余佛各説花嚴處皆不同淮前已上一沙婆説則是一佛此沙婆外則是十方一切余佛如是沙婆之舍那説處則前九門辨余佛説處則第十中辨故厼也問若爾舍那佛無有遍於十方説義余佛亦無遍沙婆説義耶答雖互遍説今此中意沙婆之舍那遍法界説義則前九門辨故界內百億万名亦前九中見也問界內之名既有百億万種之異何故當於前九門中唯舍那名説耶答雖有異名此則中央四天下佛悉滿月之名故以此為主非以余四天下佛名為主之義故此主中滿月等名即是一名非異名也是故疏云沙波一界有二種融一以説法之處則為當中為成主伴融彼百億令有上下使得圓故無三百也二縱於三近輪圍山邊一四天下為説法主即是當中融彼四天下還有十方眷屬具足以諸四天下皆望他為伴望自為主故已上隨何説處即為中央四天下是故以中央四天下之佛名為主説耳更無有余四天下佛名為主説義也是則百億万名是一主佛名故是故唯以舍那名説門中見也問唯約現在十方佛説耶通約三世諸佛説耶答如前也是故文云十方一切余佛各説花嚴不云十方三世一切余佛也問智通問答云善財值知識時所聞法門皆如問得訂耶聞以后修行方得耶答隨所聞法即得訂也問若爾既得法因緣問答中明過去無量劫中值諸佛聞法供行修方得此法門善財今方聞所説法耳非修行無量劫行云何得乎答既得此法門即入法性法性即自他無二三世非前後故善知識所得因果自利利他法門即是善財自行成故隨所得法門其因果前后之法皆自無不行得法不移一時而即成無量劫隨所聞法門無量劫中修行得以豈不修有得果之義乎又道申章云問我之當佛還化我以何文知答瓔珞經云八地菩薩自見己身當果諸佛摩頂説法又經云禮敬三世諸佛故滅諸罪業未來諸佛用何為問此乃禮他己成佛豈謂自未成佛乎答非無禮他佛之義而他佛踈何者凡諸佛為衆生説法意者為令衆生欲得自當果不惜身命而修行耳非為得他果正令我發心修行之佛者是我當佛非他佛也又有他已成佛即是我當佛何者成佛時得三世平等果法已上則三世既是同體何故余佛中不并舉過示之佛耶答此中但辨現在之佛説經時處等故第十門唯約十方現在佛辨也問若爾何故引訂云三世諸佛已説今説當説耶答但取今説非取過未為訂也又𥸩三世佛説者竪窮三際義中訂也十方同説者橫盡十方義中訂也問若爾三世佛説者訂異時説義十方同説者訂同時説義耶答若約現則可如所問然亦有三世佛同時説義如前所引升天品疏云一乘中三世常住故也同説者問以軌則同故耶約時之同耶答文云如此一佛説花嚴處如是不同是則十方一切余佛各説花嚴處皆不同唯前知之是則約軌則同義又是現在十方佛説故不得時同義也引訂中經則舍那品正陳法海分也又三賢十地本分經中皆有此文也次又云者地品也次又如訂法菩薩者引會會因人訂成文也問若引訂成文者可是伴佛説處耶答既為他作訂則亦得自有為主説義故約此為主之義訂也故非伴説處也就問答中先正問答后如舍那為主下還結前九門事也初中問答即為二假問中先正問后設厼下過難也正問中問若前九門中辨主説苐十門中亦辨主説則二主不相見者是法爾道理何故問云相見不相見耶答此所問義是苐十門佛為伴同説義中所難也今則反難云若前九門中辨主説苐十門中辨伴説則主伴相見之義是法厼道理何故問於相見不相見耶汝若救云雖主伴相見法爾道理然因論方現故如是問者若爾則二主不相見因論方現是故須問故無難也𣲪此中意者前九門中辨舍那佛具能訂伴為所訂主之義苐十門中辨余佛具能訂伴為所訂主之義亦有通約此二明㸦為主伴之義故欲現此義故如是問也問若厼為主伴之伴義亦具能所訂之伴耶答厼也謂通約具能所訂之前九門具能所訂之苐十門更論主伴故主具能所訂伴亦爾也問要須從法受名方能作伴則所言伴者唯是能訂耶答主伴不定也或約能所訂論主伴或不動本舍那阿閦名論主伴此中前之九門具能所訂苐十門中亦爾不動本舍那阿閦名辨其㸦為主伴之義故爾也是故清涼主伴重重極十方而齊唱𥸩中有三一遮那為主十方為伴可見彼文也問下文云如舍那為主訂處為伴則可是能訂耶答此則牒前九門事耳於共各門無所開故無難也是故若分科假則先正明苐十門事次問余佛下通約前九及苐十門問答后舍那為主下還牒前九門論故厼也就過難中若相見者即違相遍者前明相遍義故如是難耶答前明舍那遍法界義及余佛遍法界義是則相遍故若相見則違相遍如是難也答中㸦為主伴通有四句者各遍門二共遍門二故四句也謂各遍中主主不相見一句伴伴亦爾一句共遍中主之伴其必相見一句伴主亦爾一句也問以此二門答前難云何答以共遍門答若不相見不成主伴以共各二門答相見即違相遍也謂清涼云二㸦相見主伴義成見不見遍義皆成但各遍同遍為異耳已上故厼也是故就相遍門相見則共遍不相見則各遍也問一門中各論主伴耶合舉二門論一重主伴耶答如問二義也初義者林德云各遍者是正主伴共遍者是不正主伴故厼也問正不正主伴何別答舉主時非但不見對立之主亦乃不見隨生伴者是正主伴也有隨生伴者不正主伴也今𥸩合二門論一重主伴耳謂各遍則標也共遍則𥸩也謂於各遍門中論二主二伴不俱之時已標共遍門一主一伴相見之義故各遍門即是標也共遍門中𥸩成主伴故是𥸩也問林德分論正不正故二門各論主伴耶答林德之辝后人謬傳耳謂林德但云各遍門中正其主伴之法后人乘此而言既如是各遍門中論正主伴故對此則共遍門是不正主伴耳如是誤傳也林德意者各遍門中正鍊主伴至共遍門方明主伴之正義耳主主不相見者見舍那為主時不見余佛為主之義伴伴亦爾者見余佛為伴之時不見舍那為伴之義故也問各遍門中云彼此共遍門中云此彼者有別義耶答一云各遍門中以無為宗故先舉阿閦之主無后舉舍那之主無故云彼此也共遍門中以有為宗故先舉舍那之主有后舉阿閦之主有故云此彼也今𥸩二門之中並彼此此彼隨何自在無別義也且從一冝有不同耳法界義海章二門並云彼此故厼也主之伴其必相見者舍那為主余佛為伴義也伴主亦爾者余佛為主舍那為伴義也問前九門舍位相攝是各遍者明一主一伴不俱之義諸位相資是共遍者明一主一伴相見之義此中二主二伴不俱之義是各遍者為即門耶不答隨相而説二主二伴不俱之義是各遍者即門義也一主一伴共遍者中門義也謂神秀公他化自在主伴無得觀云一為主不得更有主伴亦爾者如光明覺品此處佛會中見余佛會何得主伴主伴相見耶答彼約相入門故有此相即義故隨門取故已上此義者約相入門故主伴相見約相即門故主伴不俱是故二主二伴不俱者即門一主一伴相見者中門也然而主伴門中門別故非是一向二主二伴不並則即門一主一伴相見則中門也問清涼云相資門中立有力為主無力被攝為伴已上主伴相見者似是中門耶答此亦不定故非是一向主伴相見為中門故無難也若爾難者一乘三乘主伴相成者一乘為主三乘為伴此亦中門耶又所訂主能訂伴者此亦中門耶又𥸩經意第八云約用有有力無力故有相入門約體有空有義故有相即門相閞攝故有主伴無得已上若主伴相見是中門則應云有力無力故有主伴相閞攝故有相入何故不云耶義海云主之伴相資相攝若相攝則彼此㸦無不可別説一切若相資則彼此㸦有不可同説一切已上主伴者是須中即之法位非即是中即也是故主伴共遍非是一向中門義也料簡相入門云即此花葉舒已遍入一切法中即攝一切令入己內舒攝同時無障得也主伴門云此圓教法理無孤起必眷屬隨生下云此花有世界海塵數蓮花以為眷屬若主伴之共遍是中門者主花即有力眷屬花即無力耶而不爾故主伴共遍非是一向中門也就牒前九門事中如舍那為主等者正牒前九門若約苐十門應云如阿閦為主訂處為伴無有主而不具伴故阿閦訂處同遍法界設於東方訂法來處彼有阿閦還有東方而來作訂等也問如舍那為主訂處為伴其義云何答一云㸦為今𥸩約融義謂若第二會為主之時十方各從百剎以外而來作訂若此主舍那之花藏剎以向東融遍故當於東方百剎以外法雲世界妙德佛所而法雲世界妙德如來亦向東融遍還自東方百剎以外而來作訂西方法雲世界妙德如來亦向東融遍故當轉在於本舍那花藏之處而來作訂向東方既爾余方亦然故也一一具具者此方為主時十方各從百剎外而來作訂是則主伴具足故是一具也又此舍那花藏融遍故向東轉在百剎外時又於十方各從百剎外而來作訂是則主伴備具故是一具也如是等比之於鉢要具大小及匙筯等方名一具也遠近皆同者一云百剎以外來者則遠百剎以內來者則近如是等也今𥸩非約一會訂成論遠近通約諸會故是故若第三會則百剎外來若第四會千剎外來乃至性起品則八十不可説百千億那由他世界外來是則第三最近後後漸遠性起則最遠如是等故也演經時第二於中二先此假別序后初唯下正宗初中常恆之説等者約前際則盡無始過去際后際則盡無終未來際究竟決定無有不説此法之時則揔舉普法説時之長遠也況念劫圓融者非特長時恆説一一念攝多念一一劫攝多劫等於中而説則揔舉説時之圓融也是故常恆等者敘初三假之意況念劫等者敘次下諸假意也今略舉短修分齊析為十重者初則最短二則次長三則最長等如是從短至長説十門故也是故卷則一念舒則至七日乃至三際就於此中以劫攝劫以念攝念劫約如是圓融義辨也如是雖辨十門卷則唯七日又揔此則唯一念也正宗中先正辨后問答除疑也前中三初列名次初唯下依名別𥸩后於此無量下結也別𥸩中初唯一念者第二七日中初日旦一念耶最后日旦一念耶答若約詮相則初日旦一念也約實則第二七日具多念於此多念隨何所舉云一念也謂約初起説之一念故云初旦一念然舒此一念故次盡七日又舒此七日故遍三際是故云第二七日具多念故隨何一念説也剎那者仁王經中一念有九十剎那一剎那有九百生滅已上念則長剎那短也此中念剎那不異謂牒初一念云於一剎那故也俱舍論云剎那者或有動法行度一極微頃又對法諸師云猶如壯士疾彈指頃六十五剎那也又頌云百二十剎那為怛剎那量臘縛此六十此三十須此三十晝夜三十晝夜月十二月為年於中半減夜須者牟呼栗多也如前無盡之處者指前説處也頓説等者若初會説花藏果第二會説正報果此后漸次説五位因等則非頓説也然而不厼七處八會無盡之法一念頓演故厼云也二盡七日此章盡七日唯一念清涼所立何別答彼云今別現是初成佛時亦彰大聖出現時也此教勝故衆教本故在於初時初言尚揔幾日之初九會之文同此初不略為三解一約不壞前后相説才成初七説前五會第二七日説十地等第九一會乃在后時以祇園身子皆后時故常恆之説不防后故雖能頓演有所表故初五信解行願最在初故皆云不𮥷道樹第六會因地訂位居其次故無不起菩提樹言法界訂極最在后故亦現二乘絶見聞故雖異處異時亦不相𮥷為寄穢土以現淨故須前后耳若爾世親那云初七不説但思惟行因緣行耶世親才見十地即為論釋或則未窮廣文或則知見有異未全克定菩提留攴大意同此二順論𥸩九會皆在二七日后二七非久亦名始成三約實圓融𥸩皆在初成一念之中一音頓演七處九會無盡之文海印定中一時現以應機出世機成即應應則有説無非時失故祇園身子蓋是九世相收重會之言亦猶燈光涉入演義云初言尚揔下假問徵起此有二徵一徵初遠近二徵初通𢩁疏略為三解下第三解𥸩些一捴摽三義即為三別三解之中初之一解徵初遠近近在一念答初通𢩁𢩁初五會苐二解二七之后而通九會第三解取前師一念之初取后第二師通於九會云云三約實圓融則藏和尚義已上若約此文則初準一念者始成正覺日之一念二盡七日者可是初七日也然演義云二盡七日者謂初成道一七日中自受法樂第二七日頓演此經已上故疏中雖有三説然約順論𥸩則清涼之唯一念盡七日章主之義同也問此經七處八會者就第二七日中初日在寂滅道場説初會法第二日在普光堂説第二會法苐七會法如是乃至第七日在祇洹林説第八會法耶答一云始自初日頓起七處八會之法盡於七日説也一云初日在寂場説初會法時遍后六日説第二日在普光堂説第二會法及第七會法時亦遍初日及后五日説乃至第七日説第八會法時遍前六日説也今𥸩以七日配七處難也是故於一念中頓説七處八會法也隨文疏云二攝前后者有三重𥸩一於此二七之時即攝八會同時而説若爾何故會有前后答如文讀時前后與之同時問若爾云何重會得成答重亦同時以無得故如燈光涉入等余不動外天準𥸩可知已上故知一念頓説八會也佛初成道第二七日者儼公云初七日得道之始第二七日現世之初章主云初七日現世之始第二七日説法之始何故不同耶答章主意則初七日於道樹下成正覺於第二七日説法故也儼公則初七日菩提樹下雖成正覺人皆不知至第二七日説法之時方知有佛出現故也三遍三際者如不思議品者大力那羅延幢佛所住法文也四攝同類五收異劫已上二假文現可知六念攝劫問此之十門從短至長何故以劫攝劫然后方説念攝劫耶答前明以劫攝劫今此諸劫皆具多念一一念中攝無邊劫則長於前門故不違也此中先一念攝無量劫后如是念下念念攝無量劫謂過去際未來際皆具多念無量無邊不可説也如是一一念中各攝無量劫海也七復重收已上並約同類界時也八異界時中時劫不同分齊各別者異類界之衆生所感時劫長短分齊各別也九彼相攝清涼云彼此相攝者約同異類界時劫相攝也亦各別相收或㸦相攝者演義云九彼此相攝者即彼異類界所有時劫亦各別相收或異類同類界時㸦相攝入若念若劫重重無盡同前四五六七已上若約此意𥸩此文者樹形界時劫攝樹形界時劫河形界時劫攝河形界時劫等者各別相收也河形界時劫攝樹形界時劫樹形界時劫攝河形界時劫等者或㸦相攝也又一義者無問河形樹形於異類界中具有長短時劫此長短劫長攝長短攝短者各別相收也長攝短短攝長者或㸦相攝也無盡同前者指同前之四五六七四假也亦二義𥸩若后義中長攝長短攝短者是各別相收故同前第四假也長攝短短攝長是㸦相攝故同前第五假也若念者六念攝劫之念七復重收之念也若劫者六念攝劫之劫七復重收之劫也是故若念若劫中約念攝劫則同前第六假所攝劫中復有多念於此所攝若念若劫相攝重重無盡者同前第七假也若初義中同前義者至於若念若劫之中方同前之四五六七故就若劫中長攝長短攝短即同前第四假長攝短短攝長則同前第五假揔就若念若劫中以念攝劫則同前第六假所攝劫中復有多念若念若劫重重相攝則同前第七假也十本收末者問何本何末答一云花藏本沙婆末也今𥸩非劫是理故本劫者是事故末也謂理則平等𮥷分限故云非劫此之平等非劫之理隨俗差別依此差別以立時劫故云事也以非劫為劫劫即非劫者以一乘中事即理理即事故厼也念亦然者非念為念念即非念也問百句如中云日如月如故只可云劫即非劫何故云非劫為劫耶答且彼經文劫即非劫門中所説故無難也以時無長短𮥷分限故者𥸩非劫也以染時分説彼劫者以現非劫之劫也謂淨業之人所感淨土𮥷於三災故時劫之相不可説也是故準染業人所感之土三災時劫説現華藏世界時劫也以時無別體依法上立者一云法者理法謂依理法以立時劫理既融通劫亦融通是故此是法性融通門義也今𥸩依有為法立時分故是有為法也如依草木及日月以分四序及晝夜故法既融通時亦隨爾者三乘中有為之法既差別故依此所立時劫亦隔得也一乘中此有為法亦融通無得故依此所立時劫亦即入重重也就此義中可云以染時分説彼劫者辨第十門事也以時無別體下通結前也問答除疑中二先舉所説法問答后問若此下舉能化佛問答也初中問答為二問中一部者通舉結集之上中下三本也答意者不思議品疏云若據此文無不説之時何故乃有一部奉行答此是衆生感處故説為一部而如來説法未曾暫息以大機常感故無有開斷故已上大機所見無不説時然慈悲者為下劣衆生於無盡中略取此結集流通如是答也下劣衆生有三差別謂或聞七字題名則得一部之意者下劣之上根也或聞題名乃至淨眼品舍那品然后方得一部之意者下劣之中根也具聞八會之法方得一部意者下劣之下根也若不在此三亦不名為下劣人也此中有二𥸩先則以一部為詮見劫海説也后則一部即是劫海説也初中先法説次喻説后當知下法合也后中只此一部即劫海説此一部外更無余説也就能説佛中問答為二答中有三一云先寄法身答次又復下舉化身答后復次舍那下寄報身答也一云初實際頓次修相后則圓也初則簡於三乘之佛有涅槃故次則説三乘佛涅槃之相亦是第二七日之所𭠎故后則如常住者即是無盡性海義故也今𥸩存初義也法界品中者毗瑟底羅居士文也疏云常供塔者以於塔處常見法身故云云開塔戶見佛法身常以見佛體性無限盡故以開塔者開其事相也得定者見理性也得妙法者理中恆沙功德法也已上攝化威儀等者以攝化衆生故示於涅槃則成道説法無別是故雖是八相然三乘化身別也如常住故者一云如來二十一種殊勝功德依法身生以法身常住故二十一種功德亦如法身而常住也一云感花藏之衆生見常恆説是故如來亦如機而常住也一云所詮章云或説𥸩迦報土在靈鷲山如法花經云我常在靈山法花論主𥸩為報身菩提也當知此約一乘同教説何以故法花中現一乘故其處隨教即染皈淨如菩提樹下説花嚴處為蓮花藏十佛境界則法花亦爾漸同此故已上如於法花報身常住之義故也問説此經佛即十身佛何故約三身𥸩耶答若隨相説不得三身故不違也説經佛苐三問何故此假無別序耶答實有且略耳是故清涼云夫真身寥廓法界合其體包羅無外万化齊其用窮原莫二執迹多端一身多身經論異説今説此經佛為真為應為一為多已上故知厼也問答為二初中先正問后設爾下過難也正問中盧舍那者疏云今勘梵本云毗盧舍那盧舍那者此云光明照毗者此云遍是謂光明遍照也光明有二種一智光二身光智光亦二一照法謂真俗雙鑒二照機謂普應群品身光亦二一是常光謂圓明無得二放光謂以光驚悟此中遍者亦二一平漫遍無得普周故二重重遍如帝重現故此二圓融各全體遍非是分遍此中身智無得故身光即智光二遍無得故平漫遍即重重遍光遍無得故光明即遍照遍照性開覺是故名為佛此明下文世界海等諸事一一皆是稱性緣起無得𮥷暗覺照稱光無不普周法界名遍此舍那佛非𢩁報身以通器三種世間具十身故已上如前無盡時處者時則前之十重説時處則名體異之余佛義中約前九門也今𥸩亦通前十重説處也問以舍那名説則前九門辨以余名説則第十所辨此是所立之義今此既云舍那則唯約前九門耶答第十異名之余佛非是他佛是舍那之異名佛也是故此中言舍𮟯時通舉十門佛也若舍𮟯身唯𢩁前九門則此下身雲差別名號不同者此亦𢩁前九門耶既云名號不同故知舍𮟯身上具足十門佛也此中且舉舍𮟯名故如是論也若舉異名佛應云説此經佛阿閦之身説此經佛寶相之身等如是之時皆具前十門佛也與過難中若是一身何故一切剎中各全現耶者光明覺品云如此見佛坐蓮花藏師子之座有十佛世界微塵數菩薩眷屬圍繞百億閻浮亦復如是已上將此經意如是難也全現者簡分現也非是唯現一手半身面相及足等於百億界中一一皆現全身故也若是多身何故經云而不分身者指性起品及淨眼品文也答中三先揔答次今現下別現十無得后如來以自在下結也揔答中有六句初一句通答次四句別答后一句現深也初句中既舍那身雲無障得故具下十無得也次四句中初二句答第三問次一句答第二難后一句答第一難也此中意者清涼略䇿云問去住不同人天處別如何經説不起覺樹而外三天答法性寥廓緣起難思我佛世尊融法界以為身揔緣起而為用體用無得一多自在不分而遍不去而周感而遂通見有前后閻浮有感見在閻浮天宮有感見外天上非𮃆覺樹之佛而外彼天故法慧菩薩云佛子汝應觀如來自在力一切閻浮提皆言佛在中我等今見佛在於須𣃥頂十方悉亦然如來自在力明如去住皆物見也請以喻現比如清江一月三舟共觀一舟停住二舟南北南者見月千里隨南北者見月千里隨北停舟之者見月不移是為此月不移中流而往南北設百千共觀八方各去即百千月住去見殊諸有智人自曉玄二日已上準思之后一句中以如來身無所不遍故不能思則甚深義也菩薩尚不能思況於二乘及人天耶此約攝論二十一種功德中不能思身也別現中先列名后依名別𥸩初用周無得二先正𥸩后引證也於上念劫剎塵等者指前時處也周側如上一一塵剎一一念劫攝生威儀等者若具説則應云周側於一剎一劫中攝生威儀或現八相等如一剎一劫既爾余諸劫亦爾如一剎中劫劫既爾余剎中諸劫亦爾剎中既爾塵中亦爾故周側於一塵一念攝生威儀或現八相或三乘形等如一塵一念既爾余念亦爾如一塵念念既爾余塵塵中念念亦爾如是具説今且略説也攝生威儀者揔也清涼云或攝生威儀或八相等已上此則攝生威儀亦是別也問取何義而為別耶答約行住坐臥四儀故別也此中既云盧舍𮟯佛於一塵中示現十佛世界微塵數等多威儀路以攝衆生已上故現八相現三乘等皆是攝生威儀是故揔也五趣身等者黑象腳身樹神等也或六塵境者香積世界食香飯而三昧現極樂國土聽風柯而正念成等又寶性論云諸佛如來身如虛空無相為諸勝智者作六塵境界示現微妙色出于妙音聲令佛戒香佛妙法味使覺三昧人知深妙法細思惟稠林佛𮥷虛空相已上引證中先舍品后淨眼品也二相遍無得前則一重無盡業用今則前無盡用中舉攝余約余亦爾也於上一一等者牒前也各攝一切用者既云各攝可云相攝無得何云相遍耶答若約能攝則可爾今約能遍故人也如是一切自在無得者約八相則入胎相中具攝余約三乘形則菩薩中具二乘約余亦爾約則天趣中具余趣身余亦爾約六塵則香塵中具故也經微細者指苐九回向微細處也三得前唯約用此通寂用三先自意𥸩次引訂后喻也雖現如是無邊自在者牒前二假也不作意則是寂而不得起用也四依起無得前唯約起此通依起二先自𥸩后引訂也初中如此所現者牒前三假也皆依海印三昧者與前寂滅無二三昧何別答海即是所依之定也寂滅無二三昧者但取業用則無功用之義故屬能依用中見也經者賢首品也五真應無得前唯約應此通真應先正𥸩后引證初中即此應現無盡身雲者牒前也即無生滅者真也不得業用者應也經者舍𮟯品也法身則真現十方則應也如此真應下章主辭也理事者理真事應也六分圓無得前唯約圓此通分圓正𥸩引訂也訂中先正訂分圓后又如法界品下對因現也正訂中二先如來毛孔現自化身也后亦於毛孔下現他佛身中先橫論則現十方佛后竪論則現三世佛也是故應加云盡未來際一切如來也經偈者淨眼品又如法界品者普賢知識文也菩薩毛孔尚如是現況於佛耶七因果無得前唯約果此通因果正𥸩引訂二也先現自往因后現他身雲經中者舍那品也八依正無得前唯約正此通依正先辨相作后亦潛身下辨潛入也初中先正𥸩后引賢首品也潛入中先明佛入塵毛次又彼所入下辨攝所入剎在於毛孔也后又如來下還現自身於身內剎也初中二正𥸩引訂也一一微細等者非是佛身小處小現大處大現雖是塵毛微細之中皆全全圓滿現也經云者舍那品也次所入剎在毛孔中二先正明后普賢下對因現也經云及普賢亦云者並舍那品也九潛入無得前則約佛及器今通衆生世間先正辨潛入次又亦揔攝下攝入無得也問若爾亦有攝入何故唯云潛入耶答雖攝衆生在如來身而衆生不知故唯云潛入耳故清涼云𥸩有二義一明佛入衆生二亦攝下明衆生入佛皆衆生不知故云潛入演義云又亦攝下上辨潛入今明攝入已上故爾也經云者淨眼品善化天主偈也十圓通無得前則別辨今通約前九揔明無得先正𥸩后同一下結也即理即事者同法身故隨緣現現故即一即多者法身一故應身多故就應身中此方為一他方為多也即依即正者於十身中國土身故如來身故即人即法者訂法成人故以法為身故即此即彼者不移菩提樹而恆在他處故遠在他處而恆在樹下故又此娑婆舍那佛即是妙喜世界阿閦佛故或反此故即情即非情者異草木故同色性故作河池等故問前依正何別答依正則約所依之土能依之佛今此無問染淨但約色心𥸩故別也即深即淺者蘊界入等若虛空故深即廣即狹者無不包含故廣又量同空故廣𮥷空相故深即因即果者因無異果之因果無異因之果故十身之中有如來身有菩薩身故即三身即十身者若約佛身上十身者頌曰菩提願化力意化相好勢德通報化法即法身智通三是故即三是十即十是三也若約融三世間十身者頌曰如來與智通三身法與虛空唯法身余之六身唯化身也佛身大義具如中卷章第八第十門也説經衆第四別序正宗二也初中衆海者非唯數之繁廣一一皆悉智慧深奧廣大如海故也豈塵算能知者無量世界盡末為塵以塵為算亦難數故正宗中先列名次依名別𥸩后以前十類下結也別𥸩中一果德衆者此是舍那別德衆故與舍那佛同一體也問若爾后九類衆亦是舍那別德何故不名果德耶答別德之中有因有果故后之九門是因門之德耳問舍那海𮟯定中所現別德之衆故十門並是果德何故云因德耶答此義可許然疏云準此經文阿難海是大菩薩能持大法理亦無違若依圓教並是舍那海三昧內現此傳法之人故亦即是佛也已上則果德亦得也又三種世間十種普法皆是海所現是故因果之法無不海中現故具因果亦得也又疏初約百二十衆辨因果云若一乘中或皆是因以未是佛故或俱是果以並是佛海中現故又乘解脫力入佛海故或通因果由前二義故或俱非因果以𮥷性平等故已上準此則約十類衆論四句得也問此十類衆與百二十衆有何別耶答百二十衆是序分中衆故無訂法所益及果德衆此中具三寬狹可知問此之十衆為別相續耶為一相續耶答一云如前初則是佛苐三則異生苐十則二乘如是故非一相續也問隨文疏百二十衆中三定器者汍論列衆有三義一是當機二是影響三是寄法今此通三已上故一一衆中皆具三義也雲集品疏云有三類一助化衆謂十方菩薩影響如來二表法衆諸首諸慧諸林諸幢等各為寄人表法也三當機衆諸教所被等此通三也已上此亦一一皆具三義故淮此則可云一相續何云各別耶答此上衆中或有當機或有影響或有寄法故云通三非是一人通具三義故相續各別也一云如后謂疏云通三者一人通具三義故也今𥸩約隨相門苐一苐十則聾盲二乘果人故相續別也中間之衆一相續也若約實則無盡法界同一相續故十衆並是一相續也然約緣起道理須一相續時一相續亦得若隨詮相於十衆中須別相續時別相續亦得也問百二十衆中今此通三之義如何會耶答或具三義或無三義或唯當機故云通三耳此三類者始自遠公所立於百二十衆中第五會升天品五十二衆者闕三義也雲集品衆中具三義也此十類衆者所益則唯當機也現法衆果德衆則於三類中不立也問此所益衆疏初當機何別答約第三會雲集論當機三義者是則依序分此所益衆者依會會得益之文故詮相即別然會初表法之衆至於會末而得益故是一種也問此中果德衆與佛花嚴定中為果德衆説果德之果德何別答彼則約背機門此則約向機門故別也問共説花嚴者能加衆則唯加無説何故云共説耶答共加之義是共説也苐三會加分疏云欲現一切佛同説是以承佛神力此法慧説即是一切佛説也已上所以加者為現一切佛同説故不違也二訂法者此約果訂第八約因訂故別也此中引發心品性起品𮥷世間品也諸會訂成頌曰賢首發心𮥷世果住行向地並因訂性起一品因果訂初后二會揔無訂問賢首亦是果訂何故此中不引耶答一云訂成中有主伴訂成有讚述訂成今此所引是主伴訂成而賢首則讚述訂成故不引也一云實引且略也初義者舉佛名世界名證者是主伴訂成賢首品中但云十方諸佛皆現賢首前嘆言善哉賢首善説此法不舉佛世界名故爾也然此義中可云對所訂主則能訂並是伴故若是能訂無不是伴則賢首亦是主伴訂成也然訂成中有具主伴而訂成者有唯訂成不具主伴者今此所引三處則具主伴及能訂義也若賢首則唯有佛之訂成義故也后義者賢首是果訂故實引然引三處文時義已現故且略也皆云我等諸佛為未來菩薩等者一云既十方亦爾之次仍有皆云我等諸佛之言是則十方諸佛之皆云也則皆云者唯𢩁性起品也今權性起品發心品皆有我等諸佛為未來菩薩護持此法令久住世之言此則一方訂成耳十方訂成中無有此言是知章主約二品中一方訂成之言合而言之故言皆云也此經住世皆是佛力者𮥷世間品亦有我等諸佛護持此經等言故通結前三品也有云賢首品無有我諸佛護持此經等言故不引也然此中以果人訂成為宗故實引且略耳二常隨衆普賢等衆若望勝音等則是外眷屬然望他方來集衆故云內眷屬也雖是初會所列通遊八會舍那佛相隨不𮥷故舉三乘舍利弗等常隨𥸩迦為同法喻也千二百五十人者十二遊經所説也三嚴會衆此亦初會所列然通遊八會而莊嚴也若依周本經則有卅九類也並是道力隨緣殊形異現等者此之神天皆佛境界然現鬼畜等種種之形莊嚴海會是故疏云或俱是果等四句如前引也余宗是化者攝論云受用土中悉無此等衆生欲令淨土不空故化作如是雜類衆生已上三乘淨土欲現不空化作雜類衆生故是化非實也此中是實等者若此宗中神天等衆並是海所現實德攝故是實非化也問此辨娑婆之衆何故引三乘淨土不空之義而對辨耶答此非娑婆穢土之衆也為辨花藏佛境界衆故爾也是故疏云乘中佛在花藏界菩薩雜衆或並是實以是海定現實德攝故或俱是權以隨緣而現故已上雖是穢土若説華嚴時當處是花藏是故此辨花藏之衆非娑婆之衆也此中應有或俱是權隨緣而現之句然對三乘化現故唯辨一乘實德也然前之並是道力隨緣之中義已現故略也問疏中云菩薩雜衆或並是實以海定現實德攝故或俱是權以隨緣而現故已上則此之十衆可通此義何故唯嚴會中辨權實耶答此亦欲簡三乘淨土中菩薩衆則實雜類衆則變化之義故爾也約實十衆通權實也能問現示大法海者一云列衆之所以也今𥸩是實非化之所以也以海中現實德之衆故方能問現大法海也問疏云有煩惱染業入九境自外入聖境已上此嚴會衆當於何耶答是佛境界衆入聖境中見也三乘中神天等入凡境中見也問此衆是飲血噉肉鬼畜之相何故云佛境界衆耶答不動飲血噉肉之相即是佛境界也又疏中明其位若三乘此普賢等皆是十地以上彼神王等多分是隨類生攝即是八地已上若一乘中如緣起際諸位皆齊是故一人具五位位位皆遍收已上也問諸佛菩薩隨類變化之身實業所感諸神王別耶答三乘則別一乘中約此實業所感雜類衆生即是諸佛菩薩隨緣所現之身亦即是舍那別德更無別也四供養衆如第五會云云梵王而圍繞之者若唯經文則不如是説也然五十八衆中初三十四衆是人天衆次十四衆是菩薩於中舉菩薩之上首云百万億菩薩在前立侍又舉天王之上首云百万億梵王而圍繞之等則章主以意引也問此中云彼有五十八衆初會疏云苐五會外天品內五十二衆已上除何等耶答此中直隨經文辨也第五會疏云色界天等然余處説於四禪天中各有三天此各四者皆一是揔余三是別故謂初禪中梵眷屬天二禪中光天三禪中淨天四禪中密身天此各是揔故不同也已上初會疏中於四禪天各除揔又百万億諸天百万億種種天者牒前所説故亦除此二故云彼有五十二衆也又無量阿僧祇等者彼云爾時兜率天王不可計阿僧祗諸天子奉迎如來等已上引此文也五奇持衆如佛高臺樓觀者疏𥸩云高臺之內所有樓觀也又高臺即樓觀也若約初𥸩高臺也樓觀也師子座也諸莊嚴也如是各別舉也若約后𥸩則不別也依正無得者疑云若依報所攝何故出菩薩耶故遣之云依正無得也人法無二者菩薩則人座則法故若加言者亦是因果無二謂菩薩即因高臺等即是果故然次下現故略也又表從訂起教者眉間表中道白毫表訂道白淨法故訂勝言是教也白毫者疏云依觀佛三昧海經大子時舒長五尺樹下長一丈四尺五寸成佛已放之長一丈五尺圓卷如秋月分明皎潔云云初辨所坐蓮花是所詮義二現音是能詮故坐花者稱義施教也蓮花者開敷故出三乘水故不染故衆聖蜂所採訂故云云此並是法門若約三乘託此事別表法然彼事非即此法一乘即彼事是此法仍有事現現也若依一乘此菩薩即名見教體人法無得故現教圓故具主伴也順理故敬繞也二明稱義故坐臺鬚也已上六影響衆如影隨形如響應聲如來興現欲説普法十方菩薩來影響也影不異形響不異聲是故要是極位非下位也且如上方等者問十方菩薩並是影響何故偏舉耶答經中唯説上方菩薩毛孔中攝法界事故偏舉之以例余也問何故此中偏引初后二會表法衆中引余會耶答一云若興供具來集則是影響也若無供具名表法故也今𥸩諸會之衆通具助化影響當機等三義如雲集品疏中今此且約一義引也七表法衆問此衆亦是極位菩薩何於影響唯云極位耶答實爾然諸首表信諸表解分齊各別極位相隱唯影響衆極位相現也此衆亦具影響當機之義而普賢等實是果人欲助化故現菩薩相故非當機不從他方來故非影響普賢之名非𢩁某會某法故非表法是故名為常隨衆也八訂法衆此訂成者結通內訂成耶結通外耶答一云內也疏中主伴無盡科云一一會一一品一一法皆結通十方如此間説十方虛空法界一切世界乃至一切塵中亦如是説此結主經也又彼一一會等皆有他方塵數菩薩來訂法此結伴經也已上牒前結通中十方虛空等云彼一一會故從結通內一切會還來訂成也今𥸩結通外也謂一訂一切訂門一説一切説門各別故也問主伴無盡科文何會耶答彼一一會者是所訂會故不違也九所益衆天王天女等者且舉第六會聞前地法請后地法人也發心品者彼經末云説此法已有万佛世界塵數衆生聞是法已皆發阿耨多羅三藐三菩提心我等諸佛授此人記疾得成佛名號淨心等十方亦如是已上意欲通引結通之益故云十方世界一一各有也性起品者彼經云時百千佛剎微塵數等菩薩得菩薩一切明一切三昧受一生記當成阿耨菩提一切佛剎塵數衆生成佛道悉同一號號佛勝境界乃至云如此四天下所度衆生十方無量阿僧祗不可思議不可稱不可説法界等一切世界所度亦復如是已上此中文勢先舉結通十方并引此方所益二莭之文也謂欲引初莭百千佛剎塵數等菩薩之文故云又云彼一一世界中復各有百千佛剎塵數等也欲引后節一切佛剎塵數等衆生之文故云十方虛空法界等一一各有一切佛剎微塵等衆生也欲引結通文故云十方虛空法界等世界一一又云彼一一世界等也第八會初等者本會頓訂之衆也十現法衆無有結通者以二乘是此一方衆故問祗桓林佛會遍法界時此衆亦隨遍耶答雖遍法界然此方二乘他方二乘別故經無結通也相違因者疏云文殊行經云五百聲聞聞不信受何故今此揔不聞見答彼是三乘逐機説令得故亦聞今此一乘逐法高出故不能聞其猶重陽麗天荐雷振響蟻子等類不能聞見若全無器前不能同念若有器何故今乃示之不見答有怖法心故前能同念眼未開故示之不見云云又不見菩薩所由經文有七一不求通明二不修彼善三不生彼願四五不知法空六不入彼位七不得普眼云云問若爾二乘應非法界所攝答法界廣故攝於二乘二乘狹故不攝法界問緣起一塵猶能攝於一切何故二乘狹而不攝廣耶答廣狹相攝是菩薩所知二乘無此故非此攝問二乘豈不是菩薩所知法界何故不攝答是此攝故彼不知見問若是此攝應得知見如菩薩衆答法界緣起有二門一順緣門如成法因等即佛菩薩要是知見方得攝耳二違緣門如相違因等即二乘衆要不知見方乃攝耳此二緣門望所起法悉有功力是故同此緣起所𭣣見不見異問若爾凡夫外道亦是違緣何不此攝答彼無德人不堪於此如聾故設余聲聞猶恐不堪是故要以鶖子等類諸大聲聞方現法勝是故辨之問此聲聞等得此法不答並得法何以故以如聾音入緣起故以此為得問若得應知見答若知見即不得以非是相迸緣起攝故不名得也菩薩不同故不例也問二乘高德尚如聾如今凡夫豈得受持答往昔凡時不受持故今時對面如聾如今若不受還亦同彼是故只為高德二乘如聾如盲故須受持增長信力令后得之已上準之就結中疏云若三乘中但是寄人現法仍人非是法若一乘中此等諸人並是法界緣起法門又此一衆通三世間以或作河池井泉等國土身等可知已上説經儀第五別序正宗也初中施化万品者一云施於万品則機之万品也一云施化有万品則法化之万品也正宗通論中前八中初一口業次五外五塵次一內六根后一四儀也問此十儀式於同異類界如何分耶答一一並通然約相分者初一同類界儀次七異類界儀后二通於同異類也或現妙色者惟摩經云佛以何説法以妙色説故奇香者惟摩經云以奇香化故此經小相品香雲普熏如下滅障益中所引也上味者香積世界食香飯悟無生也具足優婆夷以小器食給施一切疏𥸩云只是一器食融同法界無得緣起機無不應應無不益益無不稱本位法界也妙觸者婆須蜜女摩觸嗚口皆得解脫等普賢菩薩摩善財頂善財即得𭎇數三昧等法境者法塵也有通有別通法塵者意識通緣五根所對故別法塵者唯除識蘊受想行蘊及法處所攝五色六無為也內六根者不思議品云以耳入作鼻入以鼻入作耳入等四威儀者行住坐臥也如𮥷世間品弟子人物者如勝音菩薩即是教體等一切所作等指余不説也別現中先辨音聲十義次引訂現成十之所以也后如音聲下例余也一如來語業者口業也二毛孔等身業三光明等意業也菩薩亦爾然此十並口業也以此並是如來口業説法故謂供具中説偈而智論𥸩為口業説法準此則毛孔光明出聲説法並口業也然佛菩薩毛孔光明説法之事經中相現故各開耳如來語業等者僧祗品小相品是佛自説故引舍那品者訂第二第三也同如法界品者前引花嚴后引密嚴故望后密嚴欲令隔異故云同也問衆生及剎何故不開分圓耶答實開也是故清涼云今此能説通三世間開即為五謂佛菩薩聲聞衆生及器更開為十謂三世微塵毛孔器及有情各有分圓故毛孔微塵即是分説此上諸説通三世故已上爾也問衆生及器佛力加説耶實自説耶答三乘中但云以佛神力令其説法故是變化也一乘中三種世間是一身故剎説衆生説即是佛説佛説即是剎説衆生説也又一乘中緣起之法法爾如是皆具三業各自説法故實説也今言令諸剎海出聲等者此中欲辨如來説法儀式故須爾也又雖以佛力加説亦是法界緣起法性如是故三乘別也是故三乘中有二種説法謂相説法音聲説法也相説法者見八尺柱生八尺解見一尺瓦生一尺解等也音聲説法者神力加被令出聲説也一乘中一切諸法以法界為身故自具廣大三業各説法也疏中𥸩菩提樹等皆具三業經中大光王處諸草木等亦皆禮敬等此義也問非情説法如何見耶答古人云欲知非情具三業説法者要須自作非情然后可見也此義者情即分別無情即無分別故得無分別同於非情方知非情之説法也問若非情能説者能聞之中亦有非情耶答道申章云木石等具三業故菩提樹能説法者能聞衆中何不列樹等但列有情衆耶良圓師答且依相故衆中不列實言樹等即是佛之行德故樹説法問佛但化衆生亦化器耶答以相但化衆生世間以實亦化器等已上準思可知也一切法中皆出聲説等者清涼抄云廣則無量法界品中類非一者法界品中略五類法界皆有説義五類之內一一復多故云無量言五類者一法法界二人法界三俱融法界四俱泯法界五無障得法界初中有十一事法界二理法界三境四行五體六用七順八逆九教十義二人法界亦有十門一天二人三男四女五在家六出家七外道八諸神九菩薩十佛又事有多事天有多天神有多神百一十城三千知識等故云類非一也已上一切説義也彼品者舍那品也次前假引舍那是故望前言彼品也苐六假引面光集衆文此中引正法海文也第八假彼品者亦舍那品故前云也此假引面光雲集中供佛假以雲自在供佛中文也示經教第六別序正宗也初中窮法界者所説之法界也既盡如來無盡辨力者能説之辨才也各遍虛空等者現能説之廣大也先橫盡十方后竪盡三際竪中應有盡過去際之言然無間斷常説之義於未來際中增故隨便且舉耳頓説者橫盡也常説者竪該也時處既其如是無邊故所説之法亦難於部柣也正宗中先列名次別𥸩后無盡教海下通結也初中料簡云一恆本經二大本三上本四中本五下本六略本等問此中十經幾是前九門佛所説幾是第十門余佛説耶答初七經者是前九門佛説第八第十經通十門佛説也苐八經云謂舍那佛所説花嚴雖遍法界然余佛所説之經㸦為主伴已上第十經云此上諸本揔混同一故爾也初異設經者異則樹形等異設則應機施設恐有謂言何知舍那於異類界亦普應説故引舍那品訂也問清涼云又上十處共為緣起舉一全收前一一時皆遍此諸處又隨一一處皆具前前時頓説此經已上同類界衆亦聞異類界中説等耶答雖同異界別若普賢機必盡能化無邊分齊故通聞也正為文云何故此法非余境界答以盧舍那周遍塵方普應法界一切群機若彼別機稱自根器但各見己所見聞己所聞皆不見他所見不聞他所聞此普賢機乃見一切所見聞一切所聞皆盡盧舍那能化分齊故云普眼境界也是故普別二機感普別二法各不同也已上別機則各各別聞普機則一切普聞也又非唯見聞一佛遍説普聞余佛各遍法界説也二同説經以同類界中之所説故引證中引不思議品阿僧祇品者同是音聲説故也悉以毛端周遍度量一一毛端處於念念等者且約一毛端之所入處則以一毛入處中於一念中化不可説不可説佛剎塵數身一一化身有不可説不可説佛剎塵等頭一一頭有不可説不可説佛剎塵等舌乃至説不可説不可説佛剎塵等句身味身如一毛端中一念既爾余念亦然如一毛端中念念既爾余一切法界毛端中念念亦爾故難知分齊也且舉客毛之處量其分齊故云以一毛端周遍度量也此中有十種無邊謂一一毛端者處無邊於念念中者時無邊塵數身者身無邊塵數頭者頭無邊舌無邊聲無邊修多羅無邊法無邊句身味身無邊復不可説不可説等者異句身味身無邊故有十也此中法無邊者是所詮句身味身者是能詮也問句身昧身聲無邊何別答聲者從種所生故也句味者是聲上屈曲故假也名身略也問異句身味身者異類界色香等説耶答約同類界於一種四諦若諦名中此閻浮則同余四天下則異也就閻浮中五言殊漢地語別是故圓音章云如婆沙論説世尊有時為四天王先以聖語説四諦二王領解二王不解世尊憐故以南度邊國俗語説二天王中一解一不解世尊復以蔑戾車語説四諦時四天王皆得領解已上故同類界中亦多種語也音聲充滿法界衆生無不聞者不簡衆生聞不聞如來圓音無不普被何者十佛圓音非但應放堪聞之處亦普應於不聞處也是故風水之聲鳥獸之語皆是如來轉法輪聲若大機則恆聞一切當説遍説若別機則雖不能知一切音聲是十身佛轉法輪聲亦無不聞是則如來圓音一切皆聞令其暗學也無異者無變異也無斷者無間斷也阿僧祇品説衆生依者依報也問料簡恆本訂中引此不思議品解云此通樹形等異類世界各毛端處念念常説無有休息已上故此文可通訂異設經何故今此偏於同説中引耶答料簡合此同説異説為一恆本是故約同異界諸毛端處遍説無盡之義為恆本時云通樹形等非謂音聲説法通異類也法輪者疏苐三𥸩云法是軌持義通有四種謂教理行果輪是所成義亦有四一圓滿義以𮥷減故二具德義以轂輻等皆悉具故三有用義以摧輾惑障故四動轉義謂從此向彼即從佛至衆生故亦從彼向此即從衆生向佛果故又輪是喻況如聖王輪寶故體性者通論教等四法為性尅性唯八正道為性以戒為轂謂正語業命以惠為輻謂正見正思惟以定為輞謂正定余念精進等為莊飾此約小乘初教同此又無分別智為法輪體又唯真理為性此約終教或理智俱泯教果亦亡𮥷言絶慮為法輪體此約頓教或通攝無盡法界謂人法教一切自在法門海並為法輪體如帝重重具之主伴等此約圓教又若依一乘轉無盡稱法界法輪所被機同一法界無二無別法爾常恆無新辨益已上也三普眼經即料簡大本經也問大本恆本何別答寬狹別也恆本則通於同異類界説大本則唯同類界説也恆本則通一部大本則唯𢩁法界一品也恆本則不可限其品類大本則有世界塵數品也恆本則不簡聞不聞常恆之説大本則海雲比丘放十二年觀大海時佛從海出所説也貞元經疏𥸩此經名云普眼者略有五義一詮普法故二普詮諸法故三得此法者一法之中見一切故四唯是十眼之所見故五非唯十眼圓明方見能所不異方能見故是義云何謂諸緣發見緣各為根演義抄云別𥸩所以如大乘以九緣發識眼根名眼今則例之眼根能發識眼根得名眼空明能發識亦同得名眼余亦例然以緣起之法各有有力無力相成立故云云因沒果中緣皆號眼抄云九緣並是因見色得名眼九緣皆見色沒果同名眼以皆全有力故云云故全色為眼恆見色而無緣全眼為色恆稱見而非我抄云色是所緣之境眼是能緣之心今全是眼故無緣也眼是我能見今全為色正見之時即非我也云云非我𮥷於情識無緣絶放尋求收万象於目前全十方於眼際是以緣義無盡隨見見而不窮物性叵思應法法而難故法普則眼普義通乃見通體之則寂寂照之乃重重斯眼所見為普眼法門也已上四上本經結集書記之上本者文殊阿難海於鐵圍山間之所結集以機無堪受收入龍宮六百余年未傳於世后有龍樹菩薩本是外道知欲是苦本生猒𮥷心依於佛法出家求道於九十日間盡誦閻浮提所有佛教因起大慢謂此佛經只此而已大龍菩薩愍其如是引入龍宮以示佛經文字浩博不可盡誦欲數偈頌又無邊涯卷帙之數亦不可得但數部類問於大龍菩薩云佛之經誥亦有幾許大龍菩薩言帝𥸩宮中所有佛典倍於此中不可説也故龍樹頌云我於四王自在處向來龍宮除難中隨分覩見契經海其數都合百洛叉故知龍樹唯誦百洛叉經出傳於世也七卷楞伽經云大惠汝應知善逝涅槃后未來世當有持放我法者南天竺國中大名德比丘厥號為龍樹龍破有無宗世間中現我無上大乘法得初歡喜地往生安樂國已上則世尊親記也六下本經十万偈者約幾許為十万耶答有四種偈一數字偈無問長行偈頌八字為一句四句為一偈一偈有三十二字也二直頌或諷誦謂不頌長行也梵云伽陀三祇夜謂頌長行也四越檀攬此云自説也后三頌者三字四字五字七字等不定也今此約數字偈數至十万也遮俱槃國山中等者演義引開皇三寶録云其于闐國東三千余里有遮俱槃國彼國王歷敬重大乘諸國名僧入其境者並皆試鍊若小乘學者遺而不留摩訶行人請留供養王宮內有花嚴摩訶般若大集等經並十万偈王躬受持親執戶錀香花供養懸諸彩幡間以時果使諸王子使入拜禮令其回向又此國東南万二千里有山甚其內置花嚴大集方等寶積等經九十一部皆十万偈國法相承傳寶守護初東晉沙門攴法領志樂大乘捐軀求法裹糧抗䇿至遮俱槃國竭誠謂檮遂得花嚴前分三万六千偈賫來至此即晉朝所譯是也已上問此下本經所有品數料簡智通問答到目中云三十八品花嚴傳孔目章云有四十八品花嚴宗要云三十六品已上而此土所傳八十卷本經者是譯下本四万五千偈也有三十九品何故本經是三十八品而譯為三十九品耶答新羅悟真和尚遣書問大唐了源和尚和尚答云下本梵經有十万偈三十八品何故新經四万四千偈三十九品者一云此乃西域相傳不可定信一云現相等五品為一品更加十定一品唯有三十五品經若未盡十万偈者應有三十八品已上后𥸩義者五十卷經有三十四品八十卷經有三十九品者就晉本經舍那品開現相等五品為三十九合此五品則三十四品加晉經所無十定一品合三十五品余三品未傳此土如是答也是則約三十八品問故如是答也孔目花嚴傳中有四十八品者十万偈非一故難定也華嚴宗要中三十六品者有本品有子品從本品數也七略本經是前十万偈中要略所出者料簡云是彼十万偈中前分三万六千頌要略所出已上何故云前分耶答一云有前分花嚴有后分花嚴此土所傳五十卷經是前分也一云既云要略故此土所傳是會會之初故云前分謂若就初會有無量數菩薩唯列二十不具列也神衆亦爾但舉其上首等法門亦爾等故云前分也楊州謝司空寺者何故或云潤州興嚴寺耶答楊州境寬分為潤州寺在潤州地故新疏人云潤州此中云楊州者從本名也寺名是道場寺而云謝司空者從舟越耳𡚳謝官是司空也於此始譯花嚴故或名興嚴寺也就旀勒問疑者花嚴傳云嘗同學僧伽遠多遊處積年達多雖服其才敏未測其淺深后於密室閉戶坐禪忽見賢來驚問所從答云誓上兜率致敬旀勒言訖便隱達多方知異人已上大乘三果者四果通於大小今簡小乘也八主伴經謂舍那所説等者就結通法中或一舍那為主一切舍那為伴或反此或不動阿閦舍那之名㸦論主伴或㸦為能訂㸦為所訂以論主伴有多種也今約后義也問此中舍那余佛第十門舍那余佛何別答一種舍那余佛然㸦論主伴之義則不定也或約具能所訂之舍那具能所訂之余佛㸦論主伴或唯所訂為主能訂為伴而㸦論主伴也第十門者從初義此中從后義故別也是故舍那所説花嚴雖遍法界者舉所訂之主然此佛之余佛為能訂伴義亦并在此中也余佛所説經者舉余佛為所訂主之義然此余佛舍主為能訂伴義亦并在此中也是故此則所訂主能訂伴㸦為主伴之義也是以舍那説經亦主亦伴者亦主則所訂主也亦伴則能訂伴也余佛説經亦主亦伴義準前也一一主經者舍那余佛經也謂約一舍那所説經結云此方品數既爾余方品數亦爾又一説一切説又余佛説經亦爾已上通望此等故也於中有三先正𥸩次引訂后此略本下舉略本例余本也如説性起品竟者舉所訂主經也十方一一各有下舉能訂伴是故知此中主伴約所訂主能訂伴義也九眷屬經一一主經必具無量方便眷屬已上前主伴經中一一主經何別答二義也一云主伴經之一一主經唯所訂主眷屬經之一一主并舉能訂伴故別也一云並所訂主也今存后義謂所訂主經有同類眷屬異類眷屬也主伴經中一一主經必具無量同類眷屬者約具同類此中一一主經必具無量方便眷屬者約其異類也簡前同類云方便眷屬耳問此前主伴經何別已上此主伴經何佛所説耶答一云唯伴佛説一云具主伴説也初義者若約主伴佛説者不應對望眷屬經問也既云此前主伴經何別故知爾也問若爾應云伴經何故云主伴經耶答亦有為主之義故爾也以對望不定故若望所訂主則可云伴佛所説然望眷屬則能訂之伴亦是主也是故此云彼經亦主亦伴名主伴經唯伴非主名眷屬經者對眷屬經故亦主然對所訂主故亦伴也若眷屬經一向伴無有為主之義故唯伴非主也今𥸩存后義既文云主伴經故也問若爾不應對於眷屬經如是問也何故爾耶答此問意者此與前主伴經之伴經何別如是問故不違也問若爾何不唯舉伴經問耶答言揔意別言則揔舉主伴意則正問伴經故也答中一前經文句必主同此則不爾者前主伴經云我等佛所亦説此法衆會眷屬名味句身此不異故爾也二彼經必結通十方同説者主伴之伴隨所訂主之一説一切説故能訂亦爾一訂一切訂也余文可知不入一切衆生手者疏𥸩手有七義一約位謂修學此經必定超出衆生境故名不入手以此非是世法攝故二約心謂若不發起大菩提心非此經器名不入手是故若不發心終日執卷未曾入手三約行謂此經是行菩薩道者之所要若起惑造業名衆生行經非彼要故不入手是則若為名聞利養誦讀此經遍數縱多未嘗入手四約智謂執見之智名衆生智經超彼見名不入手是則若受持此經執見不破元此經曾不相見是故要須違衆生見順此法者方名入手十地經云若聞則迷悶論𥸩云聞作聞解不得不聞五約信謂雖未能破見正入於此情外難思議事能決定信方名入手若不信者不名入手故法集經云是經雖行閻浮提於諸佛所護衆生中行於能信深法者常住如是衆生心手中行解云以信能採納同手義故賢首嘆信云為清淨手受衆行斯之謂也六約二乘亦不入手七約權教菩薩亦不入手以雖聞不信故唯除菩薩者既言不入一切衆生手此言有濫故今簡除前七種簡取法器則乘不思議乘菩薩也已上一切權教等者一云唯初教是權若熟頓等是實教故即是同類眷屬也是故屬主伴經中見也今𥸩對花嚴圓教故下之四教並屬權教也十圓滿經此上諸本揔混同一則圓滿經中亦具眷屬耶答此上九本捴混同一之時雖眷屬經亦圓明滿足還是主經故唯約主經之義為圓滿經也一會一品等者如理之包一一文句等者如理之遍如理之包故一攝一切如理之遍故一切入一也圓滿因緣修多羅者晉本五十五願勇光明夜神説往因中為勝光王大子名善伏救罪人時大悲深至救護彼故作如是言我代獄囚受諸楚毒若我不救此衆生者云何能濟三界牢獄云云頌中云時王用臣言如法治大子諸臣送大子至彼刑戮處王后聞此已來白大王言願聽十五日布施修功德時王即聽許令其修福業所期日已至將至刑戮處彼時一切衆悲感悉呼泣時法輪音聲虛空燈如來知衆生根熟往詣大衆所現現自在方演説圓滿經無量諸衆生悉授菩提記清涼疏云經普照因輪者謂令知善𢙣各自有因罪人惡因所招大子善因當滿故科長行經文云悲救罪人二臣議非理三請囚代命四臣執令誅五王后哀祈六王子志七大子礭救八母請修因九正設施場十如來親於中六一就戮時臨二如來降德三敬申禮請四就座談經五廣益當機六大子得法
