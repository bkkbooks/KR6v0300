body:
  text: 高麗國故法寺主圓通首座均如説第五同體能應所應者一云并取所應為同體今𥸩唯取能應也諸處同體中云本一多一則一一且多故云多一是故唯能應為同體也俱存無得能遍應之言中若略去遍字則唯是能應故爾也同體內具異體相望者同體則本來自具十德非是望於所應之十而具德故爾也異體則以是初一守於自一不具德故要望所待方具十故爾也待緣不待緣者三乘中正因以外別立增上等三若正因之一自有力故不待三緣生果之義則不待緣也正因無力要待三緣方能生果之義則待緣也據此四因果之義約一乘説則於十普法且舉人為正因余為增上緣人之一法自具十德不待增上等三緣之他則不待緣之同體也即此一人守自一位要待增上等三方具十德則待緣之異體也是故不待所應之九故名不待如是不待緣故唯能應為同體故十句章云所應是異體能應是同體也問十句章云所應是異體能應是同體非謂前異體也已上恐人計所應是異體之異體為諸緣各異之異體是故辨云此但同體內之異體非謂前諸緣各異之異體也然則所應并在同體中耶答非謂前異體者非是望上所應異體云故唯能應同體也問若爾望何云非謂耶答上云異門者同體十門是第二也望此而云非謂前異體也恐有人計異門之言謂是諸緣各異之異是故辨云所應是異體能應是同體異門是問體內第二等非謂諸緣各異之異也問若爾十句章中何處説諸緣各異之義而云非謂前異體耶答十句章則無文以義理章前説異體下至同體門問云為但攝自門無盡重重耶為亦攝異門無盡耶答或俱攝或但攝自無盡已上恐有人計此餘異門之言為前異體故爾云也此中有人難云既攝余異門無盡故同體門中并取所應為同體也然一中十有十門不同初門具十則自門無盡第二第具十則余異門無盡是故此難甚不可也問此則古辭依何云能應同體耶答同體門云所應多緣既相即入令此多一亦有即入此則舉異體須門中即入現同體之即入是故所應異體能應同體也問然云既相即入者同體本法中即入義也是故并取所應耶答本法中但有遍應義無即入義故不爾也問此一即具多箇一也已上一是能具具所具多此是即入耶答能具所具則法爾道理故於本法中亦論也相即相入則要由空有力無力然后所論於本法中既不論空有力無力義故亦不説即入也既觀公疏云又由此一緣下雙𥸩即入二義所以謂同體即入由異體成異體相入故令同體相入異體相即故令同體相即已上所應多緣既相即入者是異體須門之即入也問本法中且如一緣遍應多緣各與彼多全為一故已上則知并與所應之多為同體耶答與者為也則音非是共與之與也是故能應之一為二而全一為三而全一等具於多一耳故不并所應也問此一即具多箇一也者云何答箇者語助是即具多一耳非謂具別二三之多也問義理章云由此一錢自體是一與二作一故即是二一乃至與十作一故即為十一已上與二與三等者合取所應耶答此亦如前𥸩與者為也則音謂對望所應為之作一故所與二三等非是同體而二一三一等是同體也問是故此一中即具有十個一耳仍十非一矣以未是即門故已上此意者中門中與二與三等故若即門中一即二一即三等也是故即門一即二一即三等既是同體則中門與二與三等之二三亦是同體耶答但約此中門二一三一至於即門云一即二一即三等是故與二與三之二三非是同體也問由此一錢者本法錢耶來初錢耶答舉本法錢以現來初一中具十義也謂一中多者有十門不同一者一何以故緣成故是本數一中即具十何以故已上如是徵已欲𥸩此徵意故云由此一錢自體是一等舉本法之遍義以現相入初一具十之義也問何故舉本法現須門初一具十之義耶答相入門中標初一之具十欲𥸩此初一具十之義云由此一錢自體是一與二作一故為二一乃至與十作一故為十一已上如是有十一也既由本一故有余九一是故九一得在本一中也問何知爾耶答文起章同體相即相入者然第一一即是余九一同時望此則全此全彼故若不爾者却第一一即無余九一故却本自一既如是却余九一一一皆然既此本一余九望之則各是自一者即彼九一由本一生然此余九之一入本一中本一能生余九一故得余九一也已上苐一一即余九一同時望之即全此全故者當於此中由此一錢自體是一與二作一故二一乃至與十作一故十一也即彼九一由本一生然此九一入本一中能生余九一故攝余九一也者當於此中是故此一中即自具有十個一也彼章中既舉本法錢現用門初一中具十之義故今此亦爾也是故云由此一錢自體是一復與二作一故即二一等者與異體門一中十有十門不同一者一何以故緣成故乃至十者一中十何以故若無一即十不成故已上一義也問若爾異體中若無一即十不成者亦是本法耶答此亦舉本法相由現須門初一具十也謂文超章云異體者由一故有二由一故有三乃至由一故有云如是相由㸦為緣起皆從本一生余九故是故余九入本一中各各不同故名異也已上由一故有二等者此亦舉本法故爾也問天作門中一者十何以故緣成故十中一何以故由此一與十作一故已上此亦舉本法耶答爾也具云者由此一錢自體是一與二作一故二一與三作一故三一乃至與十作一故十一然而超舉云此一與十作一故也問此一與二作一全為二一等者以是本一所作余九一故是故九一入於本一是則來初一中具十之義成也故唯現本一之作余九一之義耳第十之作初一義則隱也何故云舉本法之遍以成第十具十之義耶答不別也謂本一與二作一則全為二一乃至與十作一則全為十一故若却去第十一則初一亦不成是故初一攝在第十一也是故來初中初一之作多一義已現前故不云以𮥷初一即無十一也久作門中唯現初一作十一義耳第十一之作初一義隱而不現是故云即彼初一在十一中以𮥷十一即無初一故也問由此一錢自體是一乃至是故此一中即自具有十個一與本法中此一即具多個一也何別答別也謂目如一緣等謂由此一錢等不別也此一即具多個一等是故此一中自具有十個一者別也謂此即具多個一者本法一中具十之義是故此一之中等者相入門初一中具十之義故不同也問由此一錢等且如一緣等是同無別則由此一錢之一亦是無偏當捴一耶答本法之一義則同然由此一錢者局於初一門也謂彼本法中不作所應之次第故捴一也今此中説與第二第三等次次遍應之義故當於初門也問不及作門中余二三四已上九門中皆各如是準例可知又反作門下九八乃至於一皆各如是準例思之若於此中具作云何答立在來第二應云一者二何以故緣成故二中十何以故初一錢自體是一與作一故二一乃至與十作一故十一是故彼十一在二一中成也若立在第九門應云一者九何以故緣成故九中十何以故初一錢自體是一與二作一故二一與三作一故三一乃至與十作一故十一是故彼十一在九一中也若立在第十門具作則同於去初門説也若立在去第二門具作則應云一者九何以故緣成故九中一何以故由此一錢自體是一與二作一故二一乃至與十作一故十一是故初一在九一中也若立在第九門具作者應云一者二何以故緣成故二中一何以故由此一錢自體是一與二作一故二一乃至與十作一故十一是故初一在二一之中也去苐十門則同來初門説也問何故來門初后二門中云由此一而中間八門則云初一錢至去門十門中並云此一耶答來初則能具是一故帖能具之一云此一第十門則所具之終是一故帖此云此一中間八門則能具是二三等又所具之終是十故云初一初一去門前九門中所具之終是一故帖云此一第十門中能具是一故帖能具云此一也問十普法之㸦應則同體各異則異體也㸦應是同體則具能應所應故所應亦是同體即答㸦應即是同體非以所應為同體故無此難也問若唯以能應為同體則遺所應法然則同體門中不盡法界之法耶答同體之盡則盡故無不盡法界之過然門不雜故異體之盡則不盡也問同體初門中具十無盡是故引發心品初發心時便成正覺之文為訂也然則所應亦具同體中耶答能應同體中本自具足種種之德故無此難也第六定所應數者一云所應是十也今𥸩九也謂義理章云由此一錢自體是一與二作一故二一始自苐二而應應至苐十故唯九也十普法中一為能應余為所應故爾也問與二作一者所應則二個能應亦隨所應為二一所應則三個能應為三一何故云是次苐之二三耶答既文超章云初同體者如數十錢苐一一由余九生自是苐一一望二是苐二一乃至望十是苐十一即此本一望余九故即是十個一也已上作其次苐令應故所應是九也問若後第二始應則所應第二之名望於自體是一之初一得耶答對異體之初一得也謂三乘中正因以外立增上三緣正因之一有力不待增上三生果之義為不待緣正因之一無力待增上三緣方生果則待緣也至一乘中於十普法約人一法為正因余九為增上緣於人一中自內具德不待余九之義為不待緣同體也此正因之一守自一位待增上緣方具十者待緣異體也是故所應第二之名對於異體正因得也問反作初門中此一與十作一則所應亦是十耶答是第十之十非是十個之十也問若是第十則反作應云此十與一作十何不爾耶答𥸩苐十門同體故可如所問義也然雖至百門千門乃至無盡若却推於本法則是一門同體故是故一向却舉初一也義理章云問此與前異體何別答前異體者初一望后九異門相入耳今此同體一中自具十非望前后異門説也已上前則異體初一后則異體后九既非望前后之前后並是異體是則所應亦是十耶答異體則初一望后九故前后各異之相入也同體則一中自具十相入故非是前后異門相入耳非約所應云前后也若論所應之時唯是九也演義𥸩反成中若無十一本一不能應余九故已上故爾也問十句章云所應是異體能應是同體然則異體具十錢故所應亦十耶答所應之九是同耶異耶則是異體也故章云所應異體也然正因之一亦具十故十異體也問若爾所應多緣既相即入者唯九即入耶答所應則九然相即入時異體初一與后九即入也是故令此多一亦有即入者多一即九而即入之時與自本一即入也演義云同體即入由異體成異體相入故令同體相入異體相即故令同體相即此有二義若直説者如異體二即是本一其同體二豈非本一異體三即本一同體上三亦本一矣已上舉異體二三等與自初一即入之義以現同體二三等與自本一即入之義故爾也問若爾大舉而云異體即入故同體即入何須要舉所應多緣即入義耶答上云由此一緣應多緣故有此多一因於此言欲作即入所以是故爾也第七種種一一決者一云一一同體一云種種同體也初義者且約人之一法應教應義以具十故一一同體也后義者一云并取所應為同體故個也一云唯能應同體中亦爾也謂演義中如一人望父為子望子為父望兄為弟望弟為兄等於一人體而有多名今本一如一人多一如多名也已上所望父子非是同體一人身中所具多名是同體故種種同體也今𥸩一一非同體種種亦同體一一亦同體種種非同體也是故四句護過去非現德然后義理周圓也四句護過者一一同體耶不也名同體異則非同體故種種同體耶不也名異體異則非同體故俱是耶不也如前二義故俱非耶不也名同體同之一一非非同體故一身有種種名則種種之名非非同體故現德四句者一一同體耶是也名同體同之一一是同體故種種同體耶是也一人種種名是同體故俱是耶是也具前二義故俱非耶是也名異體異之種種非同體故名同體異之一一非同體故是故約人法教義等雜門論則種種同體種種異體也純約人人法法論則一一同體一一異體也若約喻説約金銀等雜錢論種種同體種種異體也純約金錢純約銀錢論則一一同體一一異體也問人則是一應於教等具足人人十德然則雖約雜門説唯是一一同體耶答以一人應教則是教人應義則是義人等雖是一箇人具教義種種功德故種種同體也問一向約雜門説則唯種種同體耳無一一同體若約純門説則唯一一同體耳無種種同體耶答大對説者則爾也若更細説則雜門同體中有一一同體義約人人純門而説亦有種種同體義也謂以一人應十法則為教人為義人故有種種同體義然以人一名所目故有一一同體義又約同名之法則此之人一應二為二一應三為三一如是二三名別故種種同體也然二一三一唯是一一故一一同體亦得也故同體訂中云初發心即正覺者約種種同體義引故無并取所應難也苐八同體理事者一云理性同體事相異體也謂光明覺品云一中解無量無量中解一展轉生非智者無所畏疏𥸩云展轉生是異體非是同體又展轉生是緣起相由非是法性融通然則緣起相由當異體法性融通當同體故爾也今𥸩約十對法通論同異故人門同體人門異體法門同體法門異體理門同體理門異體故非謂理同體事異體也問緣起相由門中論事事同體法性融通門中論理理同體耶答同體異體者當於體事十法也於同異體十法之上以緣起相由故即入者緣起門也法性融通力故即入者法性融通門也二門具論同異故不可分配也問發心品演義中法性門中論同異體云不異理之一事具攝理性時即同體義令彼不異理之多事隨所依理皆於一中現者異體隨同也已上法性融通門同異體者理同體事異體也何故通論耶答此則且約理性同體論故無難也問理門同體中理為能應應於教義等具種種德耶答爾也問若爾何故云不異理之一事具攝理性時即同體義令彼不異理之多事隨所依理皆於一中現異體隨同也已上如是唯舉理耶答以理捻該唯舉理耳問若爾何故并舉事耶答理本無相非詮難現故方託事以現理也是故舉事然所舉事還是異體也是則彼不異理之多事隨所依理皆於一中現者異體隨同者多事現於異體初一中也是故事相還是異體也問四句相即中事事相即者緣起相由門理理相即者法性融通門耶答緣起門法性門並是事事無得之所以也一乘中若有事事相即者則理理相即理事相即必不𮥷故二門各具四句也三乘中唯論理理相即不得論事事相即也至於一乘中方説事事無得仍作十門所以是故正唯事事無得而理理相即等亦不𮥷也觀公云理事相即者同頓同此約同教説若以別該同即別教一乘也理事無得即事事無得故已上故知正事事無得而理事先得亦不𮥷也理事無得即事事無得故者一乘中不異理之事故理事相即又不異理之多事故事亦如理融通故一塵含十方十方入一塵故爾云也第九雜假問答問諸緣㸦異之諸緣與諸緣㸦應之諸緣何別答一云異也以緣起法法爾如是隨何因緣新新起故一云一也一種十普法同體門見異體門見故今𥸩二義得也謂一種十普法故一亦得門不雜故異亦得也問六義剎那滅決定是不待緣俱有引自果恆隨轉待衆緣是待緣也用四句中剎那滅及決定者不他生也恆隨轉待衆緣者不自生也至異體中門引因不生緣生故緣不生自因生故為訂旦緣不生因生故者即是不待緣同體何故異體門訂中引耶答於一種六義中或約待緣不待緣論或約空有力無力論是故約待不待論則剎那滅決定者不待緣故同體也俱有引自果待緣故異體也六義之空有則無問同異體是即門也六義之力無力則無問同異是中門也論處不定故爾也問何故不立第四句無力不待緣義者以彼非是因義故不立也已上若一乘中應立同體無力不待緣耶答立不待緣無力耳不立無力不待緣也謂無力不待緣者正因之有力待緣之義名為有力待緣也正因之無力待緣之義名為無力待緣則正因無力又不待緣之義名無力不待緣也故知以對緣故得無力不待緣名也同體自具十中一若有力有體余則無力無體又反此故但立不待緣無力耳不言無力不待緣也問義理章云待緣者待何等緣耶答待因事以外增上等三緣不取自因六義㸦相待耳已上因六義㸦相待者同體中見耶異體中見耶答一云同體中見今𥸩六義㸦相待者具待不待之相待義故同異圓備門中當也第十隨文解𥸩中初緣起㸦異門中先𥸩本法依持義已下𥸩須門也初中緣起㸦異門者帖名謂於無盡大緣起中下𥸩相也問無盡大緣起中通舉十門異體耶唯是一門耶答具足諸緣㸦異諸緣㸦應等十門之緣起相由也謂無盡大緣起中諸緣㸦異者異體無盡大緣起中諸緣㸦應者同體故也問緣起㸦異之緣起亦一門耶答緣起之言則通於十門也謂緣起㸦異緣起㸦應等故爾也問諸緣相望體用各別已上體者即門用者中門然則本法中亦論中即耶答非是一向體者即門用者中門若爾何故古人云中門者因果道理門即門者德用自在門於即門中亦舉用耶又若一向體者即門然則同體異體唯即門耶然不爾故不爾也𥸩須門中先依持者怗名次一持多已下𥸩相后相入門義竟者捴結也此中一云一望多門一有力多無力多望一門多有力一無力也依於此義若分科假則一能持多至無不能依故者一望多門也如多依一持既爾已下多望一門也是故由一望多有持有依已下重𥸩俱存雙泯二句已下句數料簡也重𥸩中由一望多有持有依者重𥸩一望多門也多望於一有依有持已下重𥸩多望一門也今𥸩一望多門具一之力無力義多望一門亦具多之力無力義依於此義若分科假則從一能持多至亦無不入多之一者一望多門是故由一望下例多望一門也俱存雙泯二句下句數料簡也先𥸩一持多依后如多依一持既爾已下現多持一依也初中一能持多一有力等者𥸩一之持多依一下𥸩多之依此即已下重𥸩前義也此中無有不容多之一以無不能持故者重𥸩一之持義無有不入一之多等者重𥸩多之依義也就舉例之中先舉多依一持以為能例后舉一依多持亦然以為所例也此若具作者多能持一多有力是故能攝一一依多一無力故潛入多此即無有不容一之多以無不能持故無有不入多之一以無不能依故如是作也現作中云一能持多一有力又云無有不容多之一從此等故於一望多門或云有持或云全力也舉例中云一依又云亦無不入多之一從此等故或云有依或云無方也問若爾現作中多依一故多無力又無有不入一之多舉例中云多持又亦無不攝一之多則何處見耶答此則多望一門多之依持中見也謂多依一故等又無不入一之多者是多望一門多之無力能依義也云多持及無不攝一之多者是多之有力能持義也問若爾前中已具一望多門多望一門何故更例多望一門耶答一持則多依一依則多持故舉多之依持方現一之依持故一望多門雖有多之持依唯取一之持依也謂一為能望多為所望見一之依持者一望多門也多為能望一為所望見多之依持者多望一門是故更例也多望一門有能例所例如前可知也一望多有持有依全力等者以初意𥸩則有持者一之持義有依者多之依義全力者一之有力義無力者多之無力義能攝者一之攝義能入者多之入義也今𥸩有持者一之持多義有依者舉例中一之依義全力者前之一有力義無力者舉例中一之依義能攝者一之能攝多義能入者舉例中無不入多之一也多望一門準前可知若具作者應云多能持一多有力是故能攝一一依於多故一無力是故潛入多此即無有不容一之多以無不持故無有不入多之一以無不能依故如一依多持既爾一持多依亦然等云也二諸緣形奪體無體中先料簡大意后隨文𥸩也初中諸處即門中云一即多多即一者一即多時一有多空多即一時多有一空耶答一云如問一云反此一云有即前空有即后空有之義故一即多時即前一有多空即后多有一空也然今𥸩者一有門中具有一即多多即一多有門中亦爾也是故諸處之文㸦現一邊也義理章異體即門中一有門中現一即多義多有門中現多即一義也又云自若有時他必空等儼師光明覺疏一即多者一數即多而不見一等旨皈己即他己不立他即己他不存等者一有門中多即一多有門中一即多義是故爾也問具現此義處何文是耶答義理章同體即門一有門中標則云一即多結則云十即一也多有門中標則云多即一結則云一即十也此是明訂問道申章云此有即彼有時見彼有不見此有已上者即前一有多空即后多有一空之義何不爾耶答此義者且舉此一此一有體攝他同己時於此時中此一廢空己同有多故爾云耳非謂即前即后空有之義也問一有門中一即多義是何多即一義是何答一有門攝中有一即多多即一義廢中有多即一義也多有門中反此也謂一有門中一有之所成空多故云一即多也由如是故空多攝在有一之中故云攝中一即多多即一也廢中一向廢彼空多即於有一故云多即一也隨文𥸩中先舉門名次多緣無性已下𥸩相后相即義竟者結也𥸩相中先𥸩一望多次是故一望多已下例望一也后亦同他己亦同己他下句數料簡也初中從初至無不一之者現一有空也一無性為他所成已下例有一空也初中緣至多即一者現無體也由一有體至潛同一故者雙現一有之攝與多空之廢也無不之一者𥸩一有體能攝多義亦無不一之者𥸩無性潛同一義也若一望多門一有空多望一門有一空意則準前中門知也現作中無不之一者能具之一無不攝所具之則一望多門之攝義也亦無不一之者所具之無不即於能具之一則多望一門之廢句也舉例中若具作者應云一無性為所成是故一即由多有體能攝一由一無體潛同故無不一之亦無不之一也如是云也無不一之者能具之無不攝所具之一則望一門之攝句也無不之一者所具之一無不即於能具之則一望門一之廢句也問若爾前一望門已具望一門義何故更例望一門耶答舉之廢攝義方現一之廢攝義故耳若見一之廢攝者一望門見之廢攝者望一門是故更例也望一門能例所例可知也就能例中有有體者一有體也無體者例中一之空義也能攝他同己者一有體能攝多與無不之一也廢己同他者例中無不之一也就所例中若具作望一門應云一緣無性為所成是故一即由多有體能攝一由一無性潛同多故無不一之亦無不之一多無性為一所成一有空即一亦爾如是作也是故望一門雖有一之廢攝然舉一之廢攝現之廢攝一之廢攝還是一望門是故演義云前一望多攝廢皆是一此中多望於一攝廢皆是多也問向上向下與一望多望一何別答向上向下者無問一之與多廢攝之義若從一至十而列則向上也從十至一而列則向下也一望多望一者無向向上向下若一為能望為所望論一之廢攝則一望門也為能望一為所望論多之廢攝則望一門也是故別也問義理章云自若有時他必空故他即自等者當於何門耶答通二門也謂自他之辭不是一之辭故爾也是故一自多他則一望門也多自一他則望一門也問光明覺疏一即者一數即多而不見一等何門中見耶答此亦但言一而不言自他故一自多他則一望多門也自一他則望一門也問旨皈章此一花葉廢己同他全體彼一切法攝他同己彼一切即自體等何門見耶答此則既以一為能望余緣為所望故一望多門也句數料簡中更加二句義方圓現也謂攝他己亦攝己他非攝他己非攝己他如是加也何者同體即門終云亦攝不攝亦即不即非攝不攝非即不即已上彼中言即者當此中同他己同己他彼中云不即者當此中非同他己非同己他彼中攝不攝者當此中加辭攝他己攝己他非攝他己非攝己他也是故攝他己攝己他與同己他同他己者俱存句也非攝他己非攝己他與非同他己非同己他者雙泯句也諸緣㸦應門中先𥸩本法次依持容入下𥸩用門后同體門竟者結也初中先怙名次衆緣之中下正𥸩后是故此一具多個一也者結也然此多一已下𥸩同體名𥸩中衆緣之中者一門耶答通於十門也問諸緣㸦應既是一門則衆緣之中亦是一門耶答衆緣中之一緣應於多緣故各與多緣全為一也是故諸緣㸦應則一門也衆緣之中者通於十門也問諸緣與衆緣何別答言同意別謂演義中𥸩一一各具一切之言云若其法界差別無盡之法各各遍應故隨一一各具法界差別無盡法也已上二節之法界差別無盡法言同意別也是故法界差別無盡法者當於衆緣之中也各具法界差別無盡法者當於諸緣㸦應故爾也然此多一中然字者同體之中本一多一既別以何所由為同體耶故有然字也又下然字者望上雖由本一之雖字欲連前起后故爾也依持容入中先標名次謂此本一有力下𥸩相后同體門中容入義竟者結也𥸩相中先𥸩一望多次是即本一望一已下例多望一門后俱存雙泯二句無得已下句數料蕳也初中先𥸩一持依后如本一有力為持多無力為依已下現多持一依也初中先現一持也后一無力依本一者現多依一也是即下重𥸩也無不容多一之本一者𥸩本一之持也亦無不入本一之一者𥸩一之依也又望一門中有能例所例可知也余義準異體中門可知也二㸦相形奪體無體者先標名次多一無性下𥸩相后同體門下結也𥸩相中先𥸩一望多次是即本一望多一已下例多望一門后亦攝不攝已下句數也余義者準異體即門可知也亦攝不攝者通於一望多望一也且約一望多門者此一之攝他同已者攝也即於此時此一廢己同他故不攝也亦即不即者此一廢己同他故即也即於此時此一攝他同己故不即也非攝者絶前攝也非不攝者絶前之不攝也非即者絶前即也非不即者絶前之不即也三應異無得中先標名次以此二門同一已下現同一緣起也次是故通辨已下句數料蕳次佘入即準思下例余入即也初中問同異體有重耶答一云同體深異體淺然今𥸩無淺深也既云若無異體即諸緣雜亂非緣起故若無同體緣不相資亦非緣起故要由不雜方有相資已上故知無重也句數中具入即俱者何故俱存無得本位中并論即入耶答料簡中先論三門本法后説須門也此中前説異體本法與須門后説同體本法與須門通舉此二令俱存故爾也問若爾余入即何門之入即耶答正同異園偹之須門也若準料蕳則當於住一遍應故有廣狹自在也問本法中云住自一能遍門中亦爾二處何別耶答本法中雖云住自一能遍應然不説能𥸩至須門中云既住一遍應故有廣狹自在等如是具説能𥸩之玄門故大別也圎音章二先開章列名初中已下依章別𥸩𥸩中有四假初中二初則舒義二謂如來一音下攝義也觀公卷則舒門中引如來至契經海之文舒則卷門中引一切衆生至盡無余之文是故初則舒義后則攝義也初中從初至差別之法者揔舉也次所謂下廣列也后華嚴經云已下引訂也乃至者嗔恚多者聞如來説大悲觀愚癡者聞如來説緣起觀也引訂者舍那品如來光明中所説偈也二中如來下摽次謂諸衆生下𥸩后引訂也聞如來唯己語者天竺人聞天竺語漢土人聞漢語也引訂者十住品初發心住頌也第二決擇中先列古説后問答除疑初中初説者菩提留攴説次羅什説后龍軍堅𢙣説也謂觀公疏及刊定記中云一立一音教謂如來一代之教不𮥷一音然有二師一后魏菩提留攴云如來一音同時報万六小並陳二姚秦羅什法師云佛一圓音平等無二無思普應機聞自殊非謂言音本陳大小故維摩經云佛以一音演説法衆生各各隨所解上之二師初則佛音具異后則異自在機各得園音之一義已上留攴一音則佛音具異故當於初説羅什一音則異自在機故當次説或有説言如來唯一等者料簡能詮教體中三唯影無本如大乘終教𮥷衆生心佛果無有色身言聲事相功德唯如如及如如智大悲大願為增上緣令彼所化根熟衆生心中現佛色聲説法是故聖教唯是衆生心中影像也龍軍堅惠諸論師等並立此義已上從佛果無有色身等文云如來唯一寂滅解脫𮥷相言音也從大悲大願等文云諸衆生機感力故自聞如來種種言音也是故此即龍軍堅惠説也初説中先舉自説次非謂下簡非后以語業同下𥸩一音圓音名也次説中先舉自説后非謂下簡非也就初中先𥸩一音后𥸩圓音也后説中先舉自説非謂下蕳非也初中先𥸩一音后𥸩圓音也問后説則唯影無本初二説則云何答具本影謂有佛本質圓音又有聞者識上所變影像圓音故也二中問答為二假答中先現偏取之失后現合取之得現得中先揔標次嘖三別𥸩四結別𥸩中若彼多音等者反示其失以彼多音等者順現其得此則第二師義也若彼一音等者反示其失即多音等者順現其得此則初師義也若此等至同真際者反示其失以彼音等𮥷作故已下順現其得此即后師義也問何故次第不同前耶答以文勢爾故也若如初師立多音則唯是多音不成圓音然第二師立一音故而彼音即於一音成園音也是現第二師之得也若如第二師立一音則唯是一音不成圓音然而初師立多音故而此一音即於多音成圓音也是現初師之得也𮥷作故無性故者唯從於𮥷相言音云也如響故者從於機感力故等云也此意者猶如山谷本無音聲而由人聲而出於響佛則寂滅𮥷言説相以諸衆生機感力故發種種音而説法也結中法螺恆振結前二説也妙音常寂結后説也問后説中如響者可於法螺恆振中見何不爾耶答如響故者聞者識上所變影像言音也法螺恆振者本質言音故別也問三説合為一圓音時是圓教義耶答爾也謂通約五教本末鎔融唯一大善巧法時還是第五圓教故三説合為一圓音時此亦還是第五圓教也問若爾法界中何故有一道表如來一音故已上此亦唯圓教耶答爾也問隨三乘機欲差別不同故亦具三乘則可具五教何故唯圓教耶答彼三乘亦是圓教之三乘故爾也第三會違中問答即為二假問中先引違文問答已下正問也初中篾戾車語者此云垢穢語也答中先引論𥸩準上三𥸩下章主之辭也初中有三復次初復次意者佛則一音具説然欲滿彼四天王意樂故以三語説也第二復次意者佛則非唯一音説法以能善解一切言音故能説法令衆生解令彼斷疑也第三復次意者為以轉變形言所化衆生故以三語説如説佛等者智度論文不變形言中引也準上三𥸩者指上三復次也苐四辨𥸩中先𥸩分齊二利益下現其利益也初中先正𥸩后問答除疑也初中能一言音下揔標遍一切處下別𥸩初中等者等取一切衆生以下云遍一切衆生故也智論者第十二卷也若爾何故等者因前也鶖子者舍利弗也以舍利弗母眼如鶖如是之母所生之子故名鶖子也后中二初問中先問后設爾下與過也二答中若由等遍等者反𥸩與過今即已下正答答中不壞曲而等遍者益此若等遍之問也以不動遍而差者答如存屈曲之問也是謂如來等者現佛圓音超情絶見也二利益中先𥸩后引訂也初中問阿難天雨等者是世俗言非法輪聲也大乘等者如來所發一切言音無不利益故世俗言音無不皆是法輪聲攝也經云者不思議品文也法身章前論圓音具此圓音之佛所依身何是故此假來也初帖名開章初𥸩名已下別𥸩別𥸩中軌持義者䡄謂䡄則持謂持自性義身是依止者有積聚義所依止義今後后也即法為身者即此䡄持義為身是持業𥸩也亦名自性身者持自性義也又余處中法身亦名自性身故爾也二體性中開數正𥸩二假也𥸩中四智等者大圓鏡智等四智也此則所詮章初教義也以初教中有為無為各別故無為真如為法身有為四智為報化也無垢無罣得智者無垢智是正體智也無得智是后得智也謂𮥷二障者煩惱所知二障也煩惱障則迷理而起所知慞則迷事而起故以無垢智斷迷理障無罣得智斷迷事障也諸德者通指𥸩攝論之諸德也今𥸩已下章主之辭也所詮章云二句三句則終教四句則頓教也五此上至法身等者若無所詮者文則此五六句可是一乘然彼章既云此二句一乘故一乘也問二句何別答一云第五則分相第六則該攝也然難也謂第五則合上四句故該攝意現分相意隱第六則泯絶前五故亦非該攝也今𥸩就一乘中具合與泯二義見此具足二義之時見三乘等法即是一乘者該攝義也如是見則立在四教之上圓滿之法故分相也若分配二門難也此二單就境智辨者對下通攝余法為法身義故爾也下四句中初二句三乘后二句一乘也七通得五分等者前唯境智此通五分及悲願等故云通攝也如前智説者指前一切諸法尚即真如況此真智而不如耶則修生功德必訂理故是故無不法身收也八通報化者非唯修生是法身收報化色相亦法身也攝論者引訂也有三義者所詮章云亦有二義一為回二乘方便漸説真法身恐彼難信故以此等功德説為法身今易信受以觀見故二彼以功德法為法身故攝在彼中也此上並約始教説又三十二相即無生無性故亦即是真如法身此約終教説已上彼亦有三𥸩與此何別答一云相即如故者當彼中約終教説二智所現等者當相教初𥸩也三當相等者當初教后𥸩然配一𥸩則可也智所現等當初教初𥸩者難也謂初教中有理法身無智法身故屬何智法身耶今𥸩終教中有智法身理法身二義故相即如故者理法身也智所現故者智法身也九通攝下二句是別教義二句何別答一云第九句分相第十句該攝也此義難也謂第九句既云三身等並在此中則攝三乘三身義故該攝義現第十句非該攝故今𥸩就一乘中二句義別也是此二義之一乘統收三乘則該攝也如是統收則立左三乘之上別於三乘則分相也四者至為所成果者勝德即是果德何故云為所依因耶答雖是果德但約為物成道示現云耳廢機約自無成不成故法身説法授與義故者真如法身為諸觀智所照之境令生智解故是授與也業用四句一乘三乘云何答一云初二句三乘后二句一乘也謂論三身者是三乘故初二句三乘第三或作樹等者三世間並佛身故云樹等故一乘也第四句現也今𥸩初二句三乘第四可一乘第三句通一三也謂作樹等密攝化者三乘中有自身化他身化非身化三義以自身化物者自身化也今他身化物者他身化也變為樹等密攝化者非身化也此義通於三乘故爾也十世章前佛寶中辨圓音與法身義如此三寶於三世中紹隆不絶是故所依世時之假來也問依何文辨十世義耶答𮥷世間品云過去世説過去過去世説現在過去世説未來現在世説過去現在世説平等現在世説未來未來世説過去未來世説現在未來世説無盡現在世説三世即一念已上依此經也問若未來無盡故未來世説無盡者過去無盡故過去世亦説無盡耶答疏云未來續起故無盡過去不起故不云無盡也問現在中説平等者無別異故云平等則過未中説過未則亦無別異故過去世説平等未來亦爾耶答疏中云現在是有故云平等過未是無故不例也問捴一念者於九世中當於何耶答別九世中無別偏當故無不當義中經中且舉現在一念也此中先帖名開門后一建立已下𥸩也𥸩中建立者道申章中昨二日今一日明二日約五日論也謂昨二日者前昨日昨日也今一日者現也明二日者明日后明日也問約此論九世云何答前昨日唯過去過去一世也昨日中具二世謂昨日當體則過去現在以今日望之則現在過去故也今日中具三世謂今日當體則現在現在以昨日望之則過去未來以明日望之則未來過去故也明日具二世謂明日當體則未來現在以今日望之則現在未來故也后明日唯未來未來一世也此則約五日論九世也就建立中先立九世又九世捴為一念下辨十世也初中先正明建立后問答除疑初中先正明九世后此九中各三等者辨其有無也初中先過現未中各立三世后各現一中具三也一具三世等者有二𥸩一云一具之三世非具足之具也一云一中具三世也下二準此知也此九中至俱無者此中若論有力無力有體無體則三現有力體六過未則無力體耶答一云約同教則三現是有六過未是無也若約別教隨我所處論力無力體無體也何者普賢品疏中𥸩三世即一念云但世相入者即二世法入現世不訂位成比也此約三乘別行成又亦九世自在攝受皆訂也約普賢自在故已上約世法入現世不訂位成比也則三現是有過未是無也約又亦九世自在攝受皆訂則隨心所舉論力無力體無體也今𥸩約世辨有無與中即之義別故約世則三現是有過未是無也若論中即則隨何論力無力體無體也問何知爾耶答流轉章云一此現在法由當來有及由過去滅生是故現在為二世所成令現在無體入於過未二此現在法落謝為過去引后作當來是故二世為現所成令過未無體入於現在已上如是㸦論力無力體無體故爾也問若一乘中亦論三現是有過未是無則前引普賢品疏此約三乘又如何會耶答彼約地畫三乘三世論故與此三現是有過未是無別也問答可知又此九世捴為一念等者錢門中別十錢外不立捴一錢何故世門別九世外更立捴一念耶答一云華嚴是十十法門故錢門則別中已具十故不加捴世門別中唯是九故加捴一念也一云不即不𮥷二義具故約不即故世門更加揔約不𮥷故錢門不加捴也一云錢門亦應加捴為十一錢然而略也今𥸩存初義也第二相攝門有二一相即二相入者舉玄門也此二得成下開二所以也初緣起相由已下𥸩初緣起相由中從初至未來一切劫回置過去世等者現九世法相即入也九論相由已下別開即入二門也初中先正舉相由后依是道下以相由故現即入也初中從初至準之可見者約中間七世略辨次第相由之義又此九中三世下廣開俱不俱義也是故此九世捴下廣開次第超間義也此中先約大意論相由義后正隨文𥸩也大意中一云相由之數捴則有九要略不出俱不俱也謂一俱相由二不俱相由三次第相由四超間相由五現現相由六現相由七密相由八展轉相由九無無相由也於無無中若開未未相由過過相由則為十也不出俱不俱者現相由者俱相由也現現相由密相由展轉相由無無相由者不俱相由也次第相由者正俱義兼有不俱義也超間相由者正不俱義兼有俱義也問現相由則俱也密相由現現相由則不俱文自現也何故次第相由正俱義兼有不俱義耶答次第相由者由過去過去無故成過去現在有或反此過去現在有故成過去未來無或反此則俱也過去過去無故成過去未來無或反此則此二超於自現與之相由故兼有不俱也問何故超間相由正是不俱兼有俱義耶答超間者過去過去無故成過去現在有則是次第相由是故超自現在而云過去過去無故成過去未來無也又過去過去無故成現在過去無也是故過去過去無故成現在過去無者是不俱義過去世中超自現在與之相由故是俱義也然此義難也謂先難相由之數則相由之數不止於十謂若作無無相由則對此應立有有相由何故不開耶又於無無中應有未未相由過過相由則應有未過相由過未相由何不開耶又於俱相由中應有過現相由現過相由現未相由未現相由何不開耶又難次第相由中兼有不俱義者則過去世中三世俱而相由何故云超於自現過未相由之義為不俱耶又難超間相由中正不俱而兼有俱義者則過去三世中過未超於自現而相由是俱義者即自語相違過也何故次第相由之過三世中過未超自現在與之相由則為不俱義至超間相由中為俱義耶又次第相由中已具不俱義何故超間相由中亦論不俱義耶是故此義難也今𥸩相由之名下當自現且略也先舉相由之數后約諸門分別也初中捴有七十二相由也謂且約過去過去説則一由過去過去無故成過去現在有二由過去過去無故作過去未來無三由過去過去無故成現在過去無四由過去過去無故成現在現在有五由過去過去無故成現在未來無六由過去過去無故成未來過去無七由過去過去無故成未來現在有八由過去過去無故成未來未來無如是約過去過去一世作八相由余八世亦爾各八相由也九八合為七十二相由也問相由之相云何答由過去過去無故作過去現在有中所以相由者俱中文云若彼不謝此不有故已上則以過去過去無已落謝故方令過去現在有得成立也由過去過去無故令過去未來無中所以相由者俱中文云由過去過去無令過去未來無謂若彼不無此現不成有現不成有此未來不成無是故此無展轉由彼無也已上則可知也自此以后當例此説也謂由過去過去無故令現在過去無也謂過去過去若不無者過去中三世即不成過去中三世即不成故現在三世亦不成現在三世不成故不成現在過去無也然過去過去無故過去中三世得成過去中三世成故現在三世得成現在三世得成故令現在過去無成故云過去過去無故令現在過去無成也次后例此思之后約諸門分別者有三門也一俱不俱門二次第超間門三有有無無門也各盡七十二相由也第一俱不俱盡七十二者俱相由十八不俱相由五十四合有七十二也問俱中十八云何成耶答由過去過去無故令過去現在有又反此則二也過去現在有故令過去未來無又反此則四也過去過去無故令過去未來無又反此則六也是故過去三世中具六相由也如一過去三世中具六現未三世中亦爾具六也是則三六故十八相由也問不俱中五十四相由云何成耶答不俱中有三門謂一現現相由二無無相由三有無相由也現現有六無無有二十四有無二十四也無無有無合四十八又加現現六故成五十四相由也問現現六相由其相云何答文中自現也謂過去現在有故令現在現在有或反此則二也現在現在有故令未來現在有或反此則四也過去現在有故令未來現在有或反此則六也故爾也問無無中二十四相由其相云何答頌曰六種無世中各除自家一相由於四世各有四相由𥸩曰且約過去過去與自過去未來無相由則是俱相由故非是不俱相由是故除自家一無也是故望現在之過去現在之未來未來之過去未來之未來等四無與之相由則過去過去一無世中具四相由如是余五無世亦各除自家一無與余四無相由亦爾是則六中各四合六四故成二十四相由也問有無中二十四相由其相云何答頌曰三種現世中各除自過未余四無世中相由成十二六種無世中各除自家現余二現世中相由成十二𥸩曰以有望無中且約過去現在與自過去過去過去未來相由則是俱相由非是不俱相由故除也是故望現在之過去現在之未來未來之過去未來之未來等四無與之相由則過去現在中具四相由如是余現在現在未來現在有亦各除自家過未與余四無相由亦爾是則三中各四合三四成十二相由也以無望有中有六無世各除自家一現在世望余二現與之相由且約過去過去與過去現在相由即是俱相由故除也是故望現在現在未來現在與之相由則二也又約過去未來世除自現在與余二現相由四也如是六無各具二相由合二六故成十二也以有望無以無望有各十二相由合二十四也合無無二十四成四十八又加現現六則成不俱五十四又俱十八則六十二相由也第二次第超間盡七十二相由中問次第中十六相由其相云何答頌曰前后二世各一門中間七世各有二捴為九世成十六是為次第相由義𥸩曰過去過去則前無余世唯有望后相由未來未來則后無舍世唯有望前相由故各一相由也中間七世各望前后與之相由故各二相由故二七并前后二故合二八成十六也問超間五十六相由其相云何答頌曰第一及第九各越次一世余七世相由各有七相由中間七世中各除前后二余六世相由各有六相由𥸩曰第一則過去過去第九則未來未來且約過去過去超於過去現在與后七世相由故七相由也未來未來超於未來現在與前七世相由故亦七相由也中則各余前后二世與余六世相由故合七六成四十一相由也合前后二世中二七則成五十六又合次第相由十六成七十二相由也第三有有無無盡七十二相由中此有三門謂一有有一無無三有無也有有即是現現有六相由也無無中有三十相由也有無中有三十六故合有無無無則有六十六更加有有六則合七十二相由也問有有相由則是現現相由六可知也有無中三十六無無中三十其相云何答有無中二十四無無中二十四則如不俱相由所説也俱相由中有十八則十二是有無六是無無也俱相由之無無六并不俱中無無相由二十四成三十也俱中有無相由之十二合不俱中有無相由之二十四則成十六也問何故俱相由中十一則有無相由六是無無相由耶答過去中過去過去無故成過去現在有或反此則一也過去現在有故令過去未來無或反此則四也則是有無相由也過去過去無故令過去未來無或反此此二則無無也過去世中有無無無合有六也現在未來亦爾合有無無無各有六也故俱相由十八中有無相由十二無無相由是六也是故相由則一種然以俱不俱門盡七十二相由則無問次第超間及有有無無而七十二相由皆是俱不俱相由也以次第超間門盡七十二相由亦爾以有有無無門盡之亦爾也雖是一種相由然隨門各別故有三門也大意料蕳竟第二隨文解𥸩初中且約七世略説次第相由之義何故除過去過去與未來未來耶答一云已滅無故未生無故除也今𥸩若約五日論則中間三日具余位前后二日各唯一位故約此具余位之中間七位論則各唯一位之初后義自現故此中且略也至下文具説次第相由義也問至下文廣辨次第相由則此中唯論俱不俱義何故説次第相由耶答於九世中有約位論或約俱不俱論二義也若位論則昨日一位中具二世也今日一位具三世也明日一位具二世也若約俱不俱論則三現在六過未者不俱也一現二過未者俱也故俱不俱約九世門論也今此則約位分故約具余世之中間三位略辨七世之次第相由也此次第相由十六中過去未來無故令現在過去無或反此二也現在未來無故令未來過去無或反此四也此則次第相由而是不俱也亦是無無相由也余十二相由則俱相由也亦有無相由也超間中過去過去超自家現之相由未來未來亦超自家現之相由是俱柏由也余皆不俱也二俱不俱義初略標二就俱中已下廣𥸩三問俱者可相由已下問答除疑也初中隨其所應有隱有現者隱則不俱相由現則俱相由也既云有隱有現仍云以俱不俱故爾也就俱中過去過去無故令過去現在有者約昨日云也若彼不謝此不有故者前昨日謝故成昨日有也又由過去現在有故令過去過去無也若即是前昨日也余皆文現也又由過去過去無故令過去至彼無也者若過去過去不謝者不成過去現在有若過現在有不成者不成過去未來無也然過去過去無故令過去現在有由過去現在有故成過去未來無也是故此無由彼過去過去無成也如是過去三世中且約過去過去無故令過去現在有也又反此過去現在有故令過去未來無又反此過去過去無故令過去未來無也又反此如是過去三世中具六相由而有無相由之四即是有無門中有無相由也無無之二是無無相由也如過去三世至各有六可知者舉過去三世之六例現現未亦各有六也此中各有有無之四無無之二也是故不俱無無二十四與俱相由中無無六成三十也不俱有無二十四與俱中有無十二成三十六合成六十六也更加有有之六則七十二相由也是故有有無無有無門盡七十二相由也二就不俱中有二初現現相由亦有六義已上初一則現現相由也后一是何答無無門也此中開有無故無無二十四有無二十四合四十八此中合現現六成五十四相由也問答除疑中答中俱者現相由不俱者密相由者俱相由則相由相現故不俱相由則相由相不現故也問若爾此中密相由與前云有隱有現中有隱是不俱相由何別答小別也謂彼云有隱者若見過去中三世則不見現未中三世故云隱也今云密者相由之相隱而不現故云密也亦展轉相由者俱相由不是展轉相由耶答展轉也謂俱相由中云此無展轉由彼無故已上不俱相由中過去未來無故令現在未來無又反此由現在未來無令未來過去無又反此此四則是次第相由何故云展轉相由耶答是次第相由然論相由之由則是展轉成故爾也謂若非過去未來無則過去中三世不成也過去中三世不成故現在三世亦不成現在三世不成故現在過去無不成也是故以過去未來無故過去中三世得成過去中三世成故現在三世亦成現在三世成故現在中過去無成如是過去未來無故現在過去無成展轉故爾也三次第超問假中有二初如過去下廣后是故下捴結也初云是故者則以俱不俱盡七十二相由俱相由十八中有無相由一及不俱中由過去未來無故令現在過去無又反此現在未來無故令未來過去無又反此等四並是次第相由也又俱相由中無無六相由不俱門有無中超於自現之相由現現相由無無相由等余相由並是超間相由故因前云是故也是則俱中有無之十二不俱中無無之四故有前九門以余相由故有第十門是故文云是故此九世捴於五位有此十門云也次第相由有斯九門已上問似約九世次第列也相由義隱何故云相由耶答約世次第列時自守相由之義而現現故爾云也第十超間中若無初一即無后一等者初一謂過去過去后一謂未來未來是故舉過去過去無故令未來未來無之一相由等取余相由也結中次第者結前九門超間者結第十門也無得相由故者通結也二依是道理下以相由力令九世即入也經云者𮥷世間品也一云此文者若無初一即無后一之訂也今𥸩通訂諸門即入也二相由之義下別開中即也問此是開中即時何故舉相由之所以耶答以相由故得相即入是故名則舉所以而正所現則即入二門也有二門者開數一約力用下𥸩初中以力用至體不雜故者中門則位不動而相入故爾也問中門者位不動門即門者位動門則能具之動不動耶所具耶答一云能具之動不動也一云所具一云通能所具也初義者中門云一中二一中三等不動能具之一而將二三等來具也即門中一即二一即三等動能具之一具十故能具之動不動也次義者中門一攝時位不動入於一也即門一即時多位動而即一故所具之動不動也后義者中門之一相入時一多位不動也即門則一位動而得相即故能具所具之動不動也今𥸩唯所具之動不動也謂緣相盡不壞緣者約所具云也是故爾也𥸩此二門如別説者法界緣起章及大料蕳等也不失本位無不即入者一云不失本位則不動者向本義故緣起自體也無不即入則去來義故緣起義門也今𥸩一種緣起義門中立論也謂下文云諸劫相即而不壞本劫已上約諸劫相即義云無不即入也約不壞本劫義云不失本位也是故一量中立論也問中門是位不動門可云不失本位即門是位動門何故云不失本位耶答別也謂即門是動而不失本位也第二法性融通門中有三初現法之相依成立也次是故緣起理事下廣𥸩后時劫依此下現時劫隨法融通即入也初中此九世時無別體唯依緣起法上者猶如万物生長為春茂盛為夏衰落為秋收藏為冬則時無別體依於如是緣起之法而得建立故爾云也是則時無自體依緣起法此法亦依真性而成真性融通故法亦無得以法無得故能依時劫亦融通即入也問刊定記中於所依體事中并立世時章主於能𥸩玄門立十世門云何別耶答刊定記主則以世時立體事十法而非劫入劫劫入非劫者入門劫即非劫非劫即劫者即門故非別立玄門也章主意者雖是一種十法若約世別之則三世之法各別故玄門中立也是故演義中引刊定記云有以時劫為所依體事者然時無別體何得為他之所依耶若時是所依者濫於外道時常之失是故古德立於能𥸩中也問今此文中約於九世以論即入則時是所𥸩耶答不爾此中於相即入之法約時別之是故爾耳既云時無別體何得為所依體事耶就廣𥸩中初開數列名次初中下𥸩后是故唯理已下結也初中四句云何答一云泯相俱盡者理也相與兩存者事也下之二門唯事中辨即入也一云初則中門次則即門又第三亦中門第四亦是即門也問后義中二重中即云何別耶答初重中即通約理事后重中即唯事中論也問何知初重是中即耶答初門訂中引非劫入劫第二門訂引諸劫相即是故爾也然今𥸩初門現理事不異第二門現理事非一下二門唯事中即入也問何知初門是理事非異第二門是理事非一耶答𥸩初門云以本從末唯事而非理等已上則以理從事故即是全理之事是故非異也以事從理故即是全事之理是故非異也𥸩第二門云全理之事非理故俱存而不雜也已上既云不雜是理事非一門也問何故即入之初説理事非一異耶答料簡能詮教體門事融相攝門中有二義一相在二相是乃至下云良以全理之事與全事之理非一非異由非一故得相在也由非異故得相是也已上彼中理事非一非異者今此初二門也彼中相在相是者今此后二門也是故今此例彼先論非一非異次現即入也問若爾泯相俱盡者不是中門耶答爾也既理事不異故可云即門非是中門也是故初二通中即之所以耳非是中即也問若爾何故初門訂中引非劫入劫等耶答若爾難者演義同體即門中云一無性潛入於本一已上此之入字亦是中門耶然入之言不定故今此入字非是入即相對之入也問理事非一門中引諸劫相即之文可於非異門引也何不爾耶答雖是第二門所引然諸劫相即之言還是初門中意也不壞本劫者正第二門訂也問諸劫相即者是諸事劫㸦相即耳何故理事非異之前門中引為訂耶答諸劫相即者非謂立在事法論彼劫此劫之相即但是諸劫之事與非劫之理相即故是理事非異也三相通㸦攝者謂隨事之理故隨理之事故者相通也一事能容一切也一切事入一中也者㸦攝也反上即是一入一切可知者具作應云由隨事之理故令一切事能容一也由隨理之事故一事隨理入一切中也四相是㸦即者謂即理之事故即事之理故者相是也一即一切也一切即一也者㸦即也是故唯理無可即入等者現異理之事異事之理則不成即入也要理事相從者約初門以末從本以本從末云相從也如是故云相即也問第二理事非一門何不舉耶答門雖各別然約不異理之事與不異事之理以論即入時理事非一之義已現現故不別舉也余義準思者且論即入二門例余同時具足因陀羅等門也玄義章前則於三世中三寶興隆相續不絶故明所依時世今此欲辨三寶所現玄義故次來也問玄義與十玄何別答一云玄義者通於一乘三乘十玄者唯局一乘故別也今𥸩一也謂今此章中亦有論三乘事處然其所宗正在一乘是故玄義與十玄一而無別下文不動衆生之雜染即是三寶之清淨等現其玄妙故云玄義故爾也此中先列章門后第一緣起諸法下別𥸩也初中十門相生次第者緣起諸法既無得故隨我所舉論相在不在相是不是故有第一衆生之染三寶之淨染淨玄別何得無得耶則衆生之空三寶之空同一真空故是故緣起無障得也故有苐二計此真空不異斷空欲現真空異於斷空以治情見故有苐三欲難斷空訂得真空以何等藥治何等病則常觀諸法平等之時諸病皆治故有第四若爾理則平等事則差別何得事相亦平等耶則理平等故事亦隨理平等故有第五若諸法平等云何説因果故有苐六真諦門則平等可爾若俗諦門亦平等耶故有第七欲知二諦須明真妄心境故有第八若諸法平等則能化所化云何別耶故有苐九如是之法作何方便而得入耶故有第十也別𥸩中初門中緣起無得與法界緣起一耶答一也謂此門下文云此上三重融成一際明具德無得自在是約法界緣起門云故爾也問若爾前之法界緣起中義已盡也何故重舉耶答欲現衆生之染三寶之淨㸦為緣起則要舉法界緣起之義方因現故須重舉耳問答即為二假答中先開二門后初中已下𥸩𥸩中先開三重四句后此上三重融成一際已下結也初中一空不空門者空則真空不空則是有故事也問何故相在相是之前先論空不空耶答澄觀公𥸩周遍含容觀云事如理融遍攝無得交參自在略辨十門一事如理門二理如事門三事含理事門四通局無得門五廣狹無得六廣容無得門七攝入無得門八交涉無得門九相在無得十普融無得門初二則理事相如故理事無得也后八則事事無得也是則何故事事無得周遍含容觀中先説理事無得耶以理事無得故方成事事無得是故爾也今此亦爾理事無得故成事事無得事事無得故方得相在相是是故先辨空二空理事無得也一切法至毫末相者以緣起無性故無毫末相也雖是無性然有虛假相耶故虛相亦盡也或一切不空以空為諸法故者前云無毫末相又云虛相盡則既空所有何故云以空為諸法耶答約空即是色義云也謂雖云是空不異色之空故非謂滅色然后名空是故以空為諸法也等者等取受想行識也二相在不在門中先則一切入一之四句后如一切入一下一入一切之四句也初中相在不在者約能在所攝云相在也一切入一中至一切同在一者一法無性故是法性之一也一既無性是法性之一故一切亦無性是法性之一切是故一及一切是一法性故一切在一中也雖恆涉入住自位故者舉相在義現不在義也徵細相入者相在義恆在外故者不在義也万里迢然者不在義也恆相在故者相在義也或俱非謂入出融故者入則相在出則不在也如一切至一切亦準思之者若具作所例則應云或一入一切中由一切無性以法性為一切又一法既即法性是故一遍在一切中而不相是也或不在一切謂由無性一絶故如是作也三相是不是中先明一切即一之四句也后例一即一切之四句也初中問相是者有為能是空為所是耶答諸處不定故一即多時具有一即空多空一即有多二義也有一即空多時有為能是空為所是空一即有多時空為能是有為所是也問若爾今此云何答言雖難定若準前而説則空為能是有為所是也謂中門則一切入一中時一切無力入於一也以此準之則相是門中亦爾一切是一時一切空而即於一有故爾也此有二門下先開章門次約生已下別𥸩后問若就下問答除也𥸩中一約性謂如經云者諸法無行經也一云約性門者一乘也問然則一乘中三毒當相即是菩提也今此云以貪欲即無性故不可壞則唯取貪欲無性之理故可當三乘耶答就一乘中有約修行次第説有約已訂之人心説也若於已訂之心中三毒當相即是菩提也若修行次第中要約三毒之性令相即也今此約修行次第故爾也今𥸩所引經本既是三乘故三乘也若約一乘則三毒當相即菩提也今依彼經本意𥸩故約貪欲之無性義方云不壞也問一乘中亦説理理相即事事相即等四句則今此亦是一乘何云三乘耶答一乘雖約理説然三毒之相直是理也今此要約貪欲之無性令其相即故三乘也二約事此中二一始二終者問此始終意云何答知一切即一者始也知一即一切者終也問若爾所例之門唯終無始耶答例中亦具始終故一即一切者始一切即一者終也問何故初門中一切即一始一即一切終於所例中始終反此耶答約觀心次第論始終故爾謂依一切即一之詮發生智解者則見一切即一之法故云始此觀既熟則便發一即一切一切即一之解見法如是是故云終也所例中初依一即一切之詮修觀行故始終反此可知也問答中有二初問中若就理性既一多等者舉情計理事而問也若舉事而取理等者若舉事取理則不異前約性門更何辨耶如是問也二答中先捴答后即事之理下別答也初中云此二義者何二義即答既云今由理事不二而二已上故理事中非異與非一二門也何者嘖若事而非理等者即牒問也別答中即事之理方為真理等答若約理有即等問也即理之事方為幻事等答約事有即等問也良由理事相是而不一故等者答若舉事而取理等問也或谷嚮像執言求解等者或谷者一本云或容一云或客嚮字或本云響有𥸩云法如谷中響鏡中像而迷之者執言而求解也一𥸩云又或客有迷於如響像之法執言求解也有云或容向於如像不之法執言求解也全體相是而不雜等者全體相是則相是門也然約不雜故不壞本法故以成不是之由也其猶色即空者相是門義然約不壞色等以成不是之由也等者等取受想行識等也準思者所例四句反前可知也此上三重等者捴則三重有六重四句也謂前空不空門中雖無所例然既約一切作四句云一切空一切不空等更無約一四句故若作約一四句則一空或不空或俱或不俱等如是作四句故有二重四句相在相是二門中各現作四句辨所例四句則合有六重四句成二十四句也二句數中亦三重者先捴開數后先已下別𥸩𥸩中先約一多相即不即捴有四四句者捴摽句數一已下別𥸩𥸩中一由一即故名一者緣起一也二由一即多故非一者簡情計之一也三一即多故亦一亦非一者緣起故一非情計一故非一也四由一即多故非一非非一者非情計之一故非一非不是緣起一故非不一也多即一準之中具説應云一由多即一故名二由即一故非三由即一故亦亦非四由即一故非非不也此中約情計與緣起別準前第二由一不即多故名等者一云相是門則是緣起道理門也不即門者情計所執之法也是故由一不即故名一者情計之一也二一不即故名非一者緣起之一也三由一不即故亦一亦非一者一則約情計非一則約緣起也四一不即故非一非非一者非一則非緣起之一非非一則非不是情計之一也不即一準之中具作應云一不即一故名二不即一故名非三不即一故名亦亦非四不即一故名非非非也此中約情計與緣起別之準前然今𥸩相是不是並是緣起道理中所説故不是者非謂約情計之法也若爾則前出不是之所以而云全體相是而不雜故不壞本位故者亦情計耶色即空而不壞色等亦情計耶然不壞色等者不壞幻色本自性空之義故難也是故應云一不即故名一者緣起一也一不即故非一者非情計之一也一不即故亦一亦非一者一則緣起非一則非情計之一也一不即故非一非非一者非情計故非一非不是緣起之一故非非一也準之者準前一二重如次作四句也下二重交絡作四句也三中由一一不即故名一者第二重初句也二由一即故非一者初重第二句也三則初二重第三句通也四則初二重第四句也反作可知也第四一即故名一者初重初句也二一不即故非一者第二重第二句也三四則同前也反作可知也此上順有十六句逆亦十六者四重中現作四重四句順也例作四重四句逆也二約相在不在亦三十二句者準前相是不是作也三約空不空亦三十二句者若具説則別分一與一切各作四重四句謂一空故名一二空故非一三空故亦一非一四空故非一非不一則空中四句也一不空故名一二不空故名非一三不空故亦一亦非一四不空故非一非非一則不空四句也已上二重四句也若具作交絡二重四句則應云一不空故名一二空故名非一三亦空亦不空故亦一亦非一四非空非不空故非一非非一則一重四句也反作可知如約一之空不空四重四句如是約一切之空不空亦四重四句故合八重四句成三十二句也染淨緣起門問答即為二假答中此二各有四句者捴摽謂衆生是妄下𥸩𥸩中先𥸩衆生四句后𥸩三寶四句也初中衆生是妄者謂遍計所執衆生也衆生非妄者依他似有衆生也又約真如隨緣義也此二約用者對下二句之約體故也衆生是妄由上二句故者何故前云衆生非妄今此云妄耶答前則對遍計故依他則非妄今對園成德故依他亦妄也衆生非妄至性滿故者舍那品疏約五海論染淨之義中衆生即淨義也三寶是妄者橫計為有故雖是三寶亦是妄也二處經云者並華嚴經也經云佛菩提智等者勝鬘經也三寶是妄由治妄故者何故前則治妄故非妄今此則治妄故妄耶答前則既能治妄故非妄今則若無妄可治即不立三寶之能治今對所治之妄以立能治之真故是妄也故立也者順𥸩無妄則無者反𥸩也論云者起信論也經云者涅般經也是故生之與佛同一真空故平等無異故云染淨緣起也簡理異情門答中一約境謂真空等者色體無性即真空故也斷空在色外等者如墻處不空墻外是空則色外之空也如穿井除土方為空者滅色之空也比訂等不同者三乘地前是比比智知空故地上是訂訂智見空故也一乘中見聞是比解行為訂也必伏滅煩惱等者三乘地前伏滅地上斷滅一乘見聞位中伏滅解行斷滅也成正行者滅煩惱之所得也入位者信五位得果者得菩提果也經者淨名經也論者金剛般若論也經則訂空見之不起論則訂空見之失也斷空不爾反上知之者應云斷空不即色可斷空取是故斷空可思議也四約對辨異者以斷空對即色之真空辨其異也問答答中先略答略作四句已下開句數廣答也廣答中二先約色與斷空分別四句二如此二門下例舉余法別也初中俱所執故者色與斷空並是遍計所執故也如見人畜等者色與斷空之玄別如人與畜之別也二斷空即空與色即空二空不別者此並真空故不別也三情理異故者真空者理斷空者情也下準知四即空之色與即真之斷等者即空之色與即真之斷則不異然約色與斷之詮以現理也所以爾者以就法融通故也問何故前則色與斷空不即今此相即耶答前則異空之色異真之斷故不即今則即空之色即真之斷故相即也二中余一切法相望等者如約色與斷空所論如是約貪與嗔應云一貪與嗔不即以所執故二瞋即空與貪即空此二空不別以無二相故三貪即空與瞋不相即以情理異故又瞋即空與貪不相即亦情理異故四即空之貪與即空之瞋得相即又約余法亦爾等也經云者諸法無行經可當第四句之訂也次二問答可知或容可見者謂勸進行人令修觀智耳藥病對治門問答答中先示病次示藥后此是大乘下結也初中標數別名后前中已下𥸩也初中一者初二非器也二細者正兼有狹劣非器也𥸩中一內破戒者違真非器以求名利莊飾我人故也二假令不破者背正非器也求名利者通於違真非器也二細中一雖具直心者不作巧偽故云直心然隨自執見謬取經文故云執我修行故當於乖非器也二雖不執有人者以二乘人得人空故不計有人然未達法空故計為有法見不破故當於挾劣非器也藥中於諸過非而不覆藏等者反前內破戒也二於所修行不雜巧偽者反前求名利也質直者反前不直也柔軟者反前狡猾也作下下意者反前為他知故也不現己德者反前護短也細中一修諸行時反前執我修行也二觀察諸法平等不二等者反前雖不執有人也二通説者於前開列章門時雖不標舉然既云藥有二種如是別論二門對此故云通説也問但深觀諸法乎前觀察諸法平等不二一相何別答觀法平等則一種無別但前別治見今則通治諸病故別也理事分無門問答答中先約分無論四句后由上諸義下約在不在論四句也后中先𥸩在義次又由理不唯下𥸩不在也后是故無在不在結也初中先約理辨后約事𥸩也初中理性不唯無分者無分成分以現遍一切在一中也不唯分者奪分成無分以現在一遍一切中也后約事中事法不唯分者奪分成無分以現常在此處恆在他處也不唯無分者奪無分成分以現遍一切處不移本位也就不在義中先約理后約事𥸩也結中無在不在等者結不在也而在彼在此者結在義也因因果果門此有四假一引師子吼品四句𥸩二或有佛性闡提人有下引迦葉菩薩品四句合𥸩前四句也三十二因緣名佛性下現佛性平等也四又初四句下以七重𥸩四句也初中因者十二因緣者現十二因緣之佛性也是故十二因緣生智惠之因故爾也因因者至已去者以發心已去之人有智惠故也演義中有二𥸩一如此中又𥸩以智惠觀十二因緣故云因因也果者阿耨菩提智惠所生果也果果者無上大涅般者菩提智所現果也后四句者同是師子吼品故爾云也因非果者如佛性者十二因緣也果非因如大涅般者無上大涅般唯是果非回故爾也是因是果者如十二因緣至二句者智惠對十二因緣故是果若對菩提則是因也又菩提則智惠所生之果若對大涅般則是因是故云亦因亦果也非因非果者法身也二合𥸩四句中初句是前因性者十二因緣也第二句是因因性者智惠也第三句非因非果性者法身性故二人俱有故爾也第四句果與果果性者菩提涅般果者二人俱無故爾云也問此中善根闡提云何答串習六度至於信滿堪任位者善根人也自此已前名闡提也問若爾信滿堪任已去三賢人亦具十二因緣何故云唯闡提人有耶答十二因緣中有善不善之二故闡提人有善根人無者不善一分故不違也問曉公涅般宗要中𥸩此四句略有四義現二門故別因果性故開四意故遮二邊故已上與今所論何別答此與彼別也謂初句闡提人有者十二回緣也第二句善根人有者智惠也問此四句佛性何教中立論耶答問答后卷云大乘涅般經四句佛性者非小乘義中及初回心人作四句義即頓教終教佛性也問問答初卷云若依三乘始教即半成半不成佛若直進回心二人修行十千劫住堪任地者並皆成佛若未至此位即與一闡提迦位同如此人並皆不成佛此約位語若依此判四句分別準亦可知已上然則初教中亦論四句耶答一云非謂涅般經四句也此則和尚自意作四句耳謂或唯成如修云度串習行至信滿堪任已去者也或唯不成如無性衆生或成不成如修六度串習行未至信滿堪任人也或非成非不成如定性二乘如是自意作四句也今𥸩初教中亦得論也謂約一切闡提與善根人論四句者唯局終教約一分闡提與善根人論四句者亦是初教所論也問一分闡提者是何答簡無性有情也是則修六度串習行未至信滿堪任已前人為一分闡提也至信滿則善根人也問若爾何故問答云涅般四句佛性者非小乘義中及初回心人作四句義即是頓教終教耶答涅般經四句則約一切闡提對善根人論故終頓教也非是約一分闡提人對善根人故別也謂初教中四句則或有佛性闡提人有善根人無謂約行辨性也者此世生善根可救者有現行善性故或有佛性善根人有闡提人無者謂約位辨性故等也問今此四句與問答四句何別答別也今此二人俱有者非因非果性彼云約因辨性故別也又彼中約行辨性約位辨性者亦不同也謂此中初句闡提人有者十二因緣彼中云約行辨性也此中第二句善根人有謂智惠者所成智惠也彼中約位者約所依位故別也現十二因緣佛性中現無明佛性余攴準此者例識攴等也問當體淨故是法身性與非因非果性者法身理也何別答猶如虛空是一然瓶空甕空則別法身雖一然當體淨者在於詮中故小別也七重𥸩初四句中先正𥸩后是故四義唯一心下結也初中初染淨緣起者真如清淨以無明染故成十二因緣也二內重發心者真如內重發智惠故也三無明既盡始覺圓故也四究竟本覺現現故也又初隨染體隱者法身隱也以隨染成十二因緣故也二微起淨用者法身雖隱起淨用也三染盡淨園者無明染盡始覺園也四還源現者還本覺源現涅般也又初與第四俱是理性但染淨異者初十二因緣當體淨義第四無上涅般並是理𭠎初則是染第四則淨也中間二俱是行性但因果異者智惠與菩提並是行性智惠則因菩提則果也又初染而非淨者十二因緣染也第三淨而非染者菩提是淨也二亦染亦淨者以智惠望十二因緣則淨望菩提則染也第四非染非淨者大涅般之體非染淨故也又初是自性住者十二因緣有法身性即自性住佛性也二是引出者引出所有法身故引出佛性也三四並至得果者如是至於菩提涅般故也又初二因者十二因緣與智惠則因也后二果者菩提與涅般則果也轉初為四者十二因緣當體之淨即是大涅般故轉二為三者菩提從智惠生故又依初起二者依十二因緣起智惠故以二成三者由智惠故成菩提故以三訂初者由菩提智訂涅般果故應云以三訂四然回轉則十二因緣之當體淨即是涅般故爾也是故已下結結中若𮥷無明四相皆盡者若斷無明盡則諸法一相皆悉平等是故此四句相本無所有然由無明故有如是差別也二諦無得於中且如者真俗之喻雖有種今且約巾兔以喻其義故云且如也兔有二義等者相差別則依他似有義也體空則依他無性義也巾亦二義者住自位是不變義舉體成兔是隨緣義也不異中巾上成兔及兔上相別義合為一際者隨緣義與似有義一際故也以本就末明不異者本是不變末是隨緣似有也二以巾上住自位義等者無性義與不變義一際故也二二句如次成句三以攝末已下二句交絡成句如文可知第二非一義中不變義與似有義不一故有初句隨緣義與無性義不一故有第二句相背與相害非一故有第三句相背相害俱泯故有第四句文云相背即相背捨等者猶如冤家二人㸦相棄去不相見也相害即與等者猶如冤家二人㸦相鬪諍害於自他也此不泯不存者不泯是相害義不存是相背義也此是成壞非一者成是不泯義壞是不存義也第二就法説中兔即生即死等者兔中生義是似有死義是無性巾中隱義是隨緣現義是不變也逆順交絡等者準前喻中十門此中亦作十重也具作應云第一重兔生與巾隱非異又兔死與巾現非異后二句則準前喻初重非異中后二句也第二重非一中兔生巾現是非一兔死巾隱是不一等者亦準前喻細詳作四句也非異是順非一是逆故逆順等也二現義者對就法説門故爾云也於中俗諦中有四義初二用后二體也真中四義初二是體后二是用也合中合俗中約用等者如一乘中相入義約體等者如一乘中相即義也合真中文云依持成俗者是前依持義奪俗人盡無二故者是盡事義也問何故初列門名中列開合一異等四門𥸩中唯有開合耶答論開合時一異義則自現故也如文可知理事即不即門者相是門故云即不即也相在者準前知故略也於中先并不即二相即中下辨相即義初中一云不即者是情謂故也今𥸩不爾此中不即與法界中各各不相即同故是法道理也相即四句中訓德云初二句是初教第三句是終頓教第四句圓教也林德云四句並是圓教也令𥸩理事相即理理相即通於終頓然此中約以別該同之意故四句並圓教也真妄心境心境各有四句文云二見不壞者是空有二見也三以情就法者以妄情就法説也有無俱情有者情謂之有無是情之有故有無俱理無者情謂之有無無於道理故有無俱理有者法中有無並是道理中所有故有無俱情無者法中有無並是於迷情中所無故入道方便中先舉數開門后初中下𥸩𥸩中有三先守入道緣起又入道下辨入道方便也更以句數下句數料蕳也初中文云一謂求名利等者初二非器二細存見等者通三四非器也第二簡境中初是所簡二真境下所取之境也三定智中下有解行二門並如前流轉章也又約境以三空亂意者謂滅色為空又色外取空及謂空為物也約行以無分別智五相簡之者攝論云五相者一𮥷無作意故二𮥷過有尋有伺故三𮥷想受滅寂靜故四𮥷色自性故五𮥷於真義異計度故已上第二入道方便有四門問四門中何故不𥸩初三門耶答以初三門如常所説故爾也第四門中一捨緣門𮥷凡夫染著之過二隨緣門𮥷二乘滯寂之見又初是護煩惱行第二是護二乘行二隨緣門中云一還前六事等者前示𮥷染著此中亦守心不染也二凡於一切堪情等者堪情者順於情也謂於順情之事覺知忍拒究竟不受也三於一切違情等者設遇斷命之怨如飲甘露歡喜忍受也第二終中初捨緣等者前之捨行今此究竟故二隨緣門等者始中隨緣終極究竟故真俗境不者二境不殊也悲智心不別者二心不別也又境而不別者心境不別也又菩薩住不住行中開合為二開中先并不住義二明住下辨住義也初中先辨所住境中不住義也又智理無別下辨能緣心不住義也二住中先辨住生死二住涅般下辨住涅般也初中亦二義初義中初句是利他第二義中初句是自利義也若更以下句數中先辨不住中四句二唯住已下辨住中四句可知均如聖師在光宗朝行化神異感通具如學士赫連廷所述行狀録及海東僧史自聖師既遠法界宗中廣大之義墜乎地則嗚呼大道之難行也本講和尚天其生於相去數百余載之后生宿植一依義相門下所專妙旨聖聞遺記當此李永五濁之深揭獨力園宗古義然后海東學人知有華嚴義持一路矣弟子事本預聞一二大義今依如公三寶章古記刊削羅言難為二卷施學人非敢好事欲成就先和尚之本𭛔耳
