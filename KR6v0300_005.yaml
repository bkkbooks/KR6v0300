body:
  text: 高麗國皈法寺主圓通首座均如說現經義第七先捴標二門后別𥸩二門初中義海宏深者所現義也真源渺漫者所依真性也問以此二句配下所標所現二門云何答二句通於二門也宏深則深渺漫則廣即是十種普法十種玄門無二一味深廣難思之處則舍那品疏無尽圓明性海藏也問此是何量耶答一云國土海一云世界海今𥸩存后義也即當文真性甚深極微妙不守自性隨緣成之處此是緣起自體也就別𥸩中問所標之法則宗所現理趣則趣耶答二門中皆具宗趣謂料簡中會因果同法界門略說十事五對一教義相對舉此所說教法為宗意現所詮義理為趣或反此故所𥸩十普法中具於宗趣所𥸩既爾故能𥸩十門亦具宗趣也問料簡云語之所表曰宗宗之所皈曰趣已上即此中所標及理趣何云不爾耶答語之所表故非即是所標之法也若所表即是所標者則放此可云所表耶然云所標者欲明十玄之時先標舉法體以之為依故云所標之法約此十法現其無㝵故云所現理趣則義理章立義分中明所𥸩十法者當此所標之法也解𥸩分中明能𥸩十門者當此所現理趣也問義理章立義分中明十對法解𥸩分中明十玄門此章中所標則十對二十法所現則能𥸩十門儼疏及料簡十門中各具十法孔目中但辨十普法無別能𥸩已上能𥸩所𥸩有重耶答一云論處不定也義理章法淺門深此章反此儼疏料簡門法一齊也義理章意者三乘人等不知三外別有一乘故對此人於立義分通約一三立十普法以示之三乘人云此則不異我之所習如何得知一三之別是故於解𥸩分中須十玄門辨其十法無㝵之相故法淺門深也此章先舉十法一味無二性在中道之義然后方須能𥸩十門對機示現十無㝵故法深門淺也料簡儼疏隨於門門具論十法而不別明門法之異故門法一齊也今𥸩諸處門法並無淺深也若是所𥸩無有不能𥸩相應若是能𥸩無有不所𥸩相應故一量也問此章十法即是文緣起自體能𥸩十門即是文緣起義門則法深門淺耶答十法十門上貫內訂下該教分故因陀羅微細六相中即究竟之義在於內訂也然云訂中不說因陀羅微細等者以是訂智所知之境故但不得說現現之相耳是故知訂中具足中即況緣起自體中不論中即耶故不得言十法是緣起自體故深能𥸩是緣起義門故淺也問清涼先明所依體事約此體事以辨三觀初二同教后一別教則能𥸩十門是別教所𥸩十法通放同別故有淺深耶答以別該同皆圓教攝故初之二觀亦是別教是故無難也況真空理事無㝵是同教時十法亦是同教攝也若第三觀相應之時十法亦是別教攝也問料簡及此章約無盡教義論十法孔目義理通約五乘者云何答一云孔目義理約同教此及料簡約別教一云孔目義理并約眷屬此及料簡唯約主法一云孔目義理約窮實此及料簡約實際一云孔目義理約該攝此及料簡約分相辨也第一義者孔目章云如是我聞首料簡下文所目之義約有十門已上所目是同教故孔目既爾故義理章亦爾此章既題云花嚴旨皈至此假約十門十法明其旨趣故知約別教此章既爾料簡亦然也第二義者普法章云人及法理事義文解行因果相成主伴已上主伴者花嚴為主下教為伴故知并約眷屬也義理章攝三乘五乘故亦爾此及料簡唯約無尽教義故唯於主法中立也問孔目說十普法已云諸佛善巧會融法界圓通自在義理章立義分中雖通𠬧五乘然解𥸩分中約能𥸩十門明其無㝵則並是主法耶答此之十法或門相應或不相應今此上文具二義故相應則圓通自在主伴相成不相應則但是眷屬也第三義者孔目義理則見上諸教皆是無盡性海隨緣成義故五乘等法不動本位即是滿足佛事故是窮實此及料簡則簡放小乘三乘故是實際也今𥸩存第四義謂分相者此別教一乘別於三乘則無盡教義別於一相一寂之義也該攝者一切三乘等法本來悉是彼一乘法故此通五教故爾也然而分相之該攝該攝之分相故無重也問既通約三乘五乘等法何云一量耶答一切三乘等法悉是一乘法時即是花嚴故不動五乘即是主法是故十玄章約前十法須十門時即是別教也又孔目云上十門義諸佛善巧會融法界圓通自在者是此義也問既云相成主伴故似有眷屬法耶答於前所立平等十法先舉為主后舉為伴㸦論主伴非是眷屬伴也問孔目既約闊狹淺深而說故可具眷屬耶答不動闊狹淺深之別即是別教故無違也問若爾孔目義理無分相義此及料簡無該攝義耶答㸦具也不動三乘等法即是圓通自在之時還三乘別故亦分相義也所言無盡教義者約何為無盡耶以不動小乘三乘等即是通方無盡自在故有該攝義也義理立義分中通𭠎五乘然至解𥸩分明其十門已云以何文知三乘外別有一乘答此經自有成文引賢首品及第九地文故亦分相也此章𥸩圓滿經云此上諸本捴混同一無尽大修多羅海故亦不簡眷屬經故亦該攝也問列所𥸩法儼疏義理料簡此章並立十對二十法也法界云雖因果理事人法解行教義主伴衆多門別而隨託一門盡攝一切已上孔目亦如文立五對十法則有寬狹耶答無也文孔目約儼疏及義理中初五對也后五對者初五對中之所開故無別寬狹也義理章一依儼師所立料簡及此章自意取捨故有異耳辨十法次第者演義云又此十對初一為捴后后漸略若辨次第者如來說能詮之教詮所詮之理即無法不盡法有教理行果兼在所詮義中故二就所詮理雖復衆多不出事之理則性及相無法不攝三理該下八且置勿論就其事中不出境智四智觀於境便有造修之行所成之位五行位未極捴屬因收極則為果六果中多法不出依正因亦有之七隨依正中皆有體用如正中體者法報用者應化依中體者法性等剎用者應物隨現交入無㝵因門例然八正中自有人法不同以法成人以人知法九於人中逆化順化十人之逆順必有感應冝逆化之感即波須蜜等應之冝順化之感即文殊等應之已上可見一教義一對問正明所詮何故并取能詮教耶答言教之融通即所詮故也經云洪誓願海振音聲已上音聲是能詮然望說此偈普賢之語業則是所詮也是故能詮亦有為所詮之義也古辭佛國寺會問云三教九教之教十法中教義之教何別林德答云一也問能所詮別何云一耶林德云只是一種教而三教九教之時是能詮十種普法之時是所詮隨須處別也二理事道申章云何義為理何義為事答令跬方便且一色中五尺義為事無㝵義為理若正觀中亦得反此五尺為理無㝵為事又此事中㝵義為心緣義為色亦得反此隨須處得已上故三乘理平等事差別一乘中令跬方便中五尺義為事無㝵義為理故理平等事差別若正觀中五尺為理無㝵為事故理差別事平等如是事全為理理全為事故事即足理即足也問理即足事即足者但舉事已不加余語舉理亦爾何故具舉耶答爾是故理事之名且寄三乘說也若不寄三乘者約何以現一乘理事無㝵令三乘人捨理平等平差別之執入於一乘無障㝵處耶三境智清涼云理該下八且置勿論就其事中不出境智已上八對之法唯事中論何故今此并舉真俗境耶答清涼之意非是不論以理該下八故唯約事且作相生之次第耳四行位普賢行中有頓成多行遍成普行二也位中有行布差別位圓融相攝位二也今此且對三乘故但舉圓融行位也三因果先寄三乘辨后亦是普賢下直約一乘辨也寄三乘中約別門則生因得智果了因得斷果約通門則生因得智斷二果了因亦爾也問料簡云十得果故者令得佛地智斷果故亦有二一斷果謂除障故即普賢行品明一障一切障小相品明一斷一切斷二智果謂成德故具足十身盡三世間逆順自在依正無㝵已上即是一乘何故云寄三乘耶答前之理事且寄三乘今此亦爾雖圓融位然智斷之名亦寄三乘以現圓融也至相十玄章云若據小乘說因果則囚以成果因滅始果成若據六乘因果亦得同時成而未彰其無尺如似舍緣柱以成舍因果同時成而不成余物以因有親踈故有盡也若通宗明因果者舉踈緣以入親是故如舍成時一切法界皆一時成若有一法不成者此舍亦不成如似初步若到一切步皆到若有一步不到者一切步皆非到也已上准知六依正無㝵依持者依則佛菩薩持則剎海等也七體用同真性者理事何別答同也然前則對事取理此則對用取體故但詮相別耳儼疏義理章云主伴依正具足體用逆順具足已上主伴依正者取主伴耶取依正耶又體用逆順具足者取體用耶取逆順耶答隨舉即是不可取一捨一也問彼二文中有主伴相成何故今此不辨耶答彼於能𥸩中不辨故所𥸩中辨也八人法九逆順五熱者勝熱波羅門法門也四面火聚上有日光故以苦行外道妄計五熱𬉹身受苦后得涅槃故此知識依之而修普賢行願則義當癡也衆異章者婆須蜜多女法門也此云嗚口若嗚唼其口者便得祕蜜藏法門以欲行化故義當貪也至形虐者滿足王法門也一本作刑字則虐則是惡以刑治惡人故又虐者殺也則或行刑或行殺也形字本則形是示現義也則示現其虐也義當瞋也問法界品婆須蜜疏云難欲實際清淨法門者有二義一約自雖悲願留惑示現處欲然大智照惑則體性空名實際淨也如淨名在欲行禪又諸法無行經云貪欲即是道恚癡亦復然二約利生雖留惑示現處欲令處欲衆生要當難欲得至實際清淨法也如掩遮女等滿足王疏云以方便勝智行殺生等十事無染濁過失生無量福德速得無上提要大菩薩堪行此事此有二一實行二變化實行者了知前人必應作無間等業無別方便令難此惡唯可斷命使不作惡又知此人若捨命已必生善道又菩薩自念我行殺業必墮地獄為彼受苦彼雖現受少輕苦惱來世必受樂果報也解云此同瑜伽菩薩地中戒品內說二變化者如那羅王及善才童子或見可愛事或見可畏事各令衆生生於善處解云彼引此經是變化作那羅梵語此云滿也可愛事者引此前文初見依正生於可愛后見犯王法等生於可畏皆為益生故已上為約三乘𥸩耶為約一乘𥸩耶答約三乘𥸩也謂勝熱波羅門處疏云如是反道行上下經中揔有三類此位同邪見二滿足王同瞋恚三波須蜜同貪愛是故三毒相並有正法然有四義一以當相即空故諸法無行經云貪欲即是道恚癡亦復然於此三事中無量諸佛法解云此約即空是佛法非謂三事即是佛法二約巧攝生說為佛法非謂即是如淨名云先以欲拘牽后令入佛智等三留惑潤生長菩薩道說有佛法非謂即是如淨名云一切煩惱為如來種四約當相即是不同前三此極難解不思議故如此文說也已上第四𥸩是一乘故波須蜜之二𥸩當此中初三𥸩也滿足𥸩則依攝論所𥸩故三乘也問以波須蜜女疏二𥸩配於三𥸩如何答約自行𥸩則配初𥸩約利生𥸩則配苐二𥸩此苐三𥸩通彼二𥸩也謂自行𥸩中引無行經此亦引故約利生𥸩則是此巧攝生故照欲體空及示現處欲等者非是究竟斷欲之相是留惑潤生之義故苐三𥸩則通於二𥸩也問那羅王二𥸩中實行𥸩則配三乘可爾變化𥸩則約此經𥸩故可是一乘耶答雖是此經所說然於攝論約三乘所𥸩故非一乘例如花嚴經十二住義於瑜伽菩薩地中引𥸩則是初教也十地品三界虛妄唯一心作攝論中引𥸩則約初教賴耶心也地論引𥸩則約終教第一義真心此亦爾也問何故二處𥸩中不約一乘𥸩耶答前勝熱波羅門疏中揔并時既云當相即是不同前三不思議故如是約一乘𥸩故更不說也是故當相即是者三毒即普賢行即是佛事更無增減也古辝表訓大德云屠家兒以屠割為生活即是普賢廣大行願也是故刀割之時令得安住法門火炙之時令得照明法門也已上故一乘中三毒當相不動即滿足佛事也是故順全為逆逆全為順㸦無側也道申章云約佛皆順且約世間殺害是世慈悲是順之義故云逆耳順亦名逆逆於逆故已上故爾也問問答云六道因果本非聖法何因攝在普賢門中答六道因果是皆聖法普賢方便回成反道行為逆行門令諸有情方便依猒令得解脫已上三毒知識法門何別答彼則實業六道衆生之逆今此三毒知識則解緣起人之逆故別也問道申章云為迷衆生以自迷緣先作六道然后普賢回作反道行耶普賢無始回成六道反道行耶答衆生業先普賢后回者應非普賢自在所得但是衆生自在所得矣若普賢無始回成六道者是即無苦寂安普賢自成六道苦果反惱衆生豈成攝益乎所謂普賢不作六道苦者衆生本來無苦本來解脫本來寂靜無可猒無可脫不如不作何須無苦作苦無縛作縛然后反令脫耶不得言衆生先普賢先等何者衆生業起無非普賢回成故無普賢不自在得普賢回成無非衆生業起故非普賢無苦作苦故惱衆生矣已上若三知識之逆行實六道衆生逆行別者則亦有普賢所不回之逆耶答有解緣起人自作逆行之門有實業衆生作諸逆行普賢方便回作反道行之門故無難也是故以三毒知識逆行配二十二位則於圓教中見也何者此章既約無盡教義以立十普法引此三毒知識法門故知是圓教五位中所收也是故道申章問云修逆行者亦須回耶答然所作之逆不回為德所修之逆亦須回耳已上故三毒知識之逆則為德所修之逆也六道衆生之逆則冥然所作之逆也十應感立理引訂也舍那品面光集衆文也然此十對同時相應等者約同時門結也謂余處能𥸩之初立同時門今此不爾故於結中現也所現理趣中巧辨自在者能化之巧辨也以巧辨自在故得能演一一法中具十無㝵是故云勢變多端也先舉數列名后於前下約十普法以辨無㝵初中諸處列門不同儼疏初云同因祕微十藏一唯諸托義理章云同諸因微祕藏十唯托料簡云同廣一諸隱微因託十主問料簡中略其儼疏義理中所辨純雜唯心門而明廣狹主伴其義云何答演義云此門賢首新立以至相諸藏純雜門意云一行為純万行為雜等則事事無㝵義若一理為純万行為雜則事理無㝵義恐濫理事無㝵所以改之主伴一門至相所無而唯心回轉善成門為玄門所以故不立之已上故爾也古人云改諸藏純雜立主伴改唯心立廣狹然演義云改純雜門立廣狹門也此章云性廣一入是隱微帝十主問若對料簡則改同時託事立為性相無㝵一多無㝵若望至相改同時純雜託事唯心四門若改純雜唯心立廣狹主伴則如前所辨何故改同時託事立為性相無㝵一多無㝵耶答此中結十對法云此十對法同時相應成一緣起無㝵鎔融之時已現同時義故下結十門云是故見此花葉即是見於無盡法界非是託此別有所表之中託事義現故不立也問十門中何揔何別答一云同時門揔余門別也一云隨舉論揔別也后義者料簡云十門各具十門義理章云然此十門隨一門中即攝余門無不皆盡已上然清涼云唯同時揔也問若爾料簡文何會耶答㸦具之義清涼亦辨故無難也是故清涼云前分揔別即同時門中具下九門下之九門不具同時今約不相𮥷則后九門例於同時亦具九門矣已上故余門中雖具十門但是不相𮥷義故具耳故非是揔是故唯同時門揔也又𥸩網目章中有二𥸩一隨別開門𥸩二諸緣契合是揔余別𥸩故初𥸩則十門並別故同時亦非揔也后𥸩則唯同時揔余別也就十法以現無㝵中先揔舉次今且下別就事法明十無㝵后此一花下例余也初中百門千門等者就事法中且論事性相無㝵事廣狹無㝵云云等約余亦各具十無㝵也故有百門以此百門攝在事中如事中攝約余亦爾故有千門約法既爾約門亦具百具千等例知問就十法現無㝵中何故最初辨性相無㝵耶答清涼云今不依至相者以賢首所立有次第故一同時具足相應門以是揔故冠於九門之初二廣狹門別中先辨此者是別門之由由事理無㝵中事理相遍故生下諸門且約事如理遍故廣不壞事相故狹為事事無㝵之始已上事理相遍故方成事事無㝵是故先辨也一性相無㝵性即理相即事故理事無㝵也何故不論教義無㝵耶答余之九法並是事事無㝵故論廣狹等九無㝵時義已自現故不別辨是故清涼理事無㝵中今初云十對皆無㝵者謂一教義無㝵二理事無㝵三行位無㝵乃至應感無㝵今且約事理者事理是所詮法之揔故已上是故略也問此約花葉論無㝵時何故并辨性相耶答雖約花葉然此花葉即同真性者性也不㝵事相現現者相也故爾也先正𥸩后引訂經云者舍那品也准料簡門門皆說六句則此中應說或唯性同真性故或唯相不㝵事相故或俱具前二義故或不俱𮥷性𮥷相故或具前四約解境故或絶前五約行境故如是於門門具說也二廣狹先正𥸩后引訂海幢比丘經也三一多正𥸩引訂十住品也此有二義一約一多論無㝵二約一體中一多論無㝵今取后義也問諸處即門中引此文此中一多無㝵者中門耶即門耶答一云即門一云通中即然此中義似從即門義引也今𥸩二義見也謂一一外之多相即時唯即門也唯於一體之中具無邊德則多然是一體則一如是見時通中即也四相入先𥸩相后引訂初中此一花葉其必舒已遍入一切差別法中者一云舒有一己入無多他也今𥸩舒無一己入有多他也復能攝取彼一切法令入己內者攝於無多他入於有一己也料簡異體相入門云一能持多一是有力能攝多多依於一多是無力潛入一由一有力必不得多有力俱是故無有一而不攝多也由多無力必不得一無力俱是故無有多而不攝一也如一持多依既爾多持一依亦爾反上思之是則亦無多不攝一無一不入多者也如一望多有依有持全力無力常含多在己中潛己在多中同時無㝵多望於一當知亦爾已上從潛己在多中之句此中云舒己遍入也從常含多在己中之句此中云復能攝取彼一切法等也即舒恆攝者諸處云卷舒此中云舒攝何別答論處不定也且如卷九世為一念舒一念為九世者即卷而舒即舒而卷如一匹練如卷而舒如舒而卷卷舒雖別只是一匹練耳故約一法論卷舒也此中約一己之舒為舒攝一外之多為攝故別也又料簡云攝九世以入剎那舒一念而該永劫則舒卷舒攝不別也經云者舍那品也下句云世界本相亦不壞無比功德故能爾已上問中門位不動門多入一中不動本位可云世界本相亦不壞無比功德故能爾也即門位動故多即一時多相皆尽唯見是一故不是無比功德耶答三乘中一中攝多多相尽故理融無二方入於一故非是無比功德也一乘中一中攝多不動本位入於一中故無已上功德也即門雖是位動不壞本位全是一故三乘別是故即門亦無比功德也問古人云中門法中遠門即門法中近門者何耶答中門位不動故多入一時不動多相故一多各別故云遠門即門是位動門故多即一時多全是一一多不別故云近門也問三乘泯差別俗相方入一中一乘入門位不動故不壞多相入於一中是故三乘別可云法中近門即門是位動故泯其多相即於一中此則三乘同故可云法中遠門何故不爾耶答即門之位動者不動多位全為一時唯見是一不見於多故云位動然即於一時既多位不壞全是一故三乘別也問三乘中一為正因多為增上緣增上之多助於正因之一共生果也一乘相入門者位不動故不壞多位入一中者彼三乘增上緣力助成一果之義同耶若異者即門何別若同者一乘三乘何別答猶如栗種是正因水土等是諸緣若粟種以外增上緣助發正因之果是三乘也水土等諸緣不動自位具在粟種中者一乘之中門故三乘別也又中門有力無力即門有體無體故別也問十方入一塵時壞十方本位耶答不壞也古辝云中即二門皆有一難謂中門難者十方入塵時十方空耶即門難者西柱即東柱時堂亦壞耶若會此難者既云不動自位而恆去來是則恆去來故十方入一不動自位故本位不空也西柱全東柱時唯見東柱不見西柱故云位動而不泯捨西柱故堂不壞也五相是正𥸩引訂也初中一云此花葉必廢己同他舉體全是彼一切法者有體一之所成多故一即多也是故有一廢己同於空無之多他也而恆攝他同己者攝取無體之多他同於有體之一己也此則一向一花葉是有余一切法是無也今𥸩者廢己同他等者廢無體之一己同有體之多他也恆攝他同己者攝無體之多他同有體之一己也問一即多時一有多空耶多有一空耶答一云如初一云如后一云即前空有即后空有二義具也初義者一即多者欲現一之具多是故義理章異體即門云一者一何以故緣成故一即十何以故無一即無十故由一有體余皆空故乃至向下者亦有十門一者十何以故緣成故十即一若無十即無一故由一無體是余皆有故已上一即十時一有十空十即一時十有一空也次義者一即多者一體空無即於有多也是故此中云己即是他己不立他即是己他不有儼公光明覺疏云一即多者一數即多而不見一故多即一者多數即一而不見多故已上爾也后義者於此一即多之辝中一者舉有體之一也即多之時多有一空也是故未即之前則一有多空既即之后則多有一空也義理章異體門即以前之空有義也此章及光明覺疏即以后之空有義也今𥸩一有門中具一即多多即一多有門中亦爾隨須處得意也何者義理章同體即門云二者一即十十即一亦有二門一者一即十亦有十門不同一者一何以故緣成故一即十何以故由此十一即是初一故無別自體故此十即是一也余九門皆亦如是准之可知二者十即一者亦有十門不同一者十何以故緣成故十即一何以故以彼初一即是十故更無自一是故初一即是十也已上一有門中標則云一即十𥸩則云十即一也十有門中標則云十即一𥸩則云一即是十也是故義理章異體即門明一有門中一即十義也光覺疏及此章明一有之時多即一多有之時一即多也各現一勢也問何故一有門中具一即多多即一耶答一有門中一即多者一之攝義也多即一者一之攝義及多之廢義故爾也謂有體之一所具多者是一之所成多故一即是多是故約此云一即多也有體之一所成之多即於能成之一故一攝多也是故約此一之攝義云多即一又彼空多廢己同於有一故多即一也是故之廢義云多即一也問何知攝中具一即多多即一二義耶答清涼云由一有體必不得多有體俱多無體必不得一無體俱是故無有不多之一無有不一之多一多既爾多一亦爾反上思之如一望多有有體無體故能攝他同己廢己同他同時無㝵多望於一當知亦爾抄中云無有不多之一者此一即是多故無有不一之多者多即是一故乃至能攝他同己者成上一有體攝他多也即前無有不多之一耳已上解云攝他同己者有一攝空多同於己義以此屬於無有不多之一中也而又云無有不多之一者此一即是多故已上是故知攝中一即多多即一二義具也問三寶章大料簡清涼疏皆說一望多多望一義則一望多門一有多空多望一門反此耶答一云如問今𥸩一望多門具一之空有義多望一門具多之空有義也問若爾二門何別答一望多門取一之廢攝多望一門取多之廢攝故別也是故云前一望多門攝廢皆是一此中多望於一攝廢皆是多也問一望多門是向上來多望一門是向下去耶答一望多門一自多他多望一門多自一他若來去二門中自他不定故不准也是故無問來去一為能望多為所望見一之廢攝則一望多門也反此則多望一門也問且依清涼則文云緣是能起能成故有體多緣是所起所成故無體由一有體不得多有體俱多無體必不得一無體俱是故無有不多之一亦無有不一之多一多既爾多一亦爾者一望多門中立論耶通二門耶答一望多門也是故抄云是故一緣能起下四別示其相於中三初明一望多次例多望一后結成句數乃至下云一多下例多望一已上故爾也問一多既爾多一亦然反上思之已上反作云何答一是所起所成故無體多是能起能成故有體由一無體不得多無體俱多有體不得一有體俱是故無有不一之多無有不多之一如是作也問抄云攝他同己者即前無有不多之一耳已上則無有不一之多合於何句耶答無有不多之一者無有能具之一不即是所具之多也以是一之攝義故一之攝中攝他同己句中見也無有不一之多者無有所具之多不即是能具之一也以是多之廢義故多望一門廢己同他句中見也一多既爾多一亦然已上若於此中作二句者則無有不多之一者無有所具之一不即是能具之多故一望多門廢己同他句中見也無有不一之多者無有能具之多不即是所具之一也故多望一門攝他同己句中見也問若爾何得更例多望一門耶答一攝則多廢多攝則一廢故舉一之廢攝時并舉多之廢攝耳是則雖有多之廢攝之義非是此中所宗是故更有多望一門也三寶章料簡等文皆以此意見也問義理章云由自若有時他必無故他即自何以故由他無性以自作故二由自若空時他必有故自即他何以故由自無性用他作故已上於一望多多望一門如何配耶答二門不定若一自多他則一望多門若多自一他則多望一門也問儼公光明覺疏一即多者一數即多而不見一多即一者多數即一而不見多者何門耶答二義可見一義者今此如前自他不定故若一自多他則一望多門若多自一他則多望一門也一義者二門廢義也一即多者一望多門中廢義多即一者多望一門中廢義也問章主光明覺疏云若無一即一切緣全失自體何以故以無一時多無所成故不是緣也是故有一即有一切却一即却一切此即一切是空義故泯自即他一是有義故攝他即自反上則一是空義故泯自即他以多是有義故攝他即自已上二門何見耶答一切空義等者多望一門廢己同他句也一是有義等者一望多門攝他同己句也反作中一是空義一望多門廢己同他句也多是有義等者多望一門攝他同己句也問此章文何門耶答一望多門也問何故不辨多望一門耶答下云此花葉既具此等十種無㝵余一切事皆亦如是已上此是多望一門也問何知爾耶答清涼辨相入門全同此章文也末文云若一一切對辨則攝入各具四句謂一入一切一入一一切入一一切入一切抄云若一一切對辨下三重料簡上來約一花葉望余但有一入一攝無有多入多攝之義故更對余一多等皆有攝入於中先明相入后辨相攝初中言一入一切者如前初句第二一入一者即以一花隨對一法如一花葉入一佛身等第三一切入一者即以多法來入此一第四一切入一切者約一花一佛不成即多花及諸佛等入余諸佛等也疏㸦攝亦然者后例辨相攝上來四句但明入義今攝亦四一攝一切一攝一一切攝一一切攝一切已上入中一入一切攝中一攝一切者一望多門也入中一切入一攝中一切攝一者多望一門也下結例者對余一等所論故於多望一門例余門中見也中門既爾故即門亦然是故即門抄中云復例前亦有四句一者一即一二者一即一切三者一切即一四者一切即一切今但約一花故略不言故結例統該一切法明具四句也已上解曰并取結例具辨諸句故知此章中多望一門則結例中見也是故若准中門應作即門相廢四句相攝四句也廢中四句者一者廢一同多如廢一花葉同多佛故二者廢一同一如廢一花葉同一佛故三者廢多同多如廢多花葉同多佛多剎等故四者廢多同一如廢多法同一花故相攝四句者一者攝一同一二者攝多同一三者攝多同多四者攝多同一等攝中攝多同一廢中廢一同多則一望多門也攝中攝一同多廢中廢多同一則多望一門也問若於結例中見多望一門則結例中文云此一花葉既具此等十種無㝵余一切事皆亦如是又云如事中既爾如前十對法門之中一一皆有如是十種無㝵已上於此二假依何見耶答一多不定故若事法為一教義等為多則依后假見也唯就事中一多相對論則依初假見也問余一切事皆亦如是已上四句如何作耶答以一事對余一切則應云一入多多攝一一即多多中一也以一花葉對一佛身則應云一入一一攝一一即一等一切花葉對一切佛身則應云一切入一切一切攝一切一切即一切等是故有一望一門有一望多門有多望一門有多望多門也經云者𮥷世間品也六隱現者𥸩相引訂也料簡云祕蜜隱現俱成門也祕蜜者通於隱現謂隱現之法皆祕蜜難知也故義理章云此隱彼現正受及起定同時祕蜜成矣已上又云如上第一錢中十錢名為現了第二錢望第一錢中十即祕密則祕密唯𢩁隱中見也三門別意者演義云攝他他可見故有相入攝他他無體不可見故有相即攝他他雖存而不可見故有隱現門以為門別故此三門皆由相攝而有相入如二鏡照相即如波水相收隱現如片月相映已上也問此能遍彼二𥸩何別答初𥸩約能具之遍后𥸩約攝所具之義故別也經中者十住品也問東方入正受西方見三昧起者云何俱成耶答刊定記云菩薩本身無二已上此則若東方正受之菩薩與西方起定之菩薩異則不是俱成然一體無二故是俱成也義理章云隱覆現了俱時者若東方正受之時與西方起定之時異則不是俱成然無前后一時故得俱成也今𥸩刊定記約本身無二之義義理章約隱現同時之義各得一邊要具此二方得俱成義也謂雖一菩薩若正受起定不同時則不是俱成雖是一時若正受起定之身各異則亦非俱成是故要須通約一菩薩身與正受起定一時之義方為俱成也七微細𥸩相引訂也料簡云微細相容安立門也十句章問微細相容一多相容何別林德答云何因相容故有一多相容相容之貌如何故有微細相客也已上清涼云然微細言揔有三義一所含微細猶如芥瓶以毛孔能受彼諸剎諸剎不能遍毛孔故以毛約稱性却如琉璃之瓶剎約存相如芥子在內二約能含微細以一塵一毛即能含故三難知微細以微塵不大而剎不小而能廣容即難知義已上問於門題中具說三義耶答爾也謂一花一塵是微細故能含微細也剎入一塵不動自位炳然現現如琉璃瓶盛多芥子自位不動炳然齊現故所含微細也一中含多之相微妙深細智不知故難知微細也以此三義𥸩門名時三復微細之言義自現也謂微細之中微細之法微細然相容也微細之法微細之中微細然相容也微細然微細之中微細之法相容也問義理章云此前因陀羅何別答重重隱映牙現者因陀羅攝齊頭炳現者微細攝也已上則微細門者一中攝多其所攝多炳然齊現也其所攝多中各各攝多亦炳然齊現也約如是義重重因陀羅之法炳然齊現故耶答二義具也謂料簡云又由以異門攝同體中相入義故現微細門也由異體相入帶同體相入故有重重無尽帝門也已上以異門攝同體中相入義故現微細門者不相入之異體列十中一一各攝同體內具十中相入之十故一一門中各各炳然齊現也由異體相入帶同體相入故有重重門者異體門中十法各各相望一一各具十此一一中亦具同體相入門各具十之十炳然齊現也是故炳然齊現之義多重故既一中攝多其所攝多炳然齊現又所攝多亦各攝多具所攝多炳然齊現故云炳然現現微細攝重重隱映牙現者因陀羅攝也問初義則爾后義則依何文耶答義理章云此上諸義於一念中具足始終同時別時前后逆順等一切法門於一念中炳然同時齊頭現現無不明了猶如束箭已上一念中現重重因陀羅法界法者一切遠近大小諸法不動本位皆於一塵面上炳然齊現故爾也猶如五鏡懸於五方中央鏡中現四鏡影其所現四鏡之中亦各現四鏡又此一一鏡中非唯現四鏡之影亦現四万二千由旬上之日月也百丈山也毛端也剎海也不轉高下大小遠近炳然齊現也問約塵可爾約時則一念中現因陀羅者何見耶答如人夢中見過去父未生子則一念具三世非移己過父及未生子轉至現在以不動過未之本位恆於一念中具也是故一念中炳然齊現重重因陀羅也問微細相容一多相容何別答十句章云何因相容有一多相容相容之貌如何有微細相容已上如是別也又一多相容者約一多明相容微細相容者約一之攝多義故別也問約一之含多義者則何云相容耶答清涼云能含多即曰相容又法法皆爾故云相容已上故爾也引訂中一塵訂能含微細國土訂所含廣然安住訂安立也八帝𥸩相引訂也初中初法說后喻說法中非是心識思量境界者如是重重無尽之法唯普賢智所知非是事識分別境也喻中如帝𥸩殿天珠覆者結五色珠所成天珠珠明徹牙相現影是故白珠現四色珠所現之珠一一亦現如是攝入重重無尽余四色珠重重亦然舉此以喻普法無尽是故此門從喻得名也十句章云向內求心入入猶外向外尋邊出出猶內者其黑珠影入白珠中故黑珠是內白珠是外然其黑珠影中帶白珠影還入白珠中故不得言一向黑珠是內白珠是外也反可云白珠是內黑珠是外也又其白珠中帶黑珠影還入黑珠中故即可云黑珠是外白珠是內也故云爾也又如從外入於多重門時謂入此門已為內也入其門內復有異門故前所入門還是外也如是重重故入入猶外也從內出於多重門時謂出此門即為外也出此門外復有異門故前所出門還是內也又出此門謂為外也既出此門更有異門故前所出門還是內也如是重重故云出出猶內也因陀羅者此云能天主也又章主遊心法界記云其猶因陀羅皆以寶成由寶明徹影遆相現於一珠中現余影尽隨一即爾更無去來也今且向西南邊取一顆珠驗之即此一珠能頓現一切珠影一珠既爾余一一亦然既一一珠皆一時頓現一切珠影即此西南邊珠復現一切珠中一切珠影此珠既爾余一一亦然如是重重無有邊際即此重重無邊際之影皆在此一珠中炳然遆現余皆准此若入一珠中即入十方重重一切珠也何以故此一珠中現有十方重重一切珠故十方重重一切珠中有此一珠故是故入一珠時即入重重一切珠也一切亦然反此思之即於一珠中得入重重一切珠而竟不出此一珠於重重一切珠中入一珠而竟不𮥷此重重一切珠也問既言於一珠中得入重重一切珠而竟不出此一珠者云何得入重重一切珠耶答只由不出此一珠故是故得入重重一切珠乃至何以故此一珠外更無重重一切珠故云云問若𮥷此一珠內無重重一切珠者此即但一珠所成如何言結多珠成耶答只由唯獨一珠方始結多為何以故由此一珠是多珠故若去一珠全無故問若如是者此即唯一珠所成不得言結多為答言結多成者即是結一珠即多珠之一珠也何以故以一珠即一切珠一故若無此一一切無故是故此唯一珠成也一切准此問此但據義相攝就彼義邊說云一珠即是一切珠可一珠是一切珠耶答今所說者但在一珠中說一切珠不難此一珠中說一切珠也若不信一珠即是一切珠者但以黑點點西南邊一顆珠著時即點著十方重重一切珠也何以故一切珠上皆有點故若言十方重重一切珠不即是西南邊一顆珠者豈可一時遍點重重一切珠耶縱令遍點即應前后有點云何一時一切珠上皆有點耶是故一切珠即是一珠者定無疑也西南一珠既爾十方重重一切珠亦然也既珠重重無際點一皆周主伴始終一成咸畢如斯如喻例法思之法不即然非喻為喻據一分相似故以為言喻但影周質不即入也已上此則分喻非圓當喻也又有一意問乘生天業得帝𥸩報若天業尽帝𥸩報亦尽珠亦尽何故以有尽之珠喻於普眼所見無尽緣起法耶答三乘帝𥸩則天業所感故業尽報亦尽也一乘帝𥸩白淨寶輪王一而無別永無業尽報尽之理故天珠羅網亦無尽也問積界成種積種成海則白淨寶輪王者是統不可說佛剎塵數界種之人帝𥸩者沙波界中一須彌山三十三天之主也何故得白淨寶耶答一云積界成種積種成海者是三乘智度論之所說也一乘中以界種海牙為緣起故約界則具種海種海亦爾也是故若種業人雖在界中亦乃統於世界種也若海業人雖在界中亦統海也是故約其現相雖在沙波一須彌頂如約其亦該統於華藏海也何者外天品帝𥸩所讚十佛之中初三佛是賢劫之佛后之七佛是過去莊嚴劫佛也疏𥸩云此中后之七佛是過去莊嚴劫佛何因得於賢劫忉利天宮而說法耶答此天宮等有有細者前劫燒滅細者常存如經天人見劫尽我土常安穩等又三乘所說者滅一乘所說者常存故已上故爾也此義亦有理也今𥸩一乘中說此華嚴之忉利即是蓮花藏莊嚴世界海故讚十身佛之帝𥸩即白淨寶輪王齊也謂有種業者一向見種有海業者一向見海故此帝𥸩有海業故一向見海是故說此經之忉利即是無尽花藏海也非謂在此界中統彼海也何者第三會忉利天宮染淨無㝵觀云此山上殿等皆是辨染沙波世界如來於彼說十住此處即是華藏世界何以故染淨二界無定相故所以爾者隨業受用不同故今略辨此處有五重不同一唯真理法性之土雖染淨相圓融因果相智相所依故二者無漏德法性報土具衆德自融同毗盧遮那普賢身智所依花藏是三體含權有漏有漏無漏多淨報土則權乘地上菩薩所依用也四者有漏染淨報土生地上菩薩以諸天共受用故五者漏淨土通地前三乘凡夫所依土故既有如是五重不同此乃隨機所感有異今此天宮即是德花藏已上故爾也問天之珠雖云有尽但取重重交映攝入之相以喻此經無尽法耳何要常住不壞之珠以為喻耶答爾然道訂和尚難云若言三乘無尽為過一乘以無尽為德者天珠之既是有尽之法何故以喻緣起法耶若有尽之珠以為喻者緣起之法亦可有尽耶時有嵩業和尚覺潤和尚等云若普賢眼所見則天之珠即是花藏剎海之網故亦無有尽故以喻無尽緣起法也如是會耳經云者初地願挍量文也十地論云者𥸩此經之文也問義理章云因陀羅網境界門者何故偏於此門云境界耶答古人云境有二所緣境分齊境也今𥸩且依一教云耳謂文云帝網差別者唯智能知非眼所見已上故也然重重帝網之法唯智眼所緣故有所緣境義非是心識思量境故亦有分齊境義是則亦具二境義也問地論云唯智能知非眼所見義理章云如理智中如量境界疏云凡論大意約文有二一但有使習煩惱染業及報並入九境自外入聖境聖境有二謂理量二法此二各有二法因陀羅網境界則理中量及量中之一分耳已上此意云何答一云唯理則內訂也理中量則佛外向也唯量則普賢外向也量中之一分則普賢內向也訂分普賢外向門中不得論因陀羅約理中量量中之一分方論因陀羅也一云唯理則圓成分也唯量則遍計分也唯約依他方論因陀羅故云理中量量中一分中論也初義中問普賢菩薩入如來淨藏定窮於如來外向之心於說分中如其所訂而說則唯量中亦論因陀羅何故云唯理中量量中之一分中論耶答此義可許謂理中量量中之一分者約因陀羅究竟之處聖智之境云耳然普賢菩薩以如是所訂之法於正陳法海中為機而說機人如說而修至於究竟訂入之時即是普賢窮訂之心無有異也是故一向云理中量量中一分論因陀羅耳然故不㝵為他人說因陀羅但未究竟耳後義中問文云理理相即亦得事事相即亦得理事相即亦得已上故唯理唯量中可論因陀羅耶答普解德云四句相即者約以理向事門以事向理門方論非約唯理唯量中論也謂以理向事則有理事相即也以理向事則以事差別故理亦如事差別是故有理理相即也以事向理則以理平等故事亦如理平等是故有事事相即也因陀羅義亦爾要於理中量量中之一分論也問若爾四句相即唯於法性融通門論耶答二門可論也事者以理為體而成理既融通故事亦隨理融通者法性門也唯約事中一無自性以二為一二無自性以一為二等直約事事論其無性緣起之義者緣起門也於此二門各具論四句相即義也問其義云何答法性門者事無自性以理為體故以無性理向事之時有理事相即也事無自性以理為體故以無性理向事之時以事差別故理亦如事差別故有理理相即也事無自性以理為體故以事向理之時有事理相即也事無自性以理為體故以事向理之時以理平等故事亦如理平等故有事事相即也故具四句也緣起門者一乘中須者是緣義是故約差別事須差別事時尽法界全成差別是則於差別側不見有平等理故有事事相即也約平等理須平等理時尽法界全成平等是則於平等側不見有差別事故有理理相即也是故已止一緣起門具論四句相即義也問若爾如四句相即亦論四句因陀羅耶答一云雖立四句相即之義若四句因陀羅則不論也謂約同異類界方論因陀羅若唯約同類界不得論故爾也料簡云由異體相入帶同體相入故有重重無尽帝門已上既通約同異體方論因陀羅是故通約同異類界方論因陀羅也三千世界等現其融義蓮花藏世界等明因陀羅微細等義中間界等略而不明已上既積同異類界方成海花藏故爾也然此義難也若云通約同異體辨因陀羅故例此通約同異類界方論因陀羅則義理章同體中云此前因陀羅何別答重重隱映㸦現者因陀羅攝齊頭炳然現者微細攝已上唯約同體立因陀羅故唯約同類界可論因陀羅何云通約同異類界方論耶況一事中尽攝法界者是因陀羅義也雖云通約同異類界然同類是事異類是事故可云是事事因陀羅何故要須通約同異類故不得論理理因陀羅事事因陀羅等四句耶是故此義難也問若爾立於此義通於前難云何耶答四句相即者要於以事向理門以理向事門中論故唯理唯事中不得論也是故設准四句相即論四句因陀羅要於理中量量中之一分中論故不違也今𥸩此二各有二法因陀羅境界則理中量也及量中之一分耳者是約唯理約唯量約理中量約量中一分具論因陀羅處也謂聖境有二謂理量此二各有二法因陀羅境界已上理中二者唯理理中量也量中二者唯量量中一分也則具應云此二各有二法因陀羅境界則唯理理中量唯量量中一分然唯量唯理二句者前云聖境有二謂理量時義已具現故略也是故此文是具論四句因陀羅處也問義理章云如理智之如量境者此約理中量論因陀羅故若量之理中論因陀羅時應云如量智之如理境耶答不爾疏云量中之一分者是唯約境義理章中通約智境故云如理智之如量境也是故具應云如理智之理量境也然如理智之照理境義是法爾故唯云如理智中如量境也問若爾智中亦可具云理量也何故唯云如理智耶答寄三乘說故爾也三乘中云量智唯照於俗理智通照真俗故寄三乘理智通照真俗之義說也九十世𥸩相引訂也疏云十世隔法異成門古人𥸩云三乘中以時隔法則法既流轉故時亦流轉故立無常時也一乘中以時隔法則法不流轉故時亦不轉故立常時也何者三乘中立法孤單故時隔於法法既流轉故時亦流轉也一乘立法圓滿故時隔於法法不流轉故時亦不轉也故瓔珞經中佛告梵摩達王汝前臥狗是汝過去身將我是汝未來佛已上新羅僧智通乃相德十聖弟子之一也居大伯山旀理嵓修花嚴觀忽一日見大猪過門及通依常札木刻尊像尽其誠懇像謂曰過冗之猪是汝過去身我即是汝當果之佛也通聞此告即悟三世一際之法門矣后詣相德敘之相德知其成器遂以法界授也已上則梵摩達王雖時有正像之異地有中邊之殊然其因緣亦相類也三乘中過去唯狗位現在唯人位未來唯佛位故從過去狗位遷至現在人位從現在人位轉至未來佛位故云三乘中立法孤單故以時隔法法既無常時亦無常也一乘中過去狗位具人佛現在人位具狗佛未來佛位具狗人故不從過去狗遷至現在人不從現在人轉至未來佛是故云一乘立法圓滿故以時隔法法既常住故時亦常住也問法則是一牙望而成九世耶如九世之別法亦別耶答如后謂且約吾身於一年中約日則三百六十日故吾身亦三百六十身也約月則一年十二月故吾身亦十二身也一月三十日故吾身亦三十身也一日十二時故吾身亦十二身也一時八刻故吾身亦八身也是故一月約刻則吾身三千如是一年三百六十日一日百刻則吾身亦三万六千身也是故如九世之別法亦各別也問約五位論九世之五位者昨昨日昨日今日明日明明日也昨昨日者唯過去過去故一位也昨日者當體即是過去現在望今日則是現在過去故二位也今日者望昨日則過去之未來約當體則現在現在望明日則未來過去故三位也明日者望今日則現在之未來約當體則未來現在故二位也明明日者唯未來未來故一位也唯約五位牙望論故成九世則法唯是一牙望論故亦成九世何故云如九世別法亦別耶答義理章云以時法不相𮥷故已上故爾也三乘中色心等是法於此法上約前后遷流之義立為時故時則假也故無時別法別之義一乘中以時法既不相𮥷故如時之別法亦別也道申章云一夜夢已過父及未生子各三有九覺時見之但在一念心中非此心中片分為父片分為我片分為子九人揔在一心隨舉即攝九人無所相知而非絶無九人之別非一念外立三為有立六為無有無同處一念而非無有無之別已上故我之無我報心全為父全為我全為子故如九世別法亦別也若約同相則是九世成揔一念之力齊義也若九世中或有或無何得成力之齊也是故爾也問十世隔法者以揔一念亦隔於法耶若無此義應云九世隔法何言十世耶若有此義揔此九世即是一念則九世外有何一念而令隔法耶答以揔一念隔法以別九世隔法二義具故云十世隔法也問捴一念者於九世中無別偏當耶要當現在一念耶答雖於九世無別偏當然經中既云過去世說過去過去世說現在過去世說未來未來世說過去未來世說現在未來世說無尽現在世說過去現在世說未來現在世說平等已上現在說平等者即是一念故當於現在也問若爾九世以外無別捴一念何云以捴一念亦隔法耶答約現在一念中簡余八世則別也於九世中無別偏當則捴也具二義故爾也問現在一念簡余八世之別義九世無別偏當之捴義何見耶答儼師舉喻示於相德云如人夢見父祖父於屋上蓋瓦子孫子在庭中輸瓦其身在於中間梯上傳次而授也祖父則過云過去故一位父則過去現在現在未來故具二位中間人者過云之未來現在之現在未來之過去故具三位子則未來現在現在未來故具二位孫子則未來未來故唯一位於此五位中間傳瓦之人約當體則簡余八世故是現在現在約通夢五位之念則於九世中無別偏當也是故此人具二義故以捴別時隔揔別法也揔別合舉等者何故世門別外立揔名為十世錢門不爾耶答一云則錢門別外立揔為十一錢也一云世門約不即義故揔別各說錢門約不𮥷義故別外無揔也一云此經是十十法門故世門中加揔為十錢門中別既具十故別外不立揔也以時無別體依花以立等者約此花說則芽生花敷則春葉茂果結則夏葉落果熟則秋收藏皈根則冬如是依於花葉以立四時亦論九世故爾也經云者𮥷世間品也又云者兜率天宮品也無量無數劫能作一念頃者相和尚云事一念也刊定記主云理一念也此章主通約理事也何者經中可數劫容不可數劫非劫容劫無量劫入一念等者疏𥸩云劫者約事非劫約理無量劫入一念者通理事故爾也十主伴𥸩相引訂也經云者海幢比丘處文也是故見此花葉等者揔結前十門也即是托事門義以十門中不立此門今結中現也義理章云隨託別事以現別法者所託之事即是所現之法然所託之詮所現之詮似別故爾云耶所託之事所現之法別故爾云耶若如后者何故彼云三乘中已有此義此何別答三乘托異事相表現異理今此一乘所託之事相即是彼所現道理更無異也具足一切理事教義及上諸法門無不攝尽已上云耶若如初者彼章托十種寶王雲等事相以現十種普法則何得所託即所現耶答一乘中雖云所托即是所現故三乘別然所托詮所現詮不無別義故云隨托別事以現別法也若約菩提樹成佛之義三乘則云表佛之蔭覆義表佛之德行建立義故樹下成佛未云樹即佛也一乘中樹即菩提故三乘別然以此樹稱於緣起六法界故樹即菩提也是故所托詮所現詮不無別也又三乘衣表忍辱座喻通光室喻慈悲唯托一法以表一法今一乘中以一花葉以表十法及十玄門故三乘大別也上來且約一花以辨門法一花既爾隨舉法法亦如是說是故若約今日吾身以論十種普法觀者吾五尺身表令生解為教即是所詮為義吾身五根四大等歷然差別為事無性同真為理經云衆生即法身法身即衆生故觀吾身從頭至足從足至頭不淨白骨觀身空寂觀身無㝵為所觀境如是觀者為能觀智我之所造善惡無記等諸行為行今日所受九夫之位為位吾所造業為因所感之報為果吾是有情故為三諸佛菩薩遍吾身諸毛孔中說法度生又八万戶蟲之所依止故為依經云衆生形世界故吾本覺真性本來常住不遷不動為體應於今日五尺之身宛然現現為用吾身即人以此是緣起法之所攝故為法吾身所造不善等行違於真故為逆所造似善行等為順吾當果佛吾內熏無有捨𮥷剎之頃我若作善助令增長我若作𢙣依猒今脫為應今迷心中之所得故為感也若論十種無㝵觀者今五尺身同真性者是性不㝵五尺者是相吾五尺之普周法界則廣不壞本位則狹云云等故如是吾身若圓若分本來具足十對普法及十無㝵故若於四儀依四種修修此觀者不移五尺即是無尽法門之海即是自體毗盧遮即是普賢境界即是華藏莊嚴剎海即是大方廣佛花嚴經也奇哉未曾有也花嚴學人可習此觀矣宗蜜師行願品抄中𥸩剝皮為紙折骨為筆等文云二約觀智𥸩謂觀察此身若皮若骨都無定舉體全空無我我所雖然目覩似有身相其猶聚沫泡熖芭蕉既無自體元同法界如是推窮三諦具足成空假中微妙三觀詮於此義生得此解契合心機即是寫經以經是詮表生解義故若不觀察心迷取相即無經也已上亦當此義也𥸩經意苐八先舉數㧾標后為明下列名廣𥸩亦可先別字后正宗也初中法相圓融者牒前十法及十無㝵實有所因者正敘此假后中先列名次於此十下明十功能后初無下依名別𥸩初中料簡云果德圓極故此章略無加如夢現故立其十門清涼則以此中如幻事如夢現合為一如夢幻也以此中勝通力故解脫力故合為一神通解脫也以料簡果德圓極為佛訂窮料簡及此中所無如影像故立為十門此並現法方便不同無別義也依名別𥸩中初無定相中先𥸩相后引訂也初中以少非定小等者道申章公云小之大義能容大大之小義爾中之義章主云不必小之大相大之小相方容入直之小相能容大之大相能入已上謂十方入微𭎇時十方不壞大能入微塵中微塵不壞小能容十方界十方大相微塵小相各無自性是故十方大微塵小不別微塵小十方大不別故能容入也問欲知至大有小相則以大之小相能入小中何故云不壞大之大相能入小耶答是故有人欲遮此難𥸩此偈文云欲知至大有能入至小之相故發心也故不壞大小方能容入也今𥸩欲知至大有至小之相也謂十方之大無定自性故塵無別微塵之小無定自性故十方無別則十方之大自具小相微塵之小本具大相是故十方之大以本具之小相入於微塵故非是壞大變小方入小也道申章儼師遷神十個日前學徒進所問許師問大衆曰經中一微塵中含十方世界無量劫即是一念文汝作何物看衆人白云緣起法無自性小不住小大不住大短不住短長不住長故爾耶師曰然之然矣猶生白云何謂師云莫須多道唯言一故已上十方之大微塵之小是一不二故不壞大小方能容入也又相和尚云大小無㝵可如夢所見無我報心由睡眠緣全塵全山非片分為塵多分為山又相和尚云一微塵中含十方世界者同是一無住故爾問微塵無住小十方世界無住大耶答一量也問若爾何物言微塵小世界大耶答微塵十方世界各無自性唯無住耳所言塵小世界大者是須處須耳非是小故云小大故云大所謂不知塵小世界大機中令知塵小世界大故且言塵小世界大耳非是一向塵小自性世界大自性矣亦得言塵大世界小道理齊一無住實相也已上是故知隨須十方大微塵小本來不別故能容入也二明一切法皆唯心現中𥸩相引訂也前中有二𥸩初約心體后約心緣用謂清涼云唯心現者一切諸法真心所現如大海水舉體成波一切法無非一心故大小等相隨心回轉即入無㝵已上故知初𥸩約心體也隨心所緣全是心故心緣小時毛端隨現心緣大時世界隨現是故彼心之所緣毛端之處此心於彼現大世界緣也故知后𥸩約心緣用也訂中苐四會偈讚品也彼心不常住者能緣之心所緣之法同一無住故爾云也三如幻事故引賢首品也四如夢現故攝論也五勝通力地論明如意通法界通生自在通如幻通是四種通也清涼引智論說四通一法智通觀一切無性故二神足通自身現生住滅修短隨心自在故三如幻通轉變外事無不隨意故此二內外為異四聖自在種種變化通謂十八變三輪化等已上約轉變外事故云幻通攝然余三亦具也問清涼云十中前六通約法性為德相法爾如是后二皆葉用義通因果七約起修義通德相業用故八約果德唯是德相已上何者德相何者業用耶答諸法法爾本自無㝵者德相也諸佛菩薩以神通力對機示現無㝵之相者葉用也以刊定記主於德相業用各辨玄門是故清涼亦分配也若依此義以𥸩此章則勝通力者是業用余則德相也然章主所以不分者以一乘中變化即是德故也諸佛菩薩以神通力現無㝵相即是法性德所攝故不別配是故要義問答云小乘中諸根相作但變化成非改性也依三乘教變化及改性並得自在依一乘教變化改性並依緣起本法現現亦無別性可變可改已上故爾也六深定用清涼云海定等諸三昧力故又古德云從於海三昧出故三種世間成因陀羅也已上此義也問若訂分中不說因陀羅者何故古德如是云耶答二義可見從海出者約廣門海耳非是三本定之略門海也又亦可三本之海也初義者𮥷諸向背訂三世間法者三本定之海也花嚴經法並是海發揮者廣門海也是故法數章云所有無盡法數及余乘數皆一乘所目即是一乘由同在海定中成故又十句章云教義二大有五重已上五重並是海則廣門海義也后義者訂分中不論因陀羅者以不可起言說其相狀故耳然訂分中因陀微細方究竟具也故云從海三昧出故三世間法成因陀羅也古人云佛於樹下始成正覺訂三世間是自身心即此所訂三世間中智正覺世間亦三世間以為身心又此佛所訂三世間中智正覺世間亦三世間以為身心如是等故三世間法因陀羅也是故又古人云於內訂內因陀羅微細究竟起也但其起相不可說耳下文云者賢首品也八因無限佛地善根所起之法等者一云望佛地之善根也謂今在此堂聞此普法所種善即是望於無盡佛果之善也以此善根所起法故如是自在也一云極至佛地之善也謂下微衆生上極佛地發菩提心方於此堂得間普法若非如是發大心人無由得間也則以上極下該發此大心所種善根之所起故如是自在無㝵也清涼云八因無限故者謂佛菩薩昔在因中常修緣起無性等觀如所起果具斯無㝵已上則約因地善也今𥸩雖不㝵於因善根義然一乘之法無不是果法於此果法約修義為因約訂義為果因果無異故云佛地善根也九緣起相由𥸩相引訂也初中先正𥸩后由如此下現無㝵也初中一多牙為緣起相由成立者由一故有二由一故有三乃至由一故有十如是相由成立是緣起義也有如此相即相入等者由一故有多若却初一呼第二為一則第二言我是列十之中苐二耳非苐一也呼苐三為二苐三言我是列十之中苐三不是苐二是故無一多皆不成也又却第二亦爾如是由有初一故得有余九方即入等也一約用有二力無力等者有力則是能持所依無力則是能依所持也二約體全體有空等者有體則能作無體則所作也相是相即一義謂一即是多多即是一等故也是故相即者空一即有多空多即有一也相是亦爾也異體相客具微細義者取異體之一分也相入中具能所入相容亦爾然唯取能容故云異體相容也異體相是故具隱現義者隱現相即一耶答異也緣起相由門同體中具即入異體亦爾今此通約同異體之即入論十玄時且云異體相是故具隱現耳不壞位具在一中者相入也雖不壞多位然不見多位唯見一者隱現也多全是一者相即也相入如兩鏡㸦照隱現如片月交映相即如波木相收故三門別也又隱現者非唯約即門謂疏云相即為隱相入為現或反此又同體即入現異體即入隱或反此如是多重隱現是故別也同體相入故有一多無㝵同體相即故有廣狹無㝵者相入一多無㝵同相即廣狹無㝵同耶答雖別不同且約相似義云耳一多無㝵者具無邊德不可言一融無二相不可言多如是一中具多入門相廣狹門者事如理過而恆不失本位分齊故即門相似故爾云也問料簡云由住一遍應故有廣狹自在此何別答彼通同異今此唯約同體故別也問住一遍應者演義云此是第二門是則彼亦唯𢩁同體門耶答要住自一方能遍應者舉異體現同體也遍應多緣方是一故者舉同體現異體也是故要住自一方能遍應者唯見遍應之門故云此是第二門然住一故狹遍應故廣故是知通約同異體也又由異體攝同體故有帝者料簡云異體相入帶同體相入故有帝元尽門已上通約同異方論因陀羅耶答唯約同體十中二各自具十其所具十中亦各具十如是重重異體亦爾故同異體中各具因陀羅是故義理章同體門云重重隱映牙現者因陀羅攝也然此章料簡則以異體無尽攝同體無尽時初重相攝已現因陀羅故如是云也下文云者十忍品又云者光明覺品也解云等者此文有多𥸩今約緣起相由義引也十法性融通𥸩相引訂初中有四一簡非二今即下現正義三若一下遮外情反𥸩四今既下順𥸩也二中不異理之一事具攝理性等者吾身理性無所不遍上極佛果下該三途是故吾身理性與諸佛菩薩及諸衆生所有理性是一無二以吾理性攝他理性則三途人天及諸賢聖無性之理全在吾身所依理性既如是融通能依之事亦不異於理故隨所依理尽三世際尽十方際上至諸佛下至三途染淨之法一切皆於吾身具也今既一事等者如是事不異理理不異事故於吾身中攝一切法無性之理無不皆尽則能依一切豈不頓現於吾身耶此中若論四句相即者不異理之事故事理相即不異理之事故事亦隨理平等故事事相即不異理之事故理事相即不異理之事故理亦隨事差別故理理相即問唯一乘中得論四句相即耶答三乘得論三句但不得論事事相即耳且約理性是一之義得云此事即是彼事不得言此一事中攝余一切法一而無二也謂章主十忍品疏云第五即入門有五一理事相即謂中兔無二故經云色即是空空即是色等二理理相即謂兔頭則巾兔足亦即巾二巾無別故名云即經云衆生賢聖則如無別三以理從事名說事相即兔頭巾不異免足巾故頭即是足無行經云若人欲成佛勿壞於貪欲諸法即貪欲知是即成佛解云應說諸法即空何故万云即貪欲者以貪欲即空故舉貪名取貪也文意如此四以理融事二事相即如兔頭無別有則以巾為頭巾體圓融故令頭即是足此經云一即多多即一等又云深入如幻於一事中解衆多法此約法性融通力五以緣起相由力令二事相即如幻師幻術力令一即多多即一等故賢首品云或現須作百年幻力自在悅世間等良以幻法空無障㝵故得自在也如相即既爾相入亦然如異體既爾同體亦然此門既爾余門亦然思之可知已上初三門三后二門一乘也三乘之苐三門中巾即理也頭足事也事之頭與足皆是一種巾所成故且約一巾所成之義云頭即足耳舍那品者據義揔引說花藏世界海之文也同是安住理法界故令彼能事等者能字冝在令彼之上也明經益第九先舉數揔標次一是聞下列名后牒名別𥸩也初中信回聞趣入通於解行及訂也別𥸩中若配三生則一云聞第十則訂入中八則解行也然初發心時所即是第三生果等是故中八並是解行者亦聞益𥸩相引訂二也問見聞者唯遺教耶答如問二義也初義者無為文云謂遺法向此無尽法故問儼師見聞性起疏云廣文有初在二若有得經卷地下未來住持用已上現在正說益故見聞亦通正說耶答現在體益亦是遺教也章主疏云第十明性起見聞供養善根前既示涅槃今明供養余迹成益不虛故次明也已上既揔舉見聞性起來意云供養餘迹故唯遺教也問若爾於遺教中現在體益未來住持用何別答雖是遺教親見像佛親持經卷所植善根是現在體益昔有像佛反經卷處札拜供養所植善根是住持用也是故此中且引未來住持用耳今𥸩通正說也儼疏初明現在體益等章主𥸩見聞性起中云所謂於佛若見佛及像若聞名及稱念若三業恭敬若四事供養於此四位所種善根廣無限不可稱說已上見佛者是正說中親見佛也見像者是遺教中見像佛也藥王夛益喻云合中二初以佛合藥樹見聞等明佛在世作六根境二若有得經卷下合地土等明佛滅后益已上故現在體益是正說見聞也問若爾何故章主𥸩見聞來意云供養余迹成益不虛耶答以見聞益多分在遺教故如是云耳約通正說也此中見聞亦爾也問若爾何故此中但引未來住持用耶答遺教之中見聞尚難正說之中無所難故且舉遺教難成之益以現正說見聞之益轉轉廣大也問若爾何故兼為中云謂遺法中見聞信向耶答見聞之益遺教相現是故舉遺教中相現之益為兼為之時正說見聞亦是兼為義自現故爾也問此中見聞兼為何別答此中則廣兼為則狹也謂此中云乃至不信邪見衆生見聞佛者乃至斷一切𢙣等已上以并引不信邪見故廣也兼為中唯約信向等故狹也問此中亦云信向趣入此普賢法圓通頓益者何耶答信向趣入此普賢法者通標十益所以爾者以十種益宗於信向之所立故從其所宗如是通標也然此中含有不信邪見於見聞中成益義也問文中既云遺法所種善根訂中云若有得經卷地則此章見聞唯𢩁遺教何云通耶答如前會性起來意所現之義以會此文故無難也問正說之時皆成解行何云有見聞耶答智論云舍衛城中有九億家佛在其城說法行化二十五年三億家人見佛聞法三億家人聞世有佛不得親見三億家人不聞不見然則佛世尊同在一城如是之人尚不得聞佛之名者如是之多故知正說未必皆成解行益也問見聞既爾解行如何答此亦通也問大機所感但是常恆之說何云通於遺教中耶答若成解行則見二七日無尽之說然依遺教之詮發此解行之益故爾也訂中先引未來住持用文次佛子乃至下引深饒益文雖是不信邪見衆生見佛聞法而生誹謗如來方便潛加蜜益令得勝利故云深益也是故𥸩深饒益文中次引如來祕蜜藏經罵藥服之得力罵沉燒已還香罵佛猶勝敬諸外道等五卷大悲經云若出家人袈裟著身假令左手推乃男右手推乃女從一酒家至一酒家佛言我記此人不出賢劫當得涅槃已上不信邪見謗佛謗法佛尚不捨密令饒益要至佛果故云深益經云寧有智讎莫無智親又生公云菩薩之名起此聞謗之日已上此中合也問廣饒益之見聞配於兼為深饒益之見聞配於何耶答遠為中見也以五所為攝非器時初非器是凡夫故遠為中攝狹劣非器轉為中攝守權非器引為中攝是故不信邪見見聞之義遠為中見也問見聞生中亦有成佛義耶答又超師遺志集云大緣起法一成一切成者何故經說三生成佛何不見聞即成佛耶答若得見聞即成佛者即非是見聞何以故以見聞不是成佛緣故如經見聞但無成種子說成佛者是即佛善巧說法令物見聞若於見聞成佛者是則佛無方便非善巧也又即此見聞成佛等同時成就何以故由佛得成見聞故若未成佛以何見聞若未成佛而言有見聞者是則不從因緣便是顛倒何成見聞耶如舒手取盤未抱著盤不名為手及其是手必抱著盤言不名手者不名把盤手也若是手者即把著盤也問若言見聞成即是佛亦成時者何須解行耶答若無解行即非見聞亦不成佛何以故若無解行即無見聞何得成佛以無解行即緣起不成何有見聞即言成佛耶問若爾者今有人見聞此經成見聞不答成不成言成者但見聞供養皆成不虛故經云如人食少金剛終竟不消等是也不成者要須教相應無我見聞純一無雜以教是無漏從最清淨法界所流即是如來勝善功德具足清白𮥷諸雜染𢙣見患方得成見聞也故經云其說法者無說無示其聽法者無聞無得等是也又要解其義緣起鎔融等方為究竟若不解此義未為究竟也經云若不解此義終不成菩提等是也問今人既逢遇此經後得見聞成佛種何以猶拘九地而不成佛耶答以未見聞故何者由未成佛也故論云若果未生時是時不名因是也若成見聞即佛舊來成非是今見聞后方成佛也問既言大緣起法一成即一切成今已見聞此經何以不成佛耶答若論經說入大緣起即合成佛以為今人但唯見聞未成解行緣起義隔故不成佛何以故無解行也以無我見聞教不隔故見聞成也以教垂機不虛設也今雖得見聞由未解義以義隔故未得成佛也以彼解行未成故其猶重雲疑停在上雖未下雨然諸草木已得滋潤何以故以是雨勢分故見聞亦爾但是種子未有現行故不成佛然以是教之勢分也已上若緣起法界相應之見聞則得一即得一切故成佛也若未相應之見聞但得教之勢分故名為堅種不得成佛也准此思之二發心益謂信位滿稱彼佛境發此大心者始起圓信入法之初亦是發心但相似發非究竟發至於滿心方究竟發也是故融通即遍如前無尽時處等法界者信滿發中有融入融攝二義今則融入義也既入彼攝彼即令諸位亦皆成滿者約融攝義也何者信滿發時遍於時處等於法界故是融入也如是信滿還攝於前無尽時處乃至法界故是融攝也經云者初發心經文也疏中𥸩不由他悟云他有三義一小教二心外三性外已上此三義何別答不由他悟者非是不依諸佛菩薩及不聞法而得自悟以依不思議乘普法悟故云不依小教又依花藏當中畫作海鏡者以表衆生本識心也依海鏡有種種光明葉香幢蓮花生者表衆生之菩提心也於此花上畫諸善友等者表諸善友元在自之菩提心中也善財則遍參於自菩提心中所具善友修普賢行非是參於自心以外塵數善友故云不由心外也善財自心如來之藏即是無住法性之海以法性無二故善財之無住法性善友之無住法性及一切法無住法性只是一也是故善財訂此法性成佛之時善友也衆生也諸法也一切皆成佛然其所訂非是訂於自法性外無住法性故云不由性外也𮥷世間品云雖知不由他悟而多事善知識者即此義也道申章云我之當佛化我令修行否相和尚答曰得也若彼佛不化我我則不得修行成佛問我修行方成彼佛何得彼佛預化於我答緣起道理若非彼佛即無今我若非今我即無彼佛故知爾也如對於今乃至尽過去際亦然問若爾但自是何用須化答非他故化若是他者不得化何者自以外有非自所化問既自古是佛何為化答是佛故化若非是佛雖終劫化不得成佛雖自古是佛而不知自本是佛以化令知自本是佛名為化耳化無所化成無所成已上彼當來佛非是他佛者以訂我身之真性方得成佛我勤修已方成彼佛故爾也又云初發心菩薩即是佛等者發心品也疏𥸩或云因中說果或云解同佛境或云約理平等若約三乘教亦得如上說今尋上下經文約一乘圓教始終相攝圓融無㝵得始即得終窮終方原始一由陀羅尼門緣起相攝故二普賢菩提心該六位故即因是果也三由法性無始終故發心入始即正是終是故上文云初發心時便成正覺具足惠身不由他悟此之謂也已上此三何別答前不由他悟三𥸩如次同也初𥸩者由依如是緣起相攝陀羅尼普法故初發心時便成正覺則不由小教也二𥸩者由普賢菩提心中具六位故初發心時便成正覺則不由心外也三𥸩者由無住法性始終無別故初心法性即佛果法性是故初發心已便成正覺則不由性外也然故三𥸩終云是故上文云初發心時便成正覺具足惠身不由他者通訂前三𥸩也三起行益𥸩相引訂也一云小作方便者六相方便也然此言梵行品普賢行品性起品皆有也今此引普賢品也疏𥸩云苐二佛子是故下結勸聽受何以下𥸩現要勝以普賢行必一攝一切故是以少作功力疾得菩提此方便者是功用也性起品疏云少作方便者以依普門㸦相攝故一得一切得故如善財一生龍女速疾等已上以緣起法一中攝一切故隨何所舉得小力時即得一切非謂偏約六相方便也四攝位益先明即入后餘廣狹下例余門初中先標二門后然有下別𥸩中先約信位論二門后十住下例現住等亦爾也初中全位相是者即門諸位相資者中門十信滿處即便成佛者所詮章云若爾是初門即一切者何不信初心即得而說滿心等耶答若自別教即不依位成今寄三乘終教位說以彼教中信滿不退方得入位今則寄彼三乘得入位處一時得此前后諸位行相已上此答意者若自別教無位故無不位應言十信初心亦得如所問義今寄三乘終教之詮故言滿心耳問若爾三乘終教是自別教以外耶答寄於三乘以現一乘行故豈外也哉此中可作三門謂一約相論相門如約相就門分位前后等二約相論門如約體就法前后相入三約論門如自體別教也以自別教中初即具后后即具初具足一切故不可定言其位作佛故云不依位成若依此義隨吾所舉說也是故一乘行中信初心第二心等乃至三界及法界法門隨何成也道申章云隨舉一位尽攝諸位始即終終即始義既如是信初具配五乘乃至第十心解行回心心具配五乘已上此義也今章中亦寄三乘信滿住初之八相成佛以現一乘究竟成佛之義然有二別三乘云化現成佛一乘云行成佛三乘云入住初成佛一乘云於信滿中即得成佛故別也問十信勝進十住自分何別答一也道申章云信終勝進解初自分一種已上可知也又云在於一地普攝一切諸地功德者淨眼品也儼疏𥸩云就行相次第終至窮自體以論略要有四一者以於始故能生於后終竟滿足故名攝也二者雖是初始然皆能行諸地所行諸法無殊故言攝也而所成之行但在於自分之位上下優劣但以明昧為異也三者但是初始即攝一切諸地功德故名攝也四者非謂以初后故名攝但是初始即正是終故名攝也已上初二𥸩三乘后二𥸩一乘也一乘𥸩中一云初則同教后則別教何者初則以三乘位盡於無住大虛空中分其諸位初后之相寄此初后以明相攝故同教也后則以一乘無位故若強論者則是二十二位也是故若自別教不依位故爾也對初二𥸩行布則苐三𥸩義亦是圓融然寄他位明攝故對后直現別教之𥸩則是同教也一云初則外化后則內訂一云初則際后則窮實也今𥸩初則中門后則即門也謂初𥸩云但是初始即攝一切已上攝義雖通中即然后𥸩云即正是終已上故后𥸩即門也對此故知初𥸩之攝是中門也問非謂初后故者唯簡第三耶亦簡初二𥸩耶答唯簡第三謂中門是位不動門故約初后之異明其相攝今此即門是位動門故初即具后初后不異故知唯簡中門也章主疏中𥸩此文云此亦有二一約相入明攝二約相即明攝已上是故如次當於一乘二𥸩也問行相次第終至窮實自體者何耶答行相次第則初二𥸩窮自體則后二𥸩也初二𥸩中以於始故能生於后則如適千里始於初步為山之功皈於初簣后位究竟功皈初心者初教義也初心之人一念頓具諸位之行但以明昧而分前后如人初生五根皆具及其長大方始成人即是始覺同本覺義者終教義也五速訂益𥸩相引訂也依此普門者刊定記主約微細門亦名普門然章主意則不爾以普賢法界圓融無尽故名普門耳引訂中約實具引少相品文也彼品疏科經文云文中二先略后廣前中亦二先明果用攝益后菩薩下明因用攝益因用中二初令𮥷苦生天成安樂行二生天已下令不著天樂成饒益行亦是前身光益后空聲益云苐二廣辨中亦二先廣前光救𢙣道后廣前聲益天處后中有六初因𥸩疑二汝等應當下正勸報恩三時諸天子下依勸興供四是故諸天子下教發心悔過五說是法下聞教獲益六爾時諸天子於一一毛孔下明得益傳通成無尽行於中二先於毛孔出法界供具供養於佛二現供具所成利益三先花益廣見諸佛故二香益廣滅惑障故三蓋益廣成大行故蓋益中三一見此法門之蓋故得一恆沙輪王善根二得此王位所化利益此中有三重益三如是成就下所得利益之相云云已上放足下光者略標中無足下言蓋從廣辨文引耳普照十佛世界塵數剎者若約廣辨者應云六十億那由他佛剎微塵數剎地獄衆生今從略標引耳聞空聲乃至具足三昧者引聞法獲益文也廣益衆生者滅障益轉利益中所引經中義也疏云以彼衆生宿有見聞普賢法種復遇舍那法界光觸故得十眼普賢之益已上行願抄云宿聞圓法成金剛種今生再聞不簡九聖必能訂入若准諸教八難障於聖道今明以圓法力故障難之九尚入況無障難之九耶況賢聖耶即知此經功力超於諸教已上准之問天子成解行益者地獄中成耶答一云相十眼則地獄中成體十眼則天上成也一云在地獄成也一云生天成也初義者命終以前云彼衆生十種眼耳鼻舌身意諸根行業皆悉清淨者相十眼也命終以后云得十地諸力莊嚴具足三昧又云成就法界善身口意業者是體十眼也若是一種不應再得也第二義者既命終之前云彼衆生十種眼耳皆悉清淨故爾也問命終生天后云得十地乃至云成就法界善身口意則可生天成耶答雖地獄一念中得如是之益然布列成文如是前后耳一乘行者若除惑障時一斷一切斷若成行德一成一切成故爾也今𥸩生天成也此章云才從地獄出聞此普法即得十地者明是此法之深益也本疏云創得出獄已聞此普法即得十地者明三乘漸次之教不同又宗趣云放一光照十世界塵數剎地獄衆生皆得生天成十地十眼一乘三乘義章云訂彼普賢解行法所依身者亦得在彼兜率天成諸天子身從三𢙣道出生彼天得無難身成普賢解行法等已上故爾也問經云滅除苦痛令彼衆生十種眼耳乃至皆悉清淨彼諸衆生見光明已皆大歡喜命終皆生兜率天上約此經文則何言生天然后得十眼耶答古人會此經文命終之言牒前滅除苦痛之辝欲令鉤瑣經文次苐故爾也故十眼之益生天方成耳問若爾何故重言耶答從又菩薩至悉皆清淨者是舉能化光明勝能也彼衆生見光明下舉所化天子成益也是故先舉光能后現天子成益之相故無重言之失也既科經文云初令𮥷苦生天成安樂行二生天以下令不著天樂成饒益行已上從滅除苦痛命終之文云𮥷苦生天從十種眼耳皆悉清淨之文云成安樂行故云爾也問若爾十種眼耳諸根行業皆悉清淨者是安樂行耶答爾也謂若不約十種眼耳鼻舌為安樂行唯約除滅苦痛命終之言云𮥷苦生天則約何云成安樂行耶故爾也問生天上已聞空聲說法方得清淨何故云此是安樂行益耶答生天上已聞空聲說法十種眼耳皆悉清淨故且六根清淨者是安樂行也而十種眼耳鼻舌身意清淨者是六根清淨故十種眼耳清淨是安樂行也問何者是安樂行何者是饒益行耶答佛地論第七云令修行善因名利益令得樂果名安樂又令𮥷𢙣名利益令其攝善名安樂如是多重也論之初𥸩合此中義謂安樂行文說得樂果饒益行文說善因利故得樂果者安樂行也善因利者饒益行也問生天以后得十地諸力莊嚴具足三昧成就法界身口意業已上則饒益行中亦有得樂果義何不爾耶答非是通約廣辨之文論二益地唯約略標之文也謂略標中云生天上已聞天妙音名不可樂此音聲語諸天乎言以不放逸故於諸佛所種善根故遇諸善知識故舍那佛威神力故地獄命終生此天上已上則無得樂果之文故爾也問疏云亦前是身光益后是空聲益已上安樂行益是身光益饒益行是空聲益耶答爾也問聞空聲后云十種眼耳鼻身意皆悉清淨則不是身光益耶答是舉彼益以現身光之能故不違也問聞空聲以后之所清淨但是空聲之能何故云舉彼益現身光之能耶答若推其本是身光之能故爾也是故明三重天子之益已云以此却推揔是如來一小相中一光明力已上故爾也問苐二廣辨中赤土先廣前光救𢙣道后廣前聲益天處已上廣前光救𢙣道者是廣安樂行廣前聲益天處者是廣前饒益行也若十種眼耳鼻舌身意諸根待業皆悉清淨是安樂行者於廣辨中應廣說也然廣辨中不辨此義何故云十種眼耳清淨是安樂行耶答若科經云先廣前安樂行后廣前饒益行者可如來難然更作異辝云先廣前光救𢙣道后廣前聲益天處已上廣前光救𢙣道者唯廣前𮥷苦生天廣前聲益天處者唯廣前十種眼耳鼻舌身意皆悉清淨故無難也是故下云得十地諸力莊嚴具足三昧成就法界等善身口意業者是廣安樂行也問𥸩安樂行已云第二天上益中已上則前是地獄中益何云安樂行是天上成耶答𮥷苦生天之義是地獄中事對此云第二天上益也十種眼耳鼻皆悉清淨者雖在前假然生天上聞空聲后方得清淨也六滅障益依此普門亦一斷一切斷者一云地獄天子之斷是一斷轉利天子之斷是一切斷也今𥸩唯約轉利天子見蓋蒙香滅除罪障之義云一斷一切斷也例此則唯約地獄天子滅除苦痛亦說一斷一切斷也內外各有五百煩惱八万四千煩惱者疏云一師𥸩云煩惱根本有十使然一惑力復各有十即為一百計應分為九品但上內重故開為三品中下輕故各為一品合五品即為五百於內外境起合為一千此是根本使然以自五塵為內以他五塵為外一一五百即為五千別迷四諦即成二万并本一千即有二万一千依三毒等分故有八万四千也又有𥸩云以十𢙣為本轉轉相成一一各十故成一百迷自五塵為五百迷他五塵為五百合為一千正迷十諦法門謂四諦三諦二諦一諦或迷說成諦等十諦或迷十善故成一万然迷十諦空有不同分成二万或迷十善二諦亦是二万并本一千揔二万一千依三毒等分故有八万四千塵勞門也又第九地疏准賢劫經說佛一代有三百五十度功德法門謂始從光耀無極度終至分布舍利度一一各以六度為因便有二千一百以此對治四大六𮕱十種惱患即成二万一千四大是內報身也六𮕱是外六塵𮕱耗善法故名也以此二万一千各化四種衆生一多貪二多嗔三多癡四等分即成八万四千諸度法門能障之結即是八万四千煩惱業等亦爾已上計八万四千不定也皆悉除滅者疏𥸩云現種使習一切皆尽以普滅非別滅故何位滅通五位故云何滅如虛空故本來尽故已上可知七轉利益經云若有衆生見此蓋雲者彼諸衆生種一恆河沙輪王等者疏云三見蓋益中三初見此法界法門之蓋故得一恆河沙輪王善根皆如白淨寶等此是世界性中万子已去輪王如愛見善惠王等非是金輪千子王四洲等謂一恆沙箇白淨寶輪王善根暫見此蓋頓得成就已上此文意者一恆河沙金輪王所植善根白淨寶輪王一量耶因見此蓋所成福分一恆河沙白淨寶輪王一量耶答一云如初然此中之意如后說也問白淨寶是解行人見蓋得益之人亦是解行則一恆河沙轉輪王者似是千子金輪耶答既解行中有五位別初位菩薩亦是白淨寶輪王今此見蓋之益是舉第十地故此菩薩之福分一恆河沙白淨寶輪王齊等也是故清涼云第九地菩薩名白淨寶輪王已上自苐九地下至三賢數至一恆河沙之福分一苐十地菩薩福分齊等故云種一恆河沙輪王善根等是故經云白淨寶者舉苐九地菩薩也等者等取第九地前諸位菩薩乃至三賢也普見肉眼者疏云經文喻云如在欲界已得初禪身雖未轉得彼天樂如是衆生遇此光明頓得十地身猶未轉令本身肉眼而得普見是法力也是即三祗可以念者明一攝一切塵劫不窮一位者明一切攝一也如是遲速無㝵自在是此圓教非余宗也已上清涼云以欲界眼見色界境喻菩薩頓訂未轉本身見十地境以法力故已上肉眼分齊者經云比如菩薩摩訶薩以左手持億那白他佛剎微塵東行過億那由他佛剎微塵數世界乃下一塵如是東行尽此微塵如是菩薩悉能了知彼微塵數亦識諸塵本剎來處及下塵之剎乃至十方亦復如是菩薩摩訶薩復能還集此諸微塵作一佛剎於此佛剎亦分別知佛告寶手菩薩言於意云何如是佛剎廣大可思議否寶手白佛言世尊如是佛剎無量無邊不可思議世尊奇哉奇哉若聞是喻此人難得聞而信者亦復難得佛告寶手菩薩如是如是若有善男子善女人聞而信者我授彼記速成阿耨多羅三藐三菩提得一切種智佛告寶手菩薩言比如千億佛剎微塵世界如上喻說此一切剎末為微塵彼諸世界一一微塵悉一切佛剎微塵數等菩薩取數微塵展轉更種乃至八十彼二微塵生果悉一切世界微塵數等菩薩摩訶薩業報清淨肉眼悉分別見亦於念念中見百千億由他佛剎微塵等如來云云疏𥸩云即此身上得十眼等未知分齊故今於十眼肉眼最𥸩其分齊余眼深妙可以類知於中二先明見世界廣大后於念念下見佛廣多前中四初明一重廣大於中并取下塵點盡處已來剎并本塵揔合為一廣大之剎二問答辨難三佛告寶手下重積數現謂於如上一廣大剎復數至此千億等復末為塵此一一塵各一切佛剎之塵數等菩薩取此諸塵經八十返種一一生得一切佛剎微塵等果四菩薩下結肉眼見謂如此數量如此廣大是此肉眼所知分齊境界明知此眼深廣無邊智論云五眼中肉眼但見三千大千世界內事若見大千界外則何用天眼為解云彼約三乘漸次教說故不圎也已上八造修益造修者進趣義也以善財歷事五十五善友造修故也乃至云一切菩薩無量劫修等𣃥勒知識經文也疏云余諸菩薩無量劫修者約隨位差別說一生皆得者約普門該攝說已上二𥸩云何答雖有多𥸩然余菩薩三乘故隨位差別善財一乘故普門該攝也問疏云又此一生亦攝多劫如上仚人執手成多劫行又此普賢法圓融相攝一位即一切位故一生皆得亦要由直心精進力方得速成直心者不雜余念故猛盛趣入故精進者稱心而作故已上四𥸩何別答約普門該攝者揔標也又此一生亦攝多劫者約時𥸩也又此普賢等者約法𥸩也要由直心等者約機𥸩也問儼疏云無量菩薩廣劫所修善財得者教法得也故難世間品云於文字教法等故此約三乘若約一乘時亦可普賢行訂訂彼普行及別行也此即非教得亦可上果下加得已上上果下加得者何耶答知識之上果下加令得也章主疏云仙人執手成多劫行者是也謂毗目多羅佡人執善財手時即得法門故也抄文云諸佛無量劫修善財一生皆得者舉陀羅尼普法成即主伴相資現也已上主伴者一云諸佛者三乘故伴善財者一乘故主則一乘主三乘伴相資也今𥸩知識主善財伴也是故雖資善友之力若非直心精進則不能得然而善友力則下資善財直心精進力則上資主伴相資故一生皆得也問所詮章云因果同體成一緣起已上故因果之法一生乃至一念皆得耶因先得果后得耶答則一念頓得文云得初時無不得后故也又智通問答云善財值知識時所聞法門皆如聞得訂耶聞以后修行方得耶答隨所聞法即得訂也問若爾得法因緣問答中明過去無量劫值諸佛聞法供養等諸行修行方得此法門善財今方但聞所說法耳非謂修行無量劫行云何即得乎答既得此法即入法性法性即自他無二三世無前后故善知識所得因果自利利他法門即是善財自行成故隨所得法門其因果前后之法皆自無不行得法不移一時而即成無量劫隨所聞法門無量法門無量劫中修行得豈不修有得果之義乎問若隨所值同因行發心時莭等者諸知識皆可齊同何故諸知識發心值佛修行時莭皆不同耶答欲現法不同如是示現耳諸不同皆由同方不同耳已上入法性時自他無二三世無前后故諸知識法門一時皆得故因果之法同時得也問知識法門唯約因耳何故引成得果法之訂耶答諸知識所入之法即是諸佛訂心所得故也如妙理圓成觀云但修一因何得滿果答圓因若成無不滿果不滿果者非圓因也若爾如諸知識豈非圓因果何不滿答常滿以一切佛即心佛故若爾一切佛是他成自何不成答𮥷佛無自故常成法我未立故不成問於此身中土却諸見得成佛不若立見窮於果海故即得成佛此身如何答身無別相用彼本佛身為自身相此身是菩薩攝生身常因常果故爾此前信中義有何異答前是一念圓信此是初住終心故不同爾已上善財遇文殊時得法性自他無差別是故善財之心是善友之心是諸佛之心是故若約因則常菩薩若約果則恆佛也問疏云唯因唯果俱不俱等妙理圓成觀云今辨此義略分四別一唯因門從無始時盡未來際恆是菩薩修万行故二唯果門盡前后際恆是佛故何以故德相全真不墮時數㸦盡極故更無衆生可化度故三通因及果謂有發心及成正覺於一切時念念發心念念成佛四非因非果謂無心可發無佛可成何以故真法界中無二性故已上今所詮章因果同體當何門耶答當第三門也唯果當圓果唯因當頓因第三具頓圓如是具足之法一念中得也問若爾何故說見聞等三生耶答則同時一念中得且作詮耳謂智通記云見聞等三位普法正位耶答但從三乘作是說耳若普法正位無位無不位一切六道三界法界法門皆無不普法正位又一位一切位如位法門一切教義等法門皆爾問若爾普法中以何為始乎答得一法門為始此即終無分別始也已上且從三乘三僧祇詮作三生耳普法正位中以位則一切皆位以不位則皆不位故三生無前后也九頓得益清涼亦以善財配於此益者善財所得從三乘進入之人所得並一量故合立也祇恆林中不可說塵數菩薩等者是本會頓訂法界菩薩也十稱性益舍那品疏云普莊嚴童子得法是何位者義𮥷上下經文有三種成佛一約位以六相方便即十信終心勝進分后入解初即成佛以此是三乘終教不退之位故以一乘六相融攝即具諸位至佛果也是故此中童子見初佛為信位自分聞初經為信位勝進見后佛當解初自分聞后經為解位初勝進以攝諸位皆具足故二約行揔不依位但自分勝進究竟即至佛果三約理則一切衆生並已成竟更不新成以余相皆盡故性德本滿故此后應有結會云云但經來未尽故未有也問此會既了何不衆中有人得益答略由四義一於前三義由初二義故說童子益相由后一義故衆中無別獲益二光統律師云此經佛初成道說但現一乘圓教法輪為諸教之本諸教益相為此益相故不辨三但教有二種一逐機教攝法隨機機有增進隨分辨益二逐法教攝機同法法無增損故無別益四猶如日出先照高山既無中下之機故無隨分之益已上此稱性益前三成佛中約理之義也如性起品云佛子等疏𥸩云佛子如來身中下明現因果門於中三謂標𥸩結標中以菩提身等衆生故是故衆生悉於中現以彼所現同能現故是故衆生無不成佛此文是大節幸不輕之問此中所現衆生成佛為是約事為是約理若是約事何故下𥸩皆悉一性以無性故等若是約理何故標中乃云發心修行等答此是別教中義若不約諸宗分別無由得解何者然諸衆生若於人天位看具足人法二我物若小乘教中看此衆生唯是一聚五蘊法本來無人若大乘初教唯識所現如幻似有當相即空無人無法若約終教並是如來藏性緣起舉體即如具恆沙德乃是衆生故不增不減經云衆生即法身法身即衆生衆生法身義一名異解云此宗約理衆生即是佛若約頓教衆生相本來盡理性本來現然自露更無所待故不可說即佛不即佛等如淨名杜默之義等若依圓教即一切衆生並悉來發心亦竟修行亦竟成佛亦竟更無新成具足理事如此經文問若爾何故現有衆生不即佛耶答汝今就初人天位中觀彼衆生當相即空猶亦不得況復得見圓教中事是故汝見現有衆生我不約彼說此成佛但令情見若破法界圓現一切衆生無不成佛問若爾何故諸佛更化衆生答教化衆生亦有淺深今即菩提身中現衆生成佛者名究竟教化不同余宗故下結中名如來無極大悲度脫衆生也問既揔成佛何故亦有發心等耶答若成佛門中揔成佛若修行門中揔修行若發心門揔發心若𮥷此揔即空無所有准大緣起思之言乃至涅槃者於八相中舉最后一相二皆悉下𥸩成云何現同一真性故如是現何以衆生同菩提性略以十因𥸩成此義已上無極大悲者同體大悲也示經圓第十以同一無㝵下別結此假是謂花嚴下通結前十門也本講和尚興王寺教學僧統天其以甲午年始住開泰寺於古藏搜得此本乃八德山皈法寺圓通首座均如所說而雍熙四年丁亥三月三十日竟寫入教藏本也本講自是常依而開演及示寂弟子等以江花京十七年戊申歲於東衆社請諸德結安居削去方言以施學人則本講和尚之志也碩永此因和上及法界衆生同入花嚴普圓法界耳辛亥五月日弟子志
