body:
  text: 高麗國歸法寺圓通首座均如説將𥸩此文三門分別一定造者二𥸩題目三隨文𥸩初中一云七言三十句詩則儼師所造能𥸩則相公所謂元常録云相公於儼師所受花嚴時儼師造七言三十句詩以授相公相公則於墨字上畫赤印以獻師歎曰汝窮證法性達佛意旨冝造於𥸩相公初造四十餘紙𥸩以進師師欲知合佛意否將至佛前立願燒之悉皆燒盡又造六十餘紙進亦燒盡又造八十餘紙進師師共相德亦如前燒之於中有燒不燒不燒之文今行於世一云崔致遠所述傳中云相公於儼師所受花嚴時夢有神人貌甚魁偉謂相公曰以自所悟著述施人冝矣又夢善財授聰明藥十餘劑又遇青衣童子三授祕訣儼師聞之曰神授靈貺我一爾三遠涉勒修厥報斯現因命編次窺奧所得於是奮筆緝大乘章十卷請師指瑕儼曰義甚佳詞尚壅乃退而繁為四通號曰立義崇玄蓋欲崇其師所著搜玄分齊之義儼乃與相詣佛前結願焚之且曰言有吻合聖旨者願不也既而煨燼之餘獲二百一十字令相捃拾懇誓更擲猛熖竟不灰儼舍涕嗟稱俾綴為偈閉室數夕成三十句括三觀之奧旨舉十玄之餘美已上故七言三十句亦相公所述也后義可許然不必依崔傳㝎也今𥸩既自敘云依理教略制槃詩則所𥸩亦是主自述斷矣何須傍引證據郎况至相行狀中不載制此七言三十句事耶第二𥸩題中初之九字則正題後舉角數及字數此即是題腳也一云一乘二字所依本教法界者能𥸩章名一云九字並是能𥸩章名也初義者準教分記則花嚴一乘者所依本教教分記者能𥸩章名今此亦爾也謂花嚴一乘者下簡法花一乘及深密一乘等教分記者上簡證分也今此例彼故爾也今𥸩依後義謂九能𥸩題中安所𥸩經名必須同於經題然於經題無一乘言故並能𥸩章名也下云一乘法界合詩一印依花嚴經及十地論表圓教宗要已上故唯花嚴經及十地論是所依故爾也問若爾教分記名云何會耶答彼亦以花嚴二字為所依一乘以下為能𥸩章名如中卷題云花嚴經中一乘立教分齊義以中字隔能所依故也問此中不舉所依者何耶答以作者善巧非一故爾也且如花嚴教分記於命書中但云教分記則於一章題如是增減不同又儼公云於大方廣佛花嚴經中搜玄分齊通智方䡄藏師云花嚴經探玄記清涼云大方廣佛花嚴經疏等如是非一今此且從一義云一乘法界也一者無他義乘者運轉義也問一乘者何一乘耶答一云善巧無二之一乘一云具同別一乘一云唯別教一乘也初義者下云問何故印文唯有一道答表如來一音故所謂一善巧方便已上五教之法唯是如來一善巧方便故爾也問序云大聖善教無方應機隨病非一已上大聖既應五教機病乘教非一何云一乘耶答五教雖別然如來攝生善巧之義一而無二故也是故此中云善巧方便五教章云本末鎔融唯一大善巧法又云或具五教以攝方便故十唯識章云捴具十門約同教説融會章云一乘三乘同一善巧等並一義也第二義者下是故行者文約別教一乘及方便一乘𥸩故爾也今𥸩唯第五圓教一乘也下云一乘法界依花嚴經及十地論表圓教宗要已上圓教宗要與一乘法界是一義而並是第五圓教故爾也問若爾何故下文并辨屈曲三乘耶答雖於下文并舉三乘然約所宗則唯現別教一乘今從所宗云耳問𥸩是故行者中具説同別可云具同別一乘何云不爾耶答正約別教一乘行者𥸩兼於伴眷屬義中并辨方便一乘耳問下云表如來一音故所謂一善巧方便此則通指五教名為一音亦名一善巧故但是善巧無二之一乘何云第五圓耶答下云善巧無方應稱法界十世相應圓融滿足故則是義當圓教已上故為一大善巧方便時還當第五圓教故也又本末鎔融為一大善巧法時亦爾也問五教章云或開為二一本教謂別教一乘為諸教本故二末教謂三乘小乘等從彼所流故則本末鎔融中可具五教何云唯圓教耶答本則花嚴本末則下四教未然此本末鎔融則還是第五圓故爾也問或具五教以攝方便故則圓中具五教耶答圓教則本此之方便則下四教以具舉圓及四教故云具五非謂攝方便中具五教也又捴具十門約同教説者經云三界虛妄唯一心作𥸩有十門而后三門正當別教然於后三之伴眷屬義明前七門是故前七是同非謂后三亦同教也一乘三乘同一善巧故為同教者前中既辨別教一乘與同教三乘之異更於別教中論同別二教竟次於同教中亦論同別時云隨機故名別教同一善巧故名同教是故同一善巧之同教者下四教也孔目中可見問圓教宗要與一乘法界既是一義何故偏舉法界耶答此經宗趣中大遠法師云花嚴三昧為宗裕法師等甚深法界心境為宗乃至藏公以因果緣起理實法界為宗從古諸德皆云此經以法界為宗是故主意取經宗亦以法界為題名也清涼發題云含衆妙而有餘超言辝而逈出者其唯法界抄中𥸩云初法界中應有問言諸家章疏多先敘如來為物示生先小后大或無像現像無言示言今何故最初便敘法界故今答云以是此經之所宗故又是諸經之通體故又是諸法之通依故一切衆生迷悟本故一切諸佛所證窮故諸菩薩行自此生故初成頓説不同餘經有漸次故已上故爾也問法界為宗失所成行德因果為宗失所依法界如是辨違則今唯舉法界義既未圓此亦有失耶答所以辨違者舉法界則單真法界得因果則𢩁於修生故有失也是故光統則因果理實為宗具能依所依義理周圓藏公則仍前而加緣起法界清涼云若約言略攝盡則以法界緣起為宗是則會因果同法界則法界因果並是法界又攝法界以成因果則因果法界並是因果依前門則法界為宗不失因果依後門則因果為宗不失法界依如是道理但云法界不𢩁一邊也問杜順和尚三觀中真空觀則理法界理事無得觀則理事無得法界周遍舍容觀則事事無得法界今此法界當何法界耶答彼初二觀當於同教后之一觀當於別教清涼三觀亦爾今此法界唯是事事無得法界也問下云三乘教中亦有寂而常用用而常寂如是等義何故上云偏即理門不即事中不自在耶答理事相即故有如是義非謂事事相即乃至若依別教一乘理理相即亦得事事相即亦得乃至亦有具足理因陀羅及事因陀羅等法門故十佛普賢法界宅中有如是等無障得法界法門極自在故已上彼三法界中無所不當何云唯事事無得法界耶答理理相即等理因陀羅事因陀羅等者並是當於彼周遍含容觀之事事無得法界也彼理法界當此中三乘之理也彼理事無得法界當此中理事相即故有如是義非謂事事相即也問別教一乘中具理理相即事事相即等四句故具足理事因陀羅等是故可論理法界理事無得法界何故一乘中唯論事事無得法界耶答具足十玄十門之法周遍含容名為事事無得者以三乘中或單舉理論無得或但舉理事論無得而不得論事事無得是故欲簡三乘故云事事無得耳實則十玄十法中具足理事等一切諸法無得自在故理理無得理事無得等具論亦得也清涼於所依體事中束立十法於此法上以理法界見以理事無得法界見等是故事事無得之十玄十法中具足理事等諸法然對簡三乘故但云一乘是事事無得也法者持自性義䡄則義對意義界者因義性義分齊義謂海印㝎中出生教法寶故是因義以是諸法所依性故是性義具足諸法而成海印法界然此諸法不相雜亂故是分齊義也者畫也赤畫况智正覺世間黑字況衆生世間紙况器世間如是以况具足三世間之海印法界故云法界也合詩一印者一云字赤畫相合之詩所成之一印一云合七言三十句詩之一印也若配當者一云初之九字當於九會五十四角當於五十五知識以初后文殊唯是一人故云五十四也二百一十字者第七會𮥷世間品二百問故云二百一一問皆有十答故云一十也然此義中以此印依晉本經所述故配九會難也五十四角二百一十字者角數字數偶如是耳無別所表又以何義唯况末會五十五知識及第七會二百問一十答不舉餘耶故知不爾也又有𥸩云字數者非是表况大經中義恐有后人自意增損此印文字故標之耳謂昔有法相學人不信花嚴初發心時便成正覺之言改易便字恐有此類故爾也如俗典道經德經傳之者云此文有五千文蓋恐有增損故也古𥸩爾也今𥸩若約觀心強説則下文云印表如來一音故已上一音是語業性起而彼中具説十種音聲如來以此十音應於五乘機故云五十此能應佛具足四攝四無量應於所化故云四角於此印中所現三世間法是十玄十法也下文欲觀緣起實相陀羅尼法者先應學數十錢法乃至下云如錢中第一乃至第十不同而相即相入無得相成雖因果理事人法解行教義主伴等衆多門別隨託一門盡攝一切已上故喻十法十合為二十於十玄中一一具二十故為二百并本十玄故為一十法喻二十并本十玄故為三十捴此三十不出大方廣佛花嚴經七字故以七字造詩是故法門雖廣不出二百一十字括此二百一十字不出三十句又括此三十句不出七字題名又此七字不出最清淨法界故云法界也所述是非唯佛所知然慕法心極故強有斯𥸩耳又古德云此印是捴相印七十三印是別相印又此別相七十三中三際是捴此三際中各具七十故二百一十也故云二百一十字也今欲現合此三際印中所具二百一十印成一海印捴相印故爾也第三入文解𥸩有三初序分次從印至即虛現實者正宗分后誓願以下流通分此之三分以𥸩經論者一自彌天高判冥符西域厥后諸德造疏制文無不承用今此亦爾也序分有四一現大聖垂教非一二迷之下現所化機迷三依理下示製所為四讀詩下示讀詩方法也初中夫者此也彼也乃也今從乃訓若夫觀夫詳夫夫以並是一義則是發語之初也大聖者一云通五教之大聖一云唯圓教之大聖一云具二義也初義者既善巧之無方應於五教之機而非一故爾也問一乘十佛可云大聖小乘三乘中二身佛三身佛何得云大聖耶答雖非十佛若對所化亦得云大聖也第三義者智通問答云如是三乘一乘教等皆此經內在者皆十佛説耶答亦得皆十佛説以十佛外無別三身故三身者十佛用故三乘即一乘故此約一乘説亦得隨教宗三乘教三身佛説一乘教十身佛説機見不同故一處一時中如來善巧無所不應故三途衆生所聞教三途佛説人天所聞教人天佛説乃至一乘機所聞教一乘佛説等各各能化所化相當故已上初𥸩則唯圓教大聖亦得后𥸩則通五教亦得也今𥸩唯圓教大聖也問應於五教之機而非一則可通五教何不爾耶答雖應機而非一言大聖時唯一圓教也何者道身章云問能化所化三身何別答以能化十身言小乘佛乃至頓教絶相佛乃至一切佛皆是十佛之差別用無非十佛矣乃至能化三身即徹本十佛之三身所化三身但守權之三身耳已上雖現二三差別之身若究其源唯是第五圓教十佛大聖故爾也善教者有本云善巧並一義也問下云善巧無方應稱法界則可云善巧耳何言一義耶答以善巧之人所説之教故善巧善教並一義也無方者大方也大方無隅大像無形大音無聲大智無知之義也無所不遍無所不攝故善教無方也問善教無方應機隨病中皆具五教耶不爾耶答一云如初謂此中意者大聖善教無私應五教機而差別故爾也搜玄云大悲垂訓道無私隱故致隨緣之説法門非一已上通隨三教之機故法門非一此文亦爾也問圓教中分階佛境大山王機則豈可於應機隨病中見耶答一云應機則通五教隨病則唯下四教一云隨病中亦具五教謂一乘行者亦有所治之病是故搜玄云就於一乘了義實説中對治方便行別差殊要約有三以明次第已上對治方便是藥病對治也是故漸教機病以漸法對治頓圓機病以頓圓法對治是則一乘行者亦是病機也今𥸩善巧無方則唯當此經應機隨病則下四教也下云何故多有盤回屈曲以隨衆生機欲不同故即是義當三乘教何故一道無有始終示現善巧無方應稱法界乃至義當圓教已上從善巧無方應稱法界等云善教無方從以隨衆生機欲不同等云應機隨病非一故爾也問圓教亦是應圓機説何云應機唯下四教耶答若爾何故多有盤回屈曲以隨衆生機欲不同中亦具一乘行者耶然不爾也以相對辨異隨處各別是故今此以善巧無方為圓教應機隨病非一為下四教如是相對辨也五教章稱法本教中豈無機耶然以此經為稱法本教以對三乘逐機末教今此亦爾也問若爾隨緣之説法門非一者亦唯下四教耶答隨須處故彼則以隨三教所化之機緣故三教法門成非一也今此則唯下四教故別也非一者善教無方應機隨病中並有非一義耶答一云爾也今𥸩唯應機隨病中見也下云何故多有盤回屈曲以隨衆生機欲不同故已上以隨機病不同成非一故爾也則普法行者非是病機也二中一云守迹不知失體絶句一云守迹不知失絶句二義也迷之者佛之所以説下四教非為令其止於四教耳皆為𮥷念皈於花嚴普法之處然迷之者未得此意堅守方便之迹是故下云佛教七種苦諦以外別有菩提三無數劫如説修行乃可得度為迷之者須夛門説已上迷於如是方便之意守而不捨也守迹等者昔有宋人田中見兔以犂殺之意謂復有兔來終日守迹待之之類也皈宗未曰者敀於宗中無期也三中依理據教者一乘法界是十佛所證普賢所行非凡能測然依諸佛菩薩所説理之教制此詩也如云具縛凡夫依憑教理之力能知如來祕密之藏又大經云有眼有日光能見微細色最勝神力故淨心見諸佛又云如因日光照還見於日輪我以佛智光見佛所行道是此意也問序有證信發起之二今此當何答具二序也謂法常公梁攝論疏云所以作論先皈敬者有二一皈敬三寶令念辨為制作之由即發起序二皈敬三寶在於論首彰己所造論勝令人修學即名訂信序已上準此則仰依諸佛菩薩所説知佛意旨而有著述以現所述符合佛意令人證信故名證信仍以此序發起正宗故名發起序也執名之徒無名真源云何答一云外化之際並為執名之徒唯約內證為真源也十句章云普賢菩薩出㝎於無生無名處以種種名題目是故名所目於所目中隨機緣心勝劣尊卑差別故云寄位升沉衆生實執所目故云執名之徒佛不隨名證名無住義故云無名真源即是法性圓融訂分也已上故知爾也今𥸩執名之徒則唯下四教無名真源則唯內訂也問何故執名中不見圓機耶答至此經人自不執名故爾也問若爾十句章文云何會耶答彼亦以下四教為所目也以花嚴是定內説既云出定於無生無名處以種種名題目故知所目非花嚴也問若爾此經並是無名真源何故唯約內證耶答花嚴經亦是所敀然約所極處云耳是故前之皈宗未日之宗即此經也令下四教執名之徒近皈花嚴普法遠敀內證故不違也問欲使和尚以后執名之徒皈真源耳何得捴云下四教人耶答所以如來説下四教欲令衆生長養根性皈於真源有迷之者執名守迹今猶不捨故不違也問若爾於三乘中三祗劫修至極果人亦依主所制印方皈無名真源故爾云耶答此是要期誓願故爾也何者雖是凡夫作一小善而發願言令諸地獄受苦衆生脫苦得樂乃至發於菩提之心既發心修行者則速至補處乃至佛處此皆聖教所許是故願令三乘極果之人依此印皈於普法乃至真源如是回向有何得耶第二正宗分中先所𥸩印后能𥸩文初中𥸩能𥸩文則所𥸩印義自然現也然今略𥸩問此印七十三印何別答此捴彼別彼文云於五十卷花嚴經內指示海印七十三處今此則捴約大經之旨無別所依之處又彼則圓融無得本末相成等作別別名今此則無別名故爾也又此印意赤畫況智正覺黑字況衆生紙況器界捴表三世間從海印三昧繁出現現也是故此印一角一字中若約觀心𥸩則有四門一若取去法字則紙赤畫皆去則紙赤畫不𮥷法字故於法字中具紙畫如是若𮥷衆生世間則器佛皆不可得故器佛不𮥷衆生則衆生中具佛器是故經云菩薩自知身中有如來菩提一切衆生亦復如是二若取去赤畫則紙法字皆去則紙法字不𮥷赤畫故於赤畫中具紙法字如是若𮥷智正覺則器衆生皆不可得故器衆生不𮥷智正覺則智正覺中具器及衆生是故經云三世一切劫佛剎及諸法諸根心心法一切虛妄法於一佛身中此法皆悉現三若取去紙則法字赤畫皆去則法字赤畫不𮥷於紙故於紙中具法字赤畫如是若𮥷於器則衆生及佛皆不可得故衆生佛不𮥷於器則器中具於衆生及佛是故經云華藏世界所有𭎇一一𭎇中見法界寶光現佛如雲集此是如來剎自在第四此三位歷然紙上畫字紙不破字上畫印字不泯三位不𮥷亦三位不雜歷然現前如是三世間無得圓融然不相雜亂是故前三則融通現圓后一則歷然不雜此四無得同一緣起方為法界實相印也如一角一字具四觀門餘角餘字當知亦爾若以衆生門取之無不是衆生海印故並是衆生海印若以佛門取之無不是佛海印故並是佛海印是故衆生心內佛化佛心內衆生佛心內衆生受自心內佛説法教化若以器界取之無不是器界海印故塵塵中佛剎及諸佛曠然安住也問若爾亦得云衆生海印何云𥸩迦佛海印耶答約則爾然約妄盡心澄義云耳謂還源觀云海印森羅常住用海印者真如本覺也妄盡心澄万象齊現猶如大海因風起浪若風止息海水澄清無象不現起信論云無量功德藏法性真如海所以名為海印三昧已上故約妄盡心澄義舉佛海印也凡有心者等含佛智但以妄想顛倒所覆不知自己海印三昧本自圓明佛無異輪回不已妄受衆苦佛則不爾息妄想風澄煩惱浪令三世間分明現現比如人鬼見一河水人見為水鬼見流火如是生佛同含一法界心等無差別生則妄想所纏迷自法界但見是苦佛則息妄分別見三世間現於海印是自己也是故爾也文中初證分四句展轉遣疑謂法性有何相故云圓融無二相若爾應如龜毛兔角耶故云諸法不動本來寂何故諸法本來寂耶故云無名無相絶一切若無名相絶一切本來寂者則云何得知此境界耶故云證智所知非餘境如是展轉遣也又𥸩初句遮二邊次句簡動次句簡名相后句簡未證初遮二邊中若約真俗二相於法性中竟不可得如是法性本𮥷真俗染淨等一切待對之相故也問法性真性何別答良圓和尚記云法性者通真妄取圓融真性者但約真法何以故真法自在故能隨緣妄法不自在不能隨緣是故訂分中現通真妄之法性緣起分中唯現自在真性之義約智論無差別也已上可見真性甚深下二句緣起自體一中一切下緣起義門問料簡本法用門何別答一云三門本法終云明緣起本法竟已上故緣起本法緣起自體是一義故本法則緣起自體用門則緣起義門今𥸩同異體之本法用門並於緣起義門中所論故不同也問中即用門可當義門若本法則當於自體何不爾耶答於一緣起義門中鍊立同異體法者是本法即此所立同異之中論中即因陀羅者是用門並於一緣起義門中開為二門故也次二句約陀羅𡰱理用以辨攝法分齊一中一切多中一理也一即一切多即一用也謂中門是因果道理門即門是德用自在門故約因果道理云理約德用自在云用何者中門者能成因外有所成果法故因果道理門也即門者因緣當體即空即因即果能成因外無所成果法故德用自在門也古辝中門者法中遠門即門者法中近門主伴門者法中即門此則望於緣起自體之法分三差別也謂中門者力用門故能所成別故云法中遠門即門者約體門故當體即空因果不別故云法中近門主伴門者於不起之起別相法界先舉為主后舉為伴即於不起自體之處故云法中即門也次二句約事明攝法分齊者問一微塵中含十方亦是陀羅尼何故𥸩前二句則云陀羅尼今此云約事明攝法耶答今此亦是陀羅尼義然前則通望諸法直現陀羅尼今則微塵是事十方亦是事約此二事故爾云也此是大小無得義也道身章元曉法師曰小之大義能容大大之小義入小中藏師云不必小之大相大之小相方容入直小之小相能容大之大相能入已上藏師之意大小元來是一是故小不壞小能容大大不壞大入小中謂儼師遷神十個日前學徒進所問訊師問大衆曰經中一微塵中含十方世界無量劫是一念等文汝等作何物看衆人白云緣起法無自性小不住小大不住大短不住短長不住長等故爾耶浮矣見耳師曰然之然矣而猶生白云何謂師曰莫須多噵只言一故已上只言一故者以大小本來是一不二故爾也問何知大小本來是一耶答相和尚曰大小無得可如夢所見無我之心由睡眠緣全塵全山非片分為塵夛分為山覺夢心中塵之山無得現現已上以此喻合法則指無住空名塵指無住空名十方世界只一無住故塵不壞自小位能容大十方不壞自大位能入小故得大小無得也問十住品云欲知至大有小相菩薩以此初發心則可云小之大義能容大之小義入小中何云大小不動方容入耶答大義時不失小相小義時不失大相故云至大有小相耳非謂十方欲入塵故小微塵欲容十方故大也相和尚曰一微塵中含十方世界者同是無住故爾貟師問曰微塵無住小十方世界無住大耶答一量也問若爾何物言微塵小十方世界大耶答微塵十方世界各無自性唯無住耳所言塵小世界大者是須處須耳非是小故云小大故云大所謂不知塵小世界大機中令知塵小世界大耳非是一向塵小自性世界大自性亦得云塵大世界小道理齊一無住實相已上若曉大小同一無住時可云塵大世界小如是十方自具小相微塵自具大相是故非謂十方欲入微塵時故轉為小微塵欲含十方時故更為大直小不轉小能容大大不減大能入小也次四句約世時示攝法分齊者問九世即入既成十世然更約十世亦有即入耶答有也義理章云然此九世迭相即入成一捴句捴別合成十世此十世具足別異同時現現成緣起故得相入也已上初𥸩九世即入成十世后𥸩更舉十世辨即入也塵十方九世十世皆具即入義然塵十方則相容義增九世十世則相即義增故約事中舉相入約世時中舉相即也問仍不雜亂隔別成者通望前約事約世二門云耶答既科云次四句約世時示攝法分齊是故唯望九世十世㸦相即等約十世隔法異成門之義云隔別成也次二句約位以彰攝法分齊者初發心正覺生死涅槃皆是位故也問初發心時便成正覺者究竟果耶答爾也以主等簡去古人因中説果約理平等解同佛境等𥸩以為三乘約一乘則緣起法門始終具足得始即得終窮終方原始故究竟果也次二句捴論上義者前之即事明攝法約時約位等並是事法何故今云理事然無分別耶答塵十方念劫等是皆事法然即入無得者以不異於理故爾也若唯約理以一味故無可即入若唯約事以㸦相得故不可即入要由理事然不異方得無得故也內訂唯是十佛境故非餘境緣起分者亦是十佛之境故云十佛普賢大人境也能人者一云𥸩迦此云能仁而言能人者書者之誤也一云能化之人也今𥸩𥸩迦是能化之人是故下文云欲表𥸩迦如來教所攝三種世間從海印三昧繁出現現故是故二義得也如意者即是一音教比如大海有如意珠故潤澤万物雨諸寶利益一切𥸩迦佛海印三昧中一音如意之教利益衆生亦如是也本際者法性𩂜也叵息妄想等者一云莫息妄想若息妄則必不得還本際此約本有𥸩疏云妄想不剪而霄翔纍表靈鑒匪磨而圓明等覺者是也一云若不息妄想則必不得也今𥸩此是行者對治修證之義故存后義是故下云背反分別得無分別故曰無緣乃至如説修行得聖者意也善巧不住者三方便中無住方便也隨分得資糧者因行故云隨分以此因行至於菩提故云資糧比如有人得如意珠於一切資生之具皆得自在如是若諸行者得如意教則為已具菩提資糧行至果處一切自在又無緣善巧則不住道捉如意教則教道皈家隨分得資糧則助道謂得無分別不住之理不住生死涅盤二邊故云不住道得一音教故云教道也資糧者助菩提分故也以陀羅𡰱無盡寶等者以因中修菩提分資糧故能至果中得此無盡滿足之寶莊嚴法界實寶殿也窮坐者一云安坐然以窮坐為正謂稱於法界窮極坐也問讀詩之法何故要右旋耶答右則順於正道謂大經善財問妙月長者云聖者為由聽聞般若波羅蜜言説章句而現證耶答言不也何以故般若波羅蜜見一切法真實體性而現證故善財白言豈不由於從聞生智及思智性得見真如而自證悟長者答言不也若從聞思得自證悟無有是處善男子我於此義應説比喻汝當諦聽如大砂磧中無泉井春夏熱時有人從西向東而行遇有丈夫從東而來即問之言我今熱渴何處有水清涼樹蔭我欲於中飲沐休憩除其熱渴彼大丈夫善知善説而告之言從此東行有其二路一左一右冝從右路勤力而行決定當得至泉井所及庇清陰善男子於意云何彼熱渴者雖聞如是泉及樹名思惟往趣能除熱渴獲清涼不答言不也何以故要依示道至彼泉池沐浴飲用方除熱渴乃得清涼善男子菩薩亦爾不但唯以聞思解惠而能證入一切法門善男子言砂磧者即謂生死西來人者謂諸衆生熱謂衆惑渴即貪愛東來知道大丈夫者即佛菩薩住一切智得法真性平等實義是也得清涼水無熱渴者即自訂悟真實是也已上左右道者於經文中雖無法合然左是逆路故向生死右是正道故是諸佛菩薩所指之正道也是故今此右旋讀也繞佛及塔皆右旋亦此義也就能𥸩中先正𥸩后捴章元年下雜假問答初中二先正𥸩印后一乘法界圖下現題名及所依初中先開章門后問何故下別𥸩初捴𥸩印意中問意若不依印亦得造文何故要須依印造耶答中先正答次三種世間下現不論餘后廣義下推廣也赤畫字及紙表三世間中問何故赤印表正覺字表衆生等耶答佛則煩惱暗盡以智光明普照衆生生死大夜猶如赫日普照昏衢故以赤印況也衆生則為業煩惱無明所覆無所知覺故以黑字況也器界則頑無分別染業衆生居則成染諸佛菩薩淨業者居則成淨猶如白色衆色之本隨何受染故以白紙況也問今此海印五教章今將開𥸩迦佛海印三昧一乘教義略作十門大料簡第九海印炳現門者亦有二義一約果位如前差別無盡教法皆是如來海印㝎中同時炳然圓明現現五教章所依異謂此一乘教起要依佛海印三昧中出不同三乘等依佛后得智出又稱法本教者謂別教一乘即佛初成道第二七日在菩提樹下猶如日出先照高山海印㝎中同時演説十十法門主伴具足圓通自在融會章云一乘同別教義依海印㝎起普眼所知三乘教義依佛后得法住智説聞思修及報生善意識并內訂雙行勝智及真智所知已上諸處海印何別答一云此文及五教章初海印大料簡約果海印並現五教之法皆依海印起也所依異稱法本教及融會章等唯花嚴經依海印起也謂今此云𥸩迦如來教者是五教故通五教五教章今將開𥸩迦佛海印三昧一乘教義略作十門而十門中通現五教料簡約果海印云如前差別無盡教法皆是如來海印中現者通望初言詮辨體乃至帝等而云差別無盡教法故通五教餘三唯此經依海印之義現也今𥸩諸文海印皆明唯花嚴是㝎內説餘三乘等皆㝎外説也問𥸩迦如來教所攝通五教綱何云唯花嚴㝎內説耶答教綱所攝三世間從海印三昧現現則是此經教綱故無違也問下文具明屈曲三乘何耶答㝎內所説唯是此經若隨機屈曲時還是㝎外三乘耳問五教章初文云何會耶答十門雖具説五教然其所宗在於別教一乘是故唯此所宗是㝎內説若五教法皆從海印起者應云今將開𥸩迦佛海印三昧一乘三乘教義略作十門然不爾也問料簡文何會耶答二義可會一云所舉則通於三乘差別無盡之法若云海印中同時炳然現現之時還是此經也一云唯約前一乘云如前差別無盡教法也問法數章云所有無盡法數及餘乘數皆一乘所目即是一乘由同在海印㝎中成故已上下四教三乘之法是花嚴之所目故所目者下四教而云所目同在海印而成則下四教三乘之法亦從海印起也何唯花嚴㝎內説耶答不爾謂由是所目同教之法故在於海印㝎中所成花嚴一乘之法相似故云同耳非謂所目三乘一乘普法普在㝎中成也是故文云此皆一乘所目即是一乘十句章云普賢菩薩出㝎於無生無名處以種種名題目故云所目等皆現下三乘是㝎外所目之義也問所有無盡法數及餘乘數則何耶答前明人天欣猒二門乃至頓教一門辨種種法數故云無盡法數亦明五乘無量乘等故云及餘乘數此之三乘法數乘數皆是㝎內花嚴之所目故云皆一乘所目即是一乘也問大集經云喻如閻浮提一切衆生身及餘外色如是等色於海中皆有像以是名大海為印菩薩亦如是得大海印三昧見一切衆生心行於一切法門皆得慧明是為菩薩得海印三昧見一切衆生心行所趣已上則三乘中亦辨海印何故云唯花嚴經於海印中起耶答然故智儼和尚云海印有五一三無數劫歷修之帝𥸩升法空須彌山頂所知障阿修羅鬪戰時三科百法之相於大圓鏡智海中影現之海印二不可計數劫歷修之帝𥸩升本覺須彌山頂根本無明阿修羅鬪戰時恆沙性德之相於一心真如海中影現之海印三一念不生之帝𥸩升一行三昧須彌山頂妄念阿修羅鬪戰時𮥷相𮥷分別相於不二海中影現之海印四二佛世界微塵數劫歷修之帝𥸩升捴相須山頂遍計阿修羅鬪戰時十種普法之相於世界海中影現之海印五十佛之帝𥸩升法性須山頂無住相阿修羅鬪戰時三種世間相於國土海中影現之海印初三三乘后二一乘初三乘三中初則初教次則終教后則頓教后一乘二中初則外化后則內訂然故三乘亦得分有依海印起義然大對説故唯此經㝎內説也古人於一乘中開二海印並當料簡約果海印不開因海印若開則應云善財童子之帝𥸩升解行須彌山頂百障阿修羅鬪戰時無盡法門相於錠光頗梨鏡海中影現之海印則六重海印也問何故古人不立因海印耶答三乘中鏡智海印一心海印一行三昧海印皆約果門故一乘亦唯約果説也問若爾何故今加因海印耶答三乘雖具因果並合為漸於一乘中分論實際因窮實果如是於三教中一乘對三乘分示頓因圓果則不應一例故對三乘加論一乘因海印亦不得也問何故因海印中舉無盡法門不舉三世間十普法耶答㸦言亦得然國土海最極甚深故舉最略三世間世界海次深故舉次廣十種普法準此則因門既淺故舉無盡法門之最廣也今此中海印者既云𥸩迦如來海印三昧故當於果門然正唯外化亦不得所現內訂也問密嚴經云花嚴大樹與神通勝鬘及餘經等皆從此經出已上密嚴本花嚴末耶答道身章云密嚴經云花嚴十地皆從此經出若爾彼經勝此經劣耶和尚答云此等不定或處以勝為劣或處以劣為勝隨須不定已上云故此從以劣為勝義云耳但以此經十地寄彼密嚴位地而説故云花嚴十地從此經出也是故古人云比如大海邊有一泉井流入於海迷者妄計泉本海末然大海潛流而生泉水故海本泉末如是教也智正覺者佛菩薩者餘處唯約佛以菩薩合於衆生何耶答覺有隨分圓滿二義以分未圓故餘處中屬於衆生今此以覺義同故合正覺也又結自利云十佛普賢大人境或云雨寶益生等以具化主助化方能利物則佛菩薩並為能化是故合也不但云智正覺者佛菩薩不及𥸩器衆生故爾一云捴論諸法則有十門十法等今此但舉三世間不舉門法故爾云也今𥸩存后義既云三世間攝法盡故仍云不論餘者故知舉三世間時十門十法無盡法門無所遺故爾云也廣義如花嚴經説者於大經中廣説三世間法從海印㝎現現之相故推彼也第二別相門中先題章門后問何故下別𥸩也別相門者前則不分印相字相捴意而𥸩今則別開三門別別而𥸩故初説印文相中先正𥸩后印相如是者結初中有四重問答中表如來一音等者菩提留支三藏羅什法師共立一音教二師義何別答清涼疏云一立一音教謂如來一代之教不難一音然有二師一后魏菩提留支云如來一音同時報万大小並陳二姚秦羅什法師云佛一圓音平等無二無私普應機聞自殊非謂音本陳大小乃至云上之二師初則佛音具異后則異自在機各得圓音一義然並為教本不分之意耳抄云初師則順善口天女一聲之中百千種樂而共相應則佛自音之中有多音也后師則順如水一味隨器成異則如來夲無多音故云各得一義耳已上如是別也古人云羅什一音如解瞿音留支一音解如笙聲故別也問以衆生根行不同隨根異解故有多種如尅其本唯是如來一圓音教故經云佛以一音演説法衆生隨類各得解者羅什一音也何故五教章於留支義中引耶答五教章引立一音諸師故名則舉菩提留支義則引羅什故不違也問今此一音當何義耶答二師之義偏取皆失故不偏於一師義謂圓音章云此上三説何得何失答若別偏取三俱有失何者初説但多音無一音故次説一語無多音故后唯無性非音義故如實義者三説合為一圓音義何者若彼多音不即一音此但多音非是圓義以彼多音即一音故鎔融無得名作圓音若彼一音不即一切但是一音非是梵音以彼一音即多音故融通無得名一梵音若此等音不即無性同真際者是所執故非如來音以彼音等𮥷作者故無性故如響故已上儼藏二師及主皆是一義故今此亦合三説為一圓音也如是合三為一時則當第五圓中義也問何知合三則今此一音耶答準於印相知也謂若印一道即不回旋但一直㕛不成圓印然印一道即屈曲故成一圓印則當彼中若彼一音不即一切但是一音非是梵音以彼一音即多音故融通無得名一梵音義也若印屈曲不即一道但是多畫不成一印然多屈曲即一道故成一圓印則當彼中若彼多音不即一音此但多音非是圓義以彼多音即一音故鎔融無得名作圓音義也若彼一印及多屈曲不即無性同真際者但情所及非正緣起然此一印及諸屈曲皆無性故能成圓印即當彼中若此等音不即無性同真際者是所執故非如來音義也是則印之一道則表一音印之屈曲則表多音一多無性緣起之印則表如來一圓音故知爾也問圓音章三説是誰説耶答初是留支二是羅什第三相隱然準餘處則龍軍堅惠論師説謂立本影教中護法月藏具本影金剛軍菩薩堅惠論師立影像護法等云衆生心外佛有微妙色聲等法由聞者善根增上緣力擊佛利他種子為因於佛智上文義相生為本性相教由佛此教增上緣力擊聞者漏無漏善根種子聞者識上文義相生為影像教堅惠等云離衆生心佛果無有色身言聲事相功德唯有如如及如如智大悲大願為增上緣令彼所化根熟衆生心中現佛色身説法是故聖教唯是衆生心中影像已上故堅惠説合第三也問何知合三為一當圓教耶答料簡機感假云現身説法此有三義一以佛果色聲清淨功德為增上緣應彼機感以成攝化乃至二佛果無有色聲麁相以平等理智增上願力機感相應有形言現乃至三通上二義有無無得以稱法界乃至正是此經所説分齊已上初具本影則初教第二唯影無本則終頓第三通上二義正是此經故爾也問一善巧者為通五教為唯圓耶答一云如前一云如后一云窮實初義者於佛一音分成五教是故五教章云本末鎔融唯一大善巧法也問文中既牒此善巧云善巧無方應稱法界十世相應圓融滿足然則可唯圓教耶答文云以隨衆生機欲不同故者是三乘應稱法界者是一乘以具此一三之一善巧故爾也后義者以隨衆生等則下三乘方便修相也善巧無方乃義當圓教則際頓雙具漸頓則窮故爾所詮章甚深緣起一心具五義門五教章本末鎔融為一大善巧等皆窮也今𥸩第二義為正是故牒上善巧仍云善巧無方乃至圓教也二中機欲不同者一善巧是能隨機欲不同是所隨所隨之機欲不同能隨亦成屈曲故當三乘也三中應稱法界者橫盡法界十世相應者竪窮劫海圓融滿足者通於橫竪是故當於圓也四中四靣四角者表四攝四無量云何答不可㝎云此是四攝此是四無量是故以四靣表四攝四無量隨何得也四角亦爾依三乘現一乘者依前之屈曲三乘以現前之圓教一乘以四攝四無量通於一三故爾也二辨字相中先正辨字相后問答除疑初中先正𥸩后字相如是者結初中三重問答約修行方便現等者一云三乘今𥸩一乘謂下𥸩是故行者還本際等云修行方便及得利益然故是約一乘行者修行方便也字中多有屈曲者隨印屈曲字亦屈曲故如是問也現三乘根欲等者問何故前云隨衆生機欲不同今此直云三乘根欲耶答前之印相表如來善巧隨機屈曲今此文字況於衆生更無可隨故爾也問字隨於印既成四面四角何故辨字相中不問面角所表耶答非但能化具四攝四無量所化行者亦具而修故則字中亦現四面四角所表然前印相中既已現故今且略也始終兩字者始法終佛在於中心故如是問也問答除疑中有二重問答初重問答問中因果不同者牒前因果不同一家德等者牒前表因果兩位至在中道也問性在中道者內證耶外化耶答一云如前謂下云若約理云舊來中道一無分別同於此中性在中道故爾也問因果是外化今云因果性在中道則可云外化耶答因果雖是外化今舉因果之本故是法性中道之內證也一云外化謂因果是外化以外化因果之性在中道故爾也今𥸩非偏內證非偏外化以約無住法為中道故也此中所現中道有七重因果兩位性在中道一乘三乘不即不𮥷之中道印中際中道若約理云訂教兩法舊來中道一無分別之中道正義正説論中是故一切法本來在中道若依一乘如教門不盡其理理事冥然一無分別體用圓融常在中道不住義者即是中道義乃至引龍樹頌所立中道法性以何為相以無分別為相是故一切法尋常在中道無非無分別中道也初則因果不同而無分別故性在中道次一乘三乘一體無二之中道次證教二法一無分別之中道次正義正説一無分別之中道次理事二法冥然無分別之中道次引龍樹論證成中道者一多無二一無分別之中道次法性以何為相等及印內際中道者現通一切法之中道是故下云以此義故文首詩云法性圓融無二相乃至久來不動名為佛意在於此已上既得此中如是中道則當知一切法無非中道是故或約真俗現中道或約染淨現中道或約迷悟現中道如是一切差別相對法中隨舉現中道也問此之中道隨所論法可有重耶答中道則一也問何量耶答無住法性中道也於此有佛無佛性相常住之無住法性中十佛證之則為內證普賢證之則為外化不偏內外是故下文現中道云以此義故説與不説等無差別生與不生等無差別動與不動等無差別一切差別相對法門準例如是是故經云有為無為一切諸法有佛無佛性相常住無有變異是其義也已上故爾也問何知爾耶答道身章云一乘緣起法非情所及雖非情及而不遠求反情即是問反情方便云何答方便無量而其要者隨所見處不著心為是隨所聞法不取如聞即解其所由又解法性乃至問其法之如者何乎答此即法性無住本也既無住故無可約之法無可約之法故無分別相無分別相故非心所行處但證者境非未證者知是謂法相也無一切而不爾此處十佛普賢之境已上約諸法相無住法性而云十佛普賢境界則法性中道非偏內證是故下云圓教一乘法者頭腳捴一阿耶兒子年月皆同何以故由緣成故約道理説故問一者何義答一無分別義又同者何義答不住義無分別不住故始終同處師弟並頭已上無分別不住即是中道而頭腳捴一阿耶兒子年月皆同等者豈偏內訂不通外化耶六相章云第二教興意者此教為現一乘圓教法界緣起無盡圓融自在相即無得容持乃至因陀羅無窮理事等此義現前乃至普別具足始終皆齊初發心時便成正覺良由如此法界緣起六相鎔融因果同時相即自在具足逆順因則普賢解行及以訂入果則十佛境界所現無窮已上始終皆齊具足逆順混融無得者是無住緣起法性也仍云因則普賢解行及以證入果則十佛境界故知一種無住法性在十佛名內證在普賢名外化故無所偏當也問若爾證教之法久來中道一無分別者亦通內證外化耶答爾謂證與外化一無分別者是中道而十佛普賢之所共證又就普賢門中因果俱時相容相即各攝一切㸦為主伴之因果者因是普賢因果是舍那果此果與因相容相即約此容即之法於第十根心中具則窮第九根心中具則際此義至下又現也答中二初舉難許答后引類訂成初中其難解者自謙之辭若以自智雖難解然依聖教可解故云依天親論主云云也二中先引類成后汝所問下正答前問初中若約十句等者指下所引論文今且以下正引類成中先引類成后一乘別教下簡迷情初中三先標次所謂下𥸩后主伴下結標中今且者對上若約十句以辨六相云也又對於諸文或約舍或約金師子等論六相處云也初今且至六相者標能况后一乘至分齊者標所况今此正辨字相然舉類訂成故云約印像以明六相也問一乘三乘主伴相成者何一何三耶答既屈曲況三乘印圓況圓教一乘故圓教一乘下三乘也𥸩中從初至本來不作故者𥸩前標中能況從一切緣生乃至唯在中道者𥸩前標中所況法也初中先列六相名后捴相者根本下約印以六相𥸩也捴相者根本印者越就云故爾若準六相章云捴相者一舍多德故今此應云捴相者一含多德故何故一含多德故為捴相耶根本印故問一含多德者捴捴多德耶別別夛德耶答一云如后以攬別成捴故一云如前以一一德皆全盡捴故然二義並得也問若捴捴多德則應立無盡捴耶答雖具多德然非一外之夛故不立無盡捴也問能含之一所含之多各別何云非一外之多耶答雖云一含多德然能含所含不異故但多德融合之處目為能含一非夛外一多非一外多故無盡之捴則不立也別相者餘屈曲者同前越就故辝不足也應云別相者多德非一故何故夛德非一為別相耶以餘屈曲故問六相章云夛德非一是別相何故下云別相者椽等諸緣別於捴故耶答夛德非一故別於捴別於捴故多德非一故不違也別依止印滿彼印故者捴中及滿耶不及滿耶答二義也后義者以是別相𥸩名中所説之義故也問若爾所滿之捴何見耶答別相中見也今𥸩及滿也問以別相𥸩名中義故應不及滿根本捴何云及滿耶答以開捴成別時捴德自現是故以別成捴時亦得及滿也問若爾捴中別貌有耶答無也問以別滿捴故可有別貌何云無耶答無別貌之捴中所開之別故以別滿捴之時別貌無也問別相𥸩名中滿捴之義故可於別相中見何云捴中見耶答若爾六相章云若異者應不同耶答只由異故所以同耳已上只由異故所以同時不及成前同相義耶然同異對中以異成同時及成同相是故捴別對中以別成捴時及成本捴也古人云有帶別之捴有𮥷別之捴或云對別之捴然若是捴相何有不對別相時耶是故以帶別之捴為正問𮥷別帶別二捴何別答捴相者根本印則𮥷別之捴別依止印滿彼印則帶別之捴也問若爾𮥷別與帶別故有重耶答一云爾故二捴有重一云但云捴相者根本印不説別相所成之義故云𮥷別既言別依止印滿彼印故云帶別雖有二義然是一捴故無重也異相者增相故者約舍則石上立柱柱上安留頭等如是數增故也若約印説第二第三角等增而成印故爾也成相者略説故者如百億四天下合為一娑婆如是五十四角合成一印緣成和合略言標現故壞相者廣説故者如百億四天下一一差別緣散無作令一娑婆無所依住如是五十四角各住自法廣辨因緣本來不作故也𥸩所況法中一切緣生法無不六相成則六相亦通三乘耶答一云爾也一云唯𢩁此經初義者既云一切緣生法無不六相成故六義章約三乘六義用六相故問文云六義六相分齊云何答六義據緣起自體六相據緣起義門以法體入義門遂成差別如以六義入四句順去非故即順三乘入六相現自德故即順一乘已上雖是三乘六義若須六相則是一乘故六相者唯𢩁此經何云通三乘耶答順一乘者約終教三乘之六義用六相則順圓教一乘入四句則順初教三乘此則但言順於一乘不言即是一乘能所順別故爾也是故問答八字印處約六義用六相終云此文在三乘一乘方究竟故知三乘亦用六相也今𥸩此經所以別於三乘只由六相中即故爾也是故唯在一乘問何故約三乘六義用六相耶答六義是三乘若入六相則是別教六義又彼中云第六約教辨者若小乘中法執因於此六義名義俱無若三乘賴耶識如來藏法無我因中有六義名義而主伴不具若普賢圓因中具足主伴無𥁞緣起方究竟已上方於普賢圓因中具足主伴六義法上得用六相是故汝難無所開也然故云入六相現自德故順一乘也問能所順別何得云順一乘故唯𢩁此經耶答是一乘故云順一乘是三乘故云順三乘非能所別如云此經百四十願順一乘瓔珞經願順三乘此亦爾也問問答等文云何會耶答問答文者前明此印所宗如實㸦為因果之義因此云此文在三乘耳若不爾者三乘經論何處現有説六相文而云此文在三乘耶一切緣生法無不六相成者方於普法心中如是説耳非謂三乘心中得説此語是故前難無不會也問一乘三乘不即不𮥷用六相與一乘別教三乘別教準義可解何別答一云前約該攝下約分相一云前約修相同教用六相下現相背之一三中不得用六相一云前約此經緣起分中三乘用六相下準內證小乘中不得用六相一云前約所目用六相下約別教一乘用六相約三乘不用六相準知也今𥸩下云若約情説證教二法常在二邊過若約理云證教二法久來中道一無分別已上故前則於舊來中道一無分別義中用六相下則常在二邊過中簡情見也若準下文則約真俗則應云若約情説真俗二法常在二邊過若約理云舊來中道一無分別約因果則應云若約情説因果二法常在二邊過若約理云因果二法久來中道一無分別如是一切差別相對之法無非中道是故知今此前約一三無分別義用六相后簡情見也問既云別相者義當三乘教則通約三乘末教用六相何云唯在一乘耶答若曉無住緣起之心中我此六相不入之處於法界中竟不可得是故通約五乘用六相若用六相則便是一乘是故六相唯別教也尚於遍計人所知金師子上亦須六相況三乘耶非唯金師子亦於生師子亦須六相然彼生師子豈自知自身是六相緣起而生耶雖彼不知自是六相然於曉無住緣起之心所見其生師子即是無住緣起之法如是三乘等法即是六相者唯普眼所知非三乘分齊是故六相唯在一乘也問捴則圓教別則三乘然則餘相如何答三乘成圓力齊者同三乘形類各別者異以三乘等緣而起圓者成三乘各住不作者壞也問三乘法上須六相則約三乘法亦論力無力體無體耶答以曉無住緣起之心用六相故爾也問今此約五乘須六相心束六道因果小乘三乘等為普賢二十二位心何別答約其所現則一種無住緣起之際也但詮別耳謂二十二位則約此經內六道等法以為普賢位今此則圓教主三乘等伴主則㝎內説伴則㝎外説如是大別而以主無住緣起之心約大別之一三現示一無分別無住緣起之中道是故所現雖一而詮別也問分相該攝中三乘望一乘有二不異不一此不即不𮥷不異不一何別答分相中即一之三即三之一非一者即一之三則是三乘逐機説故高下也前后也一相一寂也即三之一則是一乘逐法性説故無𥁞緣起無前后也此則分示一三分齊之別今此約彼所分一三以現不即不𮥷是故今此所現指無住空名為一乘指無住空名為三乘故一之三一體無二無住緣起之義故別也問然則該攝耶答同是一乘心中所説然詮別也謂該攝則以一乘普法無遺攝故一切三乘等即是一乘今此通約㝎內一乘㝎外三乘以現無住之一乘無住之三乘故一無分別唯在中道故也如是若得一三是無住之一三時若約一心真如生滅二門一心為捴二門為別亦得若約初教本識賴耶賴耶為捴識上種種種子為別等亦得何者一切差別相對之法無有不入六相之處故爾也問若得此意則三乘為捴餘為別或小乘為捴餘為別亦得耶答爾且約捴別相現處云圓教捴三乘別約𫲷而説於小乘三乘等中隨舉説也十地為捴十地中種種法為別亦是約三乘所知相現處説若得不即不𮥷無住緣起之時隨何論六相是故十地中雖十地不同唯在初地初地中雖多分不同唯在一念何以故三世九世即一念故等隨一一法𥁞攝一切是故無住緣起心中隨何須六相也一乘三乘至唯在中道者於三乘機樂中説三乘法一乘機樂中説一乘法故一三之設在機益耳然三無自性不偏住三一無自性不偏住一一之三不即不𮥷常在中道也道身章云一乘緣起法非情所及雖非情及而不遠求反情即是者一三不即𮥷常在中道則非一三別執之情所可及處故云雖非情及也然反一三別執之情則不動前之所執一三即是無住緣起中道之法故云而不遠求也一乘別教三乘別教者約情謂故不用六相準知第二正答前問中三先正答次如經下引經論訂成后準是論主下結成前義初中先正答后依三乘下辨教分齊正答中先舉喻后雖因果下法合初曲者法性圓融后曲者名為佛也辨教分齊中高下不同等者以隨不知無住緣起之三乘機欲則因果不同約無住緣起之一乘則無前后也是故一三不即𮥷用六相者即此無前后義也一乘別教三乘別教者即此高下不同義然故可云隨機欲見一三各別故高下不同無住緣起之心見一三無二故無前后也問前云一乘別教三乘別教一外有三之分相一也何故今云隨三乘機欲見則一三別執故高下不同耶答一外有三之分相雖是解心之所分也以隨三乘執故立一外有三是故約情説三乘別教等一也訂成中先徵次如經説下訂即十地經后論文如是者和尚之辝如經下舉經論文次論曰下論𥸩后又一切菩薩下牒經文藏公云論主作四門解𥸩者依何等文立四門耶答如經説又一切菩薩乃至此是根本入者捴𥸩現本門此修多羅中説依根本入有九種入等者依本開末門是諸入為校量地義等者會末皈本門一切所説十句等者本末無得門問此四門中何是論文何是經文耶答初二經文后二論𥸩問若爾何云論主作四門𥸩耶答論主依經而𥸩故爾也謂若約初門則經中直現捴句無別指𥸩而論主𥸩云又一切菩薩者住信行地等捴𥸩也云此是根本入則現本也如是立捴𥸩現本門故云論主作四門解𥸩也問捴𥸩現本門之捴六句皆捴耶唯令入智慧地二句是捴耶答遠公儼公則如后藏師主則如前也儼公義者疏云二所為文二一對地法明加所為二所謂智慧下對所化人明加所為乃至對人明加所為中有二十句乃至入及始終二十句內各初一捴餘句別又一切菩薩不可思議諸佛法明説者對地法辨加所為云故唯后二句為捴遠公亦爾問論文何見耶答論中此是根本入者唯望令入智慧地句如是見也問通望六句云此是根本入何不爾耶答利他中云又得菩薩十地始終即是根本始終準此則自利中唯約令入智慧地句云此是根本入如是見也藏師義者疏云初中捴論地法緣起六義乃至此上六義融合無得通教及義通訂及比通境及智通人及法通因及果混通無得捴為一團名十地法已上故六句皆捴也問論文何見耶答通望六句云此是根本入如是見也論曰此二十句依一切菩薩自利利他故加如是初十句依自利后十句依利他行是中一切菩薩者住信行地等已上前分自利利他二十句次𥸩一切菩薩等六句以六句成自利十句初之捴句故爾也問利他捴句如何耶答藏師義者實則利他捴句亦加一切菩薩不可思議諸佛法明説之四句然自利捴句中已現故不加也是故自利利他中並以六句為捴也問何知主亦以六句皆為捴耶答此文云準是論主立宗道理故知因果信解行回地佛自位不動而無前后又下云如地論𥸩信地菩薩乃至佛六相成故明知如是已上故爾也問唯以令入智慧地句為捴則具九入之捴耶答爾也問然則九入之中前八是因第九是果則唯令入智惠慧地句為捴義中亦得云雖因果信解行回地佛自位不動而無前后何得以此為六句皆捴之訂耶答唯二句為捴義中不得言因果無前后也是故遠公會末皈本門𥸩云言為校量地義差別者為欲校量智地中德義差別故寄世間乃至佛地次第轉勝非根本入者乃寄彼轉勝之位彰智地中德義差別然彼所寄轉勝之位非是根本入智慧地良以地上念念皆具一切行德無有差別非是前后方始具故無轉勝相以無階降故已上此文現也問九入之中何者是寄位之相何者是所現之德耶答文中但現九入之德耳位相則隱而未現且十地中雖具聞思修訂然於聞思后立證入不放逸入乃至佛盡入等此則似於地前地上乃至佛果列位之相是故雖無現説位相之文然寄於列位之相以現地上念念所具之德也問儼公亦許六句皆捴義耶答有儼師十玄章一卷語義義理章十玄全同無別彼引論云以信地菩薩乃至不思議佛法為一緣起以六相捴別等義而用括之明知因果俱時相容相即各攝一切㸦為主伴已上故知爾也
