body:
  text: 章曰智儼和尚造疏要意五卷疏作竟首紙中書此十句一不思議以成陀羅尼顯地法二隨文取義有五種過三教義二大有五重四因果相形現義無盡五回文別屬以現義融六寄因陀羅彰義邊際七揔三三轉現際無窮八無生佛法寄位外沉九微細相容以明極勝十隔越科文成義自在記曰將釋此文有三初現列十句之由致次列所釋十句後能釋前中文云智儼和尚造疏要意五卷疏作竟首紙中書此十句已上問何故儼師於疏首紙中列此十句耶答得此十句之意方能解此經文故須疏首列茲十句也十句相生者為現海印定中所説無非十地法故冠之以初句也由此一言具多義故若聞凡名以為非是佛菩薩也如是隨言取義則有五種過失故受之以第二句也十地之法既不思議若聞不思議言如不思議而取有何過耶然此不思議有多重故設聞不思議言如自意取亦有五過故受之以第三句也若聞五重隨聞別取則有何過耶然約最下在語言是教此中具五重最上忘像海印是義亦具五重如是一一各具五重故設聞五重別取五重亦有五過也故受之以第四句也若得五重㸦具之義則雖華嚴經所有文義多則多矣然約最初如之一字具諸字無遺約餘亦爾為現如是義融故受之以第五句也如是一一字字各具多字無內無外故寄因陀羅彰義邊際故受之以第六句也前約橫位一中攝多成因陀羅今現竪位三際無窮故受之以第七句也現無生法隨器成差故受之以第八句也既無生法寄位升沉與三乘同耶然三乘中未論法界諸法自位不動於一法中炳然齊現之義至一乘中方現此義與三乘別故受之以第九句也若得此意則初會説何法可云十住法初會是何會可云忉利天會也為現如是無得義故終之以第十句也如是一一具多成因陀羅故得此十句意人方解此經旨趣故於首紙列十句也後能𥸩中此之釋文乃法融大德所造或云梵體大德親受融德作釋未見其文一本云尸羅國世達寺沙門神琳釋然苐二句釋文云融問琳德云則非琳德所述明矣又融昢大德作釋然但引融德釋而隨現自意無別隨文釋也今則若合意處隨釋之若不合者以別意述也章曰初現地法者彰無非十地謂初會五海是衆生本識此本識現名為願善決定名為不思議法是以無非十地也初會中為衆生欲生希欲五海不思議然説世界海隱染彰淨成希欲心苐二會中此五海名不思議是故不説成正信心也若此會中隱染現淨為衆生説非正信故不為衆生説也苐三會種性不可思議次行業後大願皆是五海衆生本識然三賢位本識未現非決定至初地方本識現名願善決定何故五海是衆生本識者性起品云一切衆生無不有如來智寧五海非衆生本識乎用何文知初會緣相應答説華藏世界已末云是盧舍那佛常轉法輪處故問用何文知苐二會離緣答不分世界性海唯云佛國土不可思議故知也儼和尚云依此經文更有剎名不知是何者是苐二會佛國土不可思議不云剎名故也今此世界或是蓮華或是海者如上性海一一具十而唯主為名故且云性海世界性依華住依海住故隨為主唯名蓮華或名海也此約性不約海也藏師云一味法界義分為二者佛入海印定背機忘緣為一味法界於緣中現離緣國土海為能隨土海於緣隨緣為所隨機緣釋迦十千名唯是衆生心分攝能化佛中如是種種不分故也如佛世界亦爾初會中欲生希欲示現嚴飾淨土是衆生土苐二會直示佛土不可思議寄此一切人所知世界佛反示佛土也問何故世界緣相應國土離緣耶答國土世界無異然而苐二會不隨衆生直示佛國土不可思議故離緣也品中句句或名號現一身如是一身居處云國土不可思議也若義準諸會中通有二淨土準本實隨差別緣差別緣隨本實門應解也世界海中三千界是融義者衆生隨業一處異見如同質異見義也衆生心染者法界回行皆土染也衆生心淨者淨土也海是因陀羅義者至淨故諸法皆不隱故一中現一切也性具此二也記曰釋初句中先正釋次用何文知下問答今初初現地法者初會中普賢觀五海普衆海云佛子諸佛一切世界海成敗清淨智不可思議苐二會中文殊師利言佛子佛剎不可思議佛住佛剎莊嚴乃至皆不可思議苐三會中種性不可思議苐四會中行業不可思議苐五會中大願不可思議苐六會中約十地法云不思議佛法如是會會名不思議者皆是苐六會十地法故云無非十地法是故云不思議以成陀羅尼現地法謂初會下初會中云不思議者欲現五海是衆生本識也此本識現顯名願善決定此決定名十地法也是則現此十地法在於不修衆生心中之義是以云五海是衆生本識此古德所謂種子十地也初會中下初會中但説十智不思議不説五海不思議何故云五海不思議耶答言十智不思議者即五海不思議也謂觀五海欲説五海而此深玄難説故唯説十智而此十智亦不思議故爾也故古人云華嚴經中六處有十地一處是初會之五海十智也故用五海置十智中用十智置五海中如是海智緣起之本識十地在衆生心中也儼師疏中約此義云通觀因地五海十智説自十智是故十智不思議即是五海不思議也然説世界下現説分中説世界海之所以謂本分中説海智緣起之本識十地之時有未悟者於説分中隱染彰淨説華藏果成衆生希欲心故爾也苐二會下問此與初會不思議何別答於一種五海之法若以佛證土門見之則深也為衆生説門見之則淺也初會中五海不思議者為衆生説也苐二會中五海不思議者現佛所證土也是故詮別也是故不下歎佛所證之土不可言説以成衆生正信心故也此是儼師舉土生信之義也問苐二會正報三業果與十國土海何別答靈炬大德云釋意別故別也體融大德云約體則同也然深其正報則十國土海淺其土海則三業果也故雖體一隨詮別耳十種淨土章云欲知分量準其十佛則可知之已上託此言古人云十國土海是何十佛也十佛是何十國土海也已上是故三業果之深則十國土海十國土海之淺則正報三業也初會中隱染現淨欲生衆生希欲心故説華藏果若苐二會亦隱染現淨説者則衆生不能正信十國土海故云不隱染現淨為衆生説也問初會五海不思議之言與苐二會五海不思議乃是一種何故初會則淺苐二會則深答然故法雄太德云若初會説世界海則淺苐二會説國土海則深者以何所以言世界海則淺言國土海則深耶若然者言極樂世界則淺言極樂國土則深耶如是誹謗法藏和上也然儼藏二師意者初會雖言五海不思議而既云我當承佛神力具足演説欲令一切衆生入佛智海又説分中説世界海之一海故此中不現佛所證土也苐二會初同生菩薩起先際十句問文殊師利答云皆不可思議者若初會已現十國土海則豈苐二會更起佛剎等問而文殊有不可思議之答耶然既爾也故知至苐二會中方現佛所證土也二師之意如是也問初會中五海是衆生本識為種子十地之義古所謂第二會光明覺品種子十地何別答不異也然於初會説海智緣起本識十地之時得種子之人至第二會無更授種子之理也初會本分説此本識十地之時有未得者但為此人於説分中隱染現淨説華藏果機人聞已生希望言何修而得耶曰有種子焉次當授汝於是第二會中授正報三業之種子也問既三業果並是種子名號四諦亦有種子十地何故偏於光明覺品有種子十地耶答雖三業果並是種子而種子十地是智分位方得立故爾也問五海是衆生本識者當差別緣耶當本實耶答本實義也問約本實八會則第一會信位成就本實因果分量德第三會解位現證性德普賢因果云云故本實義中一一位本識皆現然此文中既云三賢位本識不現非決定至初地方現名願善決定云故可當差別緣答五海是衆生本識者從不修衆生位中自有本識之義故當於本實而三賢位不現本識等者從寄位行布所説經文云故當差別緣也是以苐二會信位成就本實因果分量德者明不修衆生身中本具本體因果現於信位中也何故下於智分中方立種子十地故也是故經説一切衆生皆有如來智者明不修衆生心中有種子十地意也問一切衆生既有如來智可言衆生心中已有佛果何故乃云種子十地耶答看此十地亦是果十地故不違也然故古人云揔之則佛地別之則十地故此佛地得云種子十地也用何下前云初會為衆生欲生希欲五海不思議等是則緣相應至苐二會約此五海名不思議是故不説成正信心等是則離緣也因此二文起此問也儼和尚云下舍那品疏云依此經文更有剎名不知是何今依一義此剎非是如上文諸相由説佛剎無上諸相高下別故依佛取處名剎名土即無別異高下若約衆生取土則有諸相高下下文云常轉法輪處者約衆生説也若依此解文少可尋已上別彼文釋耳若依此章意釋彼文者謂第二會中但云佛剎不可思議而不云某佛剎故云名不知是何也今依一義此剎非是如上文諸相者若依國土海之一義非上所列諸相也依佛取處名剎名土等者第二會約佛取土故無別異高下也初會約衆生取土故有別異高下也文云常轉法輪處者證約衆生取土也一云更有剎者非是第二會佛剎初會中列十二佛國土七世界性中過十佛剎微塵數世界有世界名某也而不列所過世界名故約此義云更有剎名不知是何也其佛剎義中有約躰見有約相見門也若約躰見則佛證土不異故今依一義等者依國土海一義則非如上所列諸相故約佛取土則無別異高下相也此是約躰見門也約衆生取土則有諸相高下者若約為衆生説則有諸相別異高下也此是約相見門也常轉法輪處者證約衆生取土義也一云更有剎者不是餘剎乃華藏世界也謂已説華藏世界名故剎名則已有而不知此華藏世界為虛耶為實耶故云依此經文更有剎名不知為虛為實耶今依一義者依約衆生取土之一義準實佛土則實佛土者非如上諸相也依佛取處等者若約佛自利土則無別異高下故無十不可説世界性積成華藏又積風輪水輪等之理也而今約衆生取土故有如是説是知華藏虛耳非實也文云常轉法輪處者證約衆生取土也故知華藏虛耳非實也是以表訓大德云初會之華藏世界遍計土無實法躰者此義也問若爾者當釋華藏世界別異高下相時何故乃云更有剎耶答今釋華藏別異高下相時欲更現異義故云更耳非更明別土故云更也是則捨前釋義更出別意故云更耳問此中實土內證耶答雖是外化約佛自利土即無分齊也謂三乘中亦説佛自受用土無分齊故眼亦遍法界耳亦遍法界故雖是外化約佛自利土即無分齊審此章之意即當初義若約本疏意後説合於文相今此世界下一云華藏世界也謂諸處云十蓮華藏世界海故知爾也然華藏內有不可説世界性中央世界性中説十二佛國土七世界性故約中央世界種云今此世界或蓮華等也問何故不約華藏世界耶答本疏云若依下瞿夷文內除三千界外有十世界一性二海三圓輪等已上約本華藏不如是列故唯約中央世界種也一一具十下從為主故且云性也而此性中具性海等十又從主故且云海耳而此海中具性海等十世界性下説七世界性經文中云有一香水海名樂光明有一切香摩尼寶王莊嚴蓮華上有世界名清淨寶網光明等如是説故云依華住依海住也此約性下恐有謂是海華藏也故今簡云此約世界性且云或蓮華或海等非約海華藏説也問世界性世界海世界蓮華等各別耶於一世界中具此十義耶答於一世界中且約同類義云性約色類多義云海約敷發義云蓮華等雖一世界可具十義也問若爾何云今此世界或蓮華或海耶答爾故文云一一具十唯從主為名且云性海等是則從主為性此中具性海等十從主為海此中亦具性海等十故不違也問性海等十義有重耶無重耶答約一世界義分為十故無重也問藏師文云此中世界性者謂積世界成性積性成海等如上所引智論説又此下文於世界海中有世界性世界性中有一世界等故知積成已上依此疏文可有重耶答文云有二義一望前諸界攝諸類積結成性如文習成性二望後海等有為因義亦得名性問積界成性界亦因義何不名性答無融結故闕初義也問十世界中海望於後亦積成餘界何不名性答初積結攝已得性名後開異義轉立別號故不名性已上既文云初積結攝已得性名後開異義轉立別號故無重耳問既云二望後海等有為因義亦得名性故即可有重何故無耶答望後海者指本華藏耳非約世界性世界海為海故無重也問壽命差別童云若一乘假使世界性十種土中所有命根雖福分轉勝命亦不異已上既云十種土中福分轉勝則可有重耶答但云十種土之福分三千界雖有轉勝而其命根三千界之命根不異爾非約十種土云轉勝故是故無重也前云問依其經文將娑婆國土對阿陀佛國等辨命短長據三千界命根佛土命根雖有短長根法不異此義云何已上如是問已答成其義故世界性等十種土之福分三千界之福分雖有轉勝約其命根則三千界之命根佛土之命根根法不異如是明也藏公云於一味下彼疏云不思議者此中大意於一味法界義分為二一能隨之土海二所隨之機緣已上若以此三分國土海世界海者云何答一云三皆國土海也一云能隨之土海是國土海所隨之機緣是世界海也一云一味法界是國土海能隨所隨之二現土海之詮也此中融昢大德云若約情分能隨是土海所隨是世界海若約理云一味法界是土海也謂想德云若約情説證教二法常在二邊若約理云證教二法舊來中道一無分別已上以此準於藏師之文寄緣之詮反現土躰絶緣之義又云約緣現土以緣起塵等故令土躰從緣印成差別已上等者緣土躰別異而論是乃約情門故此則想德所云若約情説證教二法常在二邊過者準於初二不思議也又文云緣無別緣以躰即緣是故差別緣起即緣土海不異論也此乃約理門故想德所謂若約理云證教二法舊來中道一無分別者準於第三不思議也然約情者謂證外化始終竟別固執之迷情也以此準於初二不思議難故此義亦難依也是以一味法界是土海也能所隨二現土海之詮此意可依也謂不思議者此中大義於一味法界等既牒不思議云一味法界故一味法界即國土海此義甚深直現也難且作能隨所隨之詮故云能所隨二現土海之詮耳問既云能隨之土海可云能隨即土海耶答土海之佛是能隨故且云能隨之土海耳非謂能隨即土海也土海者還於一味法界中立故爾也約不動處方名土海既云能隨明知非土海也是故土海者還於不動處見也問若爾則所隨之機緣者所隨機緣亦異耶答不為一例所隨之機緣者所隨即機緣也能隨之土海者但土海之佛為能隨能隨非即土海也問於此三中屬當經文云何答雖有多説然標躰二假一味法界之經文也明用一假能隨之經文也辨相一假所隨之經文也謂牒不思議云一味法界故標假是一味法界之經文也如所標而釋之故此躰假亦是一味法界之經文也明用假云所隨機緣差別可爾能隨差別云何可見已上言所隨差別者指相假也能隨差別者指用假也故辨相假則所隨之經文明用假則能隨之經文也問何知躰假如標而釋答徵則牒前不思議之言釋則約躰如標而釋若不爾者即有標釋相違之過故知躰假如標而釋也問後現躰云十方諸佛説法知彼心行隨化衆生法界虛空等故此躰假可是能隨之經文答若如所難文中既言隨化衆生此則亦是所隨何獨判為能隨耶此既不爾彼云何然釋躰假疏云二門雙融故無際限故者欲現能化所化二門雙融成一味之義故此躰假亦一味之經文也問若言如標而釋故躰假是一味法界之經文者如躰釋相故相假亦是一味之經文耶答徵標現躰之徵如標而徵徵躰辨相之徵乃是下徵非如躰而徵是故相假非是一味之經文也謂徵標現躰中標假中不思議云何以得知不思議者故云如標而徵也徵躰辨相之時躰既平等而文中云何以得知差別無邊法界等已上既云差別無邊故知下徵也既文云約此殊形緣起反現土躰妙極難思又云寄緣之詮反現土躰絶緣之義如是云云故知躰者內證也問徵躰辨相中云何以得知差別無邊等法界者牒躰假之法界虛空等言可云如徵何言下徵耶答言似同而別也謂躰假中約土躰乎等等法界之義也相假中約土相差別無邊等法界之義故非牒躰假之法界虛空等也若於此中亦如躰而徵者應言何以得知十方諸佛説法等而既言何以得知差別無邊等法界故此中但舉平等躰之成差別之義作問故云下徵也十種淨土章云佛土自融法界等無別可別何以故由是佛土稱法界故已上佛土自融法界等者從躰假經文中法界虛空等文也故躰假之中法界虛空等者明其佛土平等雙融法界等也問所言何以得知差別無邊等法界者相差別耶用差別耶答雖具相用然唯約用差別也謂若躰之成差別時先成用差別故須爾耳所言差別無邊法界等者以躰從緣即復印成差別緣起之義同故唯約用差別也問文中説種種身種種名等相差別答之可云舉相差別作問耶答何以得知差別無邊等法界者舉用差別作問也而答中所以先辨所化衆生差別者只由所化衆生之差別故能化之差別方成故先説所化衆生相差別以答之後方重嘖云所隨根機差別可爾能隨差別云何可見於是方説能隨之差別答前用差別之問也以躰從緣即復印成差別緣起者泥雖平等以印印之隨印屈曲平等泥中亦生屈曲如是佛本平等而隨衆生亦成差別故云即復印成差別緣起也是則只由相差別故成用差別故先舉相差別而答也問若言徵躰辨相是下徵者何故乃云徵躰耶答因平等躰問差別用故云徵躰耳若爾難者即於徵相明用中先徵相云所隨衆生差別可爾能隨差別云何可見言所隨機緣差別可爾者舉前相假也能隨差別云何可見者正問用差別也於此中亦可難云何云徵相耶而彼亦因相差別問用差別故云徵相例彼此中躰平等可爾何以得知此躰之差別無邊法界等因於躰假問用差別故云徵躰也上徵標現躰非一例也問文云佛入海印定背機忘緣為一味法界於緣中現離緣佛國土為能隨土海是則能隨亦可為土海耶答爾故立能隨為土海者引此為證然唯就一味法界為國土海之義中二義可見謂一義法融大德説謂能隨即土海如是而立故更無別會也一義雖此義中亦可會此文二意並得問云何會耶答於緣中現難緣等者能隨則在於緣中土海則本自離緣於在緣之能隨中并舉離緣之土海而云為能隨土海耳能隨則非即土海也問既云於緣隨緣為所隨之機緣例此則文云於緣中現離緣土海為能隨土海者亦可云能隨即土海歟答於緣隨緣為所隨者亦唯取所隨之緣方云所隨機緣耳非耶能隨為所隨故此中亦爾能隨非即土海也問文云釋迦等十千名唯是衆生心分攝是則能隨之佛亦可合云所隨之機緣何故唯取所隨為所隨之機緣耶答釋迦等十千名唯是衆生心分攝者只欲會前於緣中現離緣國土海為能隨土海之言中能隨者在於緣中之義也謂能化之佛雖本平等而隨所化衆生成差別故但云釋迦等十千名是衆生心分攝故在於緣中耳非謂釋迦等名為所隨之機緣也能化佛下泥本平等以印印之則隨印屈曲泥亦屈曲佛亦如是佛本平等隨所化之差別故能化之佛亦成差別故云能化佛中如是種種不分也問神秀和尚果德依正難思觀云今依一味法界義分為二一所依之躰二能依之用已上以彼三莭準於藏公文者何耶答一味法界者準藏公一味法界也所依之躰者牒前一味法界故亦準藏公一味法界也能依之用者準於此中能隨所隨也問既云今依一味法界義分為二一所依之躰二能依之用故一味法界所依之躰可有異耶答例如藏師諸處中圓教有二一別教二同教者牒前圓教即云別教而兼於伴眷屬之義中并論同教此中亦爾雖言於一味法界義分為二一所依之躰二能依之用然牒前一味法界則為所依之躰非別異也問躰用俱亡故云不思議矣已上是則何得以所依之躰亦為一味法界耶答若約證一味法界之人心則躰用難分故云躰用俱亡而所依之躰還於一味中見故所依之躰亦內證爾問經文云何當耶答佛國土不可思議佛住佛剎莊嚴乃至佛阿耨多羅三藐三菩提皆不可思議者所依躰之經文也諸佛子十方世界一切諸佛知諸衆生欲樂不同隨其所應説法調伏等者能依用之經文也問若爾者藏師新經不思議釋文云衆生界遍滿法界機感不同無邊差別如來普應亦差別難知故云不思議已上是則所依之躰可是外化何故內證耶答藏師新經不思議約外化釋也神秀公約內證釋所依之躰亦內證耳問一種經文何故藏公約外化釋神秀公約內證釋耶答藏師意者經云佛國土不可思議乃至佛阿耨多羅三藐三菩提皆不可思議已上徵此而釋云十方世界一切諸佛知諸衆生樂欲不同隨其所應説法調伏如是乃至等法界虛空界等如是説釋能化之佛隨衆生等法界之義也藏公約如是義釋成故新經之不思議外化也神秀公以為佛國土不思議等者舉所現所依之躰也十方世界一切諸佛知衆生樂欲不同等者説能依之用也而不以後釋前故云內證也問神秀公分所依之躰能依之用已云此二無二者藏師分能隨所隨已云此二無二通融無得何別答神秀公執所依之躰能依之用云此二無二藏師所云此二無二者且約能隨所隨詮亡之義故別也是以神秀公此二無二者當於藏師性海果分緣起因分此二無二全躰遍收之義也問藏師所云此二無一全躰遍收者想大德若約理云證教二法舊來中道一無分別何別答無別也問若爾者約理云證教二法舊來中道一無分別之言中亦具證分緣起分耶答所謂約理云者證分全緣起分緣起分全證分故約證教緣起之理云也舊來中道一無分別之義是內證也想公云所證在言末不異言説在證本不異已上如是證教緣起而論者所欲是何欲現證分之法是舊來中道一無分別之處故云若約理云證教二分舊來中道一無分別也是以約證教緣起之理作四句云所證在言尋常差別也言説在證性在中道也令俱存此二雙現前也令雙泯此二性在中道也如是四句之中第二第四是內證義故從此二句云舊來中道一無分別也若得此意見藏師此二無二全躰遍收之文則性海果分全緣起分故尋常差別也緣起分全性海果分故性在中道也俱存此二故雙現前也雙泯前二故性在中道也是故藏師此二無二全躰遍收之義相德約理之論同也故云舊來中道一無分別者唯是內證也問何知言説在證性在中道令泯上二性在中道之義並是內證耶答既神秀公約能依用之所依躰為內證也又約躰用俱亡不思議之處亦云內證故爾也問若約情説證教二法常在二邊之義下云問如上所言證分之法及緣起分法有何差別答別不別之中別義有何異耶答約情説者約執證教始終竟別之迷情云也下云別者約法躰則雖證分全緣起分緣起分全證分然義門異故證分全緣起分之時是緣非證緣起分全證分之時是證非緣且約此義而云別故上下二文之義別也如佛世界亦爾者且如約佛而言則佛平等而隨衆生成種種差別世界亦爾佛土平等而隨衆生説故云金色世界妙色世界等差別也初會欲生希欲等者初會欲生衆生希欲心説飾華藏果是約衆生取土也第二會直現佛土不思議故舉一切人所知金色妙色等世界者欲現其世界等即佛土之義也何故世界緣相應等者問既前文云用何文知初會緣相應等問答時已盡何故更有此問答耶答前文中但將初會第二會相對問答現初會緣相應第二會離緣之義也此中如法雄大德難云何故言世界則淺言國土則深耶若爾言極樂世界則淺言極樂國土則深耶此亦如是何故世界海則緣相應國土海則離緣耶如是作問也答意國土世界無異故實則㸦言無妨而初會中隨衆生説欲生希欲心故云世界緣相應苐二會中不隨衆生直示佛土不思議義故云國土海離緣耳品中句句等者謂或稱悉達或稱滿月等者數一身所具之名也如是言金色妙色等世界者現實是一佛所居平佛土之義故爾也若義準等者問本實則內證差別緣則外化耶答以內證為本實以外化為差別緣者則引此文為證也然此二宗並外化也立此義中會此文則此內證外化俱通八會之義如彼本實隨差別緣差別緣隨本實之二宗俱通八會之義故云爾非謂本實是內證差別是外化故如是云也世界海中等者儼師十世界章云依此經文三千界等現其融義蓮華藏界明因陀羅微細等義中間界等略不明已上從此釋耳衆生隨業一處異見者有染業者唯見染土有淨業者唯見淨土一處異見故爾也如同質異見義者猶如見一種水人見水魚見家天見琉璃如是見一世界染業衆生見是穢土淨業衆生見是淨土故見一種世界全染全淨是以云三千界等現其融義也如一種三千界舍利弗見沙石所成螺髻梵王見諸寶所成故爾也海是因陀羅者海華藏是經二佛世界微塵數劫所修令淨故一塵中現法界諸法也亦其所現諸法中一一各現法界諸法入中復入重重無盡故云海因陀羅義也性具此二者若約性望界則淨而望海則不得為淨故云性具此二也融質德云三千界等是其融義者第二會中寄三千界現國土海故云界是融義也言海因陀羅者初會説華藏世界現佛外向之門故也言中間界等略不明者瞿夷文中無説此二故是則十世界章文中有二大德之釋義然質大德之釋中界是融義則深海是因陀羅義者淺也章曰二隨文取義有五種過者前辨法界一切法一一盡法界集成地法今此門中辨前法名字也今日呼一名時一切稱皆直是此一名論聞者時聞一名字一切皆直聞也若聞凡名非聖等者則有五過一不正信二退勇猛三詐他四謗佛五輕法也呼一時一切口許者二義一藏師云呼一名時一切各各自名口許二相和尚云呼一時一切共一名口許藏師云一中十故盡十中一故不盡是橫盡法界義也融問琳德何故一中十盡十中一不盡耶答一中十之一者是具二具三乃至具十之一故攝十盡也十中一之一者是非二非三乃至非十之一故攝十不盡也問何故一中十之一者是具二具三乃至具十之一故攝十盡十中一之一者是非二非三乃至非十之一故攝十不盡耶琳德歎曰此乃昔相元師於相德前所問之義也汝今亦問歎已答言一中十之一者是一之攝十故攝十盡也十中一之一者唯是一之攝十之門耳非是二攝十非是三攝十乃至非是十攝十之一故攝十不盡也私意十位中初一唯是一攝十是故云盡也此一者不是二攝十故第二門攝十者不攝也是故云不盡也若此一受第二位攝十者第一一位壞故十皆不成也是故云一中十盡也若二攝十是可得故云十中一故不盡也謂此一於十門中只是第一一門故餘門攝十者不盡也問何故章云攝餘門無盡耶答非攝別第二等無盡唯是無側故則此一門中有無盡重重此釋明現初餘門如虛空釋非別義意也若攝第二攝十者伴伴並過也唯第一一位成方餘餘第二乃至第十位建立故餘諸位唯是一位具足故呼一時一切名皆口許也相和尚以一事辨一多者舉初一門故云以一事十皆以一名口許故言辨一多也問何故一切以一名口許耶答此一位立方餘諸位得成故一言汝等諸位皆以吾名口許耳若汝言吾是二者無吾一時汝二應有然無吾一時汝不得立故唯以吾一名口許也以異事辨一多者舉二辨十二乃至舉十辨十十門也問何故第二門十二為一之多耶答先十一者非情計一故以二呼時得二名口許也是故此二三等是一之無得義故言一之多也問何故十皆一名口許之義藏師意同耶答由各各自位不動方呼一時十皆一名得口許也以一緣起法中具此二義㸦現一邊故意至齊同也是故相德盡不盡第一門中唯攝十一故盡第二門之十一則非其分故不盡也琳德曰第一門始而第二門未始故不盡云者極意不得也記曰釋第二句中二先正釋後呼一時下現二師盡不盡也此中先標二師義後藏公一中十下釋也此中先釋藏師義後釋相德義也問二師盡不盡何別答一云始終並別一云始別終同然始別而意至齊同也謂藏公呼一名時一切各各自名口許相德呼一名時一切唯一名口許如是故始別而下文云一緣起法中具此二義㸦現一邊故意至齊同也問就二師盡不盡義論橫竪義云何答一云相德則橫盡法界義藏師則竪盡法界義也謂相德之盡不盡者如立一一地具十地之十地而呼初地之歡喜地時即後九地中之歡喜等齊應云吾亦歡喜吾亦歡喜之義也藏師之盡不盡者如立一法十地而呼初歡喜地時後九地齊應云吾是離垢吾是發光乃至吾是善慧吾是法雲之義也若約喻説相德之義如立十層十塔呼初塔之第一層時後九塔之第一層齊應云吾亦第一層吾亦第一層之義故橫盡法界義也藏師之義如立十層一塔呼第一層時後九層云吾是第二吾是第三乃至吾是第十之義故竪盡法界義也梵躰大德云論橫竪之義不定故若約理事相對則理橫事竪若約時法相對則十方法界橫三世九世竪若同異體相對則同躰橫異體竪若就異體中純雜相對則純橫雜竪同體中亦爾也藏師異體中論故竪也相德同體中論故橫也然此等義難也謂相德云若欲觀緣起實相陀羅尼法者先應學數十錢法所謂一錢乃至十錢藏師云如數十錢法已上二師皆約一種十錢為喻何故云相德之義如約十層十塔論故橫盡法界也藏師如約十層一塔論故竪盡法界義耶又體德義者藏師約異躰入門論盡不盡故立異躰中論者文現可爾而相德文中無説同躰之言何故云相德立同體中論耶若云相德之義呼一名時一切皆以一名口許故立同躰中論者前論具錢不異藏公是則前約異躰論具錢之義及至盡不盡中更立同躰中論耶然且不爾此義難依也是以藏師立異躰中論也相德通約同異中論也若約十地論則立一往十地呼初歡喜時後九齊應云吾亦歡喜吾亦歡喜者相德之義也呼初歡喜時後九云吾是離垢吾是發光乃至吾是法雲者藏師之義也若約喻別則立十層一塔呼初層時後九層云吾亦初層吾亦初層者相德之義也呼初層時後九層云吾是第二乃至吾是第十也者藏師之義也故二師義竪則並竪橫則並橫耳非謂相德之盡不盡橫也藏師之盡不盡竪也問若爾者此二師義不可以橫竪分耶答既古人云為橫則並橫為竪則並竪也又論橫竪不定故理事相對則理橫事竪圓融行布相對則圓融橫行布竪時法相對則法橫時竪無性不壞相對則無性義橫不壞義竪也相德約無性義故橫藏師約不壞義故竪耳問二師之義橫則並橫竪則並竪義云何答約竪位十地呼初歡喜之時後九地並云吾亦歡喜吾亦歡喜者相德義也呼初歡喜時後九云吾是離垢乃至吾是法雲者藏師義故是故二師之義竪則並竪也橫列十錢呼第一錢時後九錢云吾亦第一吾亦第一者相德義也呼第一時後九錢云吾是第二乃至吾是第十者藏師義也故二師之義橫則並橫也問相德之以一事辨一多者一一是多故云一多也應立同躰中論耶答若以一一為同躰種種為異躰者可爾而異躰中有一名口許之義同躰中亦有種種名口許之義故同異躰中無偏當也問若約古人意者二師之義為橫並橫為竪並竪若約無性不壞則相德約無性故橫藏師約不壞故竪何故此章云藏公一中十盡十中一不盡是橫盡法界義耶答如前論橫竪不定故圓融橫行布竪故今此論盡不盡者是圓融義故云橫盡法界也就釋中藏師之一中十盡十中一不盡者何為盡何為不盡耶答一云以向上來作盡以向下去作不盡也一云舉來初作盡舉去初作不盡也一云來初門攝十者是盡也是十門中第一門故不盡也一云來初門攝十者是盡所攝十之不相是義為不盡也一云來去二十門中隨我所執論也初義者一中十者向上來之都名十中一者向下去之都名故十中一故不盡者舉去門作不盡也一中十故盡者舉來門作盡也是故相德標來門云一中十也標去門云十中一故爾也次義者藏公文云向上數十門一者一乃至十者一中十餘九亦如是向下數亦十門一者十即攝一乃至餘例然已上來初門云一中十去初門云十中一故一中十故盡者是舉來初作盡十中一故不盡者是舉去初作不盡也問若爾者來後九去前九等於盡不盡中不見耶答來後九去前九門等並來初門之不盡故實則論一門盡十九門不盡也若具列十九門不盡則恐其繁多且舉中間去初一門作不盡耳次義者約來初門攝十之義云一中十故盡而十門中唯是第一門不得盡餘九門故云十中一故不盡也如是當一身中作盡不盡也次義者相德云又一事中一多義不相是即是多是一事故即是一已上一事中一多義不相是即是多之義釋不盡也是一事故即是一之義釋前盡故約初門攝十之義為盡所攝十之不相是之義則不盡也次義者來去二十門中隨我所執約一門中攝十者為盡而其門門於十門中只是一門故不得盡餘門所攝之十故云不盡也若約塵則一塵中攝十方者盡然十方中唯一塵之攝耳不得盡餘門所攝故云不盡也如是約吾身約柱等一切法中隨舉論盡不盡無別偏當也融質德云來初門攝十者是揔相盡也後九門別者別相不盡也然此義難也謂若初門攝十為捴相盡門對此為別相不盡者初門亦是別相不盡也何云唯後九門別相不盡耶又十中一故不盡中十者是何一者是何若云十者來後九也一者來初門者初門亦是別相不盡何故唯後九門是別相耶是故此義難依也梵躰大德云一中十故盡者於來初門具十之中舉終錢作盡十中一故不盡者於來終門具十之中舉終錢作不盡也謂來初門具錢時當言第一一第二一中二第三一中三乃至第九一中九而超此云一中十故盡也若來第十門具錢時應言第一十第二十中九第三十中八乃至第九十中二而超此舉終故云十中一故不盡也問盡中所超之八不盡中所超二重八門於盡不盡中不見耶答盡中所超盡中見不盡中所超不盡中見也謂若具作盡門者應言一中二一中三一中四乃至一中十故盡而超中間舉終錢故云一中十故盡也是故盡中所超於盡中見也若具作此第一門之不盡者應言二中十故不盡三中十故不盡乃至九中十故不盡而超此舉終故云十中一故不盡也就此終門若具作者應言第一十第二十中九第三十中八乃至第九十中二而超此舉終故十中一故不盡也是故不盡中所超於不盡中見也故實則論一門盡九門不盡也問文云別別諸事門準例可知已上是則來後九門去十門中論盡不盡云何答來第二門應言二中十故盡十中一故不盡至第五門應言五中十故盡十中一故不盡至第九門應言九中十故盡十中一故不盡至第十門應言十中一故盡一中十故不盡也若約去初門如來終故云十中一故盡一中十故不盡第二門中九中一故盡一中十故不盡至第五門六中一故盡一中十故不盡至第九門二中一故盡一中十故不盡至第十門如來初門故云一中十故盡十中一故不盡也所以爾者來第二門中應言第一二第二二中一第三二中三第四二中四乃至第九二中九而超此故云二中十故盡若具作第二門之不盡者應言一中十故不盡三中十故不盡四中十故不盡乃至九中十故不盡而超此故云十中一故不盡也第五門中應言第一五第二五中四第三五中三第四五中二第五五中一第六五中六第七五中七乃至第九五中九而超此云五中十故盡也若具作此門之不盡者應言四中十故不盡三中十故不盡二中十故不盡一中十故不盡六中十故不盡乃至九中十故不盡而超此云十中一故不盡也就第九門應言第一九第二九中八乃至第九九中一而超此云九中十故盡也若具作此門之不盡者應言八中十故不盡七中十故不盡乃至一中十故不盡而超此云十中一故不盡也就第十門作盡者應言第一十第二十中九第三十中八乃至第九十中二而超此云十中一故盡也若具作此第十門之不盡者應言九中十故不盡八中十故不盡乃至二中十故不盡而超此舉終云一中十故不盡也若就去初門作盡者應言第一十第二十由九乃至第九十中二而超此云十中一故盡也若具作此門之不盡者應言九中一故不盡八中一故不盡乃至二中一故不盡而超此云一中十故不盡也就第二門作盡者應言第一九第二九中十第三九中八第四九中七乃至第九九中二而超此云九中一故盡也若具作此門之不盡者應言十中一故不盡八中一故不盡七中一故不盡乃至二中一故不盡而超此云一中十故不盡也至第五門作盡者應言第一六第二六中七第三六中八第四六中九第五六中十第六六中五乃至第九六中二而超此云六中一故盡也若具作此門之不盡者應言七中一故不盡八中一故不盡乃至十中一故不盡五中一故不盡四中一故三中一故二中一故不盡而超此云一中十故不盡也就第九門作盡者應言第一二第二二中三第三二中四乃至第九二中十而超此云二中一故盡也若具作此門之不盡應言三中一故不盡乃至十中一故不盡而超此云一中十故不盡也至第十門作盡者如來初門故應言第一一第二一中二乃至第九一中九而超此云一中十故盡也若具作此門之不盡者二中一故三中一故乃至九中一故不盡而超此舉終故云十中一故不盡也今云具錢之法此義可隨也此中稍加論者一中十故盡者并舉來初去終作盡也十中一故不盡者并舉去初來終作不盡也謂來初去終具錢狀同去初來終具錢狀同故爾也問來後九門去前九門通來初門作不盡亦去終門作不盡耶各別不同耶答各自門別合執作盡故來門之後九初門作不盡去門之前九終門作不盡也問若爾來去初終應各別論何必合執論耶答觀其文相來去初門各明具十之義結云如本末二門中各具足十門餘一一錢中準以思之已上是故本錢中來初去終通結末錢中去初來終通結也故重結云一中十者亦來初去終通云也十中一者亦去初來終通云也因此一中十之義仍云一門中既具足十義故明知一門中皆有無盡義故一門中既具足十義者亦來初去終通云也因此又問一門中攝十盡否故此中亦來初去終通舉作問也故其答中一中十故盡中亦并舉來初去終作盡也十中一故不盡中亦并舉去初來終作不盡也問別別諸門中準例如是者何耶答於來後九去前九中例現盡不盡義也問來後九去前九亦合執論耶答但來終門去初門合執論耳中間八門既具錢狀異故別論也問中間八門既其異也一中十故盡十中一故不盡言中亦應別論何故合執論耶答雖中間八門具錢狀異故未得合論幸其來初去終去初來終具錢狀同故合論耳前既本末兩錢中來初去終去初來終合執而論及至結中一中十之中亦來初去終通云也十中一之中亦去初來終通云也乃至問答盡不盡中亦合論故爾也問來去二十門中論具錢已引華嚴經菩薩善觀緣起法於一法中解衆多法衆多法中解了一法之文此文如何證耶答以於一法中解衆多法證來初去終二門也以衆多法中解了一法證來後九去前九也問來後九門去前九門各各具十何故云衆多法中解了一法耶答實云衆多法中解衆多法也而前云於一法中解衆多法及此即云衆多法中解了一法故爾耳問一門中攝十盡否者此亦超舉第十耶答通約所具之十也謂前云一門中既具足十義之言通約所具之十因此作問故爾也問若爾答中一中十故盡者亦應通約所具十也何故超舉終耶答雖超而不捨也實則具云一中二一中三乃至一中九超此略説故不違也問若爾一門中既具足十義者亦可超舉終錢耶答若爾難者前云本末二錢中各具足十門者亦超舉第十耶若爾則且本錢中超舉第十錢為終故可云具足十門也其末錢中超舉第一錢為終則何可云具足十門耶夫如是故前本末二錢中既通約所具十故一門中攝十盡否者亦通約所具十而作問也問所具唯九何云十耶答所具唯九而并能具云攝十也一中十之至攝十盡也者列來初門中所具十也十中一至攝十不盡者約其能具所具之來後九門也謂乍觀文相如約十中一之一云非二非三乃至非十之一也而不爾乎所以十中一之不盡者但見為第一而攝十耳不見為第二而攝十乃至不見為第十而攝十故十中之一是不盡也故非二非三等者具能具所具之來後九門也問次答文云十中之一者唯是一之攝十之門耳非是二攝十非是三攝十乃至非是十攝十之一故攝十不盡已上故是十門中唯第一門故云不盡也是則立在一身中應論盡不盡何故須約來苐十門之具十中超舉終錢作不盡耶答十中一之不盡者何故然耶唯見此一為初一而攝十之門耳不見為第二而攝十乃至不見為第十而攝十之門故約第二門以去後九門云不盡也是以超二重八門舉第十門中所具錢云十中一故不盡故不違也問既此章中唯約初門論盡不盡是則應別執來去二門而論何故并舉來初去終論耶答其義理章中雖合執論然各單舉一門論故方得明現來初去終具錢狀同之義是故此章且約一門論也問可直云不攝第二門中十不攝第三門中十乃至不攝第十門中十何故云非是二攝十非是三攝十等耶答有人云初一更受第二位而攝十受第三位而攝十乃至受第十位而攝十故欲遮此義也謂若初一受第二位而攝十乃至受第十位而攝十者可來初一中攝十時並盡也而初一唯是一而攝十之門耳非為第二而攝十乃至非為第十而攝十之門故來後九門攝十之義非其所盡也私意十位中唯是一攝十等雖言私意非是異義但是增現琳德之義也謂前琳德意云十位中之初一唯是為一攝十故盡也此一非是為第二而攝十是故第二門之所攝十非其所盡故云不盡如是增現也文云若二攝十是可得故一本云若二攝十是應得耶等言雖有異義乃不違後文義者初一唯是為一而攝十耳不能受第二位而攝十也而有人妄謂初一更受第二位而攝十是應得耶為決此疑故云十中一故不盡也初文義者雖初一受第二位而攝十無有此理而第二門之本二為本二而攝十之義可得也是乃初門所不能盡故云十中一故不盡也此釋明現初餘門如虛空釋非別義意者問同躰即門云問為但攝自一門中無盡重重耶為亦攝餘異門無盡耶答或俱攝或但攝自門無盡何以故若無自一門中無盡餘一切門中無盡皆悉不成故是故初門同躰即攝同異二門中無盡無盡窮其圓極法界無不攝盡耳或但攝自同躰一門中無盡何以故由餘異門如虛空故不相知故自具足故更無可攝也已上如虛空之文在後何云明現初餘門如虛空釋耶答同躰即門雖爾而諸法相即自在門云若一門中即具足無盡自在者餘門何用為答餘門如虛空何以故同躰一門並攝一切無不盡故問此同躰中所攝一切者只應攝自門中一切豈可攝餘門中一切耶答既攝自一切復攝餘一一門中無盡一切已上如是如虛空之釋在初而攝餘異門中無盡之釋在後故於此文云此釋明現初餘門如虛空釋非別義意也伴伴並過者初門所具第二門所具並故也初門能具苐二門能具並故實則亦應有主主並過也就釋相德義中彼文云以一事辨一多故盡以異事辨一多故不盡者相德亦合執來初去終作盡耶答爾也謂前來去二十門中各論具錢已次云本末二門中既具足十門餘八門中準例也本錢中通舉來初去終二門末錢中亦通舉去初來終故結中一中十者亦通約來初去終也十中一者亦通約去初來終也因一中十之言云一門中既具足十義故明知一門中有無盡已上是故一門中既具足十義者通舉來初去終也牒此一門中既具十義問云一門中攝十盡否故此問中亦通舉來初去終問盡不盡也是故答中以一事辨一多故盡之中亦舉來初去終作盡也問以異事辨一多者此亦超舉來終去初作不盡耶答通舉來後九門去前九門云以異事辨一多也是故以來後九異事辨一多者對來初門之盡辨不盡以去前九異事辨一多者對去終門之盡辨不盡也問以一事辨一多者一事者是何一事一者是何一多者是何多耶答一事者具能具所具之初門也一者牒前一事故亦具能具所具之一門也多者別數能具所具故云多也何以知然下文云一事中一多義不相是則是多是一事故即是一者此中雖有多説此文釋前盡中一多之義也初門一事中能具之一所具多不相是之義是則多也而並是一門故即是一也故一事者具能具所具之初門也一者牒前一事也多者別數能具所具之多故云多也問以異事辨一多者且約來門則以來後九門為異事也所言辨一多者還舉初門之一多云辨一多耶於後九門中各辨一多耶答融質大德言異事者謂別相不盡之九門也辨一多者謂捴相盡之一多也是以別相不盡者吾捴相盡中所具德故若數所具德則無盡故云別相不盡也是以相德義中若以捴相盡義云則以一名口許亦得以別相不盡云則以異名口許亦得然今以異事辨一多者第二門中以二事辨一多乃至第十門中以十事辨一多如是每門門辨一多合約且云以異事辨一多也實則各辨一多故云不盡也問文云以異事辨一多者舉二明十二乃至舉十明十十門也等者如是則第二門中應云辨二多乃至第十門中應云辨十多何故門門皆言辨一多耶答用受位之門論則雖爾而約當躰則門門各一故皆云辨一多也問文云別別諸事門中準例已上是則來後九門及去前九門論盡不盡者何耶答相德義中每門門合執論也謂來第二門去苐九門可云以二事辨一多故盡以異事辨一多故不盡也若來第五門去第六門應云以五事辨一多故盡以異事明一多故不盡至來第九門去第二門中應云以九事辨一多故盡以異事辨一多故不盡至來第十門去第一門應云以十事辨一多故盡以異事辨一多故不盡也問門門若約當躰則皆一是則門門皆應云以一事辨一多耶答若門門每言一事則十門之盡不盡合雜難分故欲別十門之盡不盡故於第二門中則云以二事於第三門中則云以三事而約當躰是一故門門皆言一多也文云異事準司者釋前以一事辨一多故盡之文云又一事中一多義不相是則多一事故即是一已若例此釋以異事辨一多之義亦可云一事中一多義不相是則多是一事故即一也故云異事準同也文云是故此二三等一之無得意也者問何一之無得義耶答融質德云別相不盡中十二十三等者捴相盡一之無得義也梵躰德云二者是第二門所具第二也三者是第三門所具第三也謂第二門中第一二第二二中一故此門中一是所具之第二也於第三門中第一三第二三中二第三三中一故此門中一是所具之第三也故約第二門所具第二第三門所具第三而云此二三等是一之無得義也然此義難也謂者爾者於第二門中唯取所具第一云一多耳而不通取十二於第三門唯取所具第三云一多耳而不通取十二耶若許爾則且初門中後九捴是所具可云二多乃至十多何故只言一多耶是故此義難也是以二者第二門之十二也三者第三門之十三也謂第二門中十二者是第二一之無得義也第三門中十三者是第三一之無得義也是故苐二門中可云以二事辨一多第三門中可云以三事辨一多也問文云先十一者非情計一故以二呼時得二名口許也者有何相關而有此言耶答若無初門中十則餘門中十皆悉不成是故由初門中呼一時十皆口許是一故得至於第二門中呼二時十皆口許是二乃至第十門中呼十時十皆口許是十也文云各各自位不動者釋藏師之義也呼一時一名口許者釋相德之義也一緣起法中等者一緣起法中具無性不壞二義相德得無性義藏師得不壞義各現一邊故云意至齊同也問古言同相中有分同滿同也分同者一尺留頭出一尺力同於二十步堂也滿同者一尺留頭出二十步力同於二十步堂也用此分一乘三乘義者分同一乘也滿同三乘也謂一尺留頭出二十步力同於堂者動自一尺位方同二十步堂故是乃三乘泯差別俗相方歸平等真之義故滿同三乘也一尺留頭出一尺力同於堂者不動自一尺位能同於二十步堂故斯乃一乘不動差別俗相即平等真之義故分同一乘也今相德之呼一時一切一名口許之義是滿同義故三乘藏師之呼一時一切自名口許之義是分同義故一乘耶答設藏師之義為分同相德之義為滿同也而古人所立分同一乘滿同三乘意者一尺之義一向置留頭中二十步之義一向置堂中故一尺留頭出二十步力同於堂者以堂之所二十步力方得同於二十步堂如是見故云滿同三乘分同一乘也然而分同滿同之義非唯爾耳既古人云一尺之二十步二十步之一尺故約此義則分同滿同並一乘故二師之義並為一乘也既云相德呼一時一切一名口許者約無性義故正是一乘也古人既云一尺留頭用自二十步力同於二十步堂二十步堂用自一尺力同於一尺留頭已上是故一尺留頭本自有二十步力八尺柱本自有二十步力故一尺留頭出自本具二十步力同於二十步堂也問一尺留頭者唯是一尺位無二十步義八尺柱者唯是八尺位無二十步義也是則何得自有二十步力而能同耶答本受異位之時全二十步名為一尺全二十步名為八尺故一尺留頭本自有二十步力八尺柱亦本自有二十步力也是故各出本有二十步力同於二十步堂也問呼一時十皆一名口許義者第二門中以初一所一名而口許第三門中亦以初一所一名而口許耶以自本有一名而口許耶答以自所有一名而得口許也問第二之二唯二而無一義第三之三亦唯三而無一義何得以自具一名口許耶答第二二者無性二也第三三者亦無性三也故以本有一名得口許也問若無性之二三等者設呼二時亦以一名口許也然方呼一時得以一名口許是則可云用初一所一名方能口許耶答第二門之二呼一時即以一名口許乃至呼十時即以十名口許者由本無自性以一切為自性本無自名以一切為自名故以自本有一名口許也且夫令習如此一言下具多義之觀者欲何所為曰相德既云若欲觀緣起實相陀羅尼法者先應學數十錢法是則行人若習呼一錢時十錢並一名口許之觀者知自身心中滿足佛菩薩法能以近會遠不動五尺均踏三際窮證自躰毗盧果海有如是最勝方便故制此觀也是以盧舍那佛於二佛世界微塵數劫修習此觀今證三世間法為自身心故凡一切行人可不精進於此觀乎文中於不思議以成陀羅尼句次立隨文取義有五種過之句意者天五海者是衆生本識也本識者無分別心也無分別心者濕過海心也濕過海心者觀釋云熟教之海是濕留海者先考其海也水是海耶深是海耶乃至蟹耶魚耶然水非海也所以者何海邊之人載水而去但云將海水去不云將海去也餘並例爾是故水等皆非海也是則何者是海乃衆多之物合不分處以為海也然熟教之義要以水之所濕一切之物方為海耳不及濕處非是海也是故夌田之浪非是海之浪也如是遍計中真不及故除二十夢也依他之法無不是真故不除其法也所以合一切物方為海而唯取水之通諸物義為海者欲現一真如為本之義也是故𤍨教之中由以真如為本要取真如及處為海而此遍計非真所及不為海故故云夌田之浪非是海也而一乘中既不別取真如為本故無真之所不及處也是故遍計即圓成真故夌田之浪即為海也此是濕過海心也彼五海者一切世界海中通攝所有世界一切衆生中通攝所有衆生乃至一切三世諸佛海中捴攝所有諸佛如是三種世間和合一無分別之處名為濕過海心也亦為本識十地何故此法為十地耶謂十地者從喻得名故若考其地土是地耶石是地耶山嶽河海虛空等耶若偏取一不得為地合一切物一無分別方得為地如是三世聞法和合一無分別之處若佛證此則為國土海也隨菩薩心分之則為十地也盧舍那佛始成正覺離分別證三世間法是海印定也古人所謂佛言我今證汝身心即佛汝等亦可信也者此意也樂哉我所得法不動衆生身心不動器世間法即佛身心如是受自法樂者佛華嚴定也於此下一步如此之法豈獨吾證得而止耶亦令衆生同證是法起大悲心為師子奮迅定也如是初會中臨普賢菩薩餉五海法普賢受五海法於本分中説十智者此為海智緣起本識十地也如此本分説海智緣起本識十地之時有成益者於此人中無有更於説分之中為説世界海中一海之義然為未解者於説分中隱染現淨説巧飾華藏果也於是機人起希望心云何修習能得此果耶故於第二會中授三業種子也謂名號品説種種名種種身等稱此而應為能化佛也汝等名即佛名汝等身即佛身如是誨也四諦品中説四諦理云苦集者生死因果是乃衆生起惑受苦滅道者涅槃因果斯乃衆生修道證滅之義也故衆生之起惑受苦及修道證滅之義即佛口業如是誨也光明覺品中放意業光明現示法界無非佛之意業也此衆生之三業者佛證則為內證也行人若修則即是佛故汝等應可修此三業如是誨也此三業者是何謂性起品之十三身是名號品之身業性起品之大千經卷是四諦品之口業性起品之一切智無師智自然智是光明覺之意業也明難淨行等中鍊心田也賢首品中下前所授之種子也第三會中生芽焉第四會中莖立而葉生焉第五會中葉茂而花開焉第六會十地中果結焉佛不思議相海小相三品中果𤍨焉始此修生已至性起品而見之則名號品中所授之身業乃吾本有十三等身是耳四諦品中所授之口業乃吾本有之大千經卷是耳光明覺品中所授之意業乃吾本有之三智是耳此為普賢性起中證本有果之義是乃生解之義也依此䡄而修行之義於離世間品中現示也依此䡄而入證之義於苐八會中示現也故華嚴經中所説並無非十地也以無非十地故云不思議以成陀羅尼現地法也如是一言下具多義故於吾身中有佛菩薩若不知此義者聞凡則為一向凡聞聖則異於凡由如是執故不能頓信大緣起法是為不正信由如是故退於勇猛精進故為退勇猛自既如是猶為他人説自所解是為誑他凡身即佛而執佛異凡故謗佛由如是故亦輕大法故為輕法也如是令習一中過知不動凡身即自體意此苐
